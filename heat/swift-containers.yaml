heat_template_version: 2021-04-16

description: >
  OpenStack Heat template for creating Swift object storage containers
  for the Unified Insurance Platform.

parameters:
  environment:
    type: string
    description: Deployment environment
    default: production
    constraints:
      - allowed_values: [development, staging, production]

resources:
  # ===========================================
  # Swift Containers for Document Storage
  # ===========================================

  documents_container:
    type: OS::Swift::Container
    properties:
      name: insurance-documents
      X-Container-Meta:
        environment: { get_param: environment }
        purpose: document-storage
      X-Container-Read: ".r:*,.rlistings"

  backups_container:
    type: OS::Swift::Container
    properties:
      name: insurance-backups
      X-Container-Meta:
        environment: { get_param: environment }
        purpose: database-backups
        retention-days: "90"

  lakehouse_container:
    type: OS::Swift::Container
    properties:
      name: insurance-lakehouse
      X-Container-Meta:
        environment: { get_param: environment }
        purpose: iceberg-lakehouse
        format: parquet

  ml_models_container:
    type: OS::Swift::Container
    properties:
      name: insurance-ml-models
      X-Container-Meta:
        environment: { get_param: environment }
        purpose: ml-model-storage

  audit_logs_container:
    type: OS::Swift::Container
    properties:
      name: insurance-audit-logs
      X-Container-Meta:
        environment: { get_param: environment }
        purpose: audit-log-archive
        retention-days: "2555"

  registry_container:
    type: OS::Swift::Container
    properties:
      name: docker-registry
      X-Container-Meta:
        environment: { get_param: environment }
        purpose: container-registry

outputs:
  documents_container_url:
    description: URL for documents container
    value:
      str_replace:
        template: swift://insurance-documents
        params: {}

  backups_container_url:
    description: URL for backups container
    value:
      str_replace:
        template: swift://insurance-backups
        params: {}

  lakehouse_container_url:
    description: URL for lakehouse container
    value:
      str_replace:
        template: swift://insurance-lakehouse
        params: {}

  ml_models_container_url:
    description: URL for ML models container
    value:
      str_replace:
        template: swift://insurance-ml-models
        params: {}
