heat_template_version: 2021-04-16

description: >
  OpenStack Heat template for auto-scaling Kubernetes worker nodes
  based on cluster resource utilization.

parameters:
  key_name:
    type: string
    description: Name of keypair to assign to servers
    default: insurance-platform-key

  image:
    type: string
    description: Image to use for servers
    default: Ubuntu-22.04-LTS

  worker_flavor:
    type: string
    description: Flavor for Kubernetes worker nodes
    default: m1.2xlarge

  network:
    type: string
    description: Network ID for worker nodes

  security_group:
    type: string
    description: Security group for worker nodes

  min_workers:
    type: number
    description: Minimum number of worker nodes
    default: 3

  max_workers:
    type: number
    description: Maximum number of worker nodes
    default: 20

  cooldown:
    type: number
    description: Cooldown period in seconds
    default: 300

resources:
  # ===========================================
  # Auto-Scaling Group for Worker Nodes
  # ===========================================

  worker_scaling_group:
    type: OS::Heat::AutoScalingGroup
    properties:
      min_size: { get_param: min_workers }
      max_size: { get_param: max_workers }
      cooldown: { get_param: cooldown }
      resource:
        type: OS::Nova::Server
        properties:
          name: insurance-k8s-worker-autoscale
          image: { get_param: image }
          flavor: { get_param: worker_flavor }
          key_name: { get_param: key_name }
          networks:
            - network: { get_param: network }
          security_groups:
            - { get_param: security_group }
          user_data_format: RAW
          user_data: |
            #!/bin/bash
            set -e
            
            # Update system
            apt-get update && apt-get upgrade -y
            
            # Install dependencies
            apt-get install -y apt-transport-https ca-certificates curl software-properties-common
            
            # Install Docker
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | apt-key add -
            add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
            apt-get update && apt-get install -y docker-ce docker-ce-cli containerd.io
            
            # Configure containerd
            mkdir -p /etc/containerd
            containerd config default | tee /etc/containerd/config.toml
            sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
            systemctl restart containerd
            
            # Install Kubernetes components
            curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
            echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list
            apt-get update && apt-get install -y kubelet kubeadm kubectl
            apt-mark hold kubelet kubeadm kubectl
            
            # Disable swap
            swapoff -a
            sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
            
            # Enable kernel modules
            modprobe overlay
            modprobe br_netfilter
            
            # Sysctl params
            cat <<EOF | tee /etc/sysctl.d/k8s.conf
            net.bridge.bridge-nf-call-iptables  = 1
            net.bridge.bridge-nf-call-ip6tables = 1
            net.ipv4.ip_forward                 = 1
            EOF
            sysctl --system
            
            echo "Worker node ready to join cluster"

  # ===========================================
  # Scaling Policies
  # ===========================================

  scale_up_policy:
    type: OS::Heat::ScalingPolicy
    properties:
      adjustment_type: change_in_capacity
      auto_scaling_group_id: { get_resource: worker_scaling_group }
      cooldown: { get_param: cooldown }
      scaling_adjustment: 2

  scale_down_policy:
    type: OS::Heat::ScalingPolicy
    properties:
      adjustment_type: change_in_capacity
      auto_scaling_group_id: { get_resource: worker_scaling_group }
      cooldown: { get_param: cooldown }
      scaling_adjustment: -1

  # ===========================================
  # Ceilometer Alarms for Auto-Scaling
  # ===========================================

  cpu_alarm_high:
    type: OS::Aodh::GnocchiAggregationByResourcesAlarm
    properties:
      description: Scale up if CPU > 70% for 5 minutes
      metric: cpu_util
      aggregation_method: mean
      granularity: 300
      evaluation_periods: 1
      threshold: 70
      resource_type: instance
      comparison_operator: gt
      alarm_actions:
        - { get_attr: [scale_up_policy, alarm_url] }
      query:
        str_replace:
          template: '{"=": {"server_group": "STACK_ID"}}'
          params:
            STACK_ID: { get_param: "OS::stack_id" }

  cpu_alarm_low:
    type: OS::Aodh::GnocchiAggregationByResourcesAlarm
    properties:
      description: Scale down if CPU < 30% for 10 minutes
      metric: cpu_util
      aggregation_method: mean
      granularity: 300
      evaluation_periods: 2
      threshold: 30
      resource_type: instance
      comparison_operator: lt
      alarm_actions:
        - { get_attr: [scale_down_policy, alarm_url] }
      query:
        str_replace:
          template: '{"=": {"server_group": "STACK_ID"}}'
          params:
            STACK_ID: { get_param: "OS::stack_id" }

  memory_alarm_high:
    type: OS::Aodh::GnocchiAggregationByResourcesAlarm
    properties:
      description: Scale up if memory > 80% for 5 minutes
      metric: memory.usage
      aggregation_method: mean
      granularity: 300
      evaluation_periods: 1
      threshold: 80
      resource_type: instance
      comparison_operator: gt
      alarm_actions:
        - { get_attr: [scale_up_policy, alarm_url] }
      query:
        str_replace:
          template: '{"=": {"server_group": "STACK_ID"}}'
          params:
            STACK_ID: { get_param: "OS::stack_id" }

outputs:
  scale_up_url:
    description: Webhook URL to trigger scale up
    value: { get_attr: [scale_up_policy, alarm_url] }

  scale_down_url:
    description: Webhook URL to trigger scale down
    value: { get_attr: [scale_down_policy, alarm_url] }

  current_size:
    description: Current number of worker nodes
    value: { get_attr: [worker_scaling_group, current_size] }
