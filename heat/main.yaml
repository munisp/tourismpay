heat_template_version: 2021-04-16

description: >
  OpenStack Heat template for deploying the Unified Insurance Platform
  infrastructure including Kubernetes cluster, networking, storage, and
  supporting services.

parameters:
  key_name:
    type: string
    description: Name of keypair to assign to servers
    default: insurance-platform-key

  image:
    type: string
    description: Image to use for servers
    default: Ubuntu-22.04-LTS

  master_flavor:
    type: string
    description: Flavor for Kubernetes master nodes
    default: m1.xlarge

  worker_flavor:
    type: string
    description: Flavor for Kubernetes worker nodes
    default: m1.2xlarge

  worker_count:
    type: number
    description: Number of Kubernetes worker nodes
    default: 5
    constraints:
      - range: { min: 3, max: 20 }

  external_network:
    type: string
    description: External network for floating IPs
    default: external

  dns_nameservers:
    type: comma_delimited_list
    description: DNS nameservers
    default: "8.8.8.8,8.8.4.4"

  kubernetes_version:
    type: string
    description: Kubernetes version to deploy
    default: "1.28.4"

  environment:
    type: string
    description: Deployment environment
    default: production
    constraints:
      - allowed_values: [development, staging, production]

resources:
  # ===========================================
  # Networking Resources
  # ===========================================

  insurance_network:
    type: OS::Neutron::Net
    properties:
      name: insurance-platform-network
      admin_state_up: true

  insurance_subnet:
    type: OS::Neutron::Subnet
    properties:
      name: insurance-platform-subnet
      network_id: { get_resource: insurance_network }
      cidr: 10.0.0.0/16
      gateway_ip: 10.0.0.1
      dns_nameservers: { get_param: dns_nameservers }
      allocation_pools:
        - start: 10.0.1.10
          end: 10.0.255.250
      ip_version: 4

  insurance_router:
    type: OS::Neutron::Router
    properties:
      name: insurance-platform-router
      external_gateway_info:
        network: { get_param: external_network }

  router_interface:
    type: OS::Neutron::RouterInterface
    properties:
      router_id: { get_resource: insurance_router }
      subnet_id: { get_resource: insurance_subnet }

  # ===========================================
  # Security Groups
  # ===========================================

  kubernetes_master_security_group:
    type: OS::Neutron::SecurityGroup
    properties:
      name: insurance-k8s-master-sg
      description: Security group for Kubernetes master nodes
      rules:
        - direction: ingress
          protocol: tcp
          port_range_min: 22
          port_range_max: 22
          remote_ip_prefix: 0.0.0.0/0
        - direction: ingress
          protocol: tcp
          port_range_min: 6443
          port_range_max: 6443
          remote_ip_prefix: 0.0.0.0/0
        - direction: ingress
          protocol: tcp
          port_range_min: 2379
          port_range_max: 2380
          remote_ip_prefix: 10.0.0.0/16
        - direction: ingress
          protocol: tcp
          port_range_min: 10250
          port_range_max: 10252
          remote_ip_prefix: 10.0.0.0/16
        - direction: ingress
          protocol: udp
          port_range_min: 8472
          port_range_max: 8472
          remote_ip_prefix: 10.0.0.0/16
        - direction: egress
          protocol: tcp
          port_range_min: 1
          port_range_max: 65535
          remote_ip_prefix: 0.0.0.0/0

  kubernetes_worker_security_group:
    type: OS::Neutron::SecurityGroup
    properties:
      name: insurance-k8s-worker-sg
      description: Security group for Kubernetes worker nodes
      rules:
        - direction: ingress
          protocol: tcp
          port_range_min: 22
          port_range_max: 22
          remote_ip_prefix: 10.0.0.0/16
        - direction: ingress
          protocol: tcp
          port_range_min: 10250
          port_range_max: 10250
          remote_ip_prefix: 10.0.0.0/16
        - direction: ingress
          protocol: tcp
          port_range_min: 30000
          port_range_max: 32767
          remote_ip_prefix: 0.0.0.0/0
        - direction: ingress
          protocol: udp
          port_range_min: 8472
          port_range_max: 8472
          remote_ip_prefix: 10.0.0.0/16
        - direction: ingress
          protocol: tcp
          port_range_min: 80
          port_range_max: 80
          remote_ip_prefix: 0.0.0.0/0
        - direction: ingress
          protocol: tcp
          port_range_min: 443
          port_range_max: 443
          remote_ip_prefix: 0.0.0.0/0
        - direction: egress
          protocol: tcp
          port_range_min: 1
          port_range_max: 65535
          remote_ip_prefix: 0.0.0.0/0

  database_security_group:
    type: OS::Neutron::SecurityGroup
    properties:
      name: insurance-database-sg
      description: Security group for database access
      rules:
        - direction: ingress
          protocol: tcp
          port_range_min: 5432
          port_range_max: 5432
          remote_ip_prefix: 10.0.0.0/16
        - direction: ingress
          protocol: tcp
          port_range_min: 6379
          port_range_max: 6379
          remote_ip_prefix: 10.0.0.0/16

  # ===========================================
  # Kubernetes Master Nodes
  # ===========================================

  master_port_1:
    type: OS::Neutron::Port
    properties:
      network_id: { get_resource: insurance_network }
      security_groups:
        - { get_resource: kubernetes_master_security_group }
      fixed_ips:
        - subnet_id: { get_resource: insurance_subnet }
          ip_address: 10.0.1.10

  master_port_2:
    type: OS::Neutron::Port
    properties:
      network_id: { get_resource: insurance_network }
      security_groups:
        - { get_resource: kubernetes_master_security_group }
      fixed_ips:
        - subnet_id: { get_resource: insurance_subnet }
          ip_address: 10.0.1.11

  master_port_3:
    type: OS::Neutron::Port
    properties:
      network_id: { get_resource: insurance_network }
      security_groups:
        - { get_resource: kubernetes_master_security_group }
      fixed_ips:
        - subnet_id: { get_resource: insurance_subnet }
          ip_address: 10.0.1.12

  master_floating_ip:
    type: OS::Neutron::FloatingIP
    properties:
      floating_network: { get_param: external_network }
      port_id: { get_resource: master_port_1 }

  kubernetes_master_1:
    type: OS::Nova::Server
    properties:
      name: insurance-k8s-master-1
      image: { get_param: image }
      flavor: { get_param: master_flavor }
      key_name: { get_param: key_name }
      networks:
        - port: { get_resource: master_port_1 }
      user_data_format: RAW
      user_data:
        str_replace:
          template: |
            #!/bin/bash
            set -e
            
            # Update system
            apt-get update && apt-get upgrade -y
            
            # Install dependencies
            apt-get install -y apt-transport-https ca-certificates curl software-properties-common
            
            # Install Docker
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | apt-key add -
            add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
            apt-get update && apt-get install -y docker-ce docker-ce-cli containerd.io
            
            # Configure containerd
            mkdir -p /etc/containerd
            containerd config default | tee /etc/containerd/config.toml
            sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
            systemctl restart containerd
            
            # Install Kubernetes components
            curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
            echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list
            apt-get update && apt-get install -y kubelet=$K8S_VERSION-* kubeadm=$K8S_VERSION-* kubectl=$K8S_VERSION-*
            apt-mark hold kubelet kubeadm kubectl
            
            # Disable swap
            swapoff -a
            sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
            
            # Enable kernel modules
            cat <<EOF | tee /etc/modules-load.d/k8s.conf
            overlay
            br_netfilter
            EOF
            modprobe overlay
            modprobe br_netfilter
            
            # Sysctl params
            cat <<EOF | tee /etc/sysctl.d/k8s.conf
            net.bridge.bridge-nf-call-iptables  = 1
            net.bridge.bridge-nf-call-ip6tables = 1
            net.ipv4.ip_forward                 = 1
            EOF
            sysctl --system
            
            # Initialize Kubernetes cluster
            kubeadm init --control-plane-endpoint="$MASTER_IP:6443" --upload-certs --pod-network-cidr=10.244.0.0/16
            
            # Setup kubectl for root
            mkdir -p /root/.kube
            cp -i /etc/kubernetes/admin.conf /root/.kube/config
            
            # Install Flannel CNI
            kubectl apply -f https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
            
            # Install NGINX Ingress Controller
            kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.9.4/deploy/static/provider/cloud/deploy.yaml
            
            # Install Dapr
            wget -q https://raw.githubusercontent.com/dapr/cli/master/install/install.sh -O - | /bin/bash
            dapr init -k
            
            echo "Kubernetes master initialization complete"
          params:
            $K8S_VERSION: { get_param: kubernetes_version }
            $MASTER_IP: 10.0.1.10

  kubernetes_master_2:
    type: OS::Nova::Server
    depends_on: kubernetes_master_1
    properties:
      name: insurance-k8s-master-2
      image: { get_param: image }
      flavor: { get_param: master_flavor }
      key_name: { get_param: key_name }
      networks:
        - port: { get_resource: master_port_2 }

  kubernetes_master_3:
    type: OS::Nova::Server
    depends_on: kubernetes_master_1
    properties:
      name: insurance-k8s-master-3
      image: { get_param: image }
      flavor: { get_param: master_flavor }
      key_name: { get_param: key_name }
      networks:
        - port: { get_resource: master_port_3 }

  # ===========================================
  # Kubernetes Worker Nodes
  # ===========================================

  worker_group:
    type: OS::Heat::ResourceGroup
    depends_on: kubernetes_master_1
    properties:
      count: { get_param: worker_count }
      resource_def:
        type: OS::Nova::Server
        properties:
          name: insurance-k8s-worker-%index%
          image: { get_param: image }
          flavor: { get_param: worker_flavor }
          key_name: { get_param: key_name }
          networks:
            - network: { get_resource: insurance_network }
          security_groups:
            - { get_resource: kubernetes_worker_security_group }
          user_data_format: RAW
          user_data:
            str_replace:
              template: |
                #!/bin/bash
                set -e
                
                # Update system
                apt-get update && apt-get upgrade -y
                
                # Install dependencies
                apt-get install -y apt-transport-https ca-certificates curl software-properties-common
                
                # Install Docker
                curl -fsSL https://download.docker.com/linux/ubuntu/gpg | apt-key add -
                add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
                apt-get update && apt-get install -y docker-ce docker-ce-cli containerd.io
                
                # Configure containerd
                mkdir -p /etc/containerd
                containerd config default | tee /etc/containerd/config.toml
                sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
                systemctl restart containerd
                
                # Install Kubernetes components
                curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
                echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list
                apt-get update && apt-get install -y kubelet=$K8S_VERSION-* kubeadm=$K8S_VERSION-* kubectl=$K8S_VERSION-*
                apt-mark hold kubelet kubeadm kubectl
                
                # Disable swap
                swapoff -a
                sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
                
                # Enable kernel modules
                cat <<EOF | tee /etc/modules-load.d/k8s.conf
                overlay
                br_netfilter
                EOF
                modprobe overlay
                modprobe br_netfilter
                
                # Sysctl params
                cat <<EOF | tee /etc/sysctl.d/k8s.conf
                net.bridge.bridge-nf-call-iptables  = 1
                net.bridge.bridge-nf-call-ip6tables = 1
                net.ipv4.ip_forward                 = 1
                EOF
                sysctl --system
                
                echo "Worker node ready to join cluster"
              params:
                $K8S_VERSION: { get_param: kubernetes_version }

  # ===========================================
  # Load Balancer (Octavia)
  # ===========================================

  api_loadbalancer:
    type: OS::Octavia::LoadBalancer
    properties:
      name: insurance-api-lb
      vip_subnet: { get_resource: insurance_subnet }

  api_listener:
    type: OS::Octavia::Listener
    properties:
      name: insurance-api-listener
      loadbalancer: { get_resource: api_loadbalancer }
      protocol: HTTPS
      protocol_port: 443

  api_pool:
    type: OS::Octavia::Pool
    properties:
      name: insurance-api-pool
      listener: { get_resource: api_listener }
      lb_algorithm: ROUND_ROBIN
      protocol: HTTP

  ingress_loadbalancer:
    type: OS::Octavia::LoadBalancer
    properties:
      name: insurance-ingress-lb
      vip_subnet: { get_resource: insurance_subnet }

  ingress_listener_http:
    type: OS::Octavia::Listener
    properties:
      name: insurance-ingress-http
      loadbalancer: { get_resource: ingress_loadbalancer }
      protocol: HTTP
      protocol_port: 80

  ingress_listener_https:
    type: OS::Octavia::Listener
    properties:
      name: insurance-ingress-https
      loadbalancer: { get_resource: ingress_loadbalancer }
      protocol: HTTPS
      protocol_port: 443

  ingress_floating_ip:
    type: OS::Neutron::FloatingIP
    properties:
      floating_network: { get_param: external_network }
      port_id: { get_attr: [ingress_loadbalancer, vip_port_id] }

  # ===========================================
  # Cinder Volumes for Persistent Storage
  # ===========================================

  postgresql_volume:
    type: OS::Cinder::Volume
    properties:
      name: insurance-postgresql-data
      size: 500
      volume_type: ssd

  redis_volume:
    type: OS::Cinder::Volume
    properties:
      name: insurance-redis-data
      size: 50
      volume_type: ssd

  kafka_volume:
    type: OS::Cinder::Volume
    properties:
      name: insurance-kafka-data
      size: 500
      volume_type: ssd

  tigerbeetle_volume:
    type: OS::Cinder::Volume
    properties:
      name: insurance-tigerbeetle-data
      size: 200
      volume_type: high-iops

  prometheus_volume:
    type: OS::Cinder::Volume
    properties:
      name: insurance-prometheus-data
      size: 200
      volume_type: ssd

outputs:
  master_floating_ip:
    description: Floating IP of the Kubernetes master
    value: { get_attr: [master_floating_ip, floating_ip_address] }

  ingress_floating_ip:
    description: Floating IP of the ingress load balancer
    value: { get_attr: [ingress_floating_ip, floating_ip_address] }

  network_id:
    description: Network ID
    value: { get_resource: insurance_network }

  subnet_id:
    description: Subnet ID
    value: { get_resource: insurance_subnet }

  api_loadbalancer_vip:
    description: VIP of the API load balancer
    value: { get_attr: [api_loadbalancer, vip_address] }

  worker_ips:
    description: IP addresses of worker nodes
    value: { get_attr: [worker_group, first_address] }
