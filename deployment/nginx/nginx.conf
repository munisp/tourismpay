events {
    worker_connections 1024;
}

http {
    upstream customer_portal {
        server customer-portal:3000;
    }

    upstream telco_service {
        server telco-service:8010;
    }

    upstream fraud_database {
        server fraud-database:8011;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

    # Customer Portal
    server {
        listen 80;
        server_name portal.insureportal.ng;

        # Redirect to HTTPS
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name portal.insureportal.ng;

        ssl_certificate /etc/nginx/ssl/portal.crt;
        ssl_certificate_key /etc/nginx/ssl/portal.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 10M;

        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://customer_portal;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # Telco Service API
    server {
        listen 80;
        server_name telco-api.insureportal.ng;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name telco-api.insureportal.ng;

        ssl_certificate /etc/nginx/ssl/telco-api.crt;
        ssl_certificate_key /etc/nginx/ssl/telco-api.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://telco_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Fraud Database API
    server {
        listen 80;
        server_name fraud-api.insureportal.ng;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name fraud-api.insureportal.ng;

        ssl_certificate /etc/nginx/ssl/fraud-api.crt;
        ssl_certificate_key /etc/nginx/ssl/fraud-api.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://fraud_database;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
