version: '3.8'

services:
  # ============================================
  # DATABASES
  # ============================================
  
  postgres:
    image: postgres:15-alpine
    container_name: insurance-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-insurance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insurance_password}
      POSTGRES_MULTIPLE_DATABASES: customer_portal,telco_service,fraud_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create-multiple-databases.sh:/docker-entrypoint-initdb.d/create-multiple-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insurance"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insurance-network

  redis:
    image: redis:7-alpine
    container_name: insurance-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insurance-network

  # ============================================
  # CUSTOMER PORTAL
  # ============================================
  
  customer-portal:
    build:
      context: ../customer-portal-full
      dockerfile: Dockerfile
    container_name: customer-portal
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-insurance}:${POSTGRES_PASSWORD:-insurance_password}@postgres:5432/customer_portal
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insurance-network
    restart: unless-stopped

  # ============================================
  # TELCO DATA INTEGRATION SERVICE
  # ============================================
  
  telco-service:
    build:
      context: ../telco-data-integration-service
      dockerfile: Dockerfile
    container_name: telco-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-insurance}:${POSTGRES_PASSWORD:-insurance_password}@postgres:5432/telco_service
      MTN_API_URL: ${MTN_API_URL}
      MTN_API_KEY: ${MTN_API_KEY}
      AIRTEL_API_URL: ${AIRTEL_API_URL}
      AIRTEL_API_KEY: ${AIRTEL_API_KEY}
      GLO_API_URL: ${GLO_API_URL}
      GLO_API_KEY: ${GLO_API_KEY}
      NINEMOBILE_API_URL: ${NINEMOBILE_API_URL}
      NINEMOBILE_API_KEY: ${NINEMOBILE_API_KEY}
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - insurance-network
    restart: unless-stopped

  # ============================================
  # CROSS-COMPANY FRAUD DATABASE
  # ============================================
  
  fraud-database:
    build:
      context: ../cross-company-fraud-database
      dockerfile: Dockerfile
    container_name: fraud-database
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-insurance}:${POSTGRES_PASSWORD:-insurance_password}@postgres:5432/fraud_database
      FRAUD_DB_COMPANY_KEYS: ${FRAUD_DB_COMPANY_KEYS}
      NAICOM_ADMIN_API_KEY: ${NAICOM_ADMIN_API_KEY}
    ports:
      - "8011:8011"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - insurance-network
    restart: unless-stopped

  # ============================================
  # NGINX REVERSE PROXY
  # ============================================
  
  nginx:
    image: nginx:alpine
    container_name: insurance-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - customer-portal
      - telco-service
      - fraud-database
    networks:
      - insurance-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  insurance-network:
    driver: bridge
