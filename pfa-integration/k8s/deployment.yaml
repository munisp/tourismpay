apiVersion: apps/v1
kind: Deployment
metadata:
  name: pfa-integration
  namespace: insurance-platform
  labels:
    app: pfa-integration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pfa-integration
  template:
    metadata:
      labels:
        app: pfa-integration
    spec:
      containers:
        - name: pfa-integration
          image: pfa-integration:latest
          ports:
            - containerPort: 8092
          env:
            - name: PORT
              value: "8092"
          livenessProbe:
            httpGet:
              path: /health
              port: 8092
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8092
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: pfa-integration
  namespace: insurance-platform
spec:
  selector:
    app: pfa-integration
  ports:
    - port: 8092
      targetPort: 8092
  type: ClusterIP
