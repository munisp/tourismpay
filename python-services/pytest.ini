[pytest]
testpaths = tests
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    integration: marks tests as integration tests (require running services)
    unit: marks tests as unit tests (no external dependencies)
    contract: marks tests as contract tests (validate API schemas)
    slow: marks tests as slow (may take >5s)
