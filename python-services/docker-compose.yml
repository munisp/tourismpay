version: "3.9"

services:
  bis-ai-engine:
    build:
      context: ./bis-ai-engine
      dockerfile: ../Dockerfile
    ports:
      - "8001:8000"
    environment:
      - SERVICE_NAME=bis-ai-engine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  fraud-ml-service:
    build:
      context: ./fraud-ml-service
