apiVersion: apps/v1
kind: Deployment
metadata:
  name: nmid-integration
  namespace: insurance-platform
  labels:
    app: nmid-integration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nmid-integration
  template:
    metadata:
      labels:
        app: nmid-integration
    spec:
      containers:
        - name: nmid-integration
          image: nmid-integration:latest
          ports:
            - containerPort: 8094
          env:
            - name: PORT
              value: "8094"
          livenessProbe:
            httpGet:
              path: /health
              port: 8094
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8094
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: nmid-integration
  namespace: insurance-platform
spec:
  selector:
    app: nmid-integration
  ports:
    - port: 8094
      targetPort: 8094
  type: ClusterIP
