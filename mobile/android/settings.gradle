pluginManagement {
    includeBuild(new File(["node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', {paths: [require.resolve('react-native/package.json')]})"].execute(null, null).text.trim()).getParentFile().toString())
}
plugins {
    id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

rootProject.name = 'TourismPay'
include ':app'

includeBuild('../node_modules/@react-native/gradle-plugin')

apply from: new File(["node", "--print", "require.resolve('@react-native-community/cli-platform-android/package.json', {paths: [require.resolve('react-native/package.json')]})"].execute(null, null).text.trim(), "../native_modules.gradle")
applyNativeModulesSettingsGradle(settings)
