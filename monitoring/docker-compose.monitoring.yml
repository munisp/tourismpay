# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.monitoring.yml — 54Link POS Shell Observability Stack
# ─────────────────────────────────────────────────────────────────────────────
# Full open-source monitoring stack:
#   - Prometheus       — metrics scraping + alerting
#   - Grafana          — dashboards + Grafana OnCall UI
#   - Grafana OnCall   — open-source on-call rotation (replaces PagerDuty)
#   - Alertmanager     — alert routing (Grafana OnCall + Slack)
#   - Node Exporter    — host-level metrics (CPU, memory, disk, network)
#
# Usage:
#   cd monitoring/
#   docker-compose -f docker-compose.monitoring.yml up -d
#
# Access:
#   Grafana:      http://localhost:3001  (admin / admin-change-in-production)
#   Prometheus:   http://localhost:9090
#   Alertmanager: http://localhost:9093
#   Grafana OnCall: http://localhost:3001/a/grafana-oncall-app
#
# POS Shell metrics endpoint: http://pos-shell:3000/api/metrics
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  oncall_data:

services:

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: pos_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    networks:
      - monitoring
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yml:/etc/prometheus/rules/pos-shell-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"           # POST /-/reload to hot-reload config
      - "--web.enable-admin-api"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: pos_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      - monitoring
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../docs/grafana-dashboard.json:/var/lib/grafana/dashboards/pos-shell.json:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin-change-in-production
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://grafana:3000
      # Enable Grafana OnCall plugin
      - GF_INSTALL_PLUGINS=grafana-oncall-app
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=grafana-oncall-app
      # Alertmanager datasource
      - GF_UNIFIED_ALERTING_ENABLED=true
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Grafana OnCall (open-source on-call rotation) ────────────────────────────
  # Replaces PagerDuty. Provides:
  #   - On-call schedules and rotations
  #   - Escalation chains
  #   - Alertmanager webhook integration
  #   - Slack / phone / email notifications
  # Docs: https://grafana.com/docs/oncall/latest/open-source/
  oncall:
    image: grafana/oncall:v1.8.9
    container_name: pos_oncall
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - monitoring
    volumes:
      - oncall_data:/var/lib/oncall
    environment:
      - SECRET_KEY=oncall-secret-key-change-in-production-min-50-chars-long
      - MIRAGE_SECRET_KEY=oncall-mirage-key-change-in-production-min-50-chars
      - MIRAGE_CIPHER_IV=oncall-iv-16chars
      - DATABASE_TYPE=sqlite3
      - BROKER_TYPE=redis
      - BASE_URL=http://oncall:8080
      - REDIS_URI=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=settings.hobby
      - CELERY_WORKER_QUEUE=default,critical,long,slack,telegram,webhook,retry,celery,grafana
      - CELERY_WORKER_CONCURRENCY=1
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=100
      - GRAFANA_API_URL=http://grafana:3000
      # Slack integration (optional — fill in real values)
      - SLACK_CLIENT_OAUTH_ID=slack-oauth-id-change-in-production
      - SLACK_CLIENT_OAUTH_SECRET=slack-oauth-secret-change-in-production
      - SLACK_SIGNING_SECRET=slack-signing-secret-change-in-production
    depends_on:
      - redis
      - grafana
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── OnCall Celery worker ─────────────────────────────────────────────────────
  oncall_worker:
    image: grafana/oncall:v1.8.9
    container_name: pos_oncall_worker
    restart: unless-stopped
    networks:
      - monitoring
    volumes:
      - oncall_data:/var/lib/oncall
    environment:
      - SECRET_KEY=oncall-secret-key-change-in-production-min-50-chars-long
      - MIRAGE_SECRET_KEY=oncall-mirage-key-change-in-production-min-50-chars
      - MIRAGE_CIPHER_IV=oncall-iv-16chars
      - DATABASE_TYPE=sqlite3
      - BROKER_TYPE=redis
      - BASE_URL=http://oncall:8080
      - REDIS_URI=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=settings.hobby
      - CELERY_WORKER_QUEUE=default,critical,long,slack,telegram,webhook,retry,celery,grafana
      - CELERY_WORKER_CONCURRENCY=1
    command: ["sh", "-c", "celery -A engine worker -l info -Q $CELERY_WORKER_QUEUE -c $CELERY_WORKER_CONCURRENCY --max-tasks-per-child=$CELERY_WORKER_MAX_TASKS_PER_CHILD"]
    depends_on:
      - redis
      - oncall

  # ── Redis (OnCall message broker) ────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: pos_redis
    restart: unless-stopped
    networks:
      - monitoring
    volumes:
      - /tmp/pos_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Alertmanager ─────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: pos_alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    networks:
      - monitoring
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://alertmanager:9093"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Node Exporter (host metrics) ─────────────────────────────────────────────
  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: pos_node_exporter
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
