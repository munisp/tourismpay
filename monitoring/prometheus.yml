# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Configuration — 54Link POS Shell
# ─────────────────────────────────────────────────────────────────────────────
# Used by docker-compose.monitoring.yml
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 30s
  scrape_timeout: 10s
  external_labels:
    environment: production
    service: pos-shell

# Load alerting rules
rule_files:
  - /etc/prometheus/rules/pos-shell-rules.yml

# Alertmanager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s

scrape_configs:

  # ── POS Shell application metrics ────────────────────────────────────────────
  - job_name: pos-shell
    static_configs:
      - targets:
          - pos-shell:3000   # Docker service name; use localhost:3000 for bare-metal
    metrics_path: /api/metrics
    scrape_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: pos-shell-prod

  # ── Node Exporter (host metrics) ─────────────────────────────────────────────
  - job_name: node-exporter
    static_configs:
      - targets:
          - node_exporter:9100
    scrape_interval: 30s

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # ── Alertmanager self-monitoring ─────────────────────────────────────────────
  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  # ── Grafana self-monitoring ──────────────────────────────────────────────────
  - job_name: grafana
    static_configs:
      - targets:
          - grafana:3000
    metrics_path: /metrics

  # ── Kubernetes pod discovery (production K8s deployment) ─────────────────────
