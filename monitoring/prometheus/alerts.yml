groups:
  # ── Float Balance Alerts ──────────────────────────────────────────────────────
  - name: float_balance
    rules:
      - alert: AgentFloatCriticallyLow
        expr: pos_agent_float_balance_ngn < 10000
        for: 5m
        labels:
          severity: critical
          team: operations
        annotations:
          summary: "Agent float balance critically low"
          description: "Agent {{ $labels.agent_id }} ({{ $labels.agent_code }}) has float balance of {{ $value | humanize }} NGN, below 10,000 NGN minimum."
          runbook: "https://docs.54link.ng/runbooks/float-replenishment"

      - alert: AgentFloatLow
        expr: pos_agent_float_balance_ngn < 50000
        for: 15m
        labels:
          severity: warning
          team: operations
        annotations:
          summary: "Agent float balance low"
          description: "Agent {{ $labels.agent_id }} has float balance of {{ $value | humanize }} NGN."

      - alert: FloatTopUpPendingTooLong
        expr: pos_float_topup_pending_age_seconds > 3600
        for: 5m
        labels:
          severity: warning
          team: operations
        annotations:
          summary: "Float top-up request pending for over 1 hour"
          description: "Float request {{ $labels.request_id }} for agent {{ $labels.agent_id }} has been pending for {{ $value | humanizeDuration }}."

  # ── Fraud Rate Alerts ─────────────────────────────────────────────────────────
  - name: fraud_detection
    rules:
      - alert: HighFraudRate
        expr: rate(pos_fraud_alerts_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          team: fraud
        annotations:
          summary: "High fraud alert rate detected"
          description: "Fraud alert rate is {{ $value | humanize }}/s over the last 5 minutes. Possible coordinated attack."
          runbook: "https://docs.54link.ng/runbooks/fraud-response"

      - alert: FraudAlertSpikeByAgent
        expr: increase(pos_fraud_alerts_by_agent_total[10m]) > 5
        for: 1m
        labels:
          severity: warning
          team: fraud
        annotations:
          summary: "Fraud alert spike for agent"
          description: "Agent {{ $labels.agent_id }} has triggered {{ $value }} fraud alerts in the last 10 minutes."

      - alert: VelocityBreachSpike
        expr: rate(pos_velocity_breaches_total[5m]) > 0.05
        for: 3m
        labels:
          severity: warning
          team: fraud
        annotations:
          summary: "Velocity breach rate elevated"
          description: "Velocity breach rate: {{ $value | humanize }}/s"

  # ── SIM Signal Quality Alerts ─────────────────────────────────────────────────
  - name: sim_signal
    rules:
      - alert: SimSignalCritical
        expr: pos_sim_rssi_dbm < -90
        for: 5m
        labels:
          severity: critical
          team: network
        annotations:
          summary: "SIM signal critically weak"
          description: "Terminal {{ $labels.terminal_id }} SIM {{ $labels.sim_slot }} RSSI is {{ $value }} dBm (critical threshold: -90 dBm)."
          runbook: "https://docs.54link.ng/runbooks/sim-failover"

      - alert: SimSignalWeak
        expr: pos_sim_rssi_dbm < -70
        for: 10m
        labels:
          severity: warning
          team: network
        annotations:
          summary: "SIM signal weak"
          description: "Terminal {{ $labels.terminal_id }} SIM {{ $labels.sim_slot }} RSSI is {{ $value }} dBm."

      - alert: SimFailoverTriggered
        expr: increase(pos_sim_failovers_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
          team: network
        annotations:
          summary: "SIM failover triggered"
          description: "Terminal {{ $labels.terminal_id }} triggered {{ $value }} SIM failover(s) in the last 5 minutes. Reason: {{ $labels.reason }}"

      - alert: SimPacketLossHigh
        expr: pos_sim_packet_loss_percent > 20
        for: 5m
        labels:
          severity: critical
          team: network
        annotations:
          summary: "SIM packet loss above 20%"
          description: "Terminal {{ $labels.terminal_id }} SIM {{ $labels.sim_slot }} packet loss: {{ $value }}%"

  # ── Transaction Latency Alerts ────────────────────────────────────────────────
  - name: transaction_latency
    rules:
      - alert: TransactionLatencyHigh
        expr: histogram_quantile(0.95, rate(pos_transaction_duration_seconds_bucket[5m])) > 3
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Transaction P95 latency above 3 seconds"
          description: "P95 transaction latency is {{ $value | humanizeDuration }}. SLA threshold: 3s."
          runbook: "https://docs.54link.ng/runbooks/latency-degradation"

      - alert: TransactionLatencyWarning
        expr: histogram_quantile(0.95, rate(pos_transaction_duration_seconds_bucket[5m])) > 1.5
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Transaction P95 latency elevated (>1.5s)"
          description: "P95 transaction latency is {{ $value | humanizeDuration }}."

      - alert: TransactionErrorRateHigh
        expr: rate(pos_transactions_total{status="failed"}[5m]) / rate(pos_transactions_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Transaction error rate above 5%"
          description: "Transaction error rate: {{ $value | humanizePercentage }}. This exceeds the 5% SLA threshold."

      - alert: TransactionThroughputDrop
        expr: rate(pos_transactions_total[5m]) < 0.1 and hour() >= 8 and hour() <= 20
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Transaction throughput unusually low during business hours"
          description: "Transaction rate is {{ $value | humanize }}/s during business hours (8am-8pm)."

  # ── Infrastructure Alerts ─────────────────────────────────────────────────────
  - name: infrastructure
    rules:
      - alert: DatabaseConnectionPoolExhausted
        expr: pos_db_pool_available_connections < 2
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Only {{ $value }} database connections available."

      - alert: KafkaConsumerLag
        expr: kafka_consumer_lag_sum > 10000
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group {{ $labels.consumer_group }} topic {{ $labels.topic }} lag: {{ $value }}"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis memory usage above 85%"
          description: "Redis memory: {{ $value | humanizePercentage }}"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} on {{ $labels.instance }} has been down for more than 1 minute."
