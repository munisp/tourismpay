groups:
  - name: availability_alerts
    interval: 30s
    rules:
      # ── POS Shell app down ──────────────────────────────────────────────────
      - alert: PosShellAppDown
        expr: up{job="pos-shell-app"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "POS Shell application is down"
          description: "The main POS Shell application has been unreachable for > 1 minute. All agent transactions will fail."
          runbook: "https://wiki.54link.ng/runbooks/app-down"

      # ── Fraud engine down ───────────────────────────────────────────────────
      - alert: FraudEngineDown
        expr: up{job="fraud-engine"} == 0
        for: 2m
        labels:
          severity: critical
          team: fraud
        annotations:
          summary: "Fraud detection engine is down"
          description: "The fraud engine has been unreachable for > 2 minutes. Transactions are proceeding without fraud screening."

      # ── Keycloak down ───────────────────────────────────────────────────────
      - alert: KeycloakDown
        expr: up{job="keycloak"} == 0
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Keycloak authentication service is down"
          description: "Keycloak has been unreachable for > 2 minutes. No new logins will succeed."

      # ── Kafka broker down ───────────────────────────────────────────────────
      - alert: KafkaBrokerDown
        expr: up{job="kafka"} == 0
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Kafka broker is down"
          description: "Kafka has been unreachable for > 2 minutes. Transaction events, fraud alerts, and SIM failover events will not be published."

      # ── Vault sealed or down ────────────────────────────────────────────────
      - alert: VaultSealedOrDown
        expr: vault_core_unsealed == 0 or up{job="vault"} == 0
        for: 1m
        labels:
          severity: critical
          team: security
        annotations:
          summary: "HashiCorp Vault is sealed or down"
          description: "Vault is unavailable. Secret injection will fail and services may not start correctly."
          runbook: "https://wiki.54link.ng/runbooks/vault-sealed"

      # ── PostgreSQL down ─────────────────────────────────────────────────────
      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "PostgreSQL database is down"
          description: "PostgreSQL has been unreachable for > 1 minute. All database operations will fail."

      # ── Redis down ──────────────────────────────────────────────────────────
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Redis cache is down"
          description: "Redis has been unreachable for > 2 minutes. Agent sessions and fraud rule caches will be unavailable."

      # ── High error rate ─────────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: rate(pos54link_http_requests_total{status=~"5.."}[5m]) / rate(pos54link_http_requests_total[5m]) > 0.05
        for: 3m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Error rate > 5% on POS Shell API"
          description: "{{ $value | humanizePercentage }} of API requests are returning 5xx errors over the last 5 minutes."

      # ── Low transaction success rate ────────────────────────────────────────
      - alert: LowTransactionSuccessRate
        expr: rate(pos54link_transactions_total{status="success"}[10m]) / rate(pos54link_transactions_total[10m]) < 0.95
        for: 5m
        labels:
          severity: critical
          team: operations
        annotations:
          summary: "Transaction success rate below 95%"
          description: "Only {{ $value | humanizePercentage }} of transactions are succeeding. Expected > 95%."
