groups:
  # ── MDM Device Compliance Alerts ──────────────────────────────────────────────
  - name: mdm_compliance
    interval: 60s
    rules:
      - alert: DeviceComplianceViolationCritical
        expr: pos_mdm_compliance_violations_total{severity="critical"} > 0
        for: 0m
        labels:
          severity: critical
          team: security
          category: mdm
        annotations:
          summary: "Critical MDM compliance violation detected"
          description: "Device {{ $labels.device_id }} has a critical compliance violation: {{ $labels.violation_type }}. Immediate action required."
          runbook: "https://docs.54link.ng/runbooks/mdm-compliance-violation"

      - alert: DeviceComplianceViolationWarning
        expr: pos_mdm_compliance_violations_total{severity="warning"} > 5
        for: 15m
        labels:
          severity: warning
          team: security
          category: mdm
        annotations:
          summary: "MDM compliance violations elevated"
          description: "{{ $value }} warning-level compliance violations detected in the last 15 minutes."

      - alert: DeviceRootDetected
        expr: pos_mdm_rooted_devices_total > 0
        for: 0m
        labels:
          severity: critical
          team: security
          category: mdm
        annotations:
          summary: "Rooted/jailbroken POS device detected"
          description: "Device {{ $labels.device_id }} has been flagged as rooted/jailbroken. Terminal: {{ $labels.terminal_id }}. This device must be immediately decommissioned."
          runbook: "https://docs.54link.ng/runbooks/rooted-device"

      - alert: DeviceOfflineTooLong
        expr: (time() - pos_mdm_last_heartbeat_timestamp) > 3600
        for: 5m
        labels:
          severity: warning
          team: operations
          category: mdm
        annotations:
          summary: "POS device offline for more than 1 hour"
          description: "Device {{ $labels.device_id }} (terminal {{ $labels.terminal_id }}) has not sent a heartbeat for {{ $value | humanizeDuration }}."
          runbook: "https://docs.54link.ng/runbooks/device-offline"

      - alert: DeviceOfflineCritical
        expr: (time() - pos_mdm_last_heartbeat_timestamp) > 86400
        for: 5m
        labels:
          severity: critical
          team: operations
          category: mdm
        annotations:
          summary: "POS device offline for more than 24 hours"
          description: "Device {{ $labels.device_id }} has been offline for {{ $value | humanizeDuration }}. Possible theft or hardware failure."
          runbook: "https://docs.54link.ng/runbooks/device-offline"

      - alert: DeviceTamperDetected
        expr: pos_mdm_tamper_events_total > 0
        for: 0m
        labels:
          severity: critical
          team: security
          category: mdm
        annotations:
          summary: "Physical tamper event detected on POS device"
          description: "Device {{ $labels.device_id }} reported a tamper event: {{ $labels.tamper_type }}. Location: {{ $labels.location }}. Immediate investigation required."
          runbook: "https://docs.54link.ng/runbooks/device-tamper"

      - alert: OTAUpdateFailureRateHigh
        expr: rate(pos_ota_update_failures_total[30m]) / rate(pos_ota_update_attempts_total[30m]) > 0.1
        for: 15m
        labels:
          severity: warning
          team: operations
          category: mdm
        annotations:
          summary: "OTA update failure rate above 10%"
          description: "OTA update failure rate: {{ $value | humanizePercentage }} over the last 30 minutes. Model: {{ $labels.model }}"

      - alert: GeofenceViolation
        expr: increase(pos_mdm_geofence_violations_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
          team: operations
          category: mdm
        annotations:
          summary: "POS device geofence violation"
          description: "Device {{ $labels.device_id }} has left its authorised geofence zone {{ $labels.zone_id }}. Current coordinates logged."
          runbook: "https://docs.54link.ng/runbooks/geofence-violation"

  # ── MDM Fleet Health Alerts ────────────────────────────────────────────────────
  - name: mdm_fleet
    interval: 300s
    rules:
      - alert: FleetOnlineRateLow
        expr: (pos_mdm_online_devices_total / pos_mdm_registered_devices_total) < 0.7
        for: 30m
        labels:
          severity: warning
          team: operations
          category: mdm
        annotations:
          summary: "Less than 70% of POS fleet is online"
          description: "Fleet online rate: {{ $value | humanizePercentage }}. Online: {{ $labels.online }}, Total: {{ $labels.total }}."

      - alert: FleetOnlineRateCritical
        expr: (pos_mdm_online_devices_total / pos_mdm_registered_devices_total) < 0.5
        for: 15m
        labels:
          severity: critical
          team: operations
          category: mdm
        annotations:
          summary: "Critical: less than 50% of POS fleet is online"
          description: "Fleet online rate has dropped to {{ $value | humanizePercentage }}. Possible network outage or mass device failure."
          runbook: "https://docs.54link.ng/runbooks/fleet-outage"

      - alert: OutdatedFirmwareDevicesHigh
        expr: pos_mdm_outdated_firmware_devices_total / pos_mdm_registered_devices_total > 0.3
        for: 60m
        labels:
          severity: warning
          team: operations
          category: mdm
        annotations:
          summary: "More than 30% of devices running outdated firmware"
          description: "{{ $value | humanizePercentage }} of devices are not on the latest firmware version. Security risk."
