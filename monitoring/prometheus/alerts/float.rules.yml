groups:
  - name: float_alerts
    interval: 30s
    rules:
      # ── Agent float critically low ──────────────────────────────────────────
      - alert: AgentFloatCriticallyLow
        expr: pos54link_agent_float_balance_ngn < 1000
        for: 2m
        labels:
          severity: critical
          team: operations
        annotations:
          summary: "Agent {{ $labels.agent_code }} float critically low"
          description: "Agent {{ $labels.agent_code }} has a float balance of ₦{{ $value | humanize }} which is below the ₦1,000 minimum threshold. Transactions will fail."
          runbook: "https://wiki.54link.ng/runbooks/float-low"
          webhook: "https://api.54link.ng/api/trpc/system.notifyOwner"

      # ── Agent float warning ─────────────────────────────────────────────────
      - alert: AgentFloatLow
        expr: pos54link_agent_float_balance_ngn < 10000
        for: 5m
        labels:
          severity: warning
          team: operations
        annotations:
          summary: "Agent {{ $labels.agent_code }} float low"
          description: "Agent {{ $labels.agent_code }} has a float balance of ₦{{ $value | humanize }}. Consider topping up soon."
          runbook: "https://wiki.54link.ng/runbooks/float-low"

      # ── Float top-up request pending too long ───────────────────────────────
      - alert: FloatTopUpPendingTooLong
        expr: pos54link_float_topup_pending_age_seconds > 3600
        for: 5m
        labels:
          severity: warning
          team: operations
        annotations:
          summary: "Float top-up request pending for over 1 hour"
          description: "Float top-up request {{ $labels.request_id }} for agent {{ $labels.agent_code }} has been pending for {{ $value | humanizeDuration }}."

      # ── Total float pool critically low ────────────────────────────────────
      - alert: TotalFloatPoolLow
        expr: sum(pos54link_agent_float_balance_ngn) < 1000000
        for: 5m
        labels:
          severity: critical
          team: finance
        annotations:
          summary: "Total float pool below ₦1,000,000"
          description: "The aggregate float balance across all agents is ₦{{ $value | humanize }}. Immediate replenishment required."
