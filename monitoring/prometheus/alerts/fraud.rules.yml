groups:
  - name: fraud_alerts
    interval: 15s
    rules:
      # ── High fraud alert rate ───────────────────────────────────────────────
      - alert: HighFraudAlertRate
        expr: rate(pos54link_fraud_alerts_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          team: fraud
        annotations:
          summary: "High fraud alert rate detected"
          description: "Fraud alert rate is {{ $value | humanize }} alerts/second over the last 5 minutes. Possible coordinated attack."
          runbook: "https://wiki.54link.ng/runbooks/fraud-spike"

      # ── Agent with multiple fraud flags ────────────────────────────────────
      - alert: AgentMultipleFraudFlags
        expr: increase(pos54link_fraud_alerts_total{agent_code!=""}[1h]) > 5
        for: 1m
        labels:
          severity: critical
          team: fraud
        annotations:
          summary: "Agent {{ $labels.agent_code }} has {{ $value }} fraud flags in the last hour"
          description: "Agent {{ $labels.agent_code }} at terminal {{ $labels.terminal_id }} has triggered {{ $value }} fraud alerts in the past hour. Consider suspending."

      # ── High risk score transactions ────────────────────────────────────────
      - alert: HighRiskScoreTransactions
        expr: rate(pos54link_transactions_total{risk_score="high"}[5m]) > 0.05
        for: 3m
        labels:
          severity: warning
          team: fraud
        annotations:
          summary: "Elevated rate of high-risk transactions"
          description: "{{ $value | humanize }} high-risk transactions per second in the last 5 minutes."

      # ── Blacklisted terminal activity ───────────────────────────────────────
      - alert: BlacklistedTerminalActivity
        expr: increase(pos54link_fraud_alerts_total{rule="blacklist"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
          team: fraud
        annotations:
          summary: "Blacklisted terminal {{ $labels.terminal_id }} attempted transaction"
          description: "Terminal {{ $labels.terminal_id }} is on the blacklist but attempted a transaction. Immediate investigation required."

      # ── Velocity rule violations ────────────────────────────────────────────
      - alert: VelocityRuleViolations
        expr: rate(pos54link_fraud_alerts_total{rule="velocity"}[1m]) > 0.5
        for: 2m
        labels:
          severity: warning
          team: fraud
        annotations:
          summary: "High velocity rule violation rate"
          description: "{{ $value | humanize }} velocity violations per second. Possible card testing attack."
