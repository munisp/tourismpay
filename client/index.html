<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>TourismPay Platform</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00FF88" />
    <meta name="description" content="TourismPay — Africa's Premier Tourism Payment &amp; Compliance Platform" />
    <!-- PWA / Apple -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/pwa-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/pwa-512.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TourismPay" />
    <!-- Open Graph -->
    <meta property="og:title" content="TourismPay — Africa Intelligence Platform" />
    <meta property="og:description" content="Multi-country KYB, Background Investigation Service, and AI-powered fraud detection for African tourism." />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // If a SW was already controlling this page before we (re-)register, any future
          // controllerchange is a genuine update. On a brand-new visitor's first-ever load
          // there's no controller yet, so the first claim isn't an "update" -- don't reload
          // for that one, only for ones after.
          const hadController = !!navigator.serviceWorker.controller;
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).then((reg) => {
            // The generated SW calls skipWaiting()+clientsClaim() unconditionally, so once
            // the browser notices a new sw.js it activates immediately -- but browsers only
            // check for a new sw.js on their own on a throttled schedule (up to 24h apart).
            // Ask explicitly so deploys are picked up promptly instead of requiring a hard
            // refresh or incognito window.
            const checkForUpdate = () => reg.update().catch(() => {});
            setInterval(checkForUpdate, 60 * 1000);
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') checkForUpdate();
            });

            // Once a new SW takes control (via clientsClaim), the current tab is still
            // running the OLD JS in memory. Reload once so it actually picks up the new
            // bundle. Guard against reload loops if this fires more than once.
            let isFirstEvent = true;
            let reloaded = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              // Skip only the very first event when there was no prior controller --
              // that's the initial claim on a fresh load, not an update. Every event
              // after that (including a first event when a controller already existed)
              // is a genuine update.
              const skip = isFirstEvent && !hadController;
              isFirstEvent = false;
              if (skip || reloaded) return;
              reloaded = true;
              window.location.reload();
            });
          }).catch(() => {});
        });
      }
    </script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
