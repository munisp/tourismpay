apiVersion: apps/v1
kind: Deployment
metadata:
  name: reinsurance-management
  namespace: insurance-platform
  labels:
    app: reinsurance-management
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reinsurance-management
  template:
    metadata:
      labels:
        app: reinsurance-management
    spec:
      containers:
        - name: reinsurance-management
          image: reinsurance-management:latest
          ports:
            - containerPort: 8093
          env:
            - name: PORT
              value: "8093"
          livenessProbe:
            httpGet:
              path: /health
              port: 8093
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8093
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: reinsurance-management
  namespace: insurance-platform
spec:
  selector:
    app: reinsurance-management
  ports:
    - port: 8093
      targetPort: 8093
  type: ClusterIP
