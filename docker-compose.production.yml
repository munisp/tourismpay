# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.production.yml — 54Link Agency Banking Platform
# Full production stack: infrastructure + application services + observability
#
# Usage:
#   cp .env.production.example .env.production
#   docker-compose -f docker-compose.production.yml --env-file .env.production up -d
#
# Bring up individual profiles:
#   --profile infra       → Kafka, Redis, TigerBeetle, Temporal, Keycloak, Permify, Vault
#   --profile app         → All application microservices
#   --profile gateway     → nginx reverse proxy
#   --profile observability → Prometheus, Grafana, Loki, Promtail, Alertmanager
# ─────────────────────────────────────────────────────────────────────────────
version: "3.9"

x-common-env: &common-env
  TZ: Africa/Lagos
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-restart-policy: &restart-policy
  restart: unless-stopped

x-healthcheck-defaults: &hc-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 60s

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  54link-infra:
    name: 54link-infra
    driver: bridge
  54link-app:
    name: 54link-app
    driver: bridge
  54link-obs:
    name: 54link-obs
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  tigerbeetle_data:
  temporal_data:
  keycloak_data:
  vault_data:
  vault_logs:
  prometheus_data:
  grafana_data:
  loki_data:
  minio_data:
  fluvio_data:
  alertmanager_data:
  nginx_certs:

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE TIER
  # ═══════════════════════════════════════════════════════════════════════════

  # ── PostgreSQL (primary OLTP) ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: 54link-postgres
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-54link}
      POSTGRES_USER: ${POSTGRES_USER:-54link}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-54link} -d ${POSTGRES_DB:-54link}"]
      <<: *hc-defaults

  # ── Redis (cache + distributed locks + session store) ─────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: 54link-redis
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      <<: *hc-defaults

  # ── Zookeeper (Kafka dependency) ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: 54link-zookeeper
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      <<: *hc-defaults

  # ── Kafka (event bus) ─────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: 54link-kafka
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      <<: *hc-defaults

  # ── Kafka UI (admin console) ──────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: 54link-kafka-ui
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: 54link-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      AUTH_TYPE: LOGIN_FORM
      SPRING_SECURITY_USER_NAME: ${KAFKA_UI_USER:-admin}
      SPRING_SECURITY_USER_PASSWORD: ${KAFKA_UI_PASSWORD:?KAFKA_UI_PASSWORD required}

  # ── TigerBeetle (financial ledger) ────────────────────────────────────────
  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.15.3
    container_name: 54link-tigerbeetle
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    volumes:
      - tigerbeetle_data:/data
    ports:
      - "${TIGERBEETLE_PORT:-3001}:3001"
    command: >
      start
      --addresses=0.0.0.0:3001
      /data/54link.tigerbeetle
    healthcheck:
      test: ["CMD-SHELL", "echo 'ping' | nc -w 2 localhost 3001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Temporal (workflow orchestration) ─────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: 54link-temporal
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    volumes:
      - temporal_data:/var/lib/temporal
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-54link}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development-sql.yaml
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

  # ── Temporal UI ───────────────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: 54link-temporal-ui
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    depends_on:
      - temporal
    ports:
      - "8088:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "https://${DOMAIN:-54link.ng}"

  # ── Keycloak (identity & access management) ───────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: 54link-keycloak
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infra/keycloak/realm-54link.json:/opt/keycloak/data/import/realm-54link.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-54link}
      KC_DB_USERNAME: ${POSTGRES_USER:-54link}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-keycloak.54link.ng}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD required}
    command: start --import-realm
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s

  # ── Permify (fine-grained authorization) ─────────────────────────────────
  permify:
    image: ghcr.io/permify/permify:v0.10.1
    container_name: 54link-permify
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PERMIFY_PORT:-3476}:3476"
      - "3478:3478"
    environment:
      PERMIFY_DATABASE_ENGINE: postgres
      PERMIFY_DATABASE_URI: postgres://${POSTGRES_USER:-54link}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-54link}?sslmode=disable
      PERMIFY_DATABASE_MAX_OPEN_CONNECTIONS: 20
      PERMIFY_SERVER_RATE_LIMIT: 100
    command: serve
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3476/healthz || exit 1"]
      <<: *hc-defaults

  # ── Apache APISIX (API gateway) ───────────────────────────────────────────
  apisix-etcd:
    image: bitnami/etcd:3.5.12
    container_name: 54link-apisix-etcd
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: http://apisix-etcd:2379
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      <<: *hc-defaults

  apisix:
    image: apache/apisix:3.9.1-debian
    container_name: 54link-apisix
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra, 54link-app]
    depends_on:
      apisix-etcd:
        condition: service_healthy
    volumes:
      - ./infra/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./infra/apisix/routes.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    ports:
      - "9080:9080"   # HTTP gateway
      - "9443:9443"   # HTTPS gateway
      - "9180:9180"   # Admin API
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/apisix/status"]
      <<: *hc-defaults

  # ── HashiCorp Vault (secrets management) ──────────────────────────────────
  vault:
    image: hashicorp/vault:1.16.3
    container_name: 54link-vault
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    volumes:
      - vault_data:/vault/data
      - vault_logs:/vault/logs
      - ./infra/vault/config.hcl:/vault/config/config.hcl:ro
      - ./infra/vault/policies:/vault/policies:ro
    ports:
      - "${VAULT_PORT:-8200}:8200"
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_API_ADDR: http://vault:8200
      VAULT_CLUSTER_ADDR: http://vault:8201
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/config.hcl
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Vault Agent (auto-unseal + secret injection) ──────────────────────────
  vault-agent:
    image: hashicorp/vault:1.16.3
    container_name: 54link-vault-agent
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - ./infra/vault/agent.hcl:/vault/config/agent.hcl:ro
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN:?VAULT_ROOT_TOKEN required}
    command: vault agent -config=/vault/config/agent.hcl

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATION TIER
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Main Node.js POS Shell ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: 54link-app
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-infra, 54link-app]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS: kafka:9093
      KEYCLOAK_URL: http://keycloak:8080
      PERMIFY_URL: http://permify:3476
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_APP_TOKEN}
      TIGERBEETLE_ADDRESS: tigerbeetle:3001
      TEMPORAL_ADDRESS: temporal:7233
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      <<: *hc-defaults

  # ── Go OTA Firmware Service ───────────────────────────────────────────────
  ota-service:
    build:
      context: ./server/ota-service
      dockerfile: Dockerfile
    container_name: 54link-ota
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-app]
    environment:
      <<: *common-env
      PORT: 8081
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-54link-firmware}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      <<: *hc-defaults

  # ── Go FIDO2 Authentication Service ──────────────────────────────────────
  fido2-service:
    build:
      context: ./server/fido2-service
      dockerfile: Dockerfile
    container_name: 54link-fido2
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-infra, 54link-app]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8083
      FIDO2_RP_ID: ${FIDO2_RP_ID:-54link.ng}
      FIDO2_RP_NAME: ${FIDO2_RP_NAME:-54Link POS}
      FIDO2_ORIGIN: ${FIDO2_ORIGIN:-https://54link.ng}
      DATABASE_URL: ${DATABASE_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      <<: *hc-defaults

  # ── Rust i18n/Multi-Currency Service ─────────────────────────────────────
  i18n-currency:
    build:
      context: ./services/rust/i18n-currency
      dockerfile: Dockerfile
    container_name: 54link-i18n
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-app]
    environment:
      <<: *common-env
      PORT: 8084
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/health"]
      <<: *hc-defaults

  # ── Rust Fraud Engine ─────────────────────────────────────────────────────
  fraud-engine:
    build:
      context: ./services/rust/fraud-engine
      dockerfile: Dockerfile
    container_name: 54link-fraud
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-infra, 54link-app]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8085
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS: kafka:9093
      FRAUD_RULES_PATH: /app/rules/fraud-rules.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/health"]
      <<: *hc-defaults

  # ── Rust Transaction Validator ────────────────────────────────────────────
  tx-validator:
    build:
      context: ./services/rust/tx-validator
      dockerfile: Dockerfile
    container_name: 54link-tx-validator
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-infra, 54link-app]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8086
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: ${DATABASE_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/health"]
      <<: *hc-defaults

  # ── Rust Ledger Bridge (TigerBeetle ↔ PostgreSQL sync) ────────────────────
  ledger-bridge:
    build:
      context: ./services/rust/ledger-bridge
      dockerfile: Dockerfile
    container_name: 54link-ledger
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-infra, 54link-app]
    depends_on:
      postgres:
        condition: service_healthy
      tigerbeetle:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8087
      DATABASE_URL: ${DATABASE_URL}
      TIGERBEETLE_ADDRESS: tigerbeetle:3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/health"]
      <<: *hc-defaults

  # ── Go Workflow Orchestrator ──────────────────────────────────────────────
  workflow-orchestrator:
    build:
      context: ./services/go/workflow-orchestrator
      dockerfile: Dockerfile
    container_name: 54link-workflow
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-infra, 54link-app]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8088
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS: kafka:9093
      TEMPORAL_ADDRESS: temporal:7233
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-54link}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-workflow-orchestrator}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      PERMIFY_URL: http://permify:3476
      TIGERBEETLE_ADDRESS: tigerbeetle:3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/health"]
      <<: *hc-defaults

  # ── Python Credit Scoring ─────────────────────────────────────────────────
  credit-scoring:
    build:
      context: ./services/python/credit-scoring
      dockerfile: Dockerfile
    container_name: 54link-credit
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-infra, 54link-app]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8082
      DATABASE_URL: ${DATABASE_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      <<: *hc-defaults

  # ── Python Settlement Service ─────────────────────────────────────────────
  settlement-service:
    build:
      context: ./services/python/settlement-service
      dockerfile: Dockerfile
    container_name: 54link-settlement
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-infra, 54link-app]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8089
      DATABASE_URL: ${DATABASE_URL}
      KAFKA_BROKERS: kafka:9093
      TEMPORAL_ADDRESS: temporal:7233
      TIGERBEETLE_ADDRESS: tigerbeetle:3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/health"]
      <<: *hc-defaults

  # ── Python AI/ML Risk Assessment ──────────────────────────────────────────
  risk-assessment:
    build:
      context: ./services/python/risk-assessment
      dockerfile: Dockerfile
    container_name: 54link-risk
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-infra, 54link-app]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8091
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: ${DATABASE_URL}
      ML_MODEL_PATH: /app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      <<: *hc-defaults

  # ── Python USSD Service ───────────────────────────────────────────────────
  ussd-service:
    build:
      context: ./services/python/ussd-service
      dockerfile: Dockerfile
    container_name: 54link-ussd
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-infra, 54link-app]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8092
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: ${DATABASE_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      <<: *hc-defaults

  # ── Python WhatsApp Service ───────────────────────────────────────────────
  whatsapp-service:
    build:
      context: ./services/python/whatsapp-service
      dockerfile: Dockerfile
    container_name: 54link-whatsapp
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-infra, 54link-app]
    environment:
      <<: *common-env
      PORT: 8093
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID}
      KAFKA_BROKERS: kafka:9093
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/health"]
      <<: *hc-defaults

  # ── Python SIM Orchestrator Daemon ────────────────────────────────────────
  sim-orchestrator:
    build:
      context: ./services/python/pos-integration
      dockerfile: Dockerfile
    container_name: 54link-sim-orch
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-infra, 54link-app]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      PORT: 8094
      DATABASE_URL: ${DATABASE_URL}
      KAFKA_BROKERS: kafka:9093
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8094/health"]
      <<: *hc-defaults

  # ═══════════════════════════════════════════════════════════════════════════
  # GATEWAY TIER
  # ═══════════════════════════════════════════════════════════════════════════

  # ── nginx (TLS termination + reverse proxy) ───────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: 54link-nginx
    <<: *restart-policy
    profiles: [gateway, all]
    networks: [54link-app, 54link-obs]
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Certbot (Let's Encrypt TLS) ───────────────────────────────────────────
  certbot:
    image: certbot/certbot:v2.10.0
    container_name: 54link-certbot
    profiles: [gateway, all]
    networks: [54link-app]
    volumes:
      - nginx_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h;
      done"

  # ═══════════════════════════════════════════════════════════════════════════
  # OBSERVABILITY TIER
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Prometheus (metrics) ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: 54link-prometheus
    <<: *restart-policy
    profiles: [observability, all]
    networks: [54link-obs, 54link-app, 54link-infra]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-rules.yml:/etc/prometheus/rules/pos-shell-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      <<: *hc-defaults

  # ── Grafana (dashboards) ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: 54link-grafana
    <<: *restart-policy
    profiles: [observability, all]
    networks: [54link-obs]
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docs/grafana-dashboard.json:/var/lib/grafana/dashboards/pos-shell.json:ro
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD required}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-grafana.54link.ng}
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN:-grafana.54link.ng}
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}:${SMTP_PORT:-587}
      GF_SMTP_USER: ${SMTP_USER}
      GF_SMTP_PASSWORD: ${SMTP_PASS}
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM:-alerts@54link.ng}
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      <<: *hc-defaults

  # ── Loki (log aggregation) ────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: 54link-loki
    <<: *restart-policy
    profiles: [observability, all]
    networks: [54link-obs]
    volumes:
      - loki_data:/loki
      - ./infra/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      <<: *hc-defaults

  # ── Promtail (log shipper) ────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    container_name: 54link-promtail
    <<: *restart-policy
    profiles: [observability, all]
    networks: [54link-obs, 54link-app]
    depends_on:
      - loki
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml

  # ── Alertmanager ─────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: 54link-alertmanager
    <<: *restart-policy
    profiles: [observability, all]
    networks: [54link-obs]
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=https://${ALERTMANAGER_DOMAIN:-alerts.54link.ng}"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      <<: *hc-defaults

  # ── Node Exporter (host metrics) ──────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: 54link-node-exporter
    <<: *restart-policy
    profiles: [observability, all]
    networks: [54link-obs]
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"

  # ── cAdvisor (container metrics) ──────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: 54link-cadvisor
    <<: *restart-policy
    profiles: [observability, all]
    networks: [54link-obs]
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "8091:8080"

  # ── Temporal Worker ────────────────────────────────────────────────────────
  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile.temporal-worker
    container_name: 54link-temporal-worker
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-app, 54link-infra]
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=54link-production
    depends_on:
      temporal:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M


  # ── MinIO (S3-compatible object storage / Lakehouse) ──────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: 54link-minio
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-54link_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-MinioSecure2024!}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ── MinIO Init (create buckets + lifecycle policies) ──────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    container_name: 54link-minio-init
    profiles: [infra, all]
    networks: [54link-infra]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init/init-minio.sh"]
    volumes:
      - ./infra/minio:/init:ro
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-54link_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-MinioSecure2024!}
    restart: "no"

  # ── Fluvio (real-time streaming platform) ─────────────────────────────────
  fluvio:
    image: infinyon/fluvio:0.11.11
    container_name: 54link-fluvio
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra]
    command: fluvio-run sc --local /fluvio/metadata
    environment:
      RUST_LOG: info
    volumes:
      - fluvio_data:/fluvio
    ports:
      - "9003:9003"
      - "9010:9010"
    healthcheck:
      test: ["CMD", "fluvio", "cluster", "status"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Dapr Placement Service ─────────────────────────────────────────────────
  dapr-placement:
    image: daprio/dapr:1.14.4
    container_name: 54link-dapr-placement
    <<: *restart-policy
    profiles: [infra, all]
    networks: [54link-infra, 54link-app]
    command: ["./placement", "--port", "50006", "--log-level", "info"]
    ports:
      - "50006:50006"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ── MDM Compliance Engine (Go microservice) ────────────────────────────────
  mdm-compliance-engine:
    build:
      context: ./services/go/mdm-compliance-engine
      dockerfile: Dockerfile
    container_name: 54link-mdm-compliance-engine
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-app, 54link-infra]
    env_file: .env.production
    environment:
      - PORT=8091
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_GROUP_ID=mdm-compliance-engine
      - KAFKA_TOPIC_HEARTBEAT=mdm.heartbeat
      - KAFKA_TOPIC_VIOLATIONS=mdm.compliance.violations
      - DB_URL=postgres://${POSTGRES_USER:-54link}:${POSTGRES_PASSWORD:-54linkSecure2024}@postgres:5432/${POSTGRES_DB:-54link_production}?sslmode=disable
      - MDM_API_URL=http://app:3000
      - PROMETHEUS_PORT=9091
      - LOG_LEVEL=info
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── MDM Geofence Service (Python microservice) ─────────────────────────────
  mdm-geofence-service:
    build:
      context: ./services/python/mdm-geofence-service
      dockerfile: Dockerfile
    container_name: 54link-mdm-geofence-service
    <<: *restart-policy
    profiles: [app, all]
    networks: [54link-app, 54link-infra]
    env_file: .env.production
    environment:
      - PORT=8092
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_GROUP_ID=mdm-geofence-service
      - KAFKA_TOPIC_HEARTBEAT=mdm.heartbeat
      - KAFKA_TOPIC_VIOLATIONS=mdm.geofence.violations
      - DB_URL=postgresql://${POSTGRES_USER:-54link}:${POSTGRES_PASSWORD:-54linkSecure2024}@postgres:5432/${POSTGRES_DB:-54link_production}
      - MDM_API_URL=http://app:3000
      - REDIS_URL=redis://redis:6379/3
      - LOG_LEVEL=INFO
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
