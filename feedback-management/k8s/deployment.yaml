apiVersion: apps/v1
kind: Deployment
metadata:
  name: feedback-management
  namespace: insurance-platform
  labels:
    app: feedback-management
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feedback-management
  template:
    metadata:
      labels:
        app: feedback-management
    spec:
      containers:
        - name: feedback-management
          image: feedback-management:latest
          ports:
            - containerPort: 8100
          env:
            - name: PORT
              value: "8100"
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8100
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: feedback-management
  namespace: insurance-platform
spec:
  selector:
    app: feedback-management
  ports:
    - port: 8100
      targetPort: 8100
  type: ClusterIP
