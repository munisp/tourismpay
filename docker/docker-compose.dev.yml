version: '3.8'

# Development override - use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  customer-portal:
    build:
      context: ../customer-portal-full
      target: builder
    volumes:
      - ../customer-portal-full:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080/api
      - VITE_WS_URL=ws://localhost:8080/ws

  claims-adjudication:
    volumes:
      - ../claims-adjudication-engine:/app
    environment:
      - GO_ENV=development
      - LOG_LEVEL=debug

  policy-workflow:
    volumes:
      - ../policy-workflow-go:/app
    environment:
      - GO_ENV=development
      - LOG_LEVEL=debug

  kyc-orchestrator:
    volumes:
      - ../kyc-kyb-system:/app
    environment:
      - PYTHON_ENV=development
      - LOG_LEVEL=debug

  fraud-detection:
    volumes:
      - ../cross-company-fraud-database:/app
    environment:
      - GO_ENV=development
      - LOG_LEVEL=debug

  communication-service:
    volumes:
      - ../communication-service:/app
    environment:
      - GO_ENV=development
      - LOG_LEVEL=debug

  geospatial-service:
    volumes:
      - ../geospatial-service/go-service:/app
    environment:
      - GO_ENV=development
      - LOG_LEVEL=debug

  telco-integration:
    volumes:
      - ../telco-data-integration-service:/app
    environment:
      - GO_ENV=development
      - LOG_LEVEL=debug

  erpnext-integration:
    volumes:
      - ../erpnext-integration-service:/app
    environment:
      - GO_ENV=development
      - LOG_LEVEL=debug

  openimis-integration:
    volumes:
      - ../openimis-insurance-ops-integrated:/app
    environment:
      - PYTHON_ENV=development
      - LOG_LEVEL=debug

  etherisc-integration:
    volumes:
      - ../etherisc-gif-enhanced:/app
    environment:
      - PYTHON_ENV=development
      - LOG_LEVEL=debug

  broker-api:
    volumes:
      - ../broker-api-service/go-service:/app
    environment:
      - GO_ENV=development
      - LOG_LEVEL=debug
