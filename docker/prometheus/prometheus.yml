global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'customer-portal'
    static_configs:
      - targets: ['customer-portal:80']
    metrics_path: /metrics

  - job_name: 'claims-adjudication'
    static_configs:
      - targets: ['claims-adjudication:8001']
    metrics_path: /metrics

  - job_name: 'policy-workflow'
    static_configs:
      - targets: ['policy-workflow:8002']
    metrics_path: /metrics

  - job_name: 'kyc-orchestrator'
    static_configs:
      - targets: ['kyc-orchestrator:8003']
    metrics_path: /metrics

  - job_name: 'fraud-detection'
    static_configs:
      - targets: ['fraud-detection:8007']
    metrics_path: /metrics

  - job_name: 'communication-service'
    static_configs:
      - targets: ['communication-service:8008']
    metrics_path: /metrics

  - job_name: 'geospatial-service'
    static_configs:
      - targets: ['geospatial-service:8009']
    metrics_path: /metrics

  - job_name: 'telco-integration'
    static_configs:
      - targets: ['telco-integration:8010']
    metrics_path: /metrics

  - job_name: 'erpnext-integration'
    static_configs:
      - targets: ['erpnext-integration:8011']
    metrics_path: /metrics

  - job_name: 'openimis-integration'
    static_configs:
      - targets: ['openimis-integration:8012']
    metrics_path: /metrics

  - job_name: 'etherisc-integration'
    static_configs:
      - targets: ['etherisc-integration:8022']
    metrics_path: /metrics

  - job_name: 'broker-api'
    static_configs:
      - targets: ['broker-api:8025']
    metrics_path: /metrics

  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgresql:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
