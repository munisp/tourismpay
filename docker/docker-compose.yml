version: '3.8'

services:
  # ===========================================
  # Infrastructure Services
  # ===========================================
  
  postgresql:
    image: postgres:16-alpine
    container_name: insurance-postgresql
    environment:
      POSTGRES_USER: insurance_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insurance_dev_password}
      POSTGRES_DB: insurance
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insurance_admin -d insurance"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insurance-network

  redis:
    image: redis:7.2-alpine
    container_name: insurance-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insurance-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: insurance-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - insurance-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: insurance-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - insurance-network

  # ===========================================
  # Middleware Services
  # ===========================================

  temporal:
    image: temporalio/auto-setup:1.22.4
    container_name: insurance-temporal
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=insurance_admin
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-insurance_dev_password}
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    networks:
      - insurance-network

  temporal-ui:
    image: temporalio/ui:2.21.3
    container_name: insurance-temporal-ui
    depends_on:
      - temporal
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    networks:
      - insurance-network

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:latest
    container_name: insurance-tigerbeetle
    ports:
      - "3000:3000"
    volumes:
      - tigerbeetle_data:/var/lib/tigerbeetle
    command: >
      /bin/sh -c "
        if [ ! -f /var/lib/tigerbeetle/0_0.tigerbeetle ]; then
          tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /var/lib/tigerbeetle/0_0.tigerbeetle
        fi
        tigerbeetle start --addresses=0.0.0.0:3000 /var/lib/tigerbeetle/0_0.tigerbeetle
      "
    networks:
      - insurance-network

  minio:
    image: minio/minio:latest
    container_name: insurance-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - insurance-network

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: insurance-iceberg-rest
    depends_on:
      - minio
    ports:
      - "8181:8181"
    environment:
      - CATALOG_WAREHOUSE=s3://insurance-lakehouse/warehouse
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - AWS_REGION=us-east-1
      - CATALOG_S3_PATH__STYLE__ACCESS=true
    networks:
      - insurance-network

  # ===========================================
  # Monitoring Services
  # ===========================================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: insurance-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - insurance-network

  grafana:
    image: grafana/grafana:10.2.2
    container_name: insurance-grafana
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - insurance-network

  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: insurance-jaeger
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - insurance-network

  loki:
    image: grafana/loki:2.9.2
    container_name: insurance-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - insurance-network

  # ===========================================
  # Application Services
  # ===========================================

  customer-portal:
    build:
      context: ../customer-portal-full
      dockerfile: ../docker/Dockerfile.react
      args:
        VITE_API_URL: http://localhost:8080/api
        VITE_WS_URL: ws://localhost:8080/ws
    container_name: insurance-customer-portal
    ports:
      - "3002:80"
    depends_on:
      - claims-adjudication
      - policy-workflow
    networks:
      - insurance-network

  claims-adjudication:
    build:
      context: ../claims-adjudication-engine
      dockerfile: Dockerfile
    container_name: insurance-claims-adjudication
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://insurance_admin:${POSTGRES_PASSWORD:-insurance_dev_password}@postgresql:5432/insurance
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      - KAFKA_BROKERS=kafka:9092
      - TEMPORAL_ADDRESS=temporal:7233
      - TIGERBEETLE_ADDRESS=tigerbeetle:3000
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - insurance-network

  policy-workflow:
    build:
      context: ../policy-workflow-go
      dockerfile: Dockerfile
    container_name: insurance-policy-workflow
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://insurance_admin:${POSTGRES_PASSWORD:-insurance_dev_password}@postgresql:5432/insurance
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      - KAFKA_BROKERS=kafka:9092
      - TEMPORAL_ADDRESS=temporal:7233
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - insurance-network

  kyc-orchestrator:
    build:
      context: ../kyc-kyb-system
      dockerfile: Dockerfile
    container_name: insurance-kyc-orchestrator
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://insurance_admin:${POSTGRES_PASSWORD:-insurance_dev_password}@postgresql:5432/insurance
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      - KAFKA_BROKERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insurance-network

  fraud-detection:
    build:
      context: ../cross-company-fraud-database
      dockerfile: Dockerfile
    container_name: insurance-fraud-detection
    ports:
      - "8007:8007"
    environment:
      - DATABASE_URL=postgresql://insurance_admin:${POSTGRES_PASSWORD:-insurance_dev_password}@postgresql:5432/insurance
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      - KAFKA_BROKERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insurance-network

  communication-service:
    build:
      context: ../communication-service
      dockerfile: Dockerfile
    container_name: insurance-communication-service
    ports:
      - "8008:8008"
    environment:
      - DATABASE_URL=postgresql://insurance_admin:${POSTGRES_PASSWORD:-insurance_dev_password}@postgresql:5432/insurance
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      - KAFKA_BROKERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insurance-network

  geospatial-service:
    build:
      context: ../geospatial-service/go-service
      dockerfile: Dockerfile
    container_name: insurance-geospatial-service
    ports:
      - "8009:8009"
    environment:
      - DATABASE_URL=postgresql://insurance_admin:${POSTGRES_PASSWORD:-insurance_dev_password}@postgresql:5432/insurance
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insurance-network

  telco-integration:
    build:
      context: ../telco-data-integration-service
      dockerfile: Dockerfile
    container_name: insurance-telco-integration
    ports:
      - "8010:8010"
    environment:
      - DATABASE_URL=postgresql://insurance_admin:${POSTGRES_PASSWORD:-insurance_dev_password}@postgresql:5432/insurance
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      - KAFKA_BROKERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insurance-network

  erpnext-integration:
    build:
      context: ../erpnext-integration-service
      dockerfile: Dockerfile
    container_name: insurance-erpnext-integration
    ports:
      - "8011:8011"
    environment:
      - DATABASE_URL=postgresql://insurance_admin:${POSTGRES_PASSWORD:-insurance_dev_password}@postgresql:5432/insurance
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      - KAFKA_BROKERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insurance-network

  openimis-integration:
    build:
      context: ../openimis-insurance-ops-integrated
      dockerfile: Dockerfile
    container_name: insurance-openimis-integration
    ports:
      - "8012:8012"
    environment:
      - DATABASE_URL=postgresql://insurance_admin:${POSTGRES_PASSWORD:-insurance_dev_password}@postgresql:5432/insurance
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      - KAFKA_BROKERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insurance-network

  etherisc-integration:
    build:
      context: ../etherisc-gif-enhanced
      dockerfile: Dockerfile
    container_name: insurance-etherisc-integration
    ports:
      - "8022:8022"
    environment:
      - DATABASE_URL=postgresql://insurance_admin:${POSTGRES_PASSWORD:-insurance_dev_password}@postgresql:5432/insurance
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      - KAFKA_BROKERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insurance-network

  broker-api:
    build:
      context: ../broker-api-service/go-service
      dockerfile: Dockerfile
    container_name: insurance-broker-api
    ports:
      - "8025:8025"
    environment:
      - DATABASE_URL=postgresql://insurance_admin:${POSTGRES_PASSWORD:-insurance_dev_password}@postgresql:5432/insurance
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      - KAFKA_BROKERS=kafka:9092
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insurance-network

networks:
  insurance-network:
    driver: bridge

volumes:
  postgresql_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  tigerbeetle_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
