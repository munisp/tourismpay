# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Scrape Configuration — 54Link POS Shell
# ─────────────────────────────────────────────────────────────────────────────
# Add this job to your existing prometheus.yml under the `scrape_configs:` key.
#
# The POS Shell exposes metrics at GET /api/metrics in Prometheus text format.
# All metrics are prefixed with `pos_` to avoid collision with other services.
#
# Metric inventory:
#   pos_transactions_total{type, status, channel}   — counter
#   pos_transaction_errors_total{type, reason}       — counter
#   pos_float_locks_total{trigger}                   — counter
#   pos_disputes_raised_total{type}                  — counter
#   pos_float_topup_requests_total{status}           — counter
#   pos_platform_calls_total{service, status}        — counter
#   pos_fraud_alerts_total{severity}                 — counter
#   pos_transaction_duration_ms{type}                — histogram
#   pos_platform_call_duration_ms{service}           — histogram
#   pos_http_request_duration_ms{method,route,status_code} — histogram
#   pos_node_* (default Node.js process metrics)     — gauge/counter
# ─────────────────────────────────────────────────────────────────────────────

scrape_configs:

  # ── POS Shell application metrics ──────────────────────────────────────────
  - job_name: "pos-shell"
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /api/metrics
    scheme: https                  # Use http for local dev
    static_configs:
      - targets:
          - "pos-shell.54link.internal:443"   # Replace with your actual host
        labels:
          environment: "production"
          service: "pos-shell"
          region: "ng-west-1"

  # ── Local development override ──────────────────────────────────────────────
  # Uncomment for local dev / staging:
  #
  # - job_name: "pos-shell-dev"
  #   scrape_interval: 15s
  #   metrics_path: /api/metrics
