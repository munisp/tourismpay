apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
  - name: redisHost
    value: localhost:6379 # Placeholder: Replace with actual Redis host
  - name: redisPassword
    value: "" # Placeholder: Replace with actual Redis password if needed
  - name: actorStateStore
    value: "true"
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.redis
  version: v1
  metadata:
  - name: redisHost
    value: localhost:6379 # Placeholder: Replace with actual Redis host
  - name: redisPassword
    value: "" # Placeholder: Replace with actual Redis password if needed
  - name: consumerID
    value: "${APP_ID}" # Use Dapr's built-in variable for consumer ID
  - name: enableTLS
    value: "false"
  - name: maxRetries
    value: "3" # Basic retry logic configuration
  - name: maxRetryBackOff
    value: "500ms"
