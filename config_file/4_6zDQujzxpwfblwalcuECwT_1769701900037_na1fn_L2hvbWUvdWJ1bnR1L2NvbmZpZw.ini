[TIGERBEETLE]
# TigerBeetle cluster addresses (comma-separated)
addresses = 127.0.0.1:3000

[KAFKA]
# Kafka bootstrap servers (comma-separated)
bootstrap_servers = 127.0.0.1:9092
# Topic for incoming transaction requests (Kafka -> TigerBeetle)
inbound_topic = tb_transactions_in
# Topic for outgoing transaction results/events (TigerBeetle -> Kafka)
outbound_topic = tb_events_out
# Consumer group ID for the inbound consumer
consumer_group_id = tigerbeetle_integrator_group
# Maximum number of messages to consume in one batch
max_poll_records = 1000
# Maximum time (ms) to wait for a batch of messages
poll_timeout_ms = 1000

[APPLICATION]
# Logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
log_level = INFO
# Max retries for TigerBeetle operations
max_retries = 3
# Initial backoff time in seconds for retries
retry_backoff_sec = 1
# TigerBeetle batch size for create_accounts/create_transfers
tb_batch_size = 8192
