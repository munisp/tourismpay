# Configuration for TigerBeetle-Lakehouse Integration Service

service:
  name: tigerbeetle-lakehouse-sync
  log_level: INFO
  metrics_port: 8080

tigerbeetle:
  cluster_id: 0
  addresses: ["3000"] # Mock address for local TB instance
  # Stream configuration for TB -> Lakehouse (Change Data Capture/Event Stream)
  stream:
    enabled: true
    topic_name: financial_transfers
    batch_size: 1000
    poll_interval_ms: 500

lakehouse:
  # Configuration for Lakehouse (e.g., Delta Lake/Iceberg on S3)
  type: mock_delta_lake
  storage_path: s3://financial-lakehouse/tigerbeetle_data/
  tables:
    transfers:
      name: tb_transfers
      schema: ["id", "debit_account_id", "credit_account_id", "amount", "timestamp"]
    reconciliation_commands:
      name: tb_reconciliation_commands
      schema: ["command_id", "account_id", "action", "value"]

# Bi-directional flow configuration
flow:
  tb_to_lh:
    enabled: true
    pattern: streaming
  lh_to_tb:
    enabled: true
    pattern: request-response
    endpoint: /v1/reconcile # Mock API endpoint for LH to push commands to TB
