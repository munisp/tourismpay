# Configuration for Fluvio-Lakehouse Bi-directional Integration

# --- Fluvio Configuration ---
fluvio:
  # Fluvio cluster address (e.g., "localhost:9003")
  addr: "fluvio-cluster:9003"
  # Topic for data flowing from Fluvio to Lakehouse
  topic_to_lakehouse: "fluvio-to-lakehouse-stream"
  # Topic for data flowing from Lakehouse (CDC) to Fluvio
  topic_from_lakehouse: "lakehouse-cdc-stream"

# --- Lakehouse (PostgreSQL) Configuration ---
lakehouse:
  # Database connection details
  db_host: "postgres-lakehouse"
  db_port: 5432
  db_name: "lakehouse_db"
  db_user: "integration_user"
  db_password: "secure_password"
  
  # Table to ingest data from Fluvio
  ingest_table: "fluvio_ingest_data"
  # Table to monitor for Change Data Capture (CDC)
  cdc_table: "fluvio_cdc_source"
  # Primary key column for CDC table
  cdc_pk_column: "id"

# --- Operational Configuration ---
operation:
  # Batch size for reading/writing data
  batch_size: 1000
  # Max number of retries for transient errors
  retry_attempts: 5
  # Delay in seconds between retries
  retry_delay_sec: 5
  # Polling interval in seconds for CDC
  cdc_poll_interval_sec: 10
  # Circuit breaker threshold (number of consecutive failures)
  circuit_breaker_threshold: 10
