[REDIS]
HOST = localhost
PORT = 6379
# Redis Stream for R->K (Redis Stream is used for R->K to enable reliable, consumer-group based consumption)
STREAM_KEY = redis_to_kafka_stream
# Redis Pub/Sub Channel for K->R (Redis Pub/Sub is used for K->R for simple, real-time broadcast)
CHANNEL_KEY = kafka_to_redis_channel

[KAFKA]
BOOTSTRAP_SERVERS = localhost:9092
# Topic for R->K data flow
TOPIC_REDIS_TO_KAFKA = redis_data_events
# Topic for K->R data flow
TOPIC_KAFKA_TO_REDIS = kafka_data_updates
CONSUMER_GROUP_ID = redis_kafka_integrator_group

[OPERATIONAL]
LOG_LEVEL = INFO
MAX_RETRIES = 5
RETRY_DELAY_SECONDS = 5
HEARTBEAT_INTERVAL_SECONDS = 10
CIRCUIT_BREAKER_THRESHOLD = 3
