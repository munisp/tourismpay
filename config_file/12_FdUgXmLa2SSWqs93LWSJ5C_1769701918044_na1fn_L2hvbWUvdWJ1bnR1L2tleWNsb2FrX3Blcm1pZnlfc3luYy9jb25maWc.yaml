# Configuration for Keycloak-Permify Synchronization Service

service:
  host: "0.0.0.0"
  port: 8000
  log_level: "info"
  retry_attempts: 5
  retry_delay_seconds: 5

keycloak:
  base_url: "http://keycloak:8080"
  realm: "master"
  client_id: "sync-service-client"
  client_secret: "YOUR_KEYCLOAK_CLIENT_SECRET"
  admin_username: "admin"
  admin_password: "YOUR_KEYCLOAK_ADMIN_PASSWORD"
  # Events to listen for: USER_CREATED, USER_UPDATED, USER_DELETED, GROUP_CREATED, GROUP_UPDATED, GROUP_DELETED
  sync_events:
    - "USER_CREATED"
    - "USER_UPDATED"
    - "USER_DELETED"
    - "GROUP_CREATED"
    - "GROUP_UPDATED"
    - "GROUP_DELETED"

permify:
  base_url: "http://permify:8080"
  tenant_id: "t1"
  # Permify API key or token if required
  api_key: "YOUR_PERMIFY_API_KEY"
  # Permify Schema Definition (Conceptual, will be applied via API or external tool)
  # entity user {}
  # entity group { relation member @user }
  # entity service {}
  # entity permission { relation owner @user }

# Mapping between Keycloak and Permify
mapping:
  user_entity: "user"
  group_entity: "group"
  group_member_relation: "member"
