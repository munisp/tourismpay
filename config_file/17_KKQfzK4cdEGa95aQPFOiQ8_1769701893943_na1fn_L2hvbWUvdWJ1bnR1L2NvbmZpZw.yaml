# Configuration for Ray Serve and Kafka Integration

# --- Kafka Configuration ---
kafka:
  # List of Kafka broker addresses (e.g., 'localhost:9092')
  bootstrap_servers: 'localhost:9092'
  # Topic for events flowing FROM Kafka TO Ray Serve
  input_topic: 'ray_serve_input'
  # Topic for events flowing FROM Ray Serve TO Kafka
  output_topic: 'ray_serve_output'
  # Consumer group ID for the Kafka consumer that feeds Ray Serve
  consumer_group_id: 'ray-serve-consumer-group'
  # Polling timeout in seconds for the consumer
  consumer_timeout_ms: 1000

# --- Ray Serve Configuration ---
ray_serve:
  # Name of the Ray Serve deployment
  deployment_name: 'DataProcessor'
  # Ray cluster address (set to 'auto' for local or cluster discovery)
  ray_address: 'auto'
  # Host and port for the HTTP server (optional, usually managed by Ray)
  host: '127.0.0.1'
  port: 8000

# --- Integration Configuration ---
integration:
  # Number of worker replicas for the Ray Serve deployment
  num_replicas: 1
  # Error handling: Max retries for Kafka production/consumption
  max_retries: 3
  # Circuit Breaker: Failure threshold before tripping
  failure_threshold: 5
  # Circuit Breaker: Time in seconds to wait before attempting a half-open state
  reset_timeout_seconds: 30
