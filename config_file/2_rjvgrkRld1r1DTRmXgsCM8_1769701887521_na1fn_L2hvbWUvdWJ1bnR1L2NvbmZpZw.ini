[POSTGRES]
HOST = localhost
PORT = 5432
DATABASE = integration_db
USER = postgres_user
PASSWORD = postgres_password
TABLE_TO_WATCH = events
CDC_POLL_INTERVAL_SECONDS = 5

[KAFKA]
BOOTSTRAP_SERVERS = localhost:9092
SOURCE_TOPIC = postgres_events
SINK_TOPIC = kafka_commands
CLIENT_ID = postgres_kafka_connector

[INTEGRATION]
BATCH_SIZE = 100
MAX_RETRIES = 3
CIRCUIT_BREAKER_THRESHOLD = 5
