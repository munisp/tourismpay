# Configuration file for PostgreSQL-Redis Bi-directional Integration

# --- PostgreSQL Configuration ---
postgres:
  host: "localhost"
  port: 5432
  database: "integration_db"
  user: "integration_user"
  password: "integration_password"
  # Table to synchronize. Must have a primary key and a 'last_modified' timestamp column.
  table: "products"
  # Polling interval for P2R sync (in seconds)
  polling_interval: 5

# --- Redis Configuration ---
redis:
  host: "localhost"
  port: 6379
  password: ""
  # Database index (0-15)
  db: 0
  # Prefix for all keys stored in Redis to avoid conflicts
  key_prefix: "pg_sync:"
  # Channel for Redis Keyspace Notifications (must be enabled in redis.conf: notify-keyspace-events "AKE")
  keyspace_channel: "__keyspace@0__:"
  # Key pattern to monitor for R2P sync (e.g., "pg_sync:product:*")
  monitor_pattern: "pg_sync:*"

# --- Application Configuration ---
app:
  # Logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
  log_level: "INFO"
  # Max number of retries for database operations
  max_retries: 3
  # Retry delay in seconds
  retry_delay: 2
  # Circuit breaker settings (simple implementation: max failures before tripping)
  circuit_breaker_max_failures: 5
  # Circuit breaker reset timeout in seconds
  circuit_breaker_reset_timeout: 30
