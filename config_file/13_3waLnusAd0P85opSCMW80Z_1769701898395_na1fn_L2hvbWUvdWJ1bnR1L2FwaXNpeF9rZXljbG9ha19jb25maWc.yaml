# APISix Configuration for Keycloak External Authentication
# This configuration defines a route that uses the ext-authz plugin
# to delegate authentication and authorization to a custom external service.

# 1. Define the External Authentication Service (ext-authz-service)
# This service is the custom Python/Flask application that handles JWT validation,
# error handling, and circuit breaking logic.
# Assuming the external service is running on 'ext-auth-service:5000' within the network.
# In a real deployment, this would be a Kubernetes Service or similar.
# For local testing, '127.0.0.1:5000' could be used.
---
id: ext-auth-service
upstream:
  type: roundrobin
  nodes:
    "ext-auth-service:5000": 1 # Replace with actual service address
name: ext-auth-upstream
---

# 2. Define a Route that uses the ext-authz plugin
# This route will protect all paths under /api/v1/*
id: keycloak-protected-route
uri: /api/v1/*
methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
plugins:
  ext-authz:
    host: ext-auth-service
    port: 5000
    uri: /auth
    timeout: 1000 # Timeout for the external auth service call in milliseconds
    # Request headers to be forwarded to the external auth service
    request_headers:
      - Authorization
      - X-Request-ID
    # Response headers from the external auth service to be forwarded to the upstream
    response_headers:
      - X-User-ID
      - X-User-Roles
    # If the external auth service is unavailable, APISix will return a 503
    # or you can set 'allow_request_body' to true and 'if_not_auth' to 'pass'
    # but for security, we will fail closed (default behavior).
    # The circuit breaker logic is implemented in the external service itself.
    
  # Optional: Add a rate limiting plugin after successful authentication
  # limit-req:
  #   rate: 1
  #   burst: 2
  #   key: remote_addr
upstream_id: ext-auth-service # Placeholder upstream for the actual backend service
# In a real scenario, this upstream_id would point to the actual backend service,
# but for this configuration file, we'll use the ext-auth-service as a placeholder
# to show the structure. A better approach is to define a separate upstream for the
# actual backend and use the ext-authz plugin on the route.
# Let's define a dummy backend upstream for clarity.
---
id: backend-service
upstream:
  type: roundrobin
  nodes:
    "backend-api:8080": 1 # Replace with actual backend service address
name: backend-upstream
---
# Redefine the route to use the actual backend upstream
id: keycloak-protected-route-v2
uri: /api/v1/*
methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
plugins:
  ext-authz:
    host: ext-auth-service
    port: 5000
    uri: /auth
    timeout: 1000
    request_headers:
      - Authorization
      - X-Request-ID
    response_headers:
      - X-User-ID
      - X-User-Roles
upstream_id: backend-service
# End of APISix Configuration
