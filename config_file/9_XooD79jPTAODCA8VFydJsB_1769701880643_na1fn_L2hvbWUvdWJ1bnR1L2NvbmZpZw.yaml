# config.yaml
# Configuration for the Kafka-Lakehouse Bi-Directional Integration

# --- General Settings ---
enabled: true # Master switch to enable/disable the integration
spark_packages: "io.delta:delta-core_2.12:2.4.0,org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.1"

# --- Monitoring and Observability ---
# In a production environment, these would be used to configure metrics
# reporting to Prometheus, Datadog, etc.
monitoring:
  enabled: true
  metrics_endpoint: "http://localhost:9090/metrics"

# --- Kafka -> Lakehouse (Ingestion) Configuration ---
kafka_to_lakehouse:
  # Kafka Source
  kafka_brokers: "kafka-broker-1:9092,kafka-broker-2:9092"
  kafka_topic: "raw_events_topic"
  
  # Lakehouse (Delta Lake) Destination
  lakehouse_path: "/mnt/delta/data/raw_events"
  
  # Spark Structured Streaming Configuration
  checkpoint_path: "/tmp/checkpoints/kafka_to_lakehouse"
  trigger_interval: "5 seconds" # How often to process a micro-batch
  
  # Error Handling / Retry Logic
  max_retries: 3 # Number of times to retry a failed batch before failing the stream

# --- Lakehouse -> Kafka (Egress/CDC) Configuration ---
lakehouse_to_kafka:
  # Lakehouse (Delta Lake) Source
  lakehouse_path: "/mnt/delta/data/raw_events" # Same path as ingestion
  
  # Kafka Destination
  kafka_brokers: "kafka-broker-1:9092,kafka-broker-2:9092"
  kafka_topic: "processed_events_cdc_topic"
  
  # Spark Structured Streaming Configuration
  checkpoint_path: "/tmp/checkpoints/lakehouse_to_kafka"
  trigger_interval: "5 seconds" # How often to check for new changes
  
  # Health Check / Circuit Breaker
  # A simple threshold for data volume or latency could be configured here
  min_records_per_batch: 1 # Minimum records to process before considering the stream healthy
