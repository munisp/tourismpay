temporal:
  host: "localhost:7233"
  namespace: "default"
  task_queue: "temporal-lakehouse-queue"

lakehouse:
  # In a real scenario, this would be a connection string or API endpoint for a data ingestion service
  # e.g., a REST API backed by Spark/Delta Lake or a Kafka topic.
  ingestion_endpoint: "http://lakehouse-ingestion-service/api/v1/ingest"
  # Configuration for the Lakehouse-to-Temporal poller
  polling:
    enabled: true
    interval_seconds: 60
    # Simulated path to check for new data files/partitions
    metadata_path: "/mnt/lakehouse/metadata/new_data_marker.txt"

integration:
  # Common settings for resilience and observability
  max_retries: 5
  initial_backoff_seconds: 1
  max_backoff_seconds: 30
  circuit_breaker_threshold: 3 # Number of consecutive failures before opening the circuit
  health_check_endpoint: "/health"
