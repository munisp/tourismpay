syntax = "proto3";

package tourismpay;

option go_package = "github.com/munisp/tourismpay/proto";

// ─── Settlement Service ──────────────────────────────────────────────────────

service SettlementService {
  rpc CreateSettlement (CreateSettlementRequest) returns (SettlementResponse);
  rpc GetSettlement (GetSettlementRequest) returns (SettlementResponse);
  rpc ListSettlements (ListSettlementsRequest) returns (ListSettlementsResponse);
  rpc ExecuteBatch (ExecuteBatchRequest) returns (ExecuteBatchResponse);
  rpc Health (HealthRequest) returns (HealthResponse);
}

message CreateSettlementRequest {
  string merchant_id = 1;
  double amount = 2;
  string currency = 3;
  string reference = 4;
}

message SettlementResponse {
  string id = 1;
  string merchant_id = 2;
  double amount = 3;
  string currency = 4;
  string status = 5;
  string created_at = 6;
}

message GetSettlementRequest {
  string id = 1;
}

message ListSettlementsRequest {
  string merchant_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListSettlementsResponse {
  repeated SettlementResponse settlements = 1;
  int32 total = 2;
}

message ExecuteBatchRequest {
  repeated string settlement_ids = 1;
}

message ExecuteBatchResponse {
  int32 processed = 1;
  int32 failed = 2;
  repeated string errors = 3;
}

// ─── Fraud Detection Service ─────────────────────────────────────────────────

service FraudDetectionService {
  rpc ScoreTransaction (ScoreTransactionRequest) returns (FraudScoreResponse);
  rpc BatchScore (BatchScoreRequest) returns (BatchScoreResponse);
  rpc Health (HealthRequest) returns (HealthResponse);
}

message ScoreTransactionRequest {
  string transaction_id = 1;
  double amount = 2;
  string currency = 3;
  string country = 4;
  string payment_method = 5;
  string user_id = 6;
  map<string, string> metadata = 7;
}

message FraudScoreResponse {
  string transaction_id = 1;
  double score = 2;
  string risk_level = 3;
  repeated string flags = 4;
  double gnn_score = 5;
  bool should_block = 6;
}

message BatchScoreRequest {
  repeated ScoreTransactionRequest transactions = 1;
}

message BatchScoreResponse {
  repeated FraudScoreResponse scores = 1;
}

// ─── PBAC Service ────────────────────────────────────────────────────────────

service PBACService {
  rpc CheckPermission (CheckPermissionRequest) returns (CheckPermissionResponse);
  rpc ListPermissions (ListPermissionsRequest) returns (ListPermissionsResponse);
  rpc Health (HealthRequest) returns (HealthResponse);
}

message CheckPermissionRequest {
  string subject_type = 1;
  string subject_id = 2;
  string permission = 3;
  string resource_type = 4;
  string resource_id = 5;
  map<string, string> context = 6;
}

message CheckPermissionResponse {
  bool allowed = 1;
  string reason = 2;
}

message ListPermissionsRequest {
  string subject_type = 1;
  string subject_id = 2;
  string resource_type = 3;
}

message ListPermissionsResponse {
  repeated string permissions = 1;
}

// ─── Wallet Service ──────────────────────────────────────────────────────────

service WalletService {
  rpc GetBalance (GetBalanceRequest) returns (BalanceResponse);
  rpc Transfer (TransferRequest) returns (TransferResponse);
  rpc Health (HealthRequest) returns (HealthResponse);
}

message GetBalanceRequest {
  string user_id = 1;
  string currency = 2;
}

message BalanceResponse {
  string user_id = 1;
  string currency = 2;
  double balance = 3;
  double available_balance = 4;
}

message TransferRequest {
  string from_user_id = 1;
  string to_user_id = 2;
  double amount = 3;
  string currency = 4;
  string reference = 5;
}

message TransferResponse {
  string transfer_id = 1;
  string status = 2;
  double amount = 3;
  string currency = 4;
}

// ─── Common ──────────────────────────────────────────────────────────────────

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string version = 2;
  int64 uptime_seconds = 3;
}
