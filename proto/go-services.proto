syntax = "proto3";

package posshell.services;

option go_package = "github.com/54link/pos-shell/proto";

// ─── Workflow Orchestrator ───────────────────────────────────────
service WorkflowOrchestrator {
  rpc CreateWorkflow(CreateWorkflowRequest) returns (WorkflowResponse);
  rpc ExecuteStep(ExecuteStepRequest) returns (StepResponse);
  rpc GetWorkflowStatus(WorkflowStatusRequest) returns (WorkflowStatusResponse);
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc CancelWorkflow(CancelWorkflowRequest) returns (WorkflowResponse);
}

message CreateWorkflowRequest {
  string name = 1;
  string category = 2;
  repeated WorkflowStep steps = 3;
  string description = 4;
  map<string, string> metadata = 5;
}

message WorkflowStep {
  string name = 1;
  string type = 2;
  string assignee_role = 3;
  bool auto_approve = 4;
  int32 timeout_hours = 5;
  map<string, string> config = 6;
}

message WorkflowResponse {
  string id = 1;
  string status = 2;
  int64 created_at = 3;
}

message ExecuteStepRequest {
  string workflow_id = 1;
  string step_id = 2;
  map<string, string> input = 3;
}

message StepResponse {
  string step_id = 1;
  string status = 2;
  string output = 3;
  int64 completed_at = 4;
}

message WorkflowStatusRequest { string workflow_id = 1; }
message WorkflowStatusResponse {
  string id = 1;
  string status = 2;
  int32 completed_steps = 3;
  int32 total_steps = 4;
  string current_step = 5;
}

message ListWorkflowsRequest {
  int32 limit = 1;
  int32 offset = 2;
  string status_filter = 3;
}

message ListWorkflowsResponse {
  repeated WorkflowStatusResponse workflows = 1;
  int32 total = 2;
}

message CancelWorkflowRequest { string workflow_id = 1; }

// ─── TigerBeetle Ledger ─────────────────────────────────────────
service TigerBeetleLedger {
  rpc CreateAccount(CreateAccountRequest) returns (AccountResponse);
  rpc CreateTransfer(CreateTransferRequest) returns (TransferResponse);
  rpc GetBalance(GetBalanceRequest) returns (BalanceResponse);
  rpc ListTransfers(ListTransfersRequest) returns (ListTransfersResponse);
  rpc ReverseTransfer(ReverseTransferRequest) returns (TransferResponse);
}

message CreateAccountRequest {
  string owner_id = 1;
  string currency = 2;
  string account_type = 3;
  int64 initial_balance = 4;
}

message AccountResponse {
  string account_id = 1;
  string status = 2;
  int64 created_at = 3;
}

message CreateTransferRequest {
  string debit_account_id = 1;
  string credit_account_id = 2;
  int64 amount = 3;
  string currency = 4;
  string reference = 5;
  map<string, string> metadata = 6;
}

message TransferResponse {
  string transfer_id = 1;
  string status = 2;
  int64 timestamp = 3;
}

message GetBalanceRequest { string account_id = 1; }
message BalanceResponse {
  string account_id = 1;
  int64 debits_posted = 2;
  int64 credits_posted = 3;
  int64 debits_pending = 4;
  int64 credits_pending = 5;
  int64 available_balance = 6;
}

message ListTransfersRequest {
  string account_id = 1;
  int32 limit = 2;
  int64 since = 3;
}

message ListTransfersResponse {
  repeated TransferDetail transfers = 1;
  int32 total = 2;
}

message TransferDetail {
  string id = 1;
  string debit_account_id = 2;
  string credit_account_id = 3;
  int64 amount = 4;
  string currency = 5;
  string status = 6;
  int64 timestamp = 7;
}

message ReverseTransferRequest {
  string transfer_id = 1;
  string reason = 2;
}

// ─── Settlement Gateway ──────────────────────────────────────────
service SettlementGateway {
  rpc InitiateSettlement(InitiateSettlementRequest) returns (SettlementResponse);
  rpc GetSettlementStatus(SettlementStatusRequest) returns (SettlementStatusResponse);
  rpc ListSettlements(ListSettlementsRequest) returns (ListSettlementsResponse);
  rpc ReconcileSettlement(ReconcileSettlementRequest) returns (ReconciliationResponse);
}

message InitiateSettlementRequest {
  string batch_id = 1;
  repeated string transaction_ids = 2;
  string settlement_method = 3;
  string target_account = 4;
}

message SettlementResponse {
  string settlement_id = 1;
  string status = 2;
  int64 total_amount = 3;
  int32 transaction_count = 4;
}

message SettlementStatusRequest { string settlement_id = 1; }
message SettlementStatusResponse {
  string settlement_id = 1;
  string status = 2;
  int64 settled_amount = 3;
  int64 pending_amount = 4;
  int32 settled_count = 5;
  int32 pending_count = 6;
}

message ListSettlementsRequest {
  int32 limit = 1;
  int32 offset = 2;
  string status_filter = 3;
}

message ListSettlementsResponse {
  repeated SettlementStatusResponse settlements = 1;
  int32 total = 2;
}

message ReconcileSettlementRequest {
  string settlement_id = 1;
  string source = 2;
}

message ReconciliationResponse {
  int32 matched_count = 1;
  int32 unmatched_count = 2;
  int32 discrepancy_count = 3;
  int64 total_variance = 4;
}

// ─── PBAC Engine ─────────────────────────────────────────────────
service PBACEngine {
  rpc CheckPermission(CheckPermissionRequest) returns (PermissionResponse);
  rpc AssignRole(AssignRoleRequest) returns (RoleResponse);
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);
  rpc CreatePolicy(CreatePolicyRequest) returns (PolicyResponse);
}

message CheckPermissionRequest {
  string subject_id = 1;
  string resource = 2;
  string action = 3;
  map<string, string> context = 4;
}

message PermissionResponse {
  bool allowed = 1;
  string reason = 2;
  string policy_id = 3;
}

message AssignRoleRequest {
  string user_id = 1;
  string role = 2;
  string scope = 3;
}

message RoleResponse {
  string user_id = 1;
  string role = 2;
  string status = 3;
}

message ListPermissionsRequest {
  string subject_id = 1;
  string resource_filter = 2;
}

message ListPermissionsResponse {
  repeated PermissionEntry permissions = 1;
}

message PermissionEntry {
  string resource = 1;
  string action = 2;
  bool allowed = 3;
}

message CreatePolicyRequest {
  string name = 1;
  string description = 2;
  repeated PolicyRule rules = 3;
}

message PolicyRule {
  string resource = 1;
  repeated string actions = 2;
  string effect = 3;
  map<string, string> conditions = 4;
}

message PolicyResponse {
  string policy_id = 1;
  string status = 2;
}

// ─── USSD Gateway ────────────────────────────────────────────────
service USSDGateway {
  rpc HandleSession(USSDSessionRequest) returns (USSDSessionResponse);
  rpc GetSessionState(SessionStateRequest) returns (SessionStateResponse);
  rpc ListActiveSessions(ListActiveSessionsRequest) returns (ListActiveSessionsResponse);
}

message USSDSessionRequest {
  string session_id = 1;
  string phone_number = 2;
  string service_code = 3;
  string text = 4;
}

message USSDSessionResponse {
  string session_id = 1;
  string response_text = 2;
  bool end_session = 3;
}

message SessionStateRequest { string session_id = 1; }
message SessionStateResponse {
  string session_id = 1;
  string state = 2;
  map<string, string> data = 3;
}

message ListActiveSessionsRequest { int32 limit = 1; }
message ListActiveSessionsResponse {
  repeated SessionStateResponse sessions = 1;
  int32 total = 2;
}

// ─── OpenSearch Analytics ────────────────────────────────────────
service OpenSearchAnalytics {
  rpc IndexDocument(IndexDocumentRequest) returns (IndexResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc GetAggregation(AggregationRequest) returns (AggregationResponse);
}

message IndexDocumentRequest {
  string index = 1;
  string document_id = 2;
  string body = 3;
}

message IndexResponse {
  string document_id = 1;
  string result = 2;
}

message SearchRequest {
  string index = 1;
  string query = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message SearchResponse {
  repeated SearchHit hits = 1;
  int32 total = 2;
}

message SearchHit {
  string id = 1;
  float score = 2;
  string source = 3;
}

message AggregationRequest {
  string index = 1;
  string field = 2;
  string agg_type = 3;
  int32 size = 4;
}

message AggregationResponse {
  repeated AggBucket buckets = 1;
}

message AggBucket {
  string key = 1;
  int64 doc_count = 2;
  double value = 3;
}
