# ─── 54Link Agency Banking Platform — Docker Compose Override ────────────────
# Local development overrides for docker-compose.yml.
# This file is automatically merged by `docker compose up` in development.
# DO NOT commit secrets to this file — use .env.local or Docker secrets instead.

version: '3.9'

services:
  # ── Main Node.js app — dev mode with hot reload ───────────────────────────
  app:
    build:
      target: development
    environment:
      - NODE_ENV=development
      - POSTGRES_URL=postgresql://posadmin:pos54link2026@postgres:5432/pos54link
      - VITE_DEV_SERVER_PORT=5173
      - LOG_LEVEL=debug
      - FRAUD_ENGINE_ENABLED=true
      - FLUVIO_ENABLED=false          # disable Fluvio in local dev
      - ERP_ENABLED=false             # disable ERP sync in local dev
    volumes:
      - .:/app
      - /app/node_modules             # preserve container node_modules
    ports:
      - "3000:3000"
      - "5173:5173"                   # Vite HMR port
    command: pnpm dev
    depends_on:
      postgres:
        condition: service_healthy

  # ── Local PostgreSQL (replaces remote DB in dev) ──────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: posadmin
      POSTGRES_PASSWORD: pos54link2026
      POSTGRES_DB: pos54link
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./drizzle:/docker-entrypoint-initdb.d:ro   # auto-run migrations on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posadmin -d pos54link"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Mailhog — local SMTP catch-all ────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI at http://localhost:8025

  # ── OTA service — dev mode ────────────────────────────────────────────────
  ota-service:
    environment:
      - GIN_MODE=debug
      - LOG_LEVEL=debug

  # ── FIDO2 service — dev mode ──────────────────────────────────────────────
  fido2-service:
    environment:
      - GIN_MODE=debug
      - LOG_LEVEL=debug

  # ── Credit scoring — dev mode ─────────────────────────────────────────────
  credit-scoring:
    environment:
      - FLASK_ENV=development
      - LOG_LEVEL=DEBUG

  # ── Analytics service — dev mode ──────────────────────────────────────────
  analytics-service:
    environment:
      - FLASK_ENV=development
      - LOG_LEVEL=DEBUG

  # ── i18n/Currency service — dev mode ─────────────────────────────────────
  i18n-currency:
    environment:
      - RUST_LOG=debug

  # ── Nginx — disabled in local dev (app serves directly on :3000) ──────────
  nginx:
    profiles:
      - production-only   # only starts with: docker compose --profile production-only up

volumes:
  postgres_data:
    driver: local
