{{- if .Values.temporal.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: {{ .Values.global.namespace }}
  labels:
    app: temporal
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.temporal.server.replicaCount }}
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      containers:
        - name: temporal
          image: {{ .Values.temporal.image.repository }}:{{ .Values.temporal.image.tag }}
          ports:
            - containerPort: 7233
              name: grpc
            - containerPort: 7234
              name: membership
            - containerPort: 7235
              name: history
            - containerPort: 7239
              name: matching
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "{{ .Values.global.postgresPort }}"
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: tourismpay-secrets
                  key: temporal-db-password
            - name: POSTGRES_SEEDS
              value: "{{ .Values.global.postgresHost }}"
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: /etc/temporal/dynamicconfig/development-sql.yaml
            - name: ENABLE_ES
              value: "false"
            - name: TEMPORAL_ADDRESS
              value: "temporal:7233"
            - name: TEMPORAL_NAMESPACE
              value: default
          volumeMounts:
            - name: dynamicconfig
              mountPath: /etc/temporal/dynamicconfig
          resources:
            requests:
              memory: {{ .Values.temporal.resources.requests.memory }}
              cpu: {{ .Values.temporal.resources.requests.cpu }}
            limits:
              memory: {{ .Values.temporal.resources.limits.memory }}
              cpu: {{ .Values.temporal.resources.limits.cpu }}
          readinessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: dynamicconfig
          configMap:
            name: temporal-dynamicconfig
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-dynamicconfig
  namespace: {{ .Values.global.namespace }}
data:
  development-sql.yaml: |
    limit.maxIDLength:
      - value: 255
        constraints: {}
    system.forceSearchAttributesCacheRefreshOnRead:
      - value: true
        constraints: {}
    history.defaultActivityRetryPolicy:
      - value:
          InitialIntervalInSeconds: 1
          MaximumIntervalCoefficient: 100.0
          BackoffCoefficient: 2.0
          MaximumAttempts: 3
        constraints: {}
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: {{ .Values.global.namespace }}
  labels:
    app: temporal
spec:
  selector:
    app: temporal
  ports:
    - name: grpc
      port: {{ .Values.temporal.service.port }}
      targetPort: 7233
  type: {{ .Values.temporal.service.type }}
---
{{- if .Values.temporal.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: {{ .Values.global.namespace }}
  labels:
    app: temporal-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      containers:
        - name: temporal-ui
          image: {{ .Values.temporal.ui.image.repository }}:{{ .Values.temporal.ui.image.tag }}
          ports:
            - containerPort: 8080
          env:
            - name: TEMPORAL_ADDRESS
              value: "temporal:7233"
            - name: TEMPORAL_CORS_ORIGINS
              value: "http://localhost:3000"
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: temporal-ui
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
{{- end }}
{{- end }}
