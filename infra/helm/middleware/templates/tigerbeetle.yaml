{{- if .Values.tigerbeetle.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tigerbeetle-data
  namespace: {{ .Values.global.namespace }}
  labels:
    app: tigerbeetle
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.tigerbeetle.persistence.size }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: tigerbeetle-format
  namespace: {{ .Values.global.namespace }}
  labels:
    app: tigerbeetle-format
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: format
          image: {{ .Values.tigerbeetle.image.repository }}:{{ .Values.tigerbeetle.image.tag }}
          command: ["./tigerbeetle", "format", "--cluster=0", "--replica=0", "--replica-count=1", "/data/0_0.tigerbeetle"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tigerbeetle-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tigerbeetle
  namespace: {{ .Values.global.namespace }}
  labels:
    app: tigerbeetle
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tigerbeetle
  template:
    metadata:
      labels:
        app: tigerbeetle
    spec:
      initContainers:
        - name: wait-format
          image: busybox:1.36
          command: ["sh", "-c", "until [ -f /data/0_0.tigerbeetle ]; do sleep 2; done"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: tigerbeetle
          image: {{ .Values.tigerbeetle.image.repository }}:{{ .Values.tigerbeetle.image.tag }}
          imagePullPolicy: {{ .Values.tigerbeetle.image.pullPolicy }}
          command: ["./tigerbeetle", "start", "--addresses=0.0.0.0:3001", "/data/0_0.tigerbeetle"]
          ports:
            - containerPort: 3001
              name: ledger
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: {{ .Values.tigerbeetle.resources.requests.memory }}
              cpu: {{ .Values.tigerbeetle.resources.requests.cpu }}
            limits:
              memory: {{ .Values.tigerbeetle.resources.limits.memory }}
              cpu: {{ .Values.tigerbeetle.resources.limits.cpu }}
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tigerbeetle-data
---
apiVersion: v1
kind: Service
metadata:
  name: tigerbeetle
  namespace: {{ .Values.global.namespace }}
  labels:
    app: tigerbeetle
spec:
  selector:
    app: tigerbeetle
  ports:
    - name: ledger
      port: {{ .Values.tigerbeetle.service.port }}
      targetPort: 3001
  type: {{ .Values.tigerbeetle.service.type }}
{{- end }}
