{{- if .Values.server.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tourismpay-server
  namespace: {{ .Values.global.namespace }}
  labels:
    app: tourismpay-server
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      app: tourismpay-server
  template:
    metadata:
      labels:
        app: tourismpay-server
      annotations:
        {{- if .Values.server.dapr.enabled }}
        dapr.io/enabled: "true"
        dapr.io/app-id: {{ .Values.server.dapr.appId }}
        dapr.io/app-port: "{{ .Values.server.dapr.appPort }}"
        dapr.io/log-level: {{ .Values.server.dapr.logLevel }}
        dapr.io/sidecar-listen-addresses: "0.0.0.0"
        {{- end }}
    spec:
      containers:
        - name: server
          image: {{ .Values.global.imageRegistry }}/tourismpay-server:{{ .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: jwt-secret
            - name: APISIX_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: apisix-admin-key
            {{- range $key, $value := .Values.server.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            requests:
              memory: {{ .Values.server.resources.requests.memory }}
              cpu: {{ .Values.server.resources.requests.cpu }}
            limits:
              memory: {{ .Values.server.resources.limits.memory }}
              cpu: {{ .Values.server.resources.limits.cpu }}
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: tourismpay-server
  namespace: {{ .Values.global.namespace }}
  labels:
    app: tourismpay-server
spec:
  selector:
    app: tourismpay-server
  ports:
    - name: http
      port: {{ .Values.server.service.port }}
      targetPort: 3000
  type: {{ .Values.server.service.type }}
---
{{- if .Values.server.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tourismpay-server-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tourismpay-server
  minReplicas: {{ .Values.server.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.server.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.server.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
