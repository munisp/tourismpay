# ═══════════════════════════════════════════════════════════════════════════════
# Eclipse Mosquitto Configuration — 54Link POS Shell
# ═══════════════════════════════════════════════════════════════════════════════

# ── Listeners ─────────────────────────────────────────────────────────────────
listener 1883
protocol mqtt

listener 9001
protocol websockets

# ── Security ──────────────────────────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Persistence ───────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# ── Limits ────────────────────────────────────────────────────────────────────
max_connections 1000
max_inflight_messages 100
max_queued_messages 1000
message_size_limit 65536
