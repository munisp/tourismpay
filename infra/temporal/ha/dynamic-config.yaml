###############################################################################
# Temporal Dynamic Configuration — POS-54Link Production
###############################################################################

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend.rps:
  - value: 2400
    constraints: {}
frontend.namespaceRPS:
  - value: 1200
    constraints: {}
frontend.maxNamespaceVisibilityRPSPerInstance:
  - value: 50
    constraints: {}
frontend.enableClientVersionCheck:
  - value: true
    constraints: {}

# ── History ───────────────────────────────────────────────────────────────────
history.defaultActivityRetryPolicy.InitialInterval:
  - value: "1s"
    constraints: {}
history.defaultActivityRetryPolicy.MaximumInterval:
  - value: "100s"
    constraints: {}
history.defaultActivityRetryPolicy.BackoffCoefficient:
  - value: 2.0
    constraints: {}
history.defaultActivityRetryPolicy.MaximumAttempts:
  - value: 0
    constraints: {}
history.maximumBufferedEvents:
  - value: 100
    constraints: {}
history.maxWorkflowTaskTimeoutSeconds:
  - value: 120
    constraints: {}
history.longPollExpirationInterval:
  - value: "60s"
    constraints: {}

# ── Matching ──────────────────────────────────────────────────────────────────
matching.numTaskqueueReadPartitions:
  - value: 8
    constraints: {}
matching.numTaskqueueWritePartitions:
  - value: 8
    constraints: {}
matching.forwarderMaxOutstandingPolls:
  - value: 20
    constraints: {}
matching.forwarderMaxRatePerSecond:
  - value: 20
    constraints: {}

# ── Worker ────────────────────────────────────────────────────────────────────
worker.replicatorConcurrency:
  - value: 1024
    constraints: {}

# ── Archival ──────────────────────────────────────────────────────────────────
system.archivalStatus:
  - value: enabled
    constraints: {}

# ── Persistence ───────────────────────────────────────────────────────────────
system.enableEagerNamespaceRefresher:
  - value: true
    constraints: {}
