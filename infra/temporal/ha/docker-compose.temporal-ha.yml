###############################################################################
# Temporal HA — 3 History shards, 2 Frontend, 2 Matching, 2 Worker
# Production-tuned for POS-54Link: KYC workflows, settlement, reconciliation
###############################################################################
version: "3.9"

services:
  temporal-frontend-1:
    image: temporalio/server:1.25.2
    container_name: temporal-frontend-1
    restart: unless-stopped
    ports: ["7233:7233"]
    environment:
      - SERVICES=frontend
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-temporal-secret}
      - POSTGRES_SEEDS=postgres-primary
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamic-config.yaml
      - TEMPORAL_BROADCAST_ADDRESS=temporal-frontend-1
      - NUM_HISTORY_SHARDS=512
      - FRONTEND_GRPC_MAX_MESSAGE_SIZE=67108864
    volumes:
      - ./dynamic-config.yaml:/etc/temporal/dynamic-config.yaml
    networks: [pos54-net]
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }
        reservations: { cpus: "1", memory: 1G }

  temporal-frontend-2:
    image: temporalio/server:1.25.2
    container_name: temporal-frontend-2
    restart: unless-stopped
    ports: ["7234:7233"]
    environment:
      - SERVICES=frontend
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-temporal-secret}
      - POSTGRES_SEEDS=postgres-primary
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamic-config.yaml
      - TEMPORAL_BROADCAST_ADDRESS=temporal-frontend-2
      - NUM_HISTORY_SHARDS=512
    volumes:
      - ./dynamic-config.yaml:/etc/temporal/dynamic-config.yaml
    networks: [pos54-net]
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }

  temporal-history-1:
    image: temporalio/server:1.25.2
    container_name: temporal-history-1
    restart: unless-stopped
    environment:
      - SERVICES=history
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-temporal-secret}
      - POSTGRES_SEEDS=postgres-primary
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamic-config.yaml
      - TEMPORAL_BROADCAST_ADDRESS=temporal-history-1
      - NUM_HISTORY_SHARDS=512
    volumes:
      - ./dynamic-config.yaml:/etc/temporal/dynamic-config.yaml
    networks: [pos54-net]
    deploy:
      resources:
        limits: { cpus: "4", memory: 4G }
        reservations: { cpus: "2", memory: 2G }

  temporal-history-2:
    image: temporalio/server:1.25.2
    container_name: temporal-history-2
    restart: unless-stopped
    environment:
      - SERVICES=history
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-temporal-secret}
      - POSTGRES_SEEDS=postgres-primary
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamic-config.yaml
      - TEMPORAL_BROADCAST_ADDRESS=temporal-history-2
      - NUM_HISTORY_SHARDS=512
    volumes:
      - ./dynamic-config.yaml:/etc/temporal/dynamic-config.yaml
    networks: [pos54-net]
    deploy:
      resources:
        limits: { cpus: "4", memory: 4G }

  temporal-matching-1:
    image: temporalio/server:1.25.2
    container_name: temporal-matching-1
    restart: unless-stopped
    environment:
      - SERVICES=matching
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-temporal-secret}
      - POSTGRES_SEEDS=postgres-primary
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamic-config.yaml
      - TEMPORAL_BROADCAST_ADDRESS=temporal-matching-1
    volumes:
      - ./dynamic-config.yaml:/etc/temporal/dynamic-config.yaml
    networks: [pos54-net]
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }

  temporal-worker-1:
    image: temporalio/server:1.25.2
    container_name: temporal-worker-1
    restart: unless-stopped
    environment:
      - SERVICES=worker
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_DB_USER:-temporal}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD:-temporal-secret}
      - POSTGRES_SEEDS=postgres-primary
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/dynamic-config.yaml
      - TEMPORAL_BROADCAST_ADDRESS=temporal-worker-1
    volumes:
      - ./dynamic-config.yaml:/etc/temporal/dynamic-config.yaml
    networks: [pos54-net]
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: temporal-ui
    restart: unless-stopped
    ports: ["8088:8080"]
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend-1:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    networks: [pos54-net]

networks:
  pos54-net:
    external: true
