##
## 54Link POS Shell — OpenTelemetry Collector Configuration
## Full distributed tracing pipeline for billing microservices
##

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Prometheus metrics scraping
  prometheus:
    config:
      scrape_configs:
        - job_name: 'billing-trpc-backend'
          scrape_interval: 15s
          static_configs:
            - targets: ['trpc-backend:9090']
              labels:
                service: trpc-backend
                tier: backend

        - job_name: 'billing-aggregation-engine'
          scrape_interval: 15s
          static_configs:
            - targets: ['billing-aggregation-engine:9090']
              labels:
                service: billing-aggregation-engine
                language: go

        - job_name: 'ledger-integrity-validator'
          scrape_interval: 15s
          static_configs:
            - targets: ['ledger-integrity-validator:9090']
              labels:
                service: ledger-integrity-validator
                language: rust

        - job_name: 'settlement-gateway'
          scrape_interval: 15s
          static_configs:
            - targets: ['settlement-gateway:9090']
              labels:
                service: settlement-gateway
                language: go

        - job_name: 'billing-event-processor'
          scrape_interval: 15s
          static_configs:
            - targets: ['billing-event-processor:9090']
              labels:
                service: billing-event-processor
                language: rust

        - job_name: 'sla-monitor'
          scrape_interval: 15s
          static_configs:
            - targets: ['sla-monitor:9090']
              labels:
                service: sla-monitor
                language: python

        - job_name: 'webhook-dispatcher'
          scrape_interval: 15s
          static_configs:
            - targets: ['webhook-dispatcher:9090']
              labels:
                service: webhook-dispatcher
                language: python

  # Kafka metrics
  kafka:
    protocol_version: 3.0.0
    brokers:
      - kafka-0:9092
      - kafka-1:9092
      - kafka-2:9092
    topic: billing.otel.traces
    encoding: otlp_proto

  # Host metrics
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      disk: {}
      memory: {}
      network: {}
      load: {}

processors:
  # Batch processing for efficiency
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: 5s

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

  # Resource detection
  resourcedetection:
    detectors: [env, system, docker]
    timeout: 5s

  # Attribute processing
  attributes:
    actions:
      - key: environment
        value: production
        action: upsert
      - key: platform
        value: 54link-billing
        action: upsert
      - key: region
        value: af-west-1
        action: upsert

  # Tail-based sampling for cost control
  tail_sampling:
    decision_wait: 10s
    num_traces: 100000
    expected_new_traces_per_sec: 500
    policies:
      # Always sample errors
      - name: errors
        type: status_code
        status_code:
          status_codes: [ERROR]

      # Always sample slow requests (>1s)
      - name: slow-requests
        type: latency
        latency:
          threshold_ms: 1000

      # Sample billing ledger operations at 100%
      - name: billing-ledger
        type: string_attribute
        string_attribute:
          key: rpc.method
          values: [billingLedger.postEntry, billingLedger.getEntries]

      # Sample invoice operations at 100%
      - name: billing-invoice
        type: string_attribute
        string_attribute:
          key: rpc.method
          values: [billingInvoice.createInvoice, billingInvoice.listInvoices]

      # Sample reconciliation at 100%
      - name: reconciliation
        type: string_attribute
        string_attribute:
          key: rpc.method
          values: [revenueReconciliation.runReconciliation]

      # Sample everything else at 10%
      - name: default-sampling
        type: probabilistic
        probabilistic:
          sampling_percentage: 10

  # Span metrics connector
  spanmetrics:
    histogram:
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - name: http.method
      - name: http.status_code
      - name: rpc.method
      - name: service.name
    exemplars:
      enabled: true

exporters:
  # Jaeger for trace visualization
  otlp/jaeger:
    endpoint: jaeger-collector:4317
    tls:
      insecure: true

  # Prometheus for metrics
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: billing
    const_labels:
      platform: 54link

  # Loki for logs
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    labels:
      resource:
        service.name: "service_name"
        service.namespace: "service_namespace"

  # Debug exporter (development only)
  debug:
    verbosity: basic

  # S3 for long-term trace storage
  awss3:
    s3uploader:
      region: af-south-1
      s3_bucket: 54link-billing-traces
      s3_prefix: otel-traces
      s3_partition: minute
      file_prefix: billing-trace

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  pprof:
    endpoint: 0.0.0.0:1888

  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]

  pipelines:
    traces:
      receivers: [otlp, kafka]
      processors: [memory_limiter, resourcedetection, attributes, tail_sampling, batch]
      exporters: [otlp/jaeger, awss3]

    metrics:
      receivers: [otlp, prometheus, hostmetrics]
      processors: [memory_limiter, resourcedetection, attributes, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, attributes, batch]
      exporters: [loki]

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
