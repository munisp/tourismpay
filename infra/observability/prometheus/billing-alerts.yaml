##
## 54Link POS Shell — Prometheus Alerting Rules
## Production-grade alerts for billing engine health
##

groups:
  - name: billing-availability
    interval: 30s
    rules:
      - alert: BillingAPIDown
        expr: up{job="billing-trpc-backend"} == 0
        for: 2m
        labels:
          severity: critical
          team: billing-platform
        annotations:
          summary: "Billing API is down"
          description: "The billing tRPC backend has been unreachable for more than 2 minutes."
          runbook_url: "https://wiki.54link.com/runbooks/billing-api-down"

      - alert: BillingHighErrorRate
        expr: |
          100 * rate(billing_http_requests_total{status=~"5.."}[5m])
          / rate(billing_http_requests_total[5m]) > 5
        for: 5m
        labels:
          severity: critical
          team: billing-platform
        annotations:
          summary: "Billing API error rate above 5%"
          description: "Error rate is {{ $value | printf \"%.1f\" }}% over the last 5 minutes."

      - alert: BillingHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(billing_http_request_duration_seconds_bucket{service="trpc-backend"}[5m])
          ) > 1.0
        for: 5m
        labels:
          severity: warning
          team: billing-platform
        annotations:
          summary: "Billing API P95 latency above 1s"
          description: "P95 latency is {{ $value | printf \"%.2f\" }}s."

  - name: billing-ledger
    interval: 30s
    rules:
      - alert: TigerBeetleSidecarDown
        expr: billing_tigerbeetle_sidecar_up == 0
        for: 1m
        labels:
          severity: critical
          team: billing-ledger
        annotations:
          summary: "TigerBeetle sidecar is down"
          description: "The TigerBeetle sidecar has been unreachable. Transactions are falling back to PostgreSQL-only mode."

      - alert: LedgerReconciliationFailed
        expr: billing_reconciliation_discrepancy_count > 0
        for: 10m
        labels:
          severity: critical
          team: billing-ledger
        annotations:
          summary: "Ledger reconciliation found discrepancies"
          description: "{{ $value }} discrepancies detected between TigerBeetle and PostgreSQL."

      - alert: LedgerPostLatencyHigh
        expr: |
          histogram_quantile(0.95,
            rate(billing_ledger_post_duration_seconds_bucket[5m])
          ) > 0.2
        for: 5m
        labels:
          severity: warning
          team: billing-ledger
        annotations:
          summary: "Ledger posting P95 latency above 200ms"

  - name: billing-revenue
    interval: 60s
    rules:
      - alert: InvoiceGenerationFailed
        expr: increase(billing_invoice_generation_errors_total[1h]) > 5
        for: 5m
        labels:
          severity: warning
          team: billing-revenue
        annotations:
          summary: "Multiple invoice generation failures"
          description: "{{ $value }} invoice generation errors in the last hour."

      - alert: SettlementCronMissed
        expr: time() - billing_settlement_last_run_timestamp > 90000
        for: 5m
        labels:
          severity: critical
          team: billing-revenue
        annotations:
          summary: "Daily settlement cron has not run in 25+ hours"

      - alert: RevenueDropAnomaly
        expr: |
          billing_revenue_ngn_total - billing_revenue_ngn_total offset 1d
          < -0.5 * billing_revenue_ngn_total offset 1d
        for: 30m
        labels:
          severity: warning
          team: billing-revenue
        annotations:
          summary: "Revenue dropped more than 50% compared to yesterday"

  - name: billing-stripe
    interval: 30s
    rules:
      - alert: StripeWebhookFailures
        expr: rate(billing_stripe_webhook_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          team: billing-payments
        annotations:
          summary: "Stripe webhook processing errors detected"

      - alert: StripeWebhookBacklog
        expr: billing_stripe_webhook_pending_count > 100
        for: 10m
        labels:
          severity: warning
          team: billing-payments
        annotations:
          summary: "Stripe webhook backlog growing"
          description: "{{ $value }} webhooks pending processing."

  - name: billing-infrastructure
    interval: 30s
    rules:
      - alert: DatabaseConnectionPoolExhausted
        expr: billing_db_pool_active / billing_db_pool_size > 0.9
        for: 5m
        labels:
          severity: critical
          team: billing-platform
        annotations:
          summary: "Database connection pool above 90% utilization"

      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_group_lag{group=~"billing.*"} > 10000
        for: 10m
        labels:
          severity: warning
          team: billing-platform
        annotations:
          summary: "Kafka consumer lag exceeds 10K messages"
          description: "Topic {{ $labels.topic }} partition {{ $labels.partition }} has {{ $value }} messages lag."

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
          team: billing-platform
        annotations:
          summary: "Disk space below 10%"

      - alert: MemoryUsageHigh
        expr: |
          (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
        for: 5m
        labels:
          severity: warning
          team: billing-platform
        annotations:
          summary: "Memory usage above 90%"

  - name: billing-security
    interval: 60s
    rules:
      - alert: UnauthorizedAccessSpike
        expr: rate(billing_auth_failures_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          team: billing-security
        annotations:
          summary: "Spike in unauthorized access attempts"
          description: "{{ $value | printf \"%.1f\" }} auth failures per second."

      - alert: RBACPermissionDeniedSpike
        expr: rate(billing_rbac_denied_total[5m]) > 5
        for: 5m
        labels:
          severity: warning
          team: billing-security
        annotations:
          summary: "Spike in RBAC permission denials"
