version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Keycloak HA — 2 active nodes + PostgreSQL HA backend + Infinispan clustering
# Uses Keycloak 24 with JGroups JDBC_PING for cluster discovery
# ─────────────────────────────────────────────────────────────────────────────

services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak-db-secret}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-1:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak-1
    restart: unless-stopped
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak-db-secret}
      KC_HOSTNAME: ${KC_HOSTNAME:-keycloak.tourismpay.local}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_CACHE: ispn
      KC_CACHE_STACK: jdbc-ping
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin-secret}
      JAVA_OPTS_APPEND: "-Djgroups.dns.query=keycloak"
    ports:
      - "8180:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  keycloak-2:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak-2
    restart: unless-stopped
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak-db-secret}
      KC_HOSTNAME: ${KC_HOSTNAME:-keycloak.tourismpay.local}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_CACHE: ispn
      KC_CACHE_STACK: jdbc-ping
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin-secret}
      JAVA_OPTS_APPEND: "-Djgroups.dns.query=keycloak"
    ports:
      - "8181:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  keycloak-lb:
    image: nginx:1.25-alpine
    container_name: keycloak-lb
    restart: unless-stopped
    volumes:
      - ./nginx-keycloak.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      keycloak-1:
        condition: service_healthy
      keycloak-2:
        condition: service_healthy

volumes:
  keycloak-db-data:

networks:
  default:
    name: tourismpay-infra
    external: true
