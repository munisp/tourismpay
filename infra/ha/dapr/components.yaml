---
# ─────────────────────────────────────────────────────────────────────────────
# Dapr HA Components — TourismPay Platform
# Dapr control plane: 3 replicas of each system service
# ─────────────────────────────────────────────────────────────────────────────

# ── State Store (Redis Sentinel) ──────────────────────────────────────────────
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: tourismpay-statestore
  namespace: tourismpay
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: "redis-sentinel-1:26379,redis-sentinel-2:26380,redis-sentinel-3:26381"
    - name: redisPassword
      secretKeyRef:
        name: tourismpay-secrets
        key: REDIS_PASSWORD
    - name: sentinelMasterName
      value: mymaster
    - name: enableTLS
      value: "false"
    - name: redeliveryInSeconds
      value: "30"
    - name: actorStateStore
      value: "true"

---
# ── Pub/Sub (Kafka) ───────────────────────────────────────────────────────────
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: tourismpay-pubsub
  namespace: tourismpay
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    - name: brokers
      value: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
    - name: consumerGroup
      value: tourismpay-dapr
    - name: clientID
      value: tourismpay-dapr-client
    - name: authRequired
      value: "false"
    - name: maxMessageBytes
      value: "1048576"

---
# ── Secret Store (Kubernetes) ─────────────────────────────────────────────────
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: tourismpay-secrets
  namespace: tourismpay
spec:
  type: secretstores.kubernetes
  version: v1
  metadata: []

---
# ── Resiliency Policy ─────────────────────────────────────────────────────────
apiVersion: dapr.io/v1alpha1
kind: Resiliency
metadata:
  name: tourismpay-resiliency
  namespace: tourismpay
spec:
  policies:
    timeouts:
      defaultTimeout: 30s
      longTimeout: 120s
    retries:
      defaultRetry:
        policy: constant
        duration: 1s
        maxRetries: 3
      criticalRetry:
        policy: exponential
        maxInterval: 30s
        maxRetries: 5
    circuitBreakers:
      defaultCB:
        maxRequests: 1
        interval: 10s
        timeout: 30s
        trip: consecutiveFailures >= 5
  targets:
    apps:
      bis-service:
        timeout: longTimeout
        retry: criticalRetry
        circuitBreaker: defaultCB
      payment-switch:
        timeout: longTimeout
        retry: criticalRetry
        circuitBreaker: defaultCB
    components:
      tourismpay-statestore:
        outbound:
          timeout: defaultTimeout
          retry: defaultRetry
      tourismpay-pubsub:
        outbound:
          timeout: defaultTimeout
          retry: defaultRetry

---
# ── Subscriptions ─────────────────────────────────────────────────────────────
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: payment-events
  namespace: tourismpay
spec:
  topic: payment.completed
  routes:
    default: /dapr/subscribe/payment-completed
  pubsubname: tourismpay-pubsub
  scopes:
    - tourismpay-pwa
    - bis-service

---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: fraud-alerts
  namespace: tourismpay
spec:
  topic: fraud.alert
  routes:
    default: /dapr/subscribe/fraud-alert
  pubsubname: tourismpay-pubsub
  scopes:
    - tourismpay-pwa
    - payment-switch
