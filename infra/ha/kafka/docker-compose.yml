version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Kafka HA — 3-node KRaft cluster (no ZooKeeper)
# Replication factor: 3  |  Min in-sync replicas: 2
# ─────────────────────────────────────────────────────────────────────────────

x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.6.0
  restart: unless-stopped
  environment:
    KAFKA_PROCESS_ROLES: "broker,controller"
    KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
    KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
    KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
    KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
    KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
    KAFKA_MIN_INSYNC_REPLICAS: "2"
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
    KAFKA_LOG_RETENTION_HOURS: "168"
    KAFKA_LOG_SEGMENT_BYTES: "1073741824"
    KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: "300000"
    KAFKA_HEAP_OPTS: "-Xms1g -Xmx2g"
    CLUSTER_ID: "tourismpay-kafka-cluster-v1"
  healthcheck:
    test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 60s

services:
  kafka-1:
    <<: *kafka-common
    hostname: kafka-1
    container_name: kafka-1
    environment:
      <<: *kafka-common
      KAFKA_NODE_ID: "1"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:9092"
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    ports:
      - "9092:9092"

  kafka-2:
    <<: *kafka-common
    hostname: kafka-2
    container_name: kafka-2
    environment:
      <<: *kafka-common
      KAFKA_NODE_ID: "2"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-2:9092"
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    ports:
      - "9093:9092"

  kafka-3:
    <<: *kafka-common
    hostname: kafka-3
    container_name: kafka-3
    environment:
      <<: *kafka-common
      KAFKA_NODE_ID: "3"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-3:9092"
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    ports:
      - "9094:9092"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "tourismpay"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy

volumes:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:

networks:
  default:
    name: tourismpay-infra
    external: true
