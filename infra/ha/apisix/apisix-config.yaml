apisix:
  node_listen: 9080
  enable_ipv6: false
  enable_admin: true
  admin_listen:
    ip: 0.0.0.0
    port: 9180
  admin_key:
    - name: admin
      key: tourismpay-admin-key
      role: admin
  ssl:
    enable: true
    listen:
      - port: 9443
        enable_http3: false

etcd:
  hosts:
    - "http://etcd-1:2379"
    - "http://etcd-2:2379"
    - "http://etcd-3:2379"
  prefix: /apisix
  timeout: 30
  resync_delay: 5

plugin_attr:
  prometheus:
    export_uri: /apisix/prometheus/metrics
    enable_export_server: true
    export_addr:
      ip: 0.0.0.0
      port: 9091

plugins:
  - api-breaker
  - authz-keycloak
  - basic-auth
  - consumer-restriction
  - cors
  - fault-injection
  - grpc-transcode
  - hmac-auth
  - http-logger
  - ip-restriction
  - jwt-auth
  - key-auth
  - limit-conn
  - limit-count
  - limit-req
  - node-status
  - openid-connect
  - prometheus
  - proxy-cache
  - proxy-mirror
  - proxy-rewrite
  - redirect
  - referer-restriction
  - request-id
  - request-validation
  - response-rewrite
  - serverless-post-function
  - serverless-pre-function
  - syslog
  - tcp-logger
  - traffic-split
  - ua-restriction
  - uri-blocker
  - wolf-rbac
  - zipkin

nginx_config:
  worker_processes: auto
  worker_rlimit_nofile: 20480
  events:
    worker_connections: 10240
  http:
    access_log: /usr/local/apisix/logs/access.log
    error_log: /usr/local/apisix/logs/error.log
    real_ip_header: X-Real-IP
    real_ip_recursive: "on"
    real_ip_from:
      - 0.0.0.0/0
    keepalive_timeout: 60s
    client_header_timeout: 60s
    client_body_timeout: 60s
    send_timeout: 10s
    upstream:
      keepalive: 320
      keepalive_requests: 1000
      keepalive_timeout: 60s
