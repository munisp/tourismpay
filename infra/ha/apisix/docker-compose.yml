version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# APISIX HA — 2 gateway nodes + 3-node etcd cluster
# Admin API on port 9180  |  Gateway on ports 9080 (HTTP) / 9443 (HTTPS)
# ─────────────────────────────────────────────────────────────────────────────

x-etcd-common: &etcd-common
  image: bitnami/etcd:3.5
  restart: unless-stopped
  environment:
    ALLOW_NONE_AUTHENTICATION: "yes"
    ETCD_AUTO_COMPACTION_MODE: revision
    ETCD_AUTO_COMPACTION_RETENTION: "1000"
    ETCD_QUOTA_BACKEND_BYTES: "8589934592"
    ETCD_SNAPSHOT_COUNT: "50000"

services:
  etcd-1:
    <<: *etcd-common
    container_name: etcd-1
    environment:
      <<: *etcd-common
      ETCD_NAME: etcd-1
      ETCD_INITIAL_CLUSTER: "etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380"
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd-1:2379
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd-1:2380
    volumes:
      - etcd-1-data:/bitnami/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd-2:
    <<: *etcd-common
    container_name: etcd-2
    environment:
      <<: *etcd-common
      ETCD_NAME: etcd-2
      ETCD_INITIAL_CLUSTER: "etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380"
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd-2:2379
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd-2:2380
    volumes:
      - etcd-2-data:/bitnami/etcd

  etcd-3:
    <<: *etcd-common
    container_name: etcd-3
    environment:
      <<: *etcd-common
      ETCD_NAME: etcd-3
      ETCD_INITIAL_CLUSTER: "etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380"
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd-3:2379
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd-3:2380
    volumes:
      - etcd-3-data:/bitnami/etcd

  apisix-1:
    image: apache/apisix:3.9.0-debian
    container_name: apisix-1
    restart: unless-stopped
    volumes:
      - ./apisix-config.yaml:/usr/local/apisix/conf/config.yaml:ro
    ports:
      - "9080:9080"
      - "9443:9443"
      - "9180:9180"
    depends_on:
      etcd-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9180/apisix/admin/routes -H 'X-API-KEY: tourismpay-admin-key' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  apisix-2:
    image: apache/apisix:3.9.0-debian
    container_name: apisix-2
    restart: unless-stopped
    volumes:
      - ./apisix-config.yaml:/usr/local/apisix/conf/config.yaml:ro
    ports:
      - "9081:9080"
      - "9444:9443"
      - "9181:9180"
    depends_on:
      etcd-1:
        condition: service_healthy

  apisix-dashboard:
    image: apache/apisix-dashboard:3.0.1-alpine
    container_name: apisix-dashboard
    restart: unless-stopped
    volumes:
      - ./dashboard-config.yaml:/usr/local/apisix-dashboard/conf/conf.yaml:ro
    ports:
      - "9000:9000"
    depends_on:
      apisix-1:
        condition: service_healthy

volumes:
  etcd-1-data:
  etcd-2-data:
  etcd-3-data:

networks:
  default:
    name: tourismpay-infra
    external: true
