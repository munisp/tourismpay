# ── Temporal UI ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name temporal.54link.ng;

    ssl_certificate     /etc/nginx/certs/live/temporal.54link.ng/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/temporal.54link.ng/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Restrict to internal IPs only
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    location / {
        proxy_pass         http://temporal-ui:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

