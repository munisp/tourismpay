###############################################################################
# Keycloak HA — 2 nodes + shared PostgreSQL + Infinispan distributed cache
# Production-tuned for POS-54Link: OAuth, RBAC, agent/merchant SSO
###############################################################################
version: "3.9"

x-keycloak-common: &keycloak-common
  image: quay.io/keycloak/keycloak:26.0
  restart: unless-stopped
  networks: [pos54-net]
  command: start
  healthcheck:
    test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
    interval: 15s
    timeout: 10s
    retries: 5

services:
  keycloak-1:
    <<: *keycloak-common
    container_name: keycloak-1
    hostname: keycloak-1
    ports: ["8180:8080"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-primary:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak-secret}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin-secret}
      # ── HA / Infinispan ──
      KC_CACHE: ispn
      KC_CACHE_STACK: tcp
      JAVA_OPTS_APPEND: >-
        -Djgroups.dns.query=keycloak-jgroups
        -Djgroups.dns.record_type=A
        -Xms512m -Xmx2g
        -XX:+UseG1GC -XX:MaxGCPauseMillis=100
        -Dkc.spi-connections-jpa-default-migration-strategy=update
      # ── Performance ──
      KC_TRANSACTION_XA_ENABLED: "false"
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      KC_FEATURES: "token-exchange,admin-fine-grained-authz,client-policies"

  keycloak-2:
    <<: *keycloak-common
    container_name: keycloak-2
    hostname: keycloak-2
    ports: ["8181:8080"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-primary:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak-secret}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_CACHE: ispn
      KC_CACHE_STACK: tcp
      JAVA_OPTS_APPEND: >-
        -Djgroups.dns.query=keycloak-jgroups
        -Djgroups.dns.record_type=A
        -Xms512m -Xmx2g
        -XX:+UseG1GC -XX:MaxGCPauseMillis=100
      KC_TRANSACTION_XA_ENABLED: "false"
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      KC_FEATURES: "token-exchange,admin-fine-grained-authz,client-policies"

networks:
  pos54-net:
    external: true
