apiVersion: v1
kind: Secret
metadata:
  name: pos-shell-demo-secrets
  namespace: production
type: Opaque
stringData:
  database-url: "REPLACE_WITH_PRODUCTION_DATABASE_URL"
  jwt-secret: "REPLACE_WITH_PRODUCTION_JWT_SECRET"
  stripe-secret-key: "REPLACE_WITH_PRODUCTION_STRIPE_SECRET_KEY"
  stripe-webhook-secret: "REPLACE_WITH_PRODUCTION_STRIPE_WEBHOOK_SECRET"
  oauth-server-url: "REPLACE_WITH_PRODUCTION_OAUTH_URL"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pos-shell-demo-config
  namespace: production
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
