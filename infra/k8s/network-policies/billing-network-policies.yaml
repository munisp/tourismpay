# ─── 9. Temporal Server Access ────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-temporal-access
  namespace: 54link-billing
spec:
  podSelector:
    matchLabels:
      app: temporal-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: temporal-worker
        - podSelector:
            matchLabels:
              app: trpc-backend
      ports:
        - protocol: TCP
          port: 7233

---
# ─── 10. Stripe Webhook Ingress ──────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-stripe-webhook
  namespace: 54link-billing
spec:
  podSelector:
    matchLabels:
      app: trpc-backend
  policyTypes:
    - Ingress
  ingress:
    - from: []  # Stripe sends from various IPs
      ports:
        - protocol: TCP
          port: 3000

---
# ─── 11. Backend to Stripe API (Egress) ──────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-stripe
  namespace: 54link-billing
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

---
# ─── 12. Permify Authorization Service ───────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-permify
  namespace: 54link-billing
spec:
  podSelector:
    matchLabels:
      app: permify
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: backend
      ports:
        - protocol: TCP
          port: 3476
        - protocol: TCP
          port: 3478

---
# ─── 13. Dapr Sidecar Communication ──────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dapr-sidecar
  namespace: 54link-billing
spec:
  podSelector:
    matchLabels:
      dapr.io/enabled: "true"
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              dapr.io/enabled: "true"
      ports:
        - protocol: TCP
          port: 3500
        - protocol: TCP
          port: 50001
  egress:
    - to:
        - podSelector:
            matchLabels:
              dapr.io/enabled: "true"
      ports:
        - protocol: TCP
          port: 3500
        - protocol: TCP
          port: 50001

---
