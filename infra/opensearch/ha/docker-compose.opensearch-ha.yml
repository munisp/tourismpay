###############################################################################
# OpenSearch HA — 3 nodes (2 data + 1 coordinator) + Dashboards
# Production-tuned for POS-54Link: audit search, transaction logs, analytics
###############################################################################
version: "3.9"

x-opensearch-common: &opensearch-common
  image: opensearchproject/opensearch:2.17.1
  restart: unless-stopped
  networks: [pos54-net]
  ulimits:
    memlock: { soft: -1, hard: -1 }
    nofile: { soft: 65536, hard: 65536 }
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
    interval: 15s
    timeout: 10s
    retries: 5

services:
  opensearch-node-1:
    <<: *opensearch-common
    container_name: opensearch-node-1
    hostname: opensearch-node-1
    ports: ["9200:9200", "9600:9600"]
    environment:
      - cluster.name=pos54-search
      - node.name=opensearch-node-1
      - node.roles=cluster_manager,data,ingest
      - discovery.seed_hosts=opensearch-node-2,opensearch-node-3
      - cluster.initial_cluster_manager_nodes=opensearch-node-1,opensearch-node-2
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms4g -Xmx4g
      - DISABLE_SECURITY_PLUGIN=true
      # ── Performance Tuning ──
      - indices.memory.index_buffer_size=20%
      - indices.queries.cache.size=15%
      - thread_pool.search.size=13
      - thread_pool.search.queue_size=1000
      - thread_pool.write.size=6
      - thread_pool.write.queue_size=1000
      - action.auto_create_index=true
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=85%
      - cluster.routing.allocation.disk.watermark.high=90%
      - cluster.routing.allocation.disk.watermark.flood_stage=95%
    volumes:
      - opensearch-data-1:/usr/share/opensearch/data

  opensearch-node-2:
    <<: *opensearch-common
    container_name: opensearch-node-2
    hostname: opensearch-node-2
    environment:
      - cluster.name=pos54-search
      - node.name=opensearch-node-2
      - node.roles=cluster_manager,data,ingest
      - discovery.seed_hosts=opensearch-node-1,opensearch-node-3
      - cluster.initial_cluster_manager_nodes=opensearch-node-1,opensearch-node-2
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms4g -Xmx4g
      - DISABLE_SECURITY_PLUGIN=true
      - indices.memory.index_buffer_size=20%
      - indices.queries.cache.size=15%
    volumes:
      - opensearch-data-2:/usr/share/opensearch/data

  opensearch-node-3:
    <<: *opensearch-common
    container_name: opensearch-node-3
    hostname: opensearch-node-3
    environment:
      - cluster.name=pos54-search
      - node.name=opensearch-node-3
      - node.roles=data,ingest
      - discovery.seed_hosts=opensearch-node-1,opensearch-node-2
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - DISABLE_SECURITY_PLUGIN=true
    volumes:
      - opensearch-data-3:/usr/share/opensearch/data

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    container_name: opensearch-dashboards
    restart: unless-stopped
    ports: ["5601:5601"]
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch-node-1:9200","http://opensearch-node-2:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    networks: [pos54-net]
    depends_on: [opensearch-node-1, opensearch-node-2]

volumes:
  opensearch-data-1:
  opensearch-data-2:
  opensearch-data-3:

networks:
  pos54-net:
    external: true
