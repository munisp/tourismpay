###############################################################################
# Lakehouse HA — MinIO distributed (4 nodes) + Spark cluster + Iceberg REST
# Production-tuned for POS-54Link: analytics, ETL, data warehouse
###############################################################################
version: "3.9"

services:
  # ── MinIO Distributed (4-node erasure coding) ───────────────────────────────
  minio-1:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio-1
    restart: unless-stopped
    command: server http://minio-{1...4}/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-pos54admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pos54-minio-secret}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio-1-data:/data]
    networks: [pos54-net]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio-2:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio-2
    restart: unless-stopped
    command: server http://minio-{1...4}/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-pos54admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pos54-minio-secret}
    volumes: [minio-2-data:/data]
    networks: [pos54-net]

  minio-3:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio-3
    restart: unless-stopped
    command: server http://minio-{1...4}/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-pos54admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pos54-minio-secret}
    volumes: [minio-3-data:/data]
    networks: [pos54-net]

  minio-4:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio-4
    restart: unless-stopped
    command: server http://minio-{1...4}/data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-pos54admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pos54-minio-secret}
    volumes: [minio-4-data:/data]
    networks: [pos54-net]

  # ── Spark Master ────────────────────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5
    container_name: spark-master
    restart: unless-stopped
    ports: ["8080:8080", "7077:7077"]
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_DAEMON_MEMORY=2g
    networks: [pos54-net]

  spark-worker-1:
    image: bitnami/spark:3.5
    container_name: spark-worker-1
    restart: unless-stopped
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
    networks: [pos54-net]
    depends_on: [spark-master]
    deploy:
      resources:
        limits: { cpus: "2", memory: 4G }

  spark-worker-2:
    image: bitnami/spark:3.5
    container_name: spark-worker-2
    restart: unless-stopped
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
    networks: [pos54-net]
    depends_on: [spark-master]
    deploy:
      resources:
        limits: { cpus: "2", memory: 4G }

  # ── Iceberg REST Catalog ───────────────────────────────────────────────────
  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.1
    container_name: iceberg-rest
    restart: unless-stopped
    ports: ["8181:8181"]
    environment:
      CATALOG_WAREHOUSE: s3://pos54-lakehouse/warehouse
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio-1:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-pos54admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-pos54-minio-secret}
      AWS_REGION: us-east-1
    networks: [pos54-net]
    depends_on: [minio-1]

volumes:
  minio-1-data:
  minio-2-data:
  minio-3-data:
  minio-4-data:

networks:
  pos54-net:
    external: true
