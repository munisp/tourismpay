# ═══════════════════════════════════════════════════════════════════════════════
# 54Link Agency Banking Platform — PostgreSQL Production Configuration
# Optimized for: 16 vCPU / 64 GB RAM / NVMe SSD
# Adjust values proportionally for different hardware specs.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Connection Management ────────────────────────────────────────────────────
max_connections = 200                   # PgBouncer handles pooling; keep low
superuser_reserved_connections = 5
tcp_keepalives_idle = 600
tcp_keepalives_interval = 30
tcp_keepalives_count = 3

# ── Memory ───────────────────────────────────────────────────────────────────
shared_buffers = '16GB'                 # 25% of RAM
effective_cache_size = '48GB'           # 75% of RAM (OS page cache + shared_buffers)
work_mem = '64MB'                       # Per-sort/hash operation; 200 conn × 64MB = 12.8GB max
maintenance_work_mem = '2GB'            # VACUUM, CREATE INDEX, ALTER TABLE
huge_pages = try                        # Use transparent huge pages if available
temp_buffers = '32MB'                   # Per-session temp table buffer

# ── WAL & Checkpoints ───────────────────────────────────────────────────────
wal_level = replica                     # Required for streaming replication
max_wal_size = '4GB'                    # Larger = fewer checkpoints
min_wal_size = '1GB'
checkpoint_completion_target = 0.9      # Spread checkpoint I/O
wal_compression = lz4                   # Reduce WAL volume by ~50%
wal_buffers = '64MB'                    # 1/32 of shared_buffers, capped at 64MB
full_page_writes = on                   # Required for crash recovery
wal_keep_size = '2GB'                   # Retain WAL for streaming replicas
max_wal_senders = 5                     # Streaming replication slots
max_replication_slots = 5

# ── Query Planner ────────────────────────────────────────────────────────────
random_page_cost = 1.1                  # SSD: nearly sequential cost
effective_io_concurrency = 200          # NVMe SSD concurrent I/O
default_statistics_target = 500         # More accurate planner stats (default 100)
jit = on                                # JIT compilation for complex queries
jit_above_cost = 100000                 # Only JIT for expensive queries

# ── Parallel Query ───────────────────────────────────────────────────────────
max_parallel_workers_per_gather = 4     # Workers per parallel scan
max_parallel_workers = 8                # Total parallel workers
max_parallel_maintenance_workers = 4    # Parallel CREATE INDEX, VACUUM
parallel_tuple_cost = 0.01
parallel_setup_cost = 1000

# ── VACUUM & Autovacuum ─────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 6              # More workers for 71 tables
autovacuum_naptime = '30s'              # Check every 30s (default 60s)
autovacuum_vacuum_threshold = 50        # Vacuum after 50 dead tuples (default 50)
autovacuum_vacuum_scale_factor = 0.02   # 2% of table (default 20%)
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.01  # 1% of table (default 10%)
autovacuum_vacuum_cost_delay = '2ms'    # Less aggressive throttling on SSD
autovacuum_vacuum_cost_limit = 2000     # Higher limit for faster vacuum

# ── Logging & Monitoring ────────────────────────────────────────────────────
shared_preload_libraries = 'pg_stat_statements,auto_explain'
log_min_duration_statement = 500        # Log queries > 500ms
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0                      # Log all temp file usage
deadlock_timeout = '1s'
log_autovacuum_min_duration = '250ms'   # Log slow autovacuum
log_line_prefix = '%m [%p] %q%u@%d '
log_statement = 'ddl'                   # Log DDL statements

# pg_stat_statements
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on
pg_stat_statements.track_planning = on

# auto_explain
auto_explain.log_min_duration = '1s'    # Explain plans for queries > 1s
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_timing = on

# ── Security ────────────────────────────────────────────────────────────────
ssl = on
ssl_cert_file = '/etc/ssl/certs/server.crt'
ssl_key_file = '/etc/ssl/private/server.key'
ssl_min_protocol_version = 'TLSv1.2'
password_encryption = scram-sha-256
row_security = on                       # Enable RLS for tenant isolation

# ── Locale & Encoding ───────────────────────────────────────────────────────
timezone = 'Africa/Lagos'               # WAT (UTC+1) for Nigerian fintech
lc_messages = 'en_US.UTF-8'
