; ═══════════════════════════════════════════════════════════════════════════════
; 54Link Agency Banking Platform — PgBouncer Connection Pooler
; Sits between the application and PostgreSQL to manage connection pooling.
; ═══════════════════════════════════════════════════════════════════════════════

[databases]
; Production database with connection limits
54link = host=postgres port=5432 dbname=54link auth_user=54link pool_size=50 pool_mode=transaction
54link_readonly = host=postgres-replica port=5432 dbname=54link auth_user=54link_readonly pool_size=30 pool_mode=transaction

[pgbouncer]
; ── Listen ───────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir = /var/run/pgbouncer

; ── Authentication ───────────────────────────────────────────────────────────
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

; ── Pool Mode ────────────────────────────────────────────────────────────────
; transaction: connections returned to pool after each transaction (best for web apps)
pool_mode = transaction

; ── Pool Sizing ──────────────────────────────────────────────────────────────
; Total server connections = default_pool_size × number_of_databases
default_pool_size = 50                  ; Connections per user/database pair
min_pool_size = 10                      ; Keep warm connections ready
reserve_pool_size = 10                  ; Emergency overflow pool
reserve_pool_timeout = 3                ; Wait 3s before using reserve pool
max_client_conn = 1000                  ; Max simultaneous client connections
max_db_connections = 100                ; Max server connections per database

; ── Timeouts ─────────────────────────────────────────────────────────────────
server_lifetime = 3600                  ; Close server connections after 1 hour
server_idle_timeout = 600               ; Close idle server connections after 10 min
server_connect_timeout = 5              ; Fail fast on connection errors
server_login_retry = 3                  ; Retry login 3 times
client_idle_timeout = 300               ; Close idle client connections after 5 min
client_login_timeout = 15               ; Client must authenticate within 15s
query_timeout = 30                      ; Kill queries running > 30s
query_wait_timeout = 60                 ; Wait up to 60s for a server connection
cancel_wait_timeout = 10                ; Wait for cancel to complete
idle_transaction_timeout = 60           ; Kill idle-in-transaction after 60s

; ── TLS ──────────────────────────────────────────────────────────────────────
server_tls_sslmode = prefer
client_tls_sslmode = require
client_tls_cert_file = /etc/pgbouncer/server.crt
client_tls_key_file = /etc/pgbouncer/server.key

; ── Logging ──────────────────────────────────────────────────────────────────
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60                       ; Log stats every 60s
verbose = 0

; ── Admin ────────────────────────────────────────────────────────────────────
admin_users = 54link_admin
stats_users = 54link_monitor
