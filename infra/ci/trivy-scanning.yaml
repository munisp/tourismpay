##
## 54Link POS Shell — Trivy Container Image Scanning
## GitHub Actions CI pipeline for vulnerability scanning
##

name: Container Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 02:00 WAT (01:00 UTC)
    - cron: '0 1 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: 54link

jobs:
  # ─── Scan TypeScript Backend ────────────────────────────────────────────────
  scan-trpc-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build tRPC backend image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/trpc-backend:${{ github.sha }} \
            -f infra/docker/Dockerfile.trpc-backend .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/trpc-backend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-trpc-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-trpc-backend.sarif'

  # ─── Scan Go Services ──────────────────────────────────────────────────────
  scan-go-services:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        service:
          - billing-aggregation-engine
          - settlement-gateway
          - api-gateway
          - tb-sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Build Go service image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            -f infra/docker/Dockerfile.${{ matrix.service }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'

  # ─── Scan Rust Services ─────────────────────────────────────────────────────
  scan-rust-services:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        service:
          - ledger-integrity-validator
          - billing-event-processor
          - fee-splitter-realtime
    steps:
      - uses: actions/checkout@v4

      - name: Build Rust service image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            -f infra/docker/Dockerfile.${{ matrix.service }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'

  # ─── Scan Python Services ───────────────────────────────────────────────────
  scan-python-services:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        service:
          - sla-monitor
          - webhook-dispatcher
          - analytics-pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Build Python service image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            -f infra/docker/Dockerfile.${{ matrix.service }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'

  # ─── Filesystem Scan (IaC + Dependencies) ──────────────────────────────────
  scan-filesystem:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-filesystem.sarif'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret,misconfig'

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-filesystem.sarif'

  # ─── Kubernetes Manifest Scan ───────────────────────────────────────────────
  scan-k8s-manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy config scan on K8s manifests
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'infra/k8s/'
          format: 'sarif'
          output: 'trivy-k8s-config.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload K8s config scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-k8s-config.sarif'

  # ─── Summary Report ─────────────────────────────────────────────────────────
  security-summary:
    needs: [scan-trpc-backend, scan-go-services, scan-rust-services, scan-python-services, scan-filesystem, scan-k8s-manifests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Security scan summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| tRPC Backend | ${{ needs.scan-trpc-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go Services | ${{ needs.scan-go-services.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Services | ${{ needs.scan-rust-services.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Services | ${{ needs.scan-python-services.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Filesystem | ${{ needs.scan-filesystem.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| K8s Manifests | ${{ needs.scan-k8s-manifests.result }} |" >> $GITHUB_STEP_SUMMARY
