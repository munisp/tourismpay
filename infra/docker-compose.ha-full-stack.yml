###############################################################################
# POS-54Link Full HA Stack Orchestrator
# Composes all 13 middleware HA clusters into a single deployment
# Usage: docker compose -f docker-compose.ha-full-stack.yml up -d
###############################################################################
version: "3.9"

include:
  # Core Data Layer
  - path: postgres/docker-compose.postgres-ha.yml
  - path: redis/ha/docker-compose.redis-ha.yml
  - path: tigerbeetle/docker-compose.cluster.yml

  # Event Streaming
  - path: kafka/ha/docker-compose.kafka-cluster.yml
  - path: fluvio/ha/docker-compose.fluvio-ha.yml

  # Workflow & Processing
  - path: temporal/ha/docker-compose.temporal-ha.yml

  # Identity & Authorization
  - path: keycloak/ha/docker-compose.keycloak-ha.yml
  - path: permify/ha/docker-compose.permify-ha.yml

  # API Gateway
  - path: apisix/ha/docker-compose.apisix-ha.yml

  # Search & Analytics
  - path: opensearch/ha/docker-compose.opensearch-ha.yml
  - path: lakehouse/ha/docker-compose.lakehouse-ha.yml

  # Financial Switch
  - path: mojaloop/ha/docker-compose.mojaloop-ha.yml

services:
  # ── Middleware Services (Go/Rust/Python) ────────────────────────────────────

  health-checker:
    build:
      context: ../middleware/go/health-checker
      dockerfile: Dockerfile
    container_name: pos54-health-checker
    restart: unless-stopped
    ports: ["8090:8090"]
    environment:
      PORT: "8090"
      KAFKA_BROKER: kafka-1:9092
      REDIS_URL: redis-master:6379
      POSTGRES_HOST: postgres-primary:5432
      OPENSEARCH_URL: http://opensearch-node-1:9200
      TEMPORAL_URL: http://temporal-frontend-1:7233
      KEYCLOAK_URL: http://keycloak-1:8080
      PERMIFY_URL: http://permify-1:3476
      APISIX_URL: http://apisix-1:9090
      MOJALOOP_URL: http://central-ledger-1:3001
      TIGERBEETLE_URL: http://tigerbeetle-1:3001
      FLUVIO_URL: http://fluvio-sc:9003
      MINIO_URL: http://minio-1:9000
    networks: [pos54-net]

  circuit-breaker:
    build:
      context: ../middleware/go/circuit-breaker
      dockerfile: Dockerfile
    container_name: pos54-circuit-breaker
    restart: unless-stopped
    ports: ["8091:8091"]
    environment:
      PORT: "8091"
    networks: [pos54-net]

  rate-limiter:
    build:
      context: ../middleware/rust/rate-limiter
      dockerfile: Dockerfile
    container_name: pos54-rate-limiter
    restart: unless-stopped
    ports: ["8092:8092"]
    environment:
      LISTEN_ADDR: "0.0.0.0:8092"
    networks: [pos54-net]

  metrics-collector:
    build:
      context: ../middleware/python/metrics-collector
      dockerfile: Dockerfile
    container_name: pos54-metrics-collector
    restart: unless-stopped
    ports: ["8093:8093"]
    environment:
      COLLECTION_INTERVAL: "15"
      KAFKA_UI_URL: http://kafka-ui:8080
      REDIS_URL: redis://redis-master:6379
      POSTGRES_URL: postgresql://postgres-primary:5432
      OPENSEARCH_URL: http://opensearch-node-1:9200
      TEMPORAL_URL: http://temporal-frontend-1:7233
      TB_URL: http://tigerbeetle-1:3001
      MOJALOOP_URL: http://central-ledger-1:3001
    networks: [pos54-net]

  # ── Observability ───────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
    networks: [pos54-net]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    restart: unless-stopped
    ports: ["3100:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-pos54-grafana}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
    networks: [pos54-net]

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # Collector
      - "6831:6831/udp"  # Agent
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    networks: [pos54-net]

volumes:
  prometheus-data:
  grafana-data:

networks:
  pos54-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
