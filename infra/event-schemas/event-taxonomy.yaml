# ─────────────────────────────────────────────────────────────────────────────
# 54Link Event Streaming Taxonomy
#
# Standardizes event naming, routing, and schema across Kafka and Fluvio.
#
# Convention:
#   Topic:   {domain}.{entity}.{action}
#   Key:     {entity_id}
#   Headers: X-Event-Type, X-Correlation-Id, X-Source-Service, X-Timestamp
#
# Kafka: batch processing, analytics, audit logs (high-throughput)
# Fluvio: real-time streaming, notifications, fraud alerts (low-latency)
# ─────────────────────────────────────────────────────────────────────────────

version: "1.0.0"

# ── Kafka Topics (batch/analytics) ──────────────────────────────────────────
kafka:
  topics:
    # Transactions
    - name: txn.transaction.created
      partitions: 12
      replication: 3
      retention_ms: 604800000  # 7 days
      schema: transaction_event_v1
      consumers: [analytics, settlement, fraud-engine, audit-log]

    - name: txn.transaction.completed
      partitions: 12
      replication: 3
      retention_ms: 604800000
      schema: transaction_event_v1
      consumers: [analytics, settlement, notification, audit-log]

    - name: txn.transaction.failed
      partitions: 6
      replication: 3
      retention_ms: 2592000000  # 30 days
      schema: transaction_event_v1
      consumers: [analytics, fraud-engine, audit-log, support]

    - name: txn.transaction.reversed
      partitions: 6
      replication: 3
      retention_ms: 2592000000
      schema: transaction_event_v1
      consumers: [settlement, audit-log, notification]

    # Settlements
    - name: settlement.batch.created
      partitions: 6
      replication: 3
      retention_ms: 2592000000
      schema: settlement_event_v1
      consumers: [analytics, tigerbeetle-sync, audit-log]

    - name: settlement.batch.completed
      partitions: 6
      replication: 3
      retention_ms: 2592000000
      schema: settlement_event_v1
      consumers: [analytics, notification, audit-log]

    # KYC/KYB
    - name: kyc.session.completed
      partitions: 3
      replication: 3
      retention_ms: 7776000000  # 90 days
      schema: kyc_event_v1
      consumers: [analytics, compliance, audit-log]

    - name: kyb.verification.completed
      partitions: 3
      replication: 3
      retention_ms: 7776000000
      schema: kyb_event_v1
      consumers: [analytics, compliance, audit-log]

    # Audit
    - name: audit.action.logged
      partitions: 6
      replication: 3
      retention_ms: 31536000000  # 365 days
      schema: audit_event_v1
      consumers: [opensearch, compliance, data-archival]

    # Agent lifecycle
    - name: agent.onboarding.completed
      partitions: 3
      replication: 3
      retention_ms: 2592000000
      schema: agent_event_v1
      consumers: [analytics, notification, audit-log]

    - name: agent.status.changed
      partitions: 3
      replication: 3
      retention_ms: 604800000
      schema: agent_event_v1
      consumers: [analytics, notification]

# ── Fluvio Topics (real-time streaming) ─────────────────────────────────────
fluvio:
  topics:
    # Real-time fraud alerts
    - name: fraud.alert.triggered
      partitions: 6
      replication: 3
      retention: "24h"
      schema: fraud_alert_v1
      consumers: [fraud-dashboard, notification, block-engine]

    - name: fraud.score.computed
      partitions: 6
      replication: 3
      retention: "6h"
      schema: fraud_score_v1
      consumers: [fraud-dashboard, analytics]

    # Real-time notifications
    - name: notification.push.requested
      partitions: 3
      replication: 3
      retention: "12h"
      schema: notification_v1
      consumers: [push-service, sms-gateway, email-service]

    # Biometric events (real-time)
    - name: biometric.verification.result
      partitions: 3
      replication: 3
      retention: "24h"
      schema: biometric_event_v1
      consumers: [kyc-dashboard, compliance, audit-log]

    - name: biometric.deepface.result
      partitions: 3
      replication: 3
      retention: "24h"
      schema: deepface_event_v1
      consumers: [kyc-dashboard, gallery-sync]

    # Rate limiting / circuit breaker events
    - name: platform.circuit.tripped
      partitions: 3
      replication: 3
      retention: "48h"
      schema: circuit_event_v1
      consumers: [ops-dashboard, alerting]

    - name: platform.rate.exceeded
      partitions: 3
      replication: 3
      retention: "6h"
      schema: rate_event_v1
      consumers: [ops-dashboard, security]

    # Webhook delivery status
    - name: webhook.delivery.status
      partitions: 3
      replication: 3
      retention: "72h"
      schema: webhook_event_v1
      consumers: [webhook-dashboard, retry-engine]

# ── Event Schemas ───────────────────────────────────────────────────────────
schemas:
  transaction_event_v1:
    fields:
      - { name: event_id, type: string, required: true }
      - { name: event_type, type: string, required: true }
      - { name: transaction_id, type: string, required: true }
      - { name: amount, type: decimal, required: true }
      - { name: currency, type: string, required: true }
      - { name: sender_id, type: string, required: true }
      - { name: receiver_id, type: string, required: false }
      - { name: status, type: string, required: true }
      - { name: channel, type: string, required: true }
      - { name: timestamp, type: datetime, required: true }
      - { name: metadata, type: object, required: false }

  fraud_alert_v1:
    fields:
      - { name: alert_id, type: string, required: true }
      - { name: transaction_id, type: string, required: true }
      - { name: risk_score, type: float, required: true }
      - { name: risk_factors, type: array, required: true }
      - { name: action, type: string, required: true }
      - { name: timestamp, type: datetime, required: true }

  kyc_event_v1:
    fields:
      - { name: session_id, type: string, required: true }
      - { name: agent_id, type: string, required: true }
      - { name: status, type: string, required: true }
      - { name: verification_type, type: string, required: true }
      - { name: confidence_score, type: float, required: false }
      - { name: timestamp, type: datetime, required: true }

  audit_event_v1:
    fields:
      - { name: event_id, type: string, required: true }
      - { name: actor, type: string, required: true }
      - { name: action, type: string, required: true }
      - { name: resource, type: string, required: true }
      - { name: resource_id, type: string, required: false }
      - { name: ip, type: string, required: false }
      - { name: timestamp, type: datetime, required: true }
      - { name: metadata, type: object, required: false }
