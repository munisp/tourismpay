###############################################################################
# APISIX DeepFace Service Routes — 54Link Agency Banking Platform
# Routes for DeepFace microservice (port 8133) — serengil/deepface integration
###############################################################################

routes:
  # ── DeepFace API (port 8133) ──────────────────────────────────────────────
  - uri: /deepface/*
    name: deepface-api
    desc: "DeepFace Service — multi-model face recognition, attribute analysis, gallery management"
    methods: [GET, POST, DELETE]
    upstream:
      type: roundrobin
      nodes:
        "deepface-service:8133": 1
      timeout:
        connect: 5
        send: 60
        read: 60
      retries: 2
      retry_timeout: 15
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 50
        burst: 80
        rejected_code: 429
        key: remote_addr
      cors:
        allow_origins: "*"
        allow_methods: "GET, POST, DELETE, OPTIONS"
        allow_headers: "Authorization, Content-Type, X-Request-Id, X-Tenant-Id"
      request-id:
        header_name: X-DeepFace-Request-Id
        include_in_response: true
      prometheus:
        prefer_name: true

  # ── Verification endpoints — stricter rate limiting ───────────────────────
  - uri: /deepface/verify
    name: deepface-verify
    desc: "DeepFace 1:1 face verification — single model"
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "deepface-service:8133": 1
      timeout:
        connect: 5
        send: 60
        read: 60
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 30
        burst: 50
        rejected_code: 429
        key: remote_addr
      limit-count:
        count: 500
        time_window: 3600
        rejected_code: 429
        key: remote_addr

  - uri: /deepface/verify/ensemble
    name: deepface-ensemble-verify
    desc: "DeepFace multi-model ensemble verification — extended timeout"
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "deepface-service:8133": 1
      timeout:
        connect: 5
        send: 120
        read: 120
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 10
        burst: 20
        rejected_code: 429
        key: remote_addr
      limit-count:
        count: 100
        time_window: 3600
        rejected_code: 429
        key: remote_addr

  # ── Analysis endpoint ─────────────────────────────────────────────────────
  - uri: /deepface/analyze
    name: deepface-analyze
    desc: "DeepFace facial attribute analysis — age, gender, emotion, race"
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "deepface-service:8133": 1
      timeout:
        connect: 5
        send: 60
        read: 60
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 30
        burst: 50
        rejected_code: 429
        key: remote_addr

  # ── Anti-spoofing endpoint ────────────────────────────────────────────────
  - uri: /deepface/anti-spoof
    name: deepface-anti-spoof
    desc: "DeepFace anti-spoofing detection"
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "deepface-service:8133": 1
      timeout:
        connect: 5
        send: 30
        read: 30
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 50
        burst: 80
        rejected_code: 429
        key: remote_addr

  # ── Gallery operations — enrollment and search ────────────────────────────
  - uri: /deepface/gallery/*
    name: deepface-gallery
    desc: "DeepFace gallery — face enrollment and 1:N search"
    methods: [POST, DELETE]
    upstream:
      type: roundrobin
      nodes:
        "deepface-service:8133": 1
      timeout:
        connect: 5
        send: 60
        read: 60
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 20
        burst: 30
        rejected_code: 429
        key: remote_addr
      limit-count:
        count: 200
        time_window: 3600
        rejected_code: 429
        key: remote_addr

  # ── Embedding extraction ──────────────────────────────────────────────────
  - uri: /deepface/represent
    name: deepface-represent
    desc: "DeepFace embedding extraction"
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "deepface-service:8133": 1
      timeout:
        connect: 5
        send: 60
        read: 60
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 30
        burst: 50
        rejected_code: 429
        key: remote_addr

  # ── Face detection ────────────────────────────────────────────────────────
  - uri: /deepface/detect
    name: deepface-detect
    desc: "DeepFace face detection with multiple detector backends"
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "deepface-service:8133": 1
      timeout:
        connect: 5
        send: 30
        read: 30
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 50
        burst: 80
        rejected_code: 429
        key: remote_addr

  # ── Health Check (unauthenticated) ────────────────────────────────────────
  - uri: /deepface/health
    name: deepface-health
    methods: [GET]
    upstream:
      type: roundrobin
      nodes:
        "deepface-service:8133": 1
    plugins:
      limit-req:
        rate: 10
        burst: 20
        key: remote_addr

  # ── Models & Stats (unauthenticated) ──────────────────────────────────────
  - uri: /deepface/models
    name: deepface-models
    desc: "List supported recognition models and detector backends"
    methods: [GET]
    upstream:
      type: roundrobin
      nodes:
        "deepface-service:8133": 1
    plugins:
      limit-req:
        rate: 20
        burst: 30
        key: remote_addr

  - uri: /deepface/stats
    name: deepface-stats
    methods: [GET]
    upstream:
      type: roundrobin
      nodes:
        "deepface-service:8133": 1
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 10
        burst: 20
        key: remote_addr

# ── Upstreams ────────────────────────────────────────────────────────────────
upstreams:
  - id: deepface-service-upstream
    name: "DeepFace Service (Python)"
    type: roundrobin
    nodes:
      "deepface-service:8133": 1
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 15
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
