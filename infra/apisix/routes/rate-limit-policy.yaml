# ── APISIX Rate Limiting Policy ────────────────────────────────────────────────
# Item 10: Fix rate limiting key strategy
# Use composite keys (consumer + IP) instead of remote_addr alone to prevent
# shared IP abuse (NAT, proxies) while still protecting per-user quotas.

rate_limit_policies:
  # Public endpoints: rate limit by IP (no auth available)
  public:
    key_type: var
    key: remote_addr
    rate: 60
    burst: 20
    rejected_code: 429
    rejected_msg: '{"error":"rate_limit_exceeded","retry_after":"$reset_time"}'

  # Authenticated API: rate limit by consumer (JWT sub claim)
  authenticated:
    key_type: var_combination
    key: "$consumer_name $remote_addr"
    rate: 120
    burst: 40
    rejected_code: 429
    rejected_msg: '{"error":"rate_limit_exceeded","retry_after":"$reset_time"}'

  # Auth endpoints: strict per-IP to prevent brute force
  auth:
    key_type: var
    key: remote_addr
    rate: 10
    burst: 3
    rejected_code: 429
    rejected_msg: '{"error":"too_many_auth_attempts","retry_after":"$reset_time"}'

  # Transaction endpoints: per-consumer with tight limits
  transaction:
    key_type: var_combination
    key: "$consumer_name $remote_addr"
    rate: 30
    burst: 10
    rejected_code: 429
    rejected_msg: '{"error":"transaction_rate_exceeded","retry_after":"$reset_time"}'

  # Internal service-to-service: higher limits, keyed by service identity
  internal:
    key_type: var
    key: "$http_x_service_id"
    rate: 500
    burst: 100
    rejected_code: 429

  # WebSocket: connection-based limiting
  websocket:
    conn: 1000
    burst: 200
    default_conn_delay: 0.1
    key: remote_addr
    rejected_code: 503

# ── Per-endpoint overrides ──────────────────────────────────────────────────────
endpoint_overrides:
  - uri: /api/oauth/*
    policy: auth
  - uri: /api/trpc/*
    policy: authenticated
  - uri: /api/trpc/transaction.*
    policy: transaction
  - uri: /api/trpc/settlement.*
    policy: transaction
  - uri: /fraud/*
    policy: internal
  - uri: /kyb/*
    policy: internal
  - uri: /socket.io/*
    policy: websocket
  - uri: /health
    policy: null  # no rate limiting on health checks
