# APISIX Gateway Routes for POS Enhancement Services
# Sprint 96: Production POS Feature Routes

routes:
  # Offline Sync Orchestrator (Go - port 8140)
  - uri: /api/v1/sync/*
    name: offline-sync-orchestrator
    upstream:
      type: roundrobin
      nodes:
        "offline-sync-orchestrator:8140": 1
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 100
        burst: 50
        key: consumer_name
      prometheus:
        prefer_name: true

  # Bill Payment Gateway (Go - port 8141)
  - uri: /api/v1/billers/*
    name: bill-payment-gateway
    upstream:
      type: roundrobin
      nodes:
        "bill-payment-gateway:8141": 1
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 200
        burst: 100
        key: consumer_name
      prometheus:
        prefer_name: true

  - uri: /api/v1/bill/pay
    name: bill-payment-execute
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "bill-payment-gateway:8141": 1
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 50
        burst: 20
        key: consumer_name
      prometheus:
        prefer_name: true

  # Firmware Distribution (Go - port 8142)
  - uri: /api/v1/firmware/*
    name: firmware-distribution
    upstream:
      type: roundrobin
      nodes:
        "firmware-distribution:8142": 1
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 30
        burst: 10
        key: consumer_name
      prometheus:
        prefer_name: true

  # Mojaloop Connector POS (Go - port 8143)
  - uri: /api/v1/mojaloop/*
    name: mojaloop-connector-pos
    upstream:
      type: roundrobin
      nodes:
        "mojaloop-connector-pos:8143": 1
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 100
        burst: 50
        key: consumer_name
      prometheus:
        prefer_name: true

  # Terminal Heartbeat (Rust - port 8144)
  - uri: /api/v1/heartbeat
    name: terminal-heartbeat
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "terminal-heartbeat:8144": 1
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 500
        burst: 200
        key: consumer_name
      prometheus:
        prefer_name: true

  - uri: /api/v1/fleet/*
    name: terminal-fleet-stats
    upstream:
      type: roundrobin
      nodes:
        "terminal-heartbeat:8144": 1
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 100
        burst: 50
        key: consumer_name
      prometheus:
        prefer_name: true

  # Airtime Provider Gateway (Python - port 8145)
  - uri: /api/v1/vend/*
    name: airtime-provider-gateway
    upstream:
      type: roundrobin
      nodes:
        "airtime-provider-gateway:8145": 1
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 200
        burst: 100
        key: consumer_name
      prometheus:
        prefer_name: true

  # Voice Command NLU (Python - port 8146)
  - uri: /api/v1/voice/*
    name: voice-command-nlu
    upstream:
      type: roundrobin
      nodes:
        "voice-command-nlu:8146": 1
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 50
        burst: 20
        key: consumer_name
      prometheus:
        prefer_name: true

# Health check endpoints (no auth required)
  - uri: /health/offline-sync
    name: offline-sync-health
    upstream:
      nodes:
        "offline-sync-orchestrator:8140": 1
    plugins:
      proxy-rewrite:
        uri: /health

  - uri: /health/bill-payment
    name: bill-payment-health
    upstream:
      nodes:
        "bill-payment-gateway:8141": 1
    plugins:
      proxy-rewrite:
        uri: /health

  - uri: /health/firmware
    name: firmware-health
    upstream:
      nodes:
        "firmware-distribution:8142": 1
    plugins:
      proxy-rewrite:
        uri: /health

  - uri: /health/mojaloop-pos
    name: mojaloop-pos-health
    upstream:
      nodes:
        "mojaloop-connector-pos:8143": 1
    plugins:
      proxy-rewrite:
        uri: /health

  - uri: /health/heartbeat
    name: heartbeat-health
    upstream:
      nodes:
        "terminal-heartbeat:8144": 1
    plugins:
      proxy-rewrite:
        uri: /health

  - uri: /health/airtime
    name: airtime-health
    upstream:
      nodes:
        "airtime-provider-gateway:8145": 1
    plugins:
      proxy-rewrite:
        uri: /health

  - uri: /health/voice
    name: voice-health
    upstream:
      nodes:
        "voice-command-nlu:8146": 1
    plugins:
      proxy-rewrite:
        uri: /health
