###############################################################################
# APISIX KYB Service Routes — 54Link Agency Banking Platform
# Routes for Go KYB Engine (8130), Rust Risk Engine (8131), Python Analytics (8132)
###############################################################################

routes:
  # ── Go KYB Engine (port 8130) ──────────────────────────────────────────────
  - uri: /kyb/*
    name: kyb-engine-api
    desc: "Go KYB Engine — business verification, document upload, approval workflow"
    methods: [GET, POST, PUT, PATCH, DELETE]
    upstream:
      type: roundrobin
      nodes:
        "kyb-engine:8130": 1
      timeout:
        connect: 5
        send: 30
        read: 30
      retries: 2
      retry_timeout: 10
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 100
        burst: 150
        rejected_code: 429
        key: remote_addr
      cors:
        allow_origins: "*"
        allow_methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
        allow_headers: "Authorization, Content-Type, X-Request-Id, X-Tenant-Id"
      request-id:
        header_name: X-KYB-Request-Id
        include_in_response: true
      prometheus:
        prefer_name: true

  - uri: /kyb/verify
    name: kyb-create-verification
    desc: "Create KYB verification — enhanced rate limiting"
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "kyb-engine:8130": 1
      timeout:
        connect: 5
        send: 60
        read: 60
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 20
        burst: 30
        rejected_code: 429
        key: remote_addr
      limit-count:
        count: 100
        time_window: 3600
        rejected_code: 429
        key: remote_addr

  # ── Rust KYB Risk Engine (port 8131) ───────────────────────────────────────
  - uri: /kyb-risk/*
    name: kyb-risk-engine-api
    desc: "Rust KYB Risk Engine — PEP/sanctions screening, AML/CFT, ML risk scoring"
    methods: [GET, POST]
    upstream:
      type: roundrobin
      nodes:
        "kyb-risk-engine:8131": 1
      timeout:
        connect: 5
        send: 30
        read: 30
      retries: 2
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 200
        burst: 300
        rejected_code: 429
        key: remote_addr
      cors:
        allow_origins: "*"
        allow_methods: "GET, POST, OPTIONS"
        allow_headers: "Authorization, Content-Type, X-Request-Id"
      request-id:
        header_name: X-Risk-Request-Id
        include_in_response: true
      prometheus:
        prefer_name: true

  - uri: /kyb-risk/screen/*
    name: kyb-risk-screening
    desc: "PEP/Sanctions/AML screening endpoints — strict rate limiting"
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "kyb-risk-engine:8131": 1
      timeout:
        connect: 5
        send: 60
        read: 60
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 50
        burst: 80
        rejected_code: 429
        key: remote_addr
      limit-count:
        count: 500
        time_window: 3600
        rejected_code: 429
        key: remote_addr

  # ── Python KYB Analytics (port 8132) ───────────────────────────────────────
  - uri: /kyb-analytics/*
    name: kyb-analytics-api
    desc: "Python KYB Analytics — fraud detection, compliance reporting, Lakehouse ETL"
    methods: [GET, POST]
    upstream:
      type: roundrobin
      nodes:
        "kyb-analytics:8132": 1
      timeout:
        connect: 5
        send: 120
        read: 120
      retries: 1
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 50
        burst: 80
        rejected_code: 429
        key: remote_addr
      cors:
        allow_origins: "*"
        allow_methods: "GET, POST, OPTIONS"
        allow_headers: "Authorization, Content-Type, X-Request-Id"
      request-id:
        header_name: X-Analytics-Request-Id
        include_in_response: true
      prometheus:
        prefer_name: true

  - uri: /kyb-analytics/etl/*
    name: kyb-analytics-etl
    desc: "Lakehouse ETL endpoints — extended timeout for batch processing"
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "kyb-analytics:8132": 1
      timeout:
        connect: 10
        send: 300
        read: 300
    plugins:
      jwt-auth: {}
      limit-req:
        rate: 5
        burst: 10
        rejected_code: 429
        key: remote_addr
      limit-count:
        count: 20
        time_window: 3600
        rejected_code: 429
        key: remote_addr

  # ── Health Check Routes (unauthenticated) ──────────────────────────────────
  - uri: /kyb/health
    name: kyb-engine-health
    methods: [GET]
    upstream:
      type: roundrobin
      nodes:
        "kyb-engine:8130": 1
    plugins:
      limit-req:
        rate: 10
        burst: 20
        key: remote_addr

  - uri: /kyb-risk/health
    name: kyb-risk-engine-health
    methods: [GET]
    upstream:
      type: roundrobin
      nodes:
        "kyb-risk-engine:8131": 1
    plugins:
      limit-req:
        rate: 10
        burst: 20
        key: remote_addr

  - uri: /kyb-analytics/health
    name: kyb-analytics-health
    methods: [GET]
    upstream:
      type: roundrobin
      nodes:
        "kyb-analytics:8132": 1
    plugins:
      limit-req:
        rate: 10
        burst: 20
        key: remote_addr

# ── Upstreams ────────────────────────────────────────────────────────────────
upstreams:
  - id: kyb-engine-upstream
    name: "KYB Engine (Go)"
    type: roundrobin
    nodes:
      "kyb-engine:8130": 1
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3

  - id: kyb-risk-engine-upstream
    name: "KYB Risk Engine (Rust)"
    type: roundrobin
    nodes:
      "kyb-risk-engine:8131": 1
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3

  - id: kyb-analytics-upstream
    name: "KYB Analytics (Python)"
    type: roundrobin
    nodes:
      "kyb-analytics:8132": 1
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 15
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3
