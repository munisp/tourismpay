conf:
  listen:
    host: 0.0.0.0
    port: 9000
  etcd:
    endpoints:
      - "http://etcd-1:2379"
      - "http://etcd-2:2379"
      - "http://etcd-3:2379"
  log:
    error_log:
      level: warn
      file_path: /dev/stderr
    access_log:
      file_path: /dev/stdout
authentication:
  secret: pos54-dashboard-secret
  expire_time: 3600
  users:
    - username: admin
      password: admin
