###############################################################################
# APISIX HA — 2 gateway nodes + etcd 3-node cluster + Dashboard
# Production-tuned for POS-54Link: API gateway, rate limiting, auth, circuit breaker
###############################################################################
version: "3.9"

services:
  # ── etcd cluster (APISIX config store) ──────────────────────────────────────
  etcd-1:
    image: bitnami/etcd:3.5
    container_name: etcd-1
    restart: unless-stopped
    environment:
      - ETCD_NAME=etcd-1
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd-1:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd-1:2379
      - ETCD_INITIAL_CLUSTER=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=pos54-etcd
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_AUTO_COMPACTION_MODE=periodic
      - ETCD_AUTO_COMPACTION_RETENTION=1h
      - ETCD_SNAPSHOT_COUNT=5000
    volumes: [etcd-1-data:/bitnami/etcd]
    networks: [pos54-net]

  etcd-2:
    image: bitnami/etcd:3.5
    container_name: etcd-2
    restart: unless-stopped
    environment:
      - ETCD_NAME=etcd-2
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd-2:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd-2:2379
      - ETCD_INITIAL_CLUSTER=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=pos54-etcd
      - ALLOW_NONE_AUTHENTICATION=yes
    volumes: [etcd-2-data:/bitnami/etcd]
    networks: [pos54-net]

  etcd-3:
    image: bitnami/etcd:3.5
    container_name: etcd-3
    restart: unless-stopped
    environment:
      - ETCD_NAME=etcd-3
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd-3:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd-3:2379
      - ETCD_INITIAL_CLUSTER=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=pos54-etcd
      - ALLOW_NONE_AUTHENTICATION=yes
    volumes: [etcd-3-data:/bitnami/etcd]
    networks: [pos54-net]

  # ── APISIX Gateway Node 1 ──────────────────────────────────────────────────
  apisix-1:
    image: apache/apisix:3.11.0-debian
    container_name: apisix-1
    restart: unless-stopped
    ports: ["9080:9080", "9443:9443"]
    volumes:
      - ./apisix-config.yaml:/usr/local/apisix/conf/config.yaml:ro
    networks: [pos54-net]
    depends_on: [etcd-1, etcd-2, etcd-3]
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }

  # ── APISIX Gateway Node 2 ──────────────────────────────────────────────────
  apisix-2:
    image: apache/apisix:3.11.0-debian
    container_name: apisix-2
    restart: unless-stopped
    ports: ["9081:9080", "9444:9443"]
    volumes:
      - ./apisix-config.yaml:/usr/local/apisix/conf/config.yaml:ro
    networks: [pos54-net]
    depends_on: [etcd-1, etcd-2, etcd-3]
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }

  # ── APISIX Dashboard ───────────────────────────────────────────────────────
  apisix-dashboard:
    image: apache/apisix-dashboard:3.0.1-alpine
    container_name: apisix-dashboard
    restart: unless-stopped
    ports: ["9000:9000"]
    volumes:
      - ./dashboard-config.yaml:/usr/local/apisix-dashboard/conf/conf.yaml:ro
    networks: [pos54-net]

volumes:
  etcd-1-data:
  etcd-2-data:
  etcd-3-data:

networks:
  pos54-net:
    external: true
