###############################################################################
# Mojaloop HA — Central Ledger (2 replicas), ML-API-Adapter, Account Lookup
# Production-tuned for POS-54Link: P2P transfers, agent float, settlement
###############################################################################
version: "3.9"

services:
  # ── Central Ledger (primary) ────────────────────────────────────────────────
  central-ledger-1:
    image: mojaloop/central-ledger:v17.8.1
    container_name: central-ledger-1
    restart: unless-stopped
    ports: ["3001:3001"]
    environment:
      CLEDG_DATABASE_URI: "mysql://central_ledger:${ML_DB_PASSWORD:-ml-secret}@mysql-primary:3306/central_ledger"
      CLEDG_KAFKA__PRODUCER__BROKER_LIST: kafka-1:9092,kafka-2:9092,kafka-3:9092
      CLEDG_KAFKA__CONSUMER__BROKER_LIST: kafka-1:9092,kafka-2:9092,kafka-3:9092
      CLEDG_SIDECAR__DISABLED: "true"
      CLEDG_PORT: 3001
      CLEDG_ADMIN_PORT: 3002
      CLEDG_MONGODB__DISABLED: "true"
      CLEDG_CACHE__CACHE_ENABLED: "true"
      CLEDG_CACHE__EXPIRES_IN_MS: 30000
    networks: [pos54-net]
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }
        reservations: { cpus: "1", memory: 1G }

  central-ledger-2:
    image: mojaloop/central-ledger:v17.8.1
    container_name: central-ledger-2
    restart: unless-stopped
    ports: ["3003:3001"]
    environment:
      CLEDG_DATABASE_URI: "mysql://central_ledger:${ML_DB_PASSWORD:-ml-secret}@mysql-primary:3306/central_ledger"
      CLEDG_KAFKA__PRODUCER__BROKER_LIST: kafka-1:9092,kafka-2:9092,kafka-3:9092
      CLEDG_KAFKA__CONSUMER__BROKER_LIST: kafka-1:9092,kafka-2:9092,kafka-3:9092
      CLEDG_SIDECAR__DISABLED: "true"
      CLEDG_PORT: 3001
      CLEDG_ADMIN_PORT: 3002
      CLEDG_CACHE__CACHE_ENABLED: "true"
      CLEDG_CACHE__EXPIRES_IN_MS: 30000
    networks: [pos54-net]
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }

  # ── ML API Adapter ─────────────────────────────────────────────────────────
  ml-api-adapter:
    image: mojaloop/ml-api-adapter:v14.2.3
    container_name: ml-api-adapter
    restart: unless-stopped
    ports: ["3000:3000"]
    environment:
      MLAPI_ENDPOINT_SOURCE_URL: http://central-ledger-1:3001
      MLAPI_KAFKA__PRODUCER__BROKER_LIST: kafka-1:9092,kafka-2:9092,kafka-3:9092
      MLAPI_KAFKA__CONSUMER__BROKER_LIST: kafka-1:9092,kafka-2:9092,kafka-3:9092
    networks: [pos54-net]

  # ── Account Lookup Service ─────────────────────────────────────────────────
  account-lookup:
    image: mojaloop/account-lookup-service:v15.1.0
    container_name: account-lookup
    restart: unless-stopped
    ports: ["4002:4002"]
    environment:
      ALS_DATABASE_URI: "mysql://account_lookup:${ML_DB_PASSWORD:-ml-secret}@mysql-primary:3306/account_lookup"
      ALS_CENTRAL_LEDGER_URL: http://central-ledger-1:3001
    networks: [pos54-net]

  # ── Central Settlement ─────────────────────────────────────────────────────
  central-settlement:
    image: mojaloop/central-settlement:v16.0.0
    container_name: central-settlement
    restart: unless-stopped
    ports: ["3007:3007"]
    environment:
      CSL_DATABASE_URI: "mysql://central_settlement:${ML_DB_PASSWORD:-ml-secret}@mysql-primary:3306/central_settlement"
      CSL_KAFKA__PRODUCER__BROKER_LIST: kafka-1:9092,kafka-2:9092,kafka-3:9092
      CSL_KAFKA__CONSUMER__BROKER_LIST: kafka-1:9092,kafka-2:9092,kafka-3:9092
    networks: [pos54-net]

networks:
  pos54-net:
    external: true
