###############################################################################
# Fluvio HA — 3 SPU nodes + SC (Streaming Controller)
# Production-tuned for POS-54Link: real-time fraud events, MDM heartbeats, CDC
###############################################################################
version: "3.9"

services:
  fluvio-sc:
    image: infinyon/fluvio:0.11.11
    container_name: fluvio-sc
    hostname: fluvio-sc
    restart: unless-stopped
    ports: ["9003:9003"]
    command: >
      /fluvio-run sc start
      --bind-public 0.0.0.0:9003
      --bind-private 0.0.0.0:9004
    environment:
      RUST_LOG: info
    networks: [pos54-net]
    deploy:
      resources:
        limits: { cpus: "1", memory: 1G }

  fluvio-spu-1:
    image: infinyon/fluvio:0.11.11
    container_name: fluvio-spu-1
    hostname: fluvio-spu-1
    restart: unless-stopped
    ports: ["9010:9010"]
    command: >
      /fluvio-run spu start
      --id 0
      --sc-addr fluvio-sc:9004
      --bind-public 0.0.0.0:9010
      --bind-private 0.0.0.0:9011
    environment:
      RUST_LOG: info
    networks: [pos54-net]
    depends_on: [fluvio-sc]
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }
    volumes:
      - fluvio-spu-1-data:/var/lib/fluvio

  fluvio-spu-2:
    image: infinyon/fluvio:0.11.11
    container_name: fluvio-spu-2
    hostname: fluvio-spu-2
    restart: unless-stopped
    ports: ["9012:9010"]
    command: >
      /fluvio-run spu start
      --id 1
      --sc-addr fluvio-sc:9004
      --bind-public 0.0.0.0:9010
      --bind-private 0.0.0.0:9011
    environment:
      RUST_LOG: info
    networks: [pos54-net]
    depends_on: [fluvio-sc]
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }
    volumes:
      - fluvio-spu-2-data:/var/lib/fluvio

  fluvio-spu-3:
    image: infinyon/fluvio:0.11.11
    container_name: fluvio-spu-3
    hostname: fluvio-spu-3
    restart: unless-stopped
    ports: ["9014:9010"]
    command: >
      /fluvio-run spu start
      --id 2
      --sc-addr fluvio-sc:9004
      --bind-public 0.0.0.0:9010
      --bind-private 0.0.0.0:9011
    environment:
      RUST_LOG: info
    networks: [pos54-net]
    depends_on: [fluvio-sc]
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }
    volumes:
      - fluvio-spu-3-data:/var/lib/fluvio

volumes:
  fluvio-spu-1-data:
  fluvio-spu-2-data:
  fluvio-spu-3-data:

networks:
  pos54-net:
    external: true
