# ─────────────────────────────────────────────────────────────────────────────
# Redis HA Kubernetes StatefulSet — 54Link Platform
# Deploys 1 primary + 2 replicas + 3 Sentinel instances
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-ha
  namespace: 54link
  labels:
    app: redis
    component: ha
spec:
  serviceName: redis-ha
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
            - containerPort: 26379
              name: sentinel
          command:
            - sh
            - -c
            - |
              if [ "$(hostname)" = "redis-ha-0" ]; then
                redis-server --appendonly yes --requirepass $REDIS_PASSWORD
              else
                redis-server --appendonly yes --requirepass $REDIS_PASSWORD \
                  --replicaof redis-ha-0.redis-ha.54link.svc.cluster.local 6379 \
                  --masterauth $REDIS_PASSWORD
              fi
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-ha
  namespace: 54link
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - port: 6379
      name: redis
    - port: 26379
      name: sentinel
---
apiVersion: v1
kind: Service
metadata:
  name: redis-primary
  namespace: 54link
spec:
  selector:
    app: redis
    statefulset.kubernetes.io/pod-name: redis-ha-0
  ports:
    - port: 6379
      targetPort: 6379
