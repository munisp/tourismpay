###############################################################################
# Redis HA — 1 Master + 2 Replicas + 3 Sentinels
# Production-tuned for POS-54Link: session cache, rate limiting, pub/sub
###############################################################################
version: "3.9"

x-redis-common: &redis-common
  image: redis:7.4-alpine
  restart: unless-stopped
  networks: [pos54-net]
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5

services:
  redis-master:
    <<: *redis-common
    container_name: redis-master
    ports: ["6379:6379"]
    command: >
      redis-server
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --no-appendfsync-on-rewrite yes
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --save "900 1" --save "300 10" --save "60 10000"
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
      --hz 10
      --dynamic-hz yes
      --lfu-log-factor 10
      --lfu-decay-time 1
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --replica-lazy-flush yes
      --io-threads 4
      --io-threads-do-reads yes
      --requirepass ${REDIS_PASSWORD:-pos54-redis-secret}
      --masterauth ${REDIS_PASSWORD:-pos54-redis-secret}
    volumes:
      - redis-master-data:/data

  redis-replica-1:
    <<: *redis-common
    container_name: redis-replica-1
    ports: ["6380:6379"]
    command: >
      redis-server
      --replicaof redis-master 6379
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:-pos54-redis-secret}
      --masterauth ${REDIS_PASSWORD:-pos54-redis-secret}
      --replica-read-only yes
      --replica-serve-stale-data yes
      --repl-diskless-sync yes
      --repl-diskless-sync-delay 5
      --io-threads 4
      --io-threads-do-reads yes
    volumes:
      - redis-replica-1-data:/data
    depends_on: [redis-master]

  redis-replica-2:
    <<: *redis-common
    container_name: redis-replica-2
    ports: ["6381:6379"]
    command: >
      redis-server
      --replicaof redis-master 6379
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:-pos54-redis-secret}
      --masterauth ${REDIS_PASSWORD:-pos54-redis-secret}
      --replica-read-only yes
      --replica-serve-stale-data yes
      --repl-diskless-sync yes
      --repl-diskless-sync-delay 5
      --io-threads 4
      --io-threads-do-reads yes
    volumes:
      - redis-replica-2-data:/data
    depends_on: [redis-master]

  redis-sentinel-1:
    image: redis:7.4-alpine
    container_name: redis-sentinel-1
    restart: unless-stopped
    ports: ["26379:26379"]
    command: >
      redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./sentinel-1.conf:/etc/redis/sentinel.conf
    networks: [pos54-net]
    depends_on: [redis-master, redis-replica-1, redis-replica-2]

  redis-sentinel-2:
    image: redis:7.4-alpine
    container_name: redis-sentinel-2
    restart: unless-stopped
    ports: ["26380:26379"]
    command: >
      redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./sentinel-2.conf:/etc/redis/sentinel.conf
    networks: [pos54-net]
    depends_on: [redis-master, redis-replica-1, redis-replica-2]

  redis-sentinel-3:
    image: redis:7.4-alpine
    container_name: redis-sentinel-3
    restart: unless-stopped
    ports: ["26381:26379"]
    command: >
      redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./sentinel-3.conf:/etc/redis/sentinel.conf
    networks: [pos54-net]
    depends_on: [redis-master, redis-replica-1, redis-replica-2]

volumes:
  redis-master-data:
  redis-replica-1-data:
  redis-replica-2-data:

networks:
  pos54-net:
    external: true
