# ─────────────────────────────────────────────────────────────────────────────
# Redis Sentinel Configuration — 54Link Agency Banking Platform
#
# High-availability Redis setup with automatic failover.
# Requires 3 Sentinel instances for quorum (2 out of 3).
#
# Production: Deploy across 3 availability zones.
# ─────────────────────────────────────────────────────────────────────────────

# Sentinel port (default: 26379)
port 26379

# Monitor the primary Redis instance
# sentinel monitor <master-name> <ip> <port> <quorum>
sentinel monitor 54link-redis-primary redis-primary 6379 2

# Authentication
sentinel auth-pass 54link-redis-primary ${REDIS_PASSWORD}

# Down-after-milliseconds: time before marking a node as subjectively down
sentinel down-after-milliseconds 54link-redis-primary 5000

# Failover timeout: max time for a failover to complete
sentinel failover-timeout 54link-redis-primary 60000

# Parallel syncs: number of replicas to reconfigure simultaneously after failover
sentinel parallel-syncs 54link-redis-primary 1

# Deny scripts reconfiguration (security)
sentinel deny-scripts-reconfig yes

# Logging
logfile "/var/log/redis/sentinel.log"
loglevel notice

# Persistence directory
dir /tmp

# Announce IP (set to the Sentinel's own IP in production)
# sentinel announce-ip <ip>
# sentinel announce-port <port>

# ── Notification script (optional) ────────────────────────────────────────────
# Called on failover events. Use to notify monitoring/alerting systems.
# sentinel notification-script 54link-redis-primary /opt/54link/scripts/sentinel-notify.sh

# ── Client reconfiguration script (optional) ──────────────────────────────────
# Called when clients need to update their primary address after failover.
# sentinel client-reconfig-script 54link-redis-primary /opt/54link/scripts/sentinel-reconfig.sh
