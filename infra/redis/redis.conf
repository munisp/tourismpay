# ─── 54Link Redis Production Configuration ────────────────────────────────────
# Memory policy: evict least-recently-used keys when maxmemory is reached
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence: AOF (append-only file) for durability
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots as backup
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes

# Security
protected-mode yes
# Password is set via --requirepass CLI arg in docker-compose

# Performance
tcp-keepalive 300
timeout 0
tcp-backlog 511
hz 10
dynamic-hz yes

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Keyspace notifications (for expiry events used by distributed locks)
notify-keyspace-events "Ex"

# Cluster (single node for now, enable for cluster mode)
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 5000

# Logging
loglevel notice
logfile ""

# Databases
databases 16
