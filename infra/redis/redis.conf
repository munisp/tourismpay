# ─── 54Link Redis Production Configuration ────────────────────────────────────
# Memory policy: evict least-recently-used keys when maxmemory is reached
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence: AOF (append-only file) for durability
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots as backup
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes

# Security
protected-mode yes
# Password is set via --requirepass CLI arg in docker-compose

# Performance
tcp-keepalive 300
timeout 0
tcp-backlog 511
hz 10
dynamic-hz yes

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Keyspace notifications (for expiry events used by distributed locks)
notify-keyspace-events "Ex"

# TLS — enabled for production. Mount certificates at /etc/redis/tls/.
# Set REDIS_TLS_ENABLED=false in env to disable (dev/test only).
tls-port 6380
port 0
tls-cert-file /etc/redis/tls/redis.crt
tls-key-file /etc/redis/tls/redis.key
tls-ca-cert-file /etc/redis/tls/ca.crt
tls-auth-clients optional
tls-replication yes
tls-protocols "TLSv1.2 TLSv1.3"

# Connection limits
maxclients 10000

# Memory optimization
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Cluster (single node for now, enable for cluster mode)
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 5000

# Logging
loglevel notice
logfile ""

# Databases
databases 16

# Rename dangerous commands for production safety
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command KEYS ""
