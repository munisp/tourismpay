###############################################################################
# Prometheus Configuration — POS-54Link Full Stack Monitoring
###############################################################################
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ── Custom Middleware Services ──────────────────────────────────────────────
  - job_name: pos54-health-checker
    static_configs:
      - targets: ['health-checker:8090']
    metrics_path: /metrics

  - job_name: pos54-circuit-breaker
    static_configs:
      - targets: ['circuit-breaker:8091']
    metrics_path: /metrics

  - job_name: pos54-rate-limiter
    static_configs:
      - targets: ['rate-limiter:8092']
    metrics_path: /metrics

  - job_name: pos54-metrics-collector
    static_configs:
      - targets: ['metrics-collector:8093']
    metrics_path: /metrics

  # ── Kafka ───────────────────────────────────────────────────────────────────
  - job_name: kafka
    static_configs:
      - targets: ['kafka-1:9092', 'kafka-2:9092', 'kafka-3:9092']
        labels:
          cluster: pos54-production

  # ── Redis ───────────────────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ['redis-master:6379', 'redis-replica-1:6379', 'redis-replica-2:6379']

  # ── OpenSearch ──────────────────────────────────────────────────────────────
  - job_name: opensearch
    static_configs:
      - targets: ['opensearch-node-1:9200', 'opensearch-node-2:9200', 'opensearch-node-3:9200']
    metrics_path: /_prometheus/metrics

  # ── Temporal ────────────────────────────────────────────────────────────────
  - job_name: temporal
    static_configs:
      - targets: ['temporal-frontend-1:7233', 'temporal-frontend-2:7233']

  # ── Keycloak ────────────────────────────────────────────────────────────────
  - job_name: keycloak
    static_configs:
      - targets: ['keycloak-1:8080', 'keycloak-2:8080']
    metrics_path: /metrics

  # ── Permify ─────────────────────────────────────────────────────────────────
  - job_name: permify
    static_configs:
      - targets: ['permify-1:3476', 'permify-2:3476']

  # ── APISIX ──────────────────────────────────────────────────────────────────
  - job_name: apisix
    static_configs:
      - targets: ['apisix-1:9091', 'apisix-2:9091']

  # ── MinIO ───────────────────────────────────────────────────────────────────
  - job_name: minio
    static_configs:
      - targets: ['minio-1:9000', 'minio-2:9000', 'minio-3:9000', 'minio-4:9000']
    metrics_path: /minio/v2/metrics/cluster

  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
