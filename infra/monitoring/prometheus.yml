global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: tourismpay
    metrics_path: /metrics
    static_configs:
      - targets:
          - "tourismpay-web:3000"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: tourismpay-prod

  - job_name: go-settlement
    metrics_path: /metrics
    static_configs:
      - targets:
          - "go-settlement:8082"

  - job_name: node-exporter
    static_configs:
      - targets:
          - "node-exporter:9100"

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - "postgres-exporter:9187"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"
