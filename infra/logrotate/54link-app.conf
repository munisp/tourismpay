# 54Link Agent Banking Platform — Logrotate Configuration
# Manages application log rotation for production deployments

/var/log/54link/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 www-data www-data
    sharedscripts
    postrotate
        # Signal the application to reopen log files
        [ -f /var/run/54link-app.pid ] && kill -USR1 $(cat /var/run/54link-app.pid) 2>/dev/null || true
    endscript
}

/var/log/nginx/54link-*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
    endscript
}

/var/log/54link/audit/*.log {
    weekly
    missingok
    rotate 52
    compress
    delaycompress
    notifempty
    create 0600 www-data www-data
    # Audit logs retained for 1 year (52 weeks) per CBN compliance
}

/var/log/54link/security/*.log {
    daily
    missingok
    rotate 90
    compress
    delaycompress
    notifempty
    create 0600 www-data www-data
    # Security logs retained for 90 days per NDPR requirements
}
