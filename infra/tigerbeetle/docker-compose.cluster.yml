version: "3.9"

# TigerBeetle 3-node cluster for production fault tolerance.
# Each node replicates to the other two. Requires a shared Docker network.
#
# Usage:
#   docker compose -f docker-compose.production.yml \
#                  -f infra/tigerbeetle/docker-compose.cluster.yml up -d
#
# Cluster addresses: tigerbeetle-0:3000, tigerbeetle-1:3001, tigerbeetle-2:3002

services:
  tigerbeetle-0:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.15.3
    container_name: tigerbeetle-0
    restart: unless-stopped
    command: >
      start
      --addresses=0.0.0.0:3000,tigerbeetle-1:3001,tigerbeetle-2:3002
      --replica=0
      --replica-count=3
      --cluster=0
      /data/0_0.tigerbeetle
    volumes:
      - tigerbeetle_data_0:/data
    networks:
      - 54link-net
    healthcheck:
      test: ["CMD-SHELL", "echo 'ping' | nc -q1 localhost 3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  tigerbeetle-1:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.15.3
    container_name: tigerbeetle-1
    restart: unless-stopped
    command: >
      start
      --addresses=tigerbeetle-0:3000,0.0.0.0:3001,tigerbeetle-2:3002
      --replica=1
      --replica-count=3
      --cluster=0
      /data/0_1.tigerbeetle
    volumes:
      - tigerbeetle_data_1:/data
    networks:
      - 54link-net
    healthcheck:
      test: ["CMD-SHELL", "echo 'ping' | nc -q1 localhost 3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  tigerbeetle-2:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.15.3
    container_name: tigerbeetle-2
    restart: unless-stopped
    command: >
      start
      --addresses=tigerbeetle-0:3000,tigerbeetle-1:3001,0.0.0.0:3002
      --replica=2
      --replica-count=3
      --cluster=0
      /data/0_2.tigerbeetle
    volumes:
      - tigerbeetle_data_2:/data
    networks:
      - 54link-net
    healthcheck:
      test: ["CMD-SHELL", "echo 'ping' | nc -q1 localhost 3002 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

volumes:
  tigerbeetle_data_0:
    driver: local
  tigerbeetle_data_1:
    driver: local
  tigerbeetle_data_2:
    driver: local

networks:
  54link-net:
    external: true
