###############################################################################
# Permify HA — 2 nodes + PostgreSQL backend
# Production-tuned for POS-54Link: fine-grained RBAC, agent hierarchy, tenant isolation
###############################################################################
version: "3.9"

services:
  permify-1:
    image: ghcr.io/permify/permify:v1.2.2
    container_name: permify-1
    restart: unless-stopped
    ports: ["3476:3476", "3478:3478"]
    command: serve
    environment:
      PERMIFY_DATABASE_ENGINE: postgres
      PERMIFY_DATABASE_URI: "postgres://permify:${PERMIFY_DB_PASSWORD:-permify-secret}@postgres-primary:5432/permify?sslmode=disable"
      PERMIFY_DATABASE_MAX_OPEN_CONNECTIONS: 50
      PERMIFY_DATABASE_MAX_IDLE_CONNECTIONS: 10
      PERMIFY_DATABASE_MAX_CONNECTION_LIFETIME: 300s
      PERMIFY_DATABASE_MAX_CONNECTION_IDLE_TIME: 60s
      PERMIFY_SERVICE_CIRCUIT_BREAKER: "true"
      PERMIFY_LOG_LEVEL: info
      PERMIFY_AUTHN_ENABLED: "true"
      PERMIFY_AUTHN_METHOD: preshared
      PERMIFY_AUTHN_PRESHARED_KEYS: "${PERMIFY_API_KEY:-pos54-permify-key}"
      PERMIFY_PROFILER_ENABLED: "true"
      PERMIFY_PROFILER_PORT: 6060
    networks: [pos54-net]
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }
        reservations: { cpus: "1", memory: 1G }

  permify-2:
    image: ghcr.io/permify/permify:v1.2.2
    container_name: permify-2
    restart: unless-stopped
    ports: ["3477:3476", "3479:3478"]
    command: serve
    environment:
      PERMIFY_DATABASE_ENGINE: postgres
      PERMIFY_DATABASE_URI: "postgres://permify:${PERMIFY_DB_PASSWORD:-permify-secret}@postgres-primary:5432/permify?sslmode=disable"
      PERMIFY_DATABASE_MAX_OPEN_CONNECTIONS: 50
      PERMIFY_DATABASE_MAX_IDLE_CONNECTIONS: 10
      PERMIFY_DATABASE_MAX_CONNECTION_LIFETIME: 300s
      PERMIFY_SERVICE_CIRCUIT_BREAKER: "true"
      PERMIFY_LOG_LEVEL: info
      PERMIFY_AUTHN_ENABLED: "true"
      PERMIFY_AUTHN_METHOD: preshared
      PERMIFY_AUTHN_PRESHARED_KEYS: "${PERMIFY_API_KEY:-pos54-permify-key}"
    networks: [pos54-net]
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }

networks:
  pos54-net:
    external: true
