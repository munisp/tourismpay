# Filebeat — Log Aggregation for Africa GDS
# Ships structured JSON logs from all services to Elasticsearch/Loki.

filebeat.inputs:
  # Gateway logs (JSON structured)
  - type: container
    paths:
      - '/var/lib/docker/containers/*gds-gateway*/*.log'
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: message
    fields:
      service: gds-gateway
      language: typescript

  # Go service logs
  - type: container
    paths:
      - '/var/lib/docker/containers/*pnr-engine*/*.log'
      - '/var/lib/docker/containers/*guest-profile*/*.log'
      - '/var/lib/docker/containers/*group-bookings*/*.log'
      - '/var/lib/docker/containers/*cancellation-policy*/*.log'
      - '/var/lib/docker/containers/*negotiated-rates*/*.log'
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      language: go

  # Rust service logs
  - type: container
    paths:
      - '/var/lib/docker/containers/*commission-engine*/*.log'
      - '/var/lib/docker/containers/*queue-system*/*.log'
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      language: rust

  # Python service logs
  - type: container
    paths:
      - '/var/lib/docker/containers/*content-mgmt*/*.log'
      - '/var/lib/docker/containers/*revenue-mgmt*/*.log'
      - '/var/lib/docker/containers/*discount-promo*/*.log'
      - '/var/lib/docker/containers/*settlement-saga*/*.log'
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      language: python

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
  - add_host_metadata: ~
  - dissect:
      tokenizer: "%{level} %{message}"
      field: "message"
      target_prefix: "parsed"
      when:
        not:
          has_fields: ['level']

output.elasticsearch:
  hosts: ['${ELASTICSEARCH_HOSTS:elasticsearch:9200}']
  index: "gds-logs-%{+yyyy.MM.dd}"
  pipeline: "gds-pipeline"

setup.ilm:
  enabled: true
  rollover_alias: "gds-logs"
  pattern: "{now/d}-000001"
  policy_name: "gds-log-retention"

setup.template:
  name: "gds-logs"
  pattern: "gds-logs-*"
  settings:
    number_of_shards: 2
    number_of_replicas: 1

logging.level: warning
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
