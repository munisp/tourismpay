# Prometheus Alert Rules — Africa GDS

groups:
  - name: gds-availability
    rules:
      - alert: GatewayDown
        expr: up{job="gds-gateway"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "GDS Gateway is down"
          description: "Gateway has been unreachable for > 1 minute"

      - alert: ServiceDown
        expr: up{job=~"gds-.*-services"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "GDS service {{ $labels.instance }} is down"

      - alert: HighErrorRate
        expr: |
          sum(rate(gds_http_requests_total{status=~"5.."}[5m])) by (service)
          / sum(rate(gds_http_requests_total[5m])) by (service) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate > 5% for 5 minutes"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(gds_http_request_duration_seconds_bucket[5m])) by (le, service)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.service }}"
          description: "P95 latency > 2s for 5 minutes"

  - name: gds-infrastructure
    rules:
      - alert: DatabaseDown
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"

      - alert: DatabaseConnectionsHigh
        expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections > 80% capacity"

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Redis is down"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage > 90%"

      - alert: KafkaConsumerLag
        expr: kafka_consumer_group_lag > 10000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag > 10k on {{ $labels.topic }}"

  - name: gds-business
    rules:
      - alert: NoBookingsIn1h
        expr: increase(gds_bookings_confirmed_total[1h]) == 0
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "No bookings confirmed in the last hour"

      - alert: SettlementSagaFailures
        expr: increase(gds_settlement_sagas_total{status="failed"}[15m]) > 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Multiple settlement saga failures"
