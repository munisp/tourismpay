# Prometheus Configuration — Africa GDS
# Scrapes metrics from gateway and all backend services.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # GDS Gateway (TypeScript Express)
  - job_name: 'gds-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['gds-gateway:8090']
    relabel_configs:
      - target_label: service
        replacement: 'gateway'

  # Go Services
  - job_name: 'gds-go-services'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'pnr-engine:8082'
          - 'guest-profile:8084'
          - 'group-bookings:8087'
          - 'cancellation-policy:8112'
          - 'negotiated-rates:8113'

  # Rust Services
  - job_name: 'gds-rust-services'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'queue-system:8083'
          - 'commission-engine:8110'

  # Python Services
  - job_name: 'gds-python-services'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'content-mgmt:8085'
          - 'revenue-mgmt:8086'
          - 'discount-promo:8111'
          - 'settlement-saga:8114'

  # Infrastructure
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # Node exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
