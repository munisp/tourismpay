# APISIX Routes for Africa-first GDS
# Declarative route configuration — loaded at startup.
# Each route defines: URI matching, upstream service, and plugins (auth, rate limit, etc.)

routes:
  # === Health Check (no auth) ===
  - id: gds-health
    uri: /health
    upstream_id: gds-engine
    plugins: {}

  # === Property Search (OpenSearch-powered) ===
  - id: gds-search
    uri: /api/v1/gds/search*
    methods: [GET]
    upstream_id: gds-search
    plugins:
      openid-connect:
        client_id: "${KEYCLOAK_GDS_CLIENT_ID}"
        client_secret: "${KEYCLOAK_GDS_CLIENT_SECRET}"
        discovery: "${KEYCLOAK_DISCOVERY_URL}"
        bearer_only: true
        scope: openid
      key-auth:
        header: X-GDS-API-Key
      limit-count:
        count: 500
        time_window: 60
        key_type: var
        key: remote_addr
        rejected_code: 429
        policy: local
      cors:
        allow_origins: "${GDS_CORS_ORIGINS}"
        allow_methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
        allow_headers: "Authorization, Content-Type, X-GDS-API-Key, X-GDS-Tenant-ID, X-Request-ID"
        allow_credential: true
        max_age: 3600

  # === Properties API ===
  - id: gds-properties
