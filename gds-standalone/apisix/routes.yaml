# === Upstreams (backend services) ===
upstreams:
  - id: gds-engine
    type: roundrobin
    nodes:
      "gds-engine:8080": 1
    timeout:
      connect: 5
      send: 30
      read: 30
    retries: 2
    retry_timeout: 5
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 5
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3

  - id: gds-search
    type: roundrobin
    nodes:
      "gds-search:8010": 1
    timeout:
      connect: 5
      send: 15
      read: 15
