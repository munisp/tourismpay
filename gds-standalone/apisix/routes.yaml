# === Upstreams (backend services) ===
upstreams:
  - id: gds-engine
    type: roundrobin
    nodes:
      "gds-engine:8080": 1
    timeout:
      connect: 5
      send: 30
      read: 30
    retries: 2
    retry_timeout: 5
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 5
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3

  - id: gds-search
    type: roundrobin
    nodes:
      "gds-search:8010": 1
    timeout:
      connect: 5
      send: 15
      read: 15
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3

  - id: gds-analytics
    type: roundrobin
    nodes:
      "gds-analytics:8011": 1
    timeout:
      connect: 5
      send: 30
      read: 30
    checks:
      active:
        type: http
        http_path: /health
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 10
          http_failures: 3

# === Global Plugins ===
global_rules:
  - id: request-id
    plugins:
      request-id:
        header_name: X-Request-ID
        include_in_response: true
  - id: prometheus
    plugins:
      prometheus:
        prefer_name: true
  - id: response-rewrite
    plugins:
      response-rewrite:
        headers:
          set:
            X-Content-Type-Options: nosniff
            X-Frame-Options: DENY
            Strict-Transport-Security: "max-age=31536000; includeSubDomains"
            X-XSS-Protection: "0"
            Referrer-Policy: strict-origin-when-cross-origin

#END
