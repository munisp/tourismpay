# APISIX Standalone Configuration (Declarative Mode)
# Replaces the Express gateway — handles routing, auth, rate limiting, CORS, WAF.
# Deploy with: docker run -v ./apisix.yaml:/usr/local/apisix/conf/apisix.yaml apache/apisix

apisix:
  node_listen: 9080
  enable_admin: true
  admin_key:
    - name: admin
      key: "${APISIX_ADMIN_KEY}"
      role: admin

deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml

plugin_attr:
  prometheus:
    export_addr:
      ip: 0.0.0.0
      port: 9091

#END
