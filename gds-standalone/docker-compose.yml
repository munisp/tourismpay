# Africa-first GDS — Standalone Docker Compose
# Deploy independently of TourismPay or alongside it.
#
# Services:
#   - gds-gateway: TypeScript API gateway (port 8090)
#   - gds-engine: Go reservation/settlement engine (port 8080)
#   - gds-search: Python search/pricing service (port 8010)
#   - gds-analytics: Python analytics/lakehouse service (port 8011)
#   - postgres: PostgreSQL database
#   - redis: Cache + session store
#   - kafka: Event streaming
#   - zookeeper: Kafka coordinator

version: "3.9"

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gds
      POSTGRES_USER: gds_user
      POSTGRES_PASSWORD: gds_pass
    ports:
      - "5433:5432"
    volumes:
      - gds_pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gds_user -d gds"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # --- GDS Services ---
  gds-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8090:8090"
    environment:
      GDS_PORT: "8090"
      NODE_ENV: production
      GDS_MULTI_TENANT: "true"
      GDS_DATABASE_URL: postgresql://gds_user:gds_pass@postgres:5432/gds
      GDS_REDIS_URL: redis://redis:6379/1
      GDS_KAFKA_BROKERS: kafka:9092
      GDS_ENGINE_URL: http://gds-engine:8080
      GDS_SEARCH_URL: http://gds-search:8010
      GDS_ANALYTICS_URL: http://gds-analytics:8011
      GDS_CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      GDS_BRAND_NAME: "Africa GDS"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  gds-engine:
    build:
      context: ../go-settlement-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      GDS_DATABASE_URL: postgresql://gds_user:gds_pass@postgres:5432/gds
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: kafka:9092
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

  gds-search:
    build:
      context: ../python-services
      dockerfile: Dockerfile.gds-search
    ports:
      - "8010:8010"
    environment:
      GDS_DATABASE_URL: postgresql://gds_user:gds_pass@postgres:5432/gds
      REDIS_URL: redis://redis:6379/2
      KAFKA_BROKERS: kafka:9092
      OPENSEARCH_URL: http://opensearch:9200
    depends_on:
      postgres:
        condition: service_healthy

  gds-analytics:
    build:
      context: ../python-services
      dockerfile: Dockerfile.gds-analytics
    ports:
      - "8011:8011"
    environment:
      GDS_DATABASE_URL: postgresql://gds_user:gds_pass@postgres:5432/gds
      KAFKA_BROKERS: kafka:9092
      LAKEHOUSE_URL: http://lakehouse:8181
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  gds_pgdata:
