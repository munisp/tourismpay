# Africa-first GDS — Standalone Docker Compose
# Uses APISIX (gateway) + Keycloak (auth) + OpenAppSec (WAF) instead of Express.
#
# Architecture:
#   External → APISIX (routing, rate limit, JWT) → OpenAppSec (WAF) → Backend Services
#   Keycloak handles all identity/auth (agents, property managers, API clients)
#
# Services:
#   - apisix: API Gateway (port 9080 HTTP, 9443 HTTPS)
#   - keycloak: Identity & Access Management (port 8180)
#   - openappsec: Web Application Firewall
#   - gds-engine: Go reservation/settlement engine (port 8080)
#   - gds-search: Python search/pricing service (port 8010)
#   - gds-analytics: Python analytics/lakehouse service (port 8011)
#   - postgres: PostgreSQL database
#   - redis: Cache + session store
#   - kafka: Event streaming

version: "3.9"

services:
  # ═══════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gds
      POSTGRES_USER: gds_user
      POSTGRES_PASSWORD: ${GDS_DB_PASSWORD:-gds_pass}
    ports:
      - "5433:5432"
    volumes:
      - gds_pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gds_user -d gds"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ═══════════════════════════════════════════════════════════════════
  # GATEWAY + AUTH + WAF (replaces Express gateway)
  # ═══════════════════════════════════════════════════════════════════

  apisix:
    image: apache/apisix:3.8.0-debian
    ports:
      - "9080:9080"   # HTTP (main entry point for external apps)
      - "9443:9443"   # HTTPS
      - "9180:9180"   # Admin API
      - "9091:9091"   # Prometheus metrics
    volumes:
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ./apisix/routes.yaml:/usr/local/apisix/conf/routes.yaml:ro
    environment:
      APISIX_ADMIN_KEY: ${APISIX_ADMIN_KEY:-edd1c9f034335f136f87ad84b625c8f1}
      KEYCLOAK_GDS_CLIENT_ID: gds-api-gateway
      KEYCLOAK_GDS_CLIENT_SECRET: ${KEYCLOAK_GDS_CLIENT_SECRET:-change-me-in-production}
      KEYCLOAK_DISCOVERY_URL: http://keycloak:8080/realms/gds/.well-known/openid-configuration
      GDS_CORS_ORIGINS: ${GDS_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      keycloak:
        condition: service_healthy
      gds-engine:
        condition: service_started
      gds-search:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/gds
      KC_DB_USERNAME: gds_user
      KC_DB_PASSWORD: ${GDS_DB_PASSWORD:-gds_pass}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    volumes:
      - ./keycloak/gds-realm.json:/opt/keycloak/data/import/gds-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  openappsec:
    image: ghcr.io/openappsec/agent:latest
    ports:
      - "4000:4000"
    volumes:
      - ./openappsec/policy.yaml:/etc/cp/conf/policy.yaml:ro
    environment:
      LEARNING_MODE: "false"
      POLICY_MODE: prevent
    depends_on:
      - apisix
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════
  # GDS BACKEND SERVICES
  # ═══════════════════════════════════════════════════════════════════

  gds-engine:
    build:
      context: ../go-settlement-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      GDS_DATABASE_URL: postgresql://gds_user:${GDS_DB_PASSWORD:-gds_pass}@postgres:5432/gds
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: kafka:9092
      KEYCLOAK_URL: http://keycloak:8080
      PERMIFY_ENDPOINT: permify:3478
      TIGERBEETLE_ADDRESSES: tigerbeetle:3000
      MOJALOOP_HUB_URL: http://mojaloop:4000
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  gds-search:
    build:
      context: ../python-services
      dockerfile: Dockerfile.gds-search
    ports:
      - "8010:8010"
    environment:
      GDS_DATABASE_URL: postgresql://gds_user:${GDS_DB_PASSWORD:-gds_pass}@postgres:5432/gds
      REDIS_URL: redis://redis:6379/2
      KAFKA_BROKERS: kafka:9092
      OPENSEARCH_URL: http://opensearch:9200
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  gds-analytics:
    build:
      context: ../python-services
      dockerfile: Dockerfile.gds-analytics
    ports:
      - "8011:8011"
    environment:
      GDS_DATABASE_URL: postgresql://gds_user:${GDS_DB_PASSWORD:-gds_pass}@postgres:5432/gds
      KAFKA_BROKERS: kafka:9092
      LAKEHOUSE_URL: http://lakehouse:8181
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  gds_pgdata:
