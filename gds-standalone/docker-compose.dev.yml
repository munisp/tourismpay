# Africa-first GDS — Development Mode (Express Gateway)
# Use this for local development WITHOUT APISIX/Keycloak/OpenAppSec.
# The Express gateway handles auth + routing in a single process for simplicity.
#
# Production: Use docker-compose.yml (APISIX + Keycloak + OpenAppSec)
# Development: Use this file (Express gateway on port 8090)

version: "3.9"

services:
  # ═══════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gds
      POSTGRES_USER: gds_user
      POSTGRES_PASSWORD: gds_pass
    ports:
      - "5433:5432"
    volumes:
      - gds_pgdata_dev:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gds_user -d gds"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ═══════════════════════════════════════════
  # GDS GATEWAY
  # ═══════════════════════════════════════════
  gds-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8090:8090"
    environment:
      GDS_PORT: "8090"
      NODE_ENV: development
      GDS_MULTI_TENANT: "false"
      GDS_DATABASE_URL: postgresql://gds_user:gds_pass@postgres:5432/gds
      GDS_REDIS_URL: redis://redis:6379/1
      GDS_KAFKA_BROKERS: kafka:9092
      GDS_ENGINE_URL: http://gds-engine:8080
      GDS_SEARCH_URL: http://gds-search:8010
      GDS_ANALYTICS_URL: http://gds-analytics:8011
      GDS_AUTH_API_KEY_ENABLED: "true"
      GDS_CORS_ORIGINS: "http://localhost:3000,http://localhost:4100,http://localhost:5173"
      GDS_BRAND_NAME: "Africa GDS (Dev)"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gds-engine:
    build:
      context: ../go-settlement-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      GDS_DATABASE_URL: postgresql://gds_user:gds_pass@postgres:5432/gds
      REDIS_URL: redis://redis:6379/0
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ═══════════════════════════════════════════
  # MONITORING STACK
  # ═══════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: gds-admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/gds-ops.json
    depends_on:
      - prometheus

  # Log aggregation (Loki instead of full ELK for dev)
  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

volumes:
  gds_pgdata_dev:
  prometheus_data:
  grafana_data:
