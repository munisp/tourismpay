openapi: 3.1.0
info:
  title: Africa-first GDS API
  description: |
    Global Distribution System for African tourism properties.
    Search, book, and manage rates/availability for hotels, lodges, safari camps,
    and activities across 20+ African countries.

    ## Authentication
    Two methods supported:
    - **JWT Bearer Token**: OAuth2/OIDC from Keycloak or any compliant provider
    - **API Key**: `X-GDS-API-Key` header for server-to-server integrations

    ## Multi-Tenancy
    Set `X-GDS-Tenant-ID` header to operate within a specific tenant context.
    Omit for single-tenant deployments.

    ## Rate Limiting
    Default: 100 requests/minute per API key.
    Headers: `X-RateLimit-Limit`, `X-RateLimit-Remaining`, `X-RateLimit-Reset`
  version: 1.0.0
  contact:
    name: TourismPay GDS Support
    email: gds@tourismpay.com
  license:
    name: Proprietary
    url: https://tourismpay.com/gds/license

servers:
  - url: http://localhost:8090
    description: Local development
  - url: https://gds-api.tourismpay.com
    description: Production

security:
  - BearerAuth: []
  - ApiKeyAuth: []

tags:
  - name: Properties
    description: African tourism property management
  - name: Reservations
    description: Booking creation, modification, cancellation
  - name: Availability
    description: Room/slot availability management
  - name: Rates
    description: Rate plans and dynamic pricing
  - name: Agents
    description: Travel agent registration and commission
  - name: Settlement
    description: Financial settlement and payouts
  - name: Search
    description: Full-text search and recommendations
  - name: Analytics
    description: Booking trends and market intelligence
  - name: Distribution
    description: Rate/availability distribution channels
  - name: Tax
    description: Multi-jurisdiction tax calculation (15 African countries)
  - name: Tipping
    description: Multi-recipient post-checkout tipping with role templates
  - name: Remittance
    description: Government tax remittance, compliance, maker-checker
  - name: Loyalty
    description: Points accrual and redemption for GDS bookings

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: healthy }
                  service: { type: string }
                  version: { type: string }

  /api/v1/gds/properties:
    get:
      tags: [Properties]
      summary: List properties
      operationId: listProperties
      parameters:
        - name: country
          in: query
          schema: { type: string, example: KE }
        - name: type
          in: query
          schema: { type: string, enum: [hotel, lodge, safari_camp, resort, boutique, guesthouse, villa, apartment, activity] }
        - name: star_rating
          in: query
          schema: { type: integer, minimum: 1, maximum: 5 }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Property list
          content:
            application/json:
              schema:
                type: object
                properties:
                  properties: { type: array, items: { $ref: "#/components/schemas/Property" } }
                  total: { type: integer }
                  page: { type: integer }
                  pageSize: { type: integer }

    post:
      tags: [Properties]
      summary: Register a new property
      operationId: registerProperty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyCreate"
      responses:
        "201":
          description: Property registered
        "400":
          description: Validation error

  /api/v1/gds/reservations:
    post:
      tags: [Reservations]
      summary: Create a reservation
      operationId: createReservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationCreate"
      responses:
        "201":
          description: Reservation confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservation: { $ref: "#/components/schemas/Reservation" }
        "400":
          description: Validation error
        "409":
          description: No availability

  /api/v1/gds/reservations/{id}/cancel:
    post:
      tags: [Reservations]
      summary: Cancel a reservation
      operationId: cancelReservation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 5 }
      responses:
        "200":
          description: Reservation cancelled

  /api/v1/gds/availability/check:
    get:
      tags: [Availability]
      summary: Check availability
      operationId: checkAvailability
      parameters:
        - name: propertyId
          in: query
          required: true
          schema: { type: string }
        - name: roomType
          in: query
          schema: { type: string }
        - name: checkIn
          in: query
          required: true
          schema: { type: string, format: date }
        - name: checkOut
          in: query
          required: true
          schema: { type: string, format: date }
        - name: rooms
          in: query
          schema: { type: integer, default: 1 }
      responses:
        "200":
          description: Availability result

  /api/v1/gds/search:
    get:
      tags: [Search]
      summary: Search properties
      operationId: searchProperties
      parameters:
        - name: q
          in: query
          description: Free-text search query
          schema: { type: string }
        - name: destination
          in: query
          schema: { type: string }
        - name: country
          in: query
          schema: { type: string }
        - name: checkIn
          in: query
          schema: { type: string, format: date }
        - name: checkOut
          in: query
          schema: { type: string, format: date }
        - name: type
          in: query
          schema: { type: string }
        - name: minPrice
          in: query
          schema: { type: number }
        - name: maxPrice
          in: query
          schema: { type: number }
        - name: sortBy
          in: query
          schema: { type: string, enum: [relevance, price_asc, price_desc, rating, distance] }
      responses:
        "200":
          description: Search results

  /api/v1/gds/agents/register:
    post:
      tags: [Agents]
      summary: Register as a travel agent
      operationId: registerAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCreate"
      responses:
        "201":
          description: Agent registered (pending verification)

  /api/v1/gds/agents/commission:
    get:
      tags: [Agents]
      summary: Get commission summary
      operationId: getCommission
      responses:
        "200":
          description: Commission details including tier and earnings

  /api/v1/gds/distribution/webhooks:
    post:
      tags: [Distribution]
      summary: Register a webhook for GDS events
      operationId: registerWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
                events: { type: array, items: { type: string } }
      responses:
        "201":
          description: Webhook registered

  /api/v1/gds/tax/jurisdictions:
    get:
      tags: [Tax]
      summary: List all supported tax jurisdictions
      operationId: listJurisdictions
      responses:
        "200":
          description: List of 15 African jurisdictions with tax rules

  /api/v1/gds/tax/calculate:
    post:
      tags: [Tax]
      summary: Calculate tax for a booking amount
      operationId: calculateTax
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, jurisdictionCode]
              properties:
                amount: { type: number, example: 10000 }
                currency: { type: string }
                jurisdictionCode: { type: string, example: NG }
                serviceType: { type: string, enum: [accommodation, dining, transport, activity] }
      responses:
        "200":
          description: Tax breakdown with per-rule amounts

  /api/v1/gds/tipping/templates:
    get:
      tags: [Tipping]
      summary: Get staff role templates by property type
      operationId: getTippingTemplates
      parameters:
        - name: propertyType
          in: query
          schema: { type: string, enum: [hotel, lodge, safari_camp, resort, restaurant, tour_operator, transport] }
      responses:
        "200":
          description: Role templates with suggested percentages

  /api/v1/gds/tipping/calculate:
    post:
      tags: [Tipping]
      summary: Calculate multi-recipient tip distribution
      operationId: calculateTip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [totalAmount, recipients]
              properties:
                totalAmount: { type: number }
                currency: { type: string }
                recipients: { type: array, items: { type: object, properties: { role: { type: string }, percent: { type: number }, amount: { type: number } } } }
                splitMode: { type: string, enum: [equal, percent, custom], default: equal }
      responses:
        "200":
          description: Distribution with per-recipient amounts

  /api/v1/gds/tipping/send:
    post:
      tags: [Tipping]
      summary: Send tips to multiple recipients
      operationId: sendTip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reservationId, propertyId, totalAmount, recipients]
              properties:
                reservationId: { type: string }
                propertyId: { type: string }
                totalAmount: { type: number }
                currency: { type: string }
                recipients: { type: array, items: { type: object } }
                message: { type: string }
      responses:
        "201":
          description: Tips queued for processing

  /api/v1/gds/remittance/summary:
    get:
      tags: [Remittance]
      summary: Get remittance dashboard (collected vs remitted)
      operationId: getRemittanceSummary
      parameters:
        - name: jurisdictionCode
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Summary with compliance rates

  /api/v1/gds/remittance/initiate:
    post:
      tags: [Remittance]
      summary: Initiate a government tax remittance batch (admin)
      operationId: initiateRemittance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jurisdictionCode, amount]
              properties:
                jurisdictionCode: { type: string }
                amount: { type: number }
                period: { type: string }
      responses:
        "201":
          description: Batch created (pending maker-checker approval)

  /api/v1/gds/loyalty/calculate:
    post:
      tags: [Loyalty]
      summary: Calculate loyalty points for a booking
      operationId: calculateLoyalty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount: { type: number, example: 500 }
                currency: { type: string }
                propertyType: { type: string }
                guestTier: { type: string, enum: [Bronze, Silver, Gold, Platinum] }
                bookingType: { type: string, enum: [gds, direct, ota] }
      responses:
        "200":
          description: Points calculation with tier multiplier breakdown

  /api/v1/gds/loyalty/rewards:
    get:
      tags: [Loyalty]
      summary: Get available rewards catalog
      operationId: getRewards
      responses:
        "200":
          description: Reward list with point costs

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-GDS-API-Key

  schemas:
    Property:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        country: { type: string }
        city: { type: string }
        starRating: { type: integer }
        currency: { type: string }
        commission: { type: number }
        status: { type: string }
        amenities: { type: array, items: { type: string } }
        createdAt: { type: string, format: date-time }

    PropertyCreate:
      type: object
      required: [name, type, country, currency]
      properties:
        name: { type: string, example: Serena Safari Lodge }
        type: { type: string, enum: [hotel, lodge, safari_camp, resort, boutique, guesthouse, villa, apartment, activity] }
        country: { type: string, example: KE, description: "ISO 3166-1 alpha-2 (African countries only)" }
        region: { type: string }
        city: { type: string }
        starRating: { type: integer, minimum: 1, maximum: 5 }
        currency: { type: string, example: KES }
        commission: { type: number, description: "Agent commission percentage" }
        amenities: { type: array, items: { type: string } }
        roomTypes: { type: array, items: { $ref: "#/components/schemas/RoomType" } }

    RoomType:
      type: object
      properties:
        code: { type: string, example: DLX }
        name: { type: string, example: Deluxe Room }
        maxOccupancy: { type: integer }
        bedConfiguration: { type: string }

    ReservationCreate:
      type: object
      required: [propertyId, roomTypeCode, checkIn, checkOut, guestName, guestEmail, guestCountry]
      properties:
        propertyId: { type: string }
        roomTypeCode: { type: string }
        ratePlanCode: { type: string, default: BAR }
        checkIn: { type: string, format: date }
        checkOut: { type: string, format: date }
        guests: { type: integer, minimum: 1 }
        rooms: { type: integer, minimum: 1 }
        guestName: { type: string }
        guestEmail: { type: string, format: email }
        guestPhone: { type: string }
        guestCountry: { type: string }
        specialRequests: { type: string }

    Reservation:
      type: object
      properties:
        id: { type: string }
        confirmationNo: { type: string }
        propertyId: { type: string }
        checkIn: { type: string, format: date }
        checkOut: { type: string, format: date }
        nights: { type: integer }
        guestName: { type: string }
        totalAmount: { type: number }
        commission: { type: number }
        currency: { type: string }
        status: { type: string, enum: [confirmed, cancelled, checked_in, checked_out] }
        createdAt: { type: string, format: date-time }

    AgentCreate:
      type: object
      required: [agencyName, agentName, email, country]
      properties:
        agencyName: { type: string }
        agentName: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        country: { type: string }
        iataCode: { type: string }
        preferredCurrency: { type: string, default: USD }
