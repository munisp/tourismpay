name: postourismpay
description: 54Link POS Shell — Flutter app for PAX A920 and Android POS terminals
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  retrofit: ^4.1.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # UI
  material_color_utilities: ^0.8.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.2

  # QR / NFC
  mobile_scanner: ^4.0.1
  nfc_manager: ^3.3.0

  # Printing (ESC/POS)
  esc_pos_utils_plus: ^2.0.4
  bluetooth_print: ^4.3.0

  # Auth
  flutter_appauth: ^7.0.1
  jwt_decoder: ^2.0.1

  # Biometrics
  local_auth: ^2.2.0

  # Connectivity
  connectivity_plus: ^6.0.3
  internet_connection_checker_plus: ^2.5.0

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Localization
  intl: ^0.19.0

  # Charts
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.4.3
  mockito: ^5.4.4
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
