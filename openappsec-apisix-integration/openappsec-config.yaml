apiVersion: v1
kind: ConfigMap
metadata:
  name: openappsec-config
  namespace: insurance-platform
data:
  local_policy.yaml: |
    apiVersion: v1
    kind: openappsec.io/v1
    metadata:
      name: insurance-platform-waf-policy
    spec:
      mode: prevent-learn
      practices:
        - name: default-web-protection
          webAttacks:
            enabled: true
            minimumConfidence: medium
            maxBodySizeKb: 10240
          sqlInjection:
            enabled: true
            minimumConfidence: high
          xss:
            enabled: true
            minimumConfidence: high
          csrf:
            enabled: true
          openRedirect:
            enabled: true
          pathTraversal:
            enabled: true
          ldapInjection:
            enabled: true
          osCommandInjection:
            enabled: true
          remoteCodeExecution:
            enabled: true
          xxe:
            enabled: true
          ssrf:
            enabled: true
        - name: api-protection
          apiSecurity:
            enabled: true
            schemaValidation: true
            parameterValidation: true
            responseValidation: false
          rateLimiting:
            enabled: true
            requestsPerSecond: 1000
            burstSize: 2000
          authentication:
            enabled: true
            jwtValidation: true
            oauth2Validation: true
        - name: bot-protection
          botProtection:
            enabled: true
            blockMaliciousBots: true
            blockSuspiciousBots: false
            challengeSuspiciousBots: true
            allowSearchEngines: true
            allowMonitoring: true
        - name: ddos-protection
          ddosProtection:
            enabled: true
            requestsPerSecond: 10000
            connectionsPerSecond: 5000
            bandwidthMbps: 1000
      exceptions:
        - name: health-check-endpoints
          urlPatterns:
            - /health
            - /healthz
            - /ready
            - /metrics
          practices:
            - default-web-protection
        - name: webhook-endpoints
          urlPatterns:
            - /webhooks/*
          practices:
            - csrf
      logging:
        enabled: true
        level: info
        destinations:
          - type: syslog
            host: opensearch-cluster
            port: 514
            protocol: tcp
          - type: kafka
            brokers:
              - kafka-0.kafka-headless:9092
              - kafka-1.kafka-headless:9092
              - kafka-2.kafka-headless:9092
            topic: security.waf.events
      monitoring:
        enabled: true
        prometheus:
          enabled: true
          port: 9091
        healthCheck:
          enabled: true
          interval: 30s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openappsec-tuning
  namespace: insurance-platform
data:
  tuning.yaml: |
    apiVersion: v1
    kind: openappsec.io/v1
    metadata:
      name: nigeria-insurance-tuning
    spec:
      geolocation:
        allowedCountries:
          - NG
          - GB
          - US
          - ZA
        blockedCountries:
          - CN
          - RU
          - KP
      ipReputation:
        enabled: true
        blockMaliciousIPs: true
        blockTorExitNodes: true
        blockProxies: false
        blockVPNs: false
      customRules:
        - name: block-sql-keywords
          description: Block common SQL injection keywords
          pattern: '(?i)(union|select|insert|update|delete|drop|create|alter|exec|execute|script|javascript|eval|expression)'
          action: block
          severity: high
        - name: block-path-traversal
          description: Block path traversal attempts
          pattern: '(\.\./|\.\.\\|%2e%2e%2f|%2e%2e\\)'
          action: block
          severity: high
        - name: block-sensitive-files
          description: Block access to sensitive files
          pattern: '(?i)(\.env|\.git|\.svn|\.htaccess|\.htpasswd|web\.config|\.aws|\.ssh)'
          action: block
          severity: critical
        - name: rate-limit-login
          description: Rate limit login endpoints
          urlPattern: '/api/v1/auth/login'
          rateLimit:
            requestsPerMinute: 10
            burstSize: 20
          action: challenge
        - name: rate-limit-registration
          description: Rate limit registration endpoints
          urlPattern: '/api/v1/auth/register'
          rateLimit:
            requestsPerMinute: 5
            burstSize: 10
          action: challenge
      nigeriaSpecific:
        - name: validate-nin
          description: Validate Nigerian NIN format
          urlPattern: '/api/v1/kyc/verify'
          customValidation:
            field: nin
            pattern: '^\d{11}$'
            action: block
        - name: validate-bvn
          description: Validate Nigerian BVN format
          urlPattern: '/api/v1/kyc/verify'
          customValidation:
            field: bvn
            pattern: '^\d{11}$'
            action: block
        - name: validate-phone
          description: Validate Nigerian phone format
          urlPattern: '/api/v1/customers'
          customValidation:
            field: phone
            pattern: '^\+234[0-9]{10}$'
            action: block
