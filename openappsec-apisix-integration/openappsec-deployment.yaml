apiVersion: apps/v1
kind: Deployment
metadata:
  name: openappsec-agent
  namespace: insurance-platform
  labels:
    app: openappsec-agent
    component: security
spec:
  replicas: 3
  selector:
    matchLabels:
      app: openappsec-agent
  template:
    metadata:
      labels:
        app: openappsec-agent
        component: security
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: openappsec-agent
      containers:
      - name: openappsec-agent
        image: openappsec/agent:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: https
          containerPort: 8443
          protocol: TCP
        - name: metrics
          containerPort: 9091
          protocol: TCP
        env:
        - name: OPENAPPSEC_MODE
          value: "inline"
        - name: OPENAPPSEC_UPSTREAM
          value: "apisix-gateway.insurance-platform.svc.cluster.local:9080"
        - name: OPENAPPSEC_POLICY_FILE
          value: "/etc/openappsec/local_policy.yaml"
        - name: OPENAPPSEC_TUNING_FILE
          value: "/etc/openappsec/tuning.yaml"
        - name: OPENAPPSEC_LOG_LEVEL
          value: "info"
        - name: OPENAPPSEC_KAFKA_BROKERS
          value: "kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092,kafka-2.kafka-headless:9092"
        - name: OPENAPPSEC_KAFKA_TOPIC
          value: "security.waf.events"
        volumeMounts:
        - name: config
          mountPath: /etc/openappsec
          readOnly: true
        - name: cache
          mountPath: /var/cache/openappsec
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
      volumes:
      - name: config
        configMap:
          name: openappsec-config
      - name: cache
        emptyDir:
          sizeLimit: 1Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - openappsec-agent
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: openappsec-agent
  namespace: insurance-platform
  labels:
    app: openappsec-agent
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: https
    port: 8443
    targetPort: 8443
    protocol: TCP
  - name: metrics
    port: 9091
    targetPort: 9091
    protocol: TCP
  selector:
    app: openappsec-agent
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openappsec-agent
  namespace: insurance-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openappsec-agent
  namespace: insurance-platform
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openappsec-agent
  namespace: insurance-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openappsec-agent
subjects:
- kind: ServiceAccount
  name: openappsec-agent
  namespace: insurance-platform
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: openappsec-agent
  namespace: insurance-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: openappsec-agent
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: openappsec-agent
  namespace: insurance-platform
  labels:
    app: openappsec-agent
spec:
  selector:
    matchLabels:
      app: openappsec-agent
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
