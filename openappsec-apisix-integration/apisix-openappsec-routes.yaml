apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: insurance-platform-protected
  namespace: insurance-platform
spec:
  http:
  - name: payment-service-protected
    match:
      hosts:
      - api.insurance.ng
      paths:
      - /api/v1/payments/*
    backends:
    - serviceName: openappsec-agent
      servicePort: 8080
    plugins:
    - name: openappsec-waf
      enable: true
      config:
        policy: default-web-protection
        mode: prevent
    - name: prometheus
      enable: true
    - name: request-id
      enable: true
    - name: limit-req
      enable: true
      config:
        rate: 100
        burst: 200
        key: remote_addr
        rejected_code: 429
  - name: policy-service-protected
    match:
      hosts:
      - api.insurance.ng
      paths:
      - /api/v1/policies/*
    backends:
    - serviceName: openappsec-agent
      servicePort: 8080
    plugins:
    - name: openappsec-waf
      enable: true
      config:
        policy: default-web-protection
        mode: prevent
    - name: jwt-auth
      enable: true
    - name: prometheus
      enable: true
  - name: kyc-service-protected
    match:
      hosts:
      - api.insurance.ng
      paths:
      - /api/v1/kyc/*
    backends:
    - serviceName: openappsec-agent
      servicePort: 8080
    plugins:
    - name: openappsec-waf
      enable: true
      config:
        policy: api-protection
        mode: prevent
        customRules:
        - validate-nin
        - validate-bvn
        - validate-phone
    - name: jwt-auth
      enable: true
    - name: limit-req
      enable: true
      config:
        rate: 50
        burst: 100
        key: consumer_name
  - name: claims-service-protected
    match:
      hosts:
      - api.insurance.ng
      paths:
      - /api/v1/claims/*
    backends:
    - serviceName: openappsec-agent
      servicePort: 8080
    plugins:
    - name: openappsec-waf
      enable: true
      config:
        policy: default-web-protection
        mode: prevent
    - name: jwt-auth
      enable: true
    - name: prometheus
      enable: true
  - name: auth-service-protected
    match:
      hosts:
      - api.insurance.ng
      paths:
      - /api/v1/auth/*
    backends:
    - serviceName: openappsec-agent
      servicePort: 8080
    plugins:
    - name: openappsec-waf
      enable: true
      config:
        policy: api-protection
        mode: prevent
        customRules:
        - rate-limit-login
        - rate-limit-registration
    - name: limit-req
      enable: true
      config:
        rate: 10
        burst: 20
        key: remote_addr
---
apiVersion: apisix.apache.org/v2
kind: ApisixUpstream
metadata:
  name: openappsec-upstream
  namespace: insurance-platform
spec:
  loadbalancer:
    type: roundrobin
  healthCheck:
    active:
      type: http
      httpPath: /health
      healthy:
        interval: 10s
        successes: 2
      unhealthy:
        interval: 5s
        httpFailures: 3
    passive:
      healthy:
        successes: 3
      unhealthy:
        httpFailures: 5
  retries: 3
  timeout:
    connect: 5s
    send: 10s
    read: 10s
  scheme: http
  portLevelSettings:
  - port: 8080
    scheme: http
---
apiVersion: apisix.apache.org/v2
kind: ApisixPluginConfig
metadata:
  name: waf-security-baseline
  namespace: insurance-platform
spec:
  plugins:
  - name: openappsec-waf
    enable: true
    config:
      policy: default-web-protection
      mode: prevent
      logLevel: info
  - name: ip-restriction
    enable: true
    config:
      whitelist:
      - 0.0.0.0/0
      message: "Access denied by IP restriction"
  - name: ua-restriction
    enable: true
    config:
      bypass_missing: false
      allowlist:
      - ".*"
      denylist:
      - "(?i)(bot|crawler|spider|scraper|curl|wget|python-requests)"
      message: "User-Agent not allowed"
  - name: referer-restriction
    enable: false
  - name: cors
    enable: true
    config:
      allow_origins: "https://insurance.ng,https://app.insurance.ng"
      allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
      allow_headers: "Authorization,Content-Type,X-Request-ID"
      expose_headers: "X-Request-ID"
      max_age: 3600
      allow_credential: true
  - name: csrf
    enable: true
    config:
      key: "insurance-csrf-key-2026"
  - name: request-validation
    enable: true
    config:
      header_schema:
        type: object
        required:
        - "Content-Type"
        properties:
          Content-Type:
            type: string
            enum:
            - "application/json"
            - "application/x-www-form-urlencoded"
            - "multipart/form-data"
  - name: response-rewrite
    enable: true
    config:
      headers:
        set:
          X-Frame-Options: "DENY"
          X-Content-Type-Options: "nosniff"
          X-XSS-Protection: "1; mode=block"
          Strict-Transport-Security: "max-age=31536000; includeSubDomains"
          Content-Security-Policy: "default-src 'self'"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-openappsec-plugin
  namespace: insurance-platform
data:
  openappsec-waf.lua: |
    local core = require("apisix.core")
    local http = require("resty.http")
    local json = require("cjson")
    
    local plugin_name = "openappsec-waf"
    
    local schema = {
        type = "object",
        properties = {
            policy = {
                type = "string",
                default = "default-web-protection"
            },
            mode = {
                type = "string",
                enum = {"prevent", "detect", "inactive"},
                default = "prevent"
            },
            customRules = {
                type = "array",
                items = {
                    type = "string"
                }
            },
            logLevel = {
                type = "string",
                enum = {"debug", "info", "warn", "error"},
                default = "info"
            }
        }
    }
    
    local _M = {
        version = 1.0,
        priority = 1000,
        name = plugin_name,
        schema = schema
    }
    
    function _M.check_schema(conf)
        return core.schema.check(schema, conf)
    end
    
    function _M.access(conf, ctx)
        local httpc = http.new()
        httpc:set_timeout(5000)
        
        local headers = ngx.req.get_headers()
        local method = ngx.req.get_method()
        local uri = ngx.var.uri
        local args = ngx.req.get_uri_args()
        
        local body
        if method == "POST" or method == "PUT" or method == "PATCH" then
            ngx.req.read_body()
            body = ngx.req.get_body_data()
        end
        
        local request_data = {
            method = method,
            uri = uri,
            headers = headers,
            args = args,
            body = body,
            policy = conf.policy,
            mode = conf.mode,
            customRules = conf.customRules or {}
        }
        
        local res, err = httpc:request_uri("http://openappsec-agent:8080/validate", {
            method = "POST",
            body = json.encode(request_data),
            headers = {
                ["Content-Type"] = "application/json"
            }
        })
        
        if not res then
            core.log.error("Failed to connect to OpenAppSec: ", err)
            if conf.mode == "prevent" then
                return 503, {message = "WAF service unavailable"}
            end
            return
        end
        
        local result = json.decode(res.body)
        
        if result.action == "block" then
            core.log.warn("Request blocked by OpenAppSec: ", result.reason)
            return 403, {
                message = "Request blocked by Web Application Firewall",
                incident_id = result.incident_id
            }
        elseif result.action == "challenge" then
            return 429, {
                message = "Rate limit exceeded",
                retry_after = result.retry_after or 60
            }
        end
        
        ctx.openappsec_incident_id = result.incident_id
        ctx.openappsec_risk_score = result.risk_score
    end
    
    function _M.log(conf, ctx)
        if ctx.openappsec_incident_id then
            core.log.info("OpenAppSec incident: ", ctx.openappsec_incident_id,
                         " risk_score: ", ctx.openappsec_risk_score)
        end
    end
    
    return _M
