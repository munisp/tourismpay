version: "3.9"

services:
  # ─── Core Platform ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ndsep_user
      POSTGRES_PASSWORD: ndsep_secure_2026
      POSTGRES_DB: ndsep_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndsep_user -d ndsep_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Main Application ────────────────────────────────────────────────────────
  tourismpay-pwa:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://ndsep_user:ndsep_secure_2026@postgres:5432/ndsep_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-production-jwt-secret-min-32-characters-long}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      GO_SETTLEMENT_URL: http://go-settlement:8081
      PYTHON_ML_URL: http://python-ml:8001
      PBAC_ENGINE_URL: http://pbac-engine:8090
      RATE_LIMITER_URL: http://rate-limiter:8091
      CRYPTO_ENGINE_URL: http://crypto-engine:8092
      OFFLINE_SYNC_URL: http://offline-sync:8093
      KAFKA_BROKER_URL: kafka:9092
      KEYCLOAK_URL: http://keycloak:8080
      OPENSEARCH_URL: http://opensearch:9200
      # Go middleware services
      KAFKA_PROCESSOR_URL: http://kafka-processor:8100
      TEMPORAL_WORKER_URL: http://temporal-worker:8101
      KEYCLOAK_ADMIN_URL: http://keycloak-admin:8102
      PERMIFY_PROXY_URL: http://permify-proxy:8103
      APISIX_ADMIN_SERVICE_URL: http://apisix-admin:8104
      OPENAPPSEC_WAF_URL: http://openappsec-waf:8105
      DAPR_GATEWAY_URL: http://dapr-gateway:8106
      MOJALOOP_HUB_URL: http://mojaloop-hub:8107
      # Rust middleware services
      REDIS_CACHE_URL: http://redis-cache:8110
      TIGERBEETLE_LEDGER_URL: http://tigerbeetle-ledger:8111
      FLUVIO_STREAM_URL: http://fluvio-stream:8112
      # Python middleware services
      OPENSEARCH_ANALYTICS_URL: http://opensearch-analytics:8120
      LAKEHOUSE_ANALYTICS_URL: http://lakehouse-analytics:8121
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Go Settlement Service ──────────────────────────────────────────────────
  go-settlement:
    build:
      context: ./go-settlement-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      TIGERBEETLE_ADDR: tigerbeetle:3000
      DATABASE_URL: postgresql://ndsep_user:ndsep_secure_2026@postgres:5432/ndsep_db

  # ─── Python ML Services ────────────────────────────────────────────────────
  python-ml:
    build:
      context: ./python-services
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://ndsep_user:ndsep_secure_2026@postgres:5432/ndsep_db
      REDIS_URL: redis://redis:6379

  # ─── Rust Services ─────────────────────────────────────────────────────────
  pbac-engine:
    build:
      context: ./rust-services/pbac-engine
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      RUST_LOG: info

  rate-limiter:
    build:
      context: ./rust-services/rate-limiter
      dockerfile: Dockerfile
    ports:
      - "8091:8091"
    environment:
      PORT: "8091"
      RUST_LOG: info

  crypto-engine:
    build:
      context: ./rust-services/crypto-engine
      dockerfile: Dockerfile
    ports:
      - "8092:8092"
    environment:
      PORT: "8092"
      RUST_LOG: info

  offline-sync:
    build:
      context: ./rust-services/offline-sync
      dockerfile: Dockerfile
    ports:
      - "8093:8093"
    environment:
      PORT: "8093"
      RUST_LOG: info

  # ─── Go Middleware Services ────────────────────────────────────────────────
  kafka-processor:
    build:
      context: ./go-middleware/kafka-processor
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      PORT: "8100"
      KAFKA_BROKERS: kafka:9092
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  temporal-worker:
    build:
      context: ./go-middleware/temporal-worker
      dockerfile: Dockerfile
    ports:
      - "8101:8101"
    environment:
      PORT: "8101"
      TEMPORAL_HOST: temporal:7233
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8101/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  keycloak-admin:
    build:
      context: ./go-middleware/keycloak-admin
      dockerfile: Dockerfile
    ports:
      - "8102:8102"
    environment:
      PORT: "8102"
      KEYCLOAK_URL: http://keycloak:8080
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8102/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  permify-proxy:
    build:
      context: ./go-middleware/permify-proxy
      dockerfile: Dockerfile
    ports:
      - "8103:8103"
    environment:
      PORT: "8103"
      PERMIFY_URL: http://localhost:3476
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8103/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  apisix-admin:
    build:
      context: ./go-middleware/apisix-admin
      dockerfile: Dockerfile
    ports:
      - "8104:8104"
    environment:
      PORT: "8104"
      APISIX_ADMIN_URL: http://apisix:9180
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8104/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  openappsec-waf:
    build:
      context: ./go-middleware/openappsec-waf
      dockerfile: Dockerfile
    ports:
      - "8105:8105"
    environment:
      PORT: "8105"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8105/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  dapr-gateway:
    build:
      context: ./go-middleware/dapr-gateway
      dockerfile: Dockerfile
    ports:
      - "8106:8106"
    environment:
      PORT: "8106"
      DAPR_HTTP_URL: http://localhost:3500
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8106/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  mojaloop-hub:
    build:
      context: ./go-middleware/mojaloop-hub
      dockerfile: Dockerfile
    ports:
      - "8107:8107"
    environment:
      PORT: "8107"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8107/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Rust Middleware Services ──────────────────────────────────────────────
  redis-cache:
    build:
      context: ./rust-services/redis-cache
      dockerfile: Dockerfile
    ports:
      - "8110:8110"
    environment:
      PORT: "8110"
      RUST_LOG: info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8110/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  tigerbeetle-ledger:
    build:
      context: ./rust-services/tigerbeetle-ledger
      dockerfile: Dockerfile
    ports:
      - "8111:8111"
    environment:
      PORT: "8111"
      RUST_LOG: info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8111/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  fluvio-stream:
    build:
      context: ./rust-services/fluvio-stream
      dockerfile: Dockerfile
    ports:
      - "8112:8112"
    environment:
      PORT: "8112"
      RUST_LOG: info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8112/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Python Middleware Services ────────────────────────────────────────────
  opensearch-analytics:
    build:
      context: ./python-services/opensearch-analytics
      dockerfile: Dockerfile
    ports:
      - "8120:8120"
    environment:
      PORT: "8120"
      OPENSEARCH_URL: http://opensearch:9200
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8120/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  lakehouse-analytics:
    build:
      context: ./python-services/lakehouse-analytics
      dockerfile: Dockerfile
    ports:
      - "8121:8121"
    environment:
      PORT: "8121"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8121/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Middleware Infrastructure ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    profiles: ["middleware"]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    profiles: ["middleware"]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/ndsep_db
      KC_DB_USERNAME: ndsep_user
      KC_DB_PASSWORD: ndsep_secure_2026
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["middleware"]

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    profiles: ["middleware"]

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.15.6
    ports:
      - "3001:3000"
    command: start --addresses=0.0.0.0:3000 /data/0_0.tigerbeetle
    volumes:
      - tigerbeetle_data:/data
    profiles: ["middleware"]

  apisix:
    image: apache/apisix:3.8.0-debian
    ports:
      - "9080:9080"
      - "9180:9180"
    volumes:
      - ./infra/ha/apisix:/usr/local/apisix/conf
    profiles: ["middleware"]

  temporal:
    image: temporalio/auto-setup:1.23
    ports:
      - "7233:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ndsep_user
      POSTGRES_PWD: ndsep_secure_2026
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["middleware"]

  # ─── ML Inference Service ──────────────────────────────────────────────────
  ml-inference:
    build:
      context: .
      dockerfile: ml/Dockerfile
    ports:
      - "8200:8200"
    environment:
      ML_MODEL_DIR: /app/ml/saved_models
      ML_INFERENCE_PORT: "8200"
    volumes:
      - ./ml/saved_models:/app/ml/saved_models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    profiles: ["ml"]

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/tourismpay-neo4j-2026
      NEO4J_PLUGINS: '["graph-data-science"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    profiles: ["ml"]

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  tigerbeetle_data:
  neo4j_data:
