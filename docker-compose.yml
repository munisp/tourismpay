version: "3.9"

services:
  # ─── Core Platform ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ndsep_user
      POSTGRES_PASSWORD: ndsep_secure_2026
      POSTGRES_DB: ndsep_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndsep_user -d ndsep_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Main Application ────────────────────────────────────────────────────────
  tourismpay-pwa:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://ndsep_user:ndsep_secure_2026@postgres:5432/ndsep_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-production-jwt-secret-min-32-characters-long}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      GO_SETTLEMENT_URL: http://go-settlement:8081
      PYTHON_ML_URL: http://python-ml:8001
      PBAC_ENGINE_URL: http://pbac-engine:8090
      RATE_LIMITER_URL: http://rate-limiter:8091
      CRYPTO_ENGINE_URL: http://crypto-engine:8092
      OFFLINE_SYNC_URL: http://offline-sync:8093
      KAFKA_BROKER_URL: kafka:9092
      KEYCLOAK_URL: http://keycloak:8080
      OPENSEARCH_URL: http://opensearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Go Settlement Service ──────────────────────────────────────────────────
  go-settlement:
    build:
      context: ./go-settlement-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      TIGERBEETLE_ADDR: tigerbeetle:3000
      DATABASE_URL: postgresql://ndsep_user:ndsep_secure_2026@postgres:5432/ndsep_db

  # ─── Python ML Services ────────────────────────────────────────────────────
  python-ml:
    build:
      context: ./python-services
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql://ndsep_user:ndsep_secure_2026@postgres:5432/ndsep_db
      REDIS_URL: redis://redis:6379

  # ─── Rust Services ─────────────────────────────────────────────────────────
  pbac-engine:
    build:
      context: ./rust-services/pbac-engine
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      RUST_LOG: info

  rate-limiter:
    build:
      context: ./rust-services/rate-limiter
      dockerfile: Dockerfile
    ports:
      - "8091:8091"
    environment:
      PORT: "8091"
      RUST_LOG: info

  crypto-engine:
    build:
      context: ./rust-services/crypto-engine
      dockerfile: Dockerfile
    ports:
      - "8092:8092"
    environment:
      PORT: "8092"
      RUST_LOG: info

  offline-sync:
    build:
      context: ./rust-services/offline-sync
      dockerfile: Dockerfile
    ports:
      - "8093:8093"
    environment:
      PORT: "8093"
      RUST_LOG: info

  # ─── Middleware Infrastructure ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    profiles: ["middleware"]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    profiles: ["middleware"]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/ndsep_db
      KC_DB_USERNAME: ndsep_user
      KC_DB_PASSWORD: ndsep_secure_2026
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["middleware"]

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    profiles: ["middleware"]

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.15.6
    ports:
      - "3001:3000"
    command: start --addresses=0.0.0.0:3000 /data/0_0.tigerbeetle
    volumes:
      - tigerbeetle_data:/data
    profiles: ["middleware"]

  apisix:
    image: apache/apisix:3.8.0-debian
    ports:
      - "9080:9080"
      - "9180:9180"
    volumes:
      - ./infra/ha/apisix:/usr/local/apisix/conf
    profiles: ["middleware"]

  temporal:
    image: temporalio/auto-setup:1.23
    ports:
      - "7233:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ndsep_user
      POSTGRES_PWD: ndsep_secure_2026
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["middleware"]

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  tigerbeetle_data:
