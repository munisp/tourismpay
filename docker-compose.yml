# TourismPay — Full-Stack Development/Deployment
# Usage: docker compose up -d
# All services share a PostgreSQL instance.
# Infrastructure: Keycloak, TigerBeetle, APISIX, Permify, Dapr, Temporal, Fluvio, Lakehouse, OpenAppSec, Ollama

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tourismpay_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpass123}
      POSTGRES_DB: tourismpay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tourismpay_user -d tourismpay"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── TypeScript Server (Express + tRPC + React PWA) ─────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://tourismpay_user:${POSTGRES_PASSWORD:-testpass123}@postgres:5432/tourismpay
      JWT_SECRET: ${JWT_SECRET:-tourismpay-test-jwt-secret-for-dev-32chars}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      SETTLEMENT_SERVICE_URL: http://settlement:8081
      KYC_SERVICE_URL: http://kyc:8082
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: tourismpay
      KEYCLOAK_CLIENT_ID: tourismpay-pwa
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      PERMIFY_URL: http://permify:3476
      PERMIFY_HOST: permify
      PERMIFY_PORT: "3476"
      PERMIFY_TENANT_ID: tourismpay
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: tourismpay
      TB_SIDECAR_URL: http://tigerbeetle-sidecar:3001
      FLUVIO_ENDPOINT: fluvio-sc:9003
      LAKEHOUSE_SERVICE_URL: http://lakehouse-service:8001
      LAKEHOUSE_ENABLED: "true"
      OPENAPPSEC_AGENT_URL: http://openappsec-agent:1080
      OPENAPPSEC_BLOCKING: ${OPENAPPSEC_BLOCKING:-false}
      OLLAMA_BASE_URL: http://ollama:11434
      DAPR_HTTP_PORT: "3500"
      DAPR_APP_ID: tourismpay-pwa
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY:-tourismpay}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY:-tourismpay123}
      S3_BUCKET: tourismpay-documents
      EXCHANGE_RATE_ML_URL: http://lakehouse-service:8001
      MOJALOOP_HUB_URL: ${MOJALOOP_HUB_URL:-}
      MOJALOOP_DFSP_ID: ${MOJALOOP_DFSP_ID:-tourismpay}
      VITE_APP_ID: tourismpay
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/livez"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Go Settlement Service ──────────────────────────────────────────────────
  settlement:
    build:
      context: ./go-settlement-service
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8081"
      DATABASE_URL: postgresql://tourismpay_user:${POSTGRES_PASSWORD:-testpass123}@postgres:5432/tourismpay_settlement
      JWT_SECRET: ${JWT_SECRET:-tourismpay-test-jwt-secret-for-dev-32chars}
      SETTLEMENT_API_KEY: ${SETTLEMENT_API_KEY:-test-settlement-api-key}
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Kafka (KRaft mode, no Zookeeper) ─────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafkadata:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Rust KYC Service ─────────────────────────────────────────────────────
  kyc:
    build:
      context: ./rust-kyc-service
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KYC_PORT: "8082"
      KYC_DATABASE_URL: postgresql://tourismpay_user:${POSTGRES_PASSWORD:-testpass123}@postgres:5432/tourismpay
      REDIS_URL: redis://redis:6379
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ─── Python ML Services (all-in-one container) ─────────────────────────────
  python-ml:
    build:
      context: ./python-services
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tourismpay_user:${POSTGRES_PASSWORD:-testpass123}@postgres:5432/tourismpay
      JWT_SECRET: ${JWT_SECRET:-tourismpay-test-jwt-secret-for-dev-32chars}
      SERVICE_API_KEY: ${SERVICE_API_KEY:-test-key-123}
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
      - "8005:8005"
    command: ["bash", "-c", "./start-all.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ─── Partner Remittance Service (Python) ─────────────────────────────────
  partner-remittance:
    build:
      context: ./python-services
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tourismpay_user:${POSTGRES_PASSWORD:-testpass123}@postgres:5432/tourismpay
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WISE_API_KEY: ${WISE_API_KEY:-}
      REVOLUT_API_KEY: ${REVOLUT_API_KEY:-}
      REMITLY_API_KEY: ${REMITLY_API_KEY:-}
      LEMFI_API_KEY: ${LEMFI_API_KEY:-}
      CORS_ORIGIN: http://localhost:5173
      PORT: "8085"
    ports:
      - "8085:8085"
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8085"]
    working_dir: /app/partner-remittance
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ─── Keycloak Identity Provider ─────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/tourismpay
      KC_DB_USERNAME: tourismpay_user
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-testpass123}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/tourismpay-realm.json:/opt/keycloak/data/import/tourismpay-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─── TigerBeetle Ledger (via sidecar HTTP bridge) ──────────────────────────
  tigerbeetle-sidecar:
    build:
      context: ./tb-sidecar
      dockerfile: Dockerfile
    environment:
      TB_CLUSTER_ID: ${TB_CLUSTER_ID:-0}
      TB_ADDRESSES: ${TB_ADDRESSES:-3000}
      PORT: "3001"
      DATABASE_URL: postgresql://tourismpay_user:${POSTGRES_PASSWORD:-testpass123}@postgres:5432/tourismpay
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Permify Authorization Engine ───────────────────────────────────────────
  permify:
    image: ghcr.io/permify/permify:v0.10.1
    command: serve
    environment:
      PERMIFY_DATABASE_ENGINE: postgres
      PERMIFY_DATABASE_URI: postgresql://tourismpay_user:${POSTGRES_PASSWORD:-testpass123}@postgres:5432/tourismpay
      PERMIFY_DATABASE_MAX_OPEN_CONNECTIONS: "20"
      PERMIFY_GRPC_PORT: "3478"
      PERMIFY_HTTP_PORT: "3476"
      PERMIFY_LOG_LEVEL: info
      PERMIFY_AUTHN_ENABLED: "false"
    ports:
      - "3476:3476"
      - "3478:3478"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3476/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Temporal Workflow Engine ────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24.2
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: tourismpay_user
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-testpass123}
      POSTGRES_SEEDS: postgres
      ENABLE_ES: "false"
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: tourismpay
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7233/health || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Temporal UI ─────────────────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:2.28.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal

  # ─── Temporal Worker (Settlement + Float workflows) ──────────────────────────
  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile.temporal-worker
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: tourismpay
      DATABASE_URL: postgresql://tourismpay_user:${POSTGRES_PASSWORD:-testpass123}@postgres:5432/tourismpay
      REDIS_URL: redis://redis:6379
      TB_SIDECAR_URL: http://tigerbeetle-sidecar:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Fluvio Streaming Platform ──────────────────────────────────────────────
  fluvio-sc:
    image: infinyon/fluvio:0.11.11
    command: fluvio-run sc --local /fluvio/metadata
    ports:
      - "9003:9003"
    volumes:
      - fluviodata:/fluvio/metadata

  fluvio-spu:
    image: infinyon/fluvio:0.11.11
    command: fluvio-run spu -i 5001 -p fluvio-spu:9010 -v fluvio-spu:9011 --sc-addr fluvio-sc:9004
    ports:
      - "9010:9010"
    depends_on:
      - fluvio-sc
    volumes:
      - fluviodata:/fluvio/metadata

  # ─── MinIO Object Storage (Lakehouse S3 backend) ────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-tourismpay}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-tourismpay123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Lakehouse Service (Apache Iceberg + DuckDB + MinIO) ────────────────────
  lakehouse-service:
    build:
      context: ./python-services
      dockerfile: Dockerfile
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      DATABASE_URL: postgresql://tourismpay_user:${POSTGRES_PASSWORD:-testpass123}@postgres:5432/tourismpay
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-tourismpay}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-tourismpay123}
      MINIO_BUCKET: tourismpay-lakehouse
      LAKEHOUSE_ENABLED: "true"
      SERVICE_API_KEY: ${SERVICE_API_KEY:-test-key-123}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ─── APISIX API Gateway ──────────────────────────────────────────────────────
  apisix:
    image: apache/apisix:3.9.1-debian
    environment:
      APISIX_STAND_ALONE: "true"
    ports:
      - "9080:9080"
      - "9443:9443"
      - "9180:9180"
    volumes:
      - ./infra/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./infra/apisix/routes.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9080/apisix/status"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── OpenAppSec WAF Agent ────────────────────────────────────────────────────
  openappsec-agent:
    image: openappsec/agent:1.1.0
    restart: unless-stopped
    privileged: true
    environment:
      AGENT_TOKEN: ${OPENAPPSEC_TOKEN:-dev-token}
      REGISTRATION_SERVER: https://inext-agents.checkpoint.com
      TUNING_HOST: https://inext-tuning.checkpoint.com
      OPENAPPSEC_BLOCKING: ${OPENAPPSEC_BLOCKING:-false}
    volumes:
      - openappsec-data:/etc/cp/conf
      - openappsec-logs:/var/log/nano_agent
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ─── Dapr Placement Service ──────────────────────────────────────────────────
  dapr-placement:
    image: daprio/dapr:1.13.4
    command: ["./placement", "-port", "50006"]
    ports:
      - "50006:50006"

  # ─── Ollama (Local LLM — CPU inference, qwen2.5:7b) ─────────────────────────
  ollama:
    image: ollama/ollama:0.3.14
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_NUM_PARALLEL: "2"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Ollama Model Puller (pulls qwen2.5:7b on startup) ───────────────────────
  ollama-pull:
    image: curlimages/curl:8.6.0
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["curl -sf http://ollama:11434/api/pull -d '{\"name\":\"qwen2.5:7b\"}' && curl -sf http://ollama:11434/api/pull -d '{\"name\":\"nomic-embed-text\"}'"]
    restart: "no"

  # ─── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - prometheusdata:/prometheus
    command:
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  # ─── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3030:3000"
    volumes:
      - grafanadata:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  kafkadata:
  fluviodata:
  miniodata:
  ollamadata:
  openappsec-data:
  openappsec-logs:
  prometheusdata:
  grafanadata:
