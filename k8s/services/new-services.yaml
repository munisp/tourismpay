# Kubernetes Deployments for Core Insurance Services
# Apply: kubectl apply -f k8s/services/new-services.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-adjudication-engine
  labels:
    app: claims-adjudication-engine
    tier: core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: claims-adjudication-engine
  template:
    metadata:
      labels:
        app: claims-adjudication-engine
    spec:
      containers:
      - name: claims-adjudication-engine
        image: registry.insureportal.ng/claims-adjudication-engine:latest
        ports:
        - containerPort: 8091
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits: { cpu: "500m", memory: "512Mi" }
        livenessProbe:
          httpGet: { path: /health, port: 8091 }
          initialDelaySeconds: 10
        readinessProbe:
          httpGet: { path: /health, port: 8091 }
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: claims-adjudication-engine
spec:
  selector:
    app: claims-adjudication-engine
  ports:
  - port: 8091
    targetPort: 8091
