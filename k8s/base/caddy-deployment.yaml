apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy-edge
  namespace: tourismpay
  labels:
    app: caddy
    component: edge-proxy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2019"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: caddy
          image: tourismpay/caddy-custom:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
            - containerPort: 443
              name: http3
              protocol: UDP
            - containerPort: 2019
              name: admin
          env:
            - name: CADDY_OAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: caddy-secrets
                  key: oauth-secret
            - name: CADDY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: caddy-secrets
                  key: jwt-secret
          volumeMounts:
            - name: caddy-config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: caddy-data
              mountPath: /data
            - name: caddy-certs
              mountPath: /etc/caddy/certs
          livenessProbe:
            httpGet:
              path: /config/
              port: 2019
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /config/
              port: 2019
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: caddy-config
          configMap:
            name: caddy-configmap
        - name: caddy-data
          persistentVolumeClaim:
            claimName: caddy-pvc
        - name: caddy-certs
          secret:
            secretName: caddy-internal-certs

---
apiVersion: v1
kind: Service
metadata:
  name: caddy-service
  namespace: tourismpay
spec:
  type: LoadBalancer
  selector:
    app: caddy
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
    - name: http3
      port: 443
      targetPort: 443
      protocol: UDP
    - name: admin
      port: 2019
      targetPort: 2019
