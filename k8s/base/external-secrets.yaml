---
# ─────────────────────────────────────────────────────────────────────────────
# TourismPay External Secrets Operator (ESO) Configuration
# Pulls secrets from AWS Secrets Manager (or Vault) into Kubernetes Secrets
# Requires: external-secrets.io/v1beta1 CRD installed
# ─────────────────────────────────────────────────────────────────────────────

# SecretStore — connects to AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: af-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets

---
# ExternalSecret — tourismpay-server core secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tourismpay-server-secrets
  namespace: tourismpay
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: tourismpay-server-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: tourismpay/production/database
        property: url
    - secretKey: JWT_SECRET
      remoteRef:
        key: tourismpay/production/jwt
        property: secret
    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: tourismpay/production/keycloak
        property: client_secret
    - secretKey: APISIX_ADMIN_KEY
      remoteRef:
        key: tourismpay/production/apisix
        property: admin_key
    - secretKey: REDIS_URL
      remoteRef:
        key: tourismpay/production/redis
        property: url
    - secretKey: TB_ADDRESS
      remoteRef:
        key: tourismpay/production/tigerbeetle
        property: address
    - secretKey: TEMPORAL_HOST
      remoteRef:
        key: tourismpay/production/temporal
        property: host

---
# ExternalSecret — crypto-engine master key (highest sensitivity)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: crypto-engine-secrets
  namespace: tourismpay
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: crypto-engine-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: CRYPTO_MASTER_KEY
      remoteRef:
        key: tourismpay/production/crypto
        property: master_key

---
# ExternalSecret — lakehouse and fraud scoring
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: data-services-secrets
  namespace: tourismpay
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: data-services-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: tourismpay/production/s3
        property: access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: tourismpay/production/s3
        property: secret_access_key
    - secretKey: LAKEHOUSE_S3_BUCKET
      remoteRef:
        key: tourismpay/production/lakehouse
        property: bucket

---
# ServiceAccount for External Secrets (IRSA)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: external-secrets
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/tourismpay-external-secrets
