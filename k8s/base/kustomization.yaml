apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: insurance-platform

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - storage-classes.yaml
  - network-policies.yaml
  - services/customer-portal.yaml
  - services/claims-adjudication.yaml
  - services/policy-workflow.yaml
  - services/kyc-orchestrator.yaml
  - services/fraud-detection.yaml
  - services/communication-service.yaml
  - services/payment-service.yaml
  - services/geospatial-service.yaml
  - services/telco-integration.yaml
  - services/erpnext-integration.yaml
  - services/openimis-integration.yaml
  - services/etherisc-integration.yaml
  - services/broker-api.yaml
  - services/underwriting-service.yaml
  - services/document-service.yaml
  - services/microinsurance-service.yaml
  - services/analytics-service.yaml
  - services/remaining-services.yaml
  - services/extended-go-services.yaml

commonLabels:
  app.kubernetes.io/part-of: unified-insurance-platform
  app.kubernetes.io/managed-by: kustomize

images:
  - name: registry.yourdomain.com/insurance/customer-portal
    newTag: latest
  - name: registry.yourdomain.com/insurance/claims-adjudication
    newTag: latest
  - name: registry.yourdomain.com/insurance/policy-workflow
    newTag: latest
  - name: registry.yourdomain.com/insurance/kyc-orchestrator
    newTag: latest
  - name: registry.yourdomain.com/insurance/fraud-detection
    newTag: latest
