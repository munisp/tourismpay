apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: insurance-platform
  labels:
    app: analytics-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "analytics-service"
        dapr.io/app-port: "8029"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: analytics-service
        image: registry.yourdomain.com/insurance/analytics-service:latest
        ports:
        - containerPort: 8029
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        env:
        - name: SERVICE_PORT
          value: "8029"
        - name: LAKEHOUSE_ENABLED
          value: "true"
        - name: ICEBERG_CATALOG_URL
          value: "http://iceberg-rest.middleware.svc.cluster.local:8181"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8029
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8029
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: insurance-platform
spec:
  selector:
    app: analytics-service
  ports:
  - port: 8029
    targetPort: 8029
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
  namespace: insurance-platform
  labels:
    app: reporting-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reporting-service
  template:
    metadata:
      labels:
        app: reporting-service
        tier: backend
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: reporting-service
        image: registry.yourdomain.com/insurance/reporting-service:latest
        ports:
        - containerPort: 8030
          name: http
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8030
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8030
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: reporting-service
  namespace: insurance-platform
spec:
  selector:
    app: reporting-service
  ports:
  - port: 8030
    targetPort: 8030
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
