apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-currency-support
  namespace: insurance-platform
  labels:
    app: multi-currency-support
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: multi-currency-support
  template:
    metadata:
      labels:
        app: multi-currency-support
        tier: backend
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: multi-currency-support
        image: registry.yourdomain.com/insurance/multi-currency-support:latest
        ports:
        - containerPort: 8031
          name: http
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8031
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8031
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: multi-currency-support
  namespace: insurance-platform
spec:
  selector:
    app: multi-currency-support
  ports:
  - port: 8031
    targetPort: 8031
    name: http
  type: ClusterIP
---
