apiVersion: apps/v1
kind: Deployment
metadata:
  name: underwriting-service
  namespace: insurance-platform
  labels:
    app: underwriting-service
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: underwriting-service
  template:
    metadata:
      labels:
        app: underwriting-service
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "underwriting-service"
        dapr.io/app-port: "8026"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: underwriting-service
        image: registry.yourdomain.com/insurance/underwriting-service:latest
        ports:
        - containerPort: 8026
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        env:
        - name: SERVICE_PORT
          value: "8026"
        - name: TEMPORAL_TASK_QUEUE
          value: "underwriting"
        - name: MCMC_ENABLED
          value: "true"
        - name: SMART_RATING_ENABLED
          value: "true"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8026
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8026
          initialDelaySeconds: 30
          periodSeconds: 5
        volumeMounts:
        - name: underwriting-models
          mountPath: /app/models
      volumes:
      - name: underwriting-models
        persistentVolumeClaim:
          claimName: underwriting-ml-models
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: underwriting-service
  namespace: insurance-platform
spec:
  selector:
    app: underwriting-service
  ports:
  - port: 8026
    targetPort: 8026
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: underwriting-ml-models
  namespace: insurance-platform
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: cinder-ssd
  resources:
    requests:
      storage: 10Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: underwriting-service-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: underwriting-service
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: underwriting-service-pdb
  namespace: insurance-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: underwriting-service
