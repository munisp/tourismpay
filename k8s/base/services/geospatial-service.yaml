apiVersion: apps/v1
kind: Deployment
metadata:
  name: geospatial-service
  namespace: insurance-platform
  labels:
    app: geospatial-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geospatial-service
  template:
    metadata:
      labels:
        app: geospatial-service
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "geospatial-service"
        dapr.io/app-port: "8009"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: geospatial-service
        image: registry.yourdomain.com/insurance/geospatial-service:latest
        ports:
        - containerPort: 8009
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        env:
        - name: SERVICE_PORT
          value: "8009"
        - name: POSTGIS_ENABLED
          value: "true"
        - name: TILE_CACHE_SIZE
          value: "1000"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8009
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8009
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: tile-cache
          mountPath: /app/cache
      volumes:
      - name: tile-cache
        emptyDir:
          sizeLimit: 5Gi
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: geospatial-service
  namespace: insurance-platform
spec:
  selector:
    app: geospatial-service
  ports:
  - port: 8009
    targetPort: 8009
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: geospatial-service-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: geospatial-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: geospatial-service-pdb
  namespace: insurance-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: geospatial-service
