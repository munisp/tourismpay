apiVersion: apps/v1
kind: Deployment
metadata:
  name: telco-integration
  namespace: insurance-platform
  labels:
    app: telco-integration
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: telco-integration
  template:
    metadata:
      labels:
        app: telco-integration
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "telco-integration"
        dapr.io/app-port: "8010"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: telco-integration
        image: registry.yourdomain.com/insurance/telco-integration:latest
        ports:
        - containerPort: 8010
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        - secretRef:
            name: telco-credentials
        env:
        - name: SERVICE_PORT
          value: "8010"
        - name: MTN_ENABLED
          value: "true"
        - name: AIRTEL_ENABLED
          value: "true"
        - name: GLO_ENABLED
          value: "true"
        - name: NINEMOBILE_ENABLED
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8010
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8010
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: telco-integration
  namespace: insurance-platform
spec:
  selector:
    app: telco-integration
  ports:
  - port: 8010
    targetPort: 8010
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: telco-integration-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: telco-integration
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: telco-integration-pdb
  namespace: insurance-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: telco-integration
