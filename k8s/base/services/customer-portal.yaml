apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-portal
  namespace: insurance-platform
  labels:
    app: customer-portal
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: customer-portal
  template:
    metadata:
      labels:
        app: customer-portal
        tier: frontend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "customer-portal"
        dapr.io/app-port: "3000"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: customer-portal
        image: registry.yourdomain.com/insurance/customer-portal:latest
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: jwt-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: customer-portal
  namespace: insurance-platform
spec:
  selector:
    app: customer-portal
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: customer-portal-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: customer-portal
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: customer-portal-pdb
  namespace: insurance-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: customer-portal
