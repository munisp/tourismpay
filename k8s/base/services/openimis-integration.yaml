---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: openimis-integration-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: openimis-integration
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
