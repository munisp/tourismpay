apiVersion: apps/v1
kind: Deployment
metadata:
  name: openimis-integration
  namespace: insurance-platform
  labels:
    app: openimis-integration
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openimis-integration
  template:
    metadata:
      labels:
        app: openimis-integration
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "openimis-integration"
        dapr.io/app-port: "8012"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: openimis-integration
        image: registry.yourdomain.com/insurance/openimis-integration:latest
        ports:
        - containerPort: 8012
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        env:
        - name: SERVICE_PORT
          value: "8012"
        - name: OPENIMIS_URL
          value: "http://openimis.insurance-platform.svc.cluster.local:8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8012
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8012
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: openimis-integration
  namespace: insurance-platform
spec:
  selector:
    app: openimis-integration
  ports:
  - port: 8012
    targetPort: 8012
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
