apiVersion: apps/v1
kind: Deployment
metadata:
  name: broker-api
  namespace: insurance-platform
  labels:
    app: broker-api
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: broker-api
  template:
    metadata:
      labels:
        app: broker-api
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "broker-api"
        dapr.io/app-port: "8025"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: broker-api
        image: registry.yourdomain.com/insurance/broker-api:latest
        ports:
        - containerPort: 8025
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        - secretRef:
            name: jwt-secret
        env:
        - name: SERVICE_PORT
          value: "8025"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8025
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8025
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: broker-api
  namespace: insurance-platform
spec:
  selector:
    app: broker-api
  ports:
  - port: 8025
    targetPort: 8025
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: broker-api-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: broker-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: broker-api-pdb
  namespace: insurance-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: broker-api
