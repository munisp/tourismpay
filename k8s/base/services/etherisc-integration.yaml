---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: etherisc-gif-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: etherisc-gif
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
