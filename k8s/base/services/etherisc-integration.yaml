apiVersion: apps/v1
kind: Deployment
metadata:
  name: etherisc-gif
  namespace: insurance-platform
  labels:
    app: etherisc-gif
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: etherisc-gif
  template:
    metadata:
      labels:
        app: etherisc-gif
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "etherisc-gif"
        dapr.io/app-port: "8022"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: etherisc-gif
        image: registry.yourdomain.com/insurance/etherisc-gif:latest
        ports:
        - containerPort: 8022
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        env:
        - name: SERVICE_PORT
          value: "8022"
        - name: BLOCKCHAIN_NETWORK
          value: "polygon"
        - name: PARAMETRIC_ENABLED
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8022
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8022
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: etherisc-gif
  namespace: insurance-platform
spec:
  selector:
    app: etherisc-gif
  ports:
  - port: 8022
    targetPort: 8022
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
