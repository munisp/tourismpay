apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
  namespace: insurance-platform
  labels:
    app: document-service
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: document-service
  template:
    metadata:
      labels:
        app: document-service
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "document-service"
        dapr.io/app-port: "8027"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: document-service
        image: registry.yourdomain.com/insurance/document-service:latest
        ports:
        - containerPort: 8027
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        - secretRef:
            name: swift-credentials
        env:
        - name: SERVICE_PORT
          value: "8027"
        - name: SWIFT_CONTAINER
          value: "insurance-documents"
        - name: OCR_ENABLED
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8027
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8027
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: document-service
  namespace: insurance-platform
spec:
  selector:
    app: document-service
  ports:
  - port: 8027
    targetPort: 8027
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: document-service-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: document-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: document-service-pdb
  namespace: insurance-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: document-service
