apiVersion: apps/v1
kind: Deployment
metadata:
  name: erpnext-integration
  namespace: insurance-platform
  labels:
    app: erpnext-integration
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: erpnext-integration
  template:
    metadata:
      labels:
        app: erpnext-integration
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "erpnext-integration"
        dapr.io/app-port: "8011"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: erpnext-integration
        image: registry.yourdomain.com/insurance/erpnext-integration:latest
        ports:
        - containerPort: 8011
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        env:
        - name: SERVICE_PORT
          value: "8011"
        - name: ERPNEXT_URL
          value: "http://erpnext.insurance-platform.svc.cluster.local:8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8011
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8011
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: erpnext-integration
  namespace: insurance-platform
spec:
  selector:
    app: erpnext-integration
  ports:
  - port: 8011
    targetPort: 8011
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: erpnext-integration-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: erpnext-integration
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
