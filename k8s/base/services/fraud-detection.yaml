apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection
  namespace: insurance-platform
  labels:
    app: fraud-detection
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fraud-detection
  template:
    metadata:
      labels:
        app: fraud-detection
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "fraud-detection"
        dapr.io/app-port: "8007"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: fraud-detection
        image: registry.yourdomain.com/insurance/fraud-detection:latest
        ports:
        - containerPort: 8007
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        env:
        - name: SERVICE_PORT
          value: "8007"
        - name: GNN_MODEL_PATH
          value: "/app/models/gnn"
        - name: MCMC_ENABLED
          value: "true"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8007
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8007
          initialDelaySeconds: 30
          periodSeconds: 5
        volumeMounts:
        - name: fraud-models
          mountPath: /app/models
      volumes:
      - name: fraud-models
        persistentVolumeClaim:
          claimName: fraud-ml-models
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection
  namespace: insurance-platform
spec:
  selector:
    app: fraud-detection
  ports:
  - port: 8007
    targetPort: 8007
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fraud-ml-models
  namespace: insurance-platform
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: cinder-ssd
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cross-company-fraud
  namespace: insurance-platform
  labels:
    app: cross-company-fraud
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cross-company-fraud
  template:
    metadata:
      labels:
        app: cross-company-fraud
        tier: backend
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: cross-company-fraud
        image: registry.yourdomain.com/insurance/cross-company-fraud:latest
        ports:
        - containerPort: 8017
          name: http
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8017
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8017
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: cross-company-fraud
  namespace: insurance-platform
spec:
  selector:
    app: cross-company-fraud
  ports:
  - port: 8017
    targetPort: 8017
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fraud-detection-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fraud-detection
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fraud-detection-pdb
  namespace: insurance-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: fraud-detection
