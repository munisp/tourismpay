apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-workflow
  namespace: insurance-platform
  labels:
    app: policy-workflow
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: policy-workflow
  template:
    metadata:
      labels:
        app: policy-workflow
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "policy-workflow"
        dapr.io/app-port: "8002"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: policy-workflow
        image: registry.yourdomain.com/insurance/policy-workflow:latest
        ports:
        - containerPort: 8002
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        - secretRef:
            name: jwt-secret
        env:
        - name: SERVICE_PORT
          value: "8002"
        - name: TEMPORAL_TASK_QUEUE
          value: "policy-workflow"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: policy-workflow
  namespace: insurance-platform
spec:
  selector:
    app: policy-workflow
  ports:
  - port: 8002
    targetPort: 8002
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: policy-workflow-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: policy-workflow
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: policy-workflow-pdb
  namespace: insurance-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: policy-workflow
