apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: insurance-platform
  labels:
    app: payment-service
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "payment-service"
        dapr.io/app-port: "8020"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: payment-service
        image: registry.yourdomain.com/insurance/payment-service:latest
        ports:
        - containerPort: 8020
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        - secretRef:
            name: payment-credentials
        env:
        - name: SERVICE_PORT
          value: "8020"
        - name: TIGERBEETLE_ENABLED
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8020
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8020
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: insurance-platform
spec:
  selector:
    app: payment-service
  ports:
  - port: 8020
    targetPort: 8020
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-money-service
  namespace: insurance-platform
  labels:
    app: mobile-money-service
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mobile-money-service
  template:
    metadata:
      labels:
        app: mobile-money-service
        tier: backend
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: mobile-money-service
        image: registry.yourdomain.com/insurance/mobile-money-service:latest
        ports:
        - containerPort: 8021
          name: http
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        - secretRef:
            name: payment-credentials
        - secretRef:
            name: telco-credentials
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8021
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8021
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: mobile-money-service
  namespace: insurance-platform
spec:
  selector:
    app: mobile-money-service
  ports:
  - port: 8021
    targetPort: 8021
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-service
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment-service-pdb
  namespace: insurance-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: payment-service
