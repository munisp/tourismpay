apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-adjudication
  namespace: insurance-platform
  labels:
    app: claims-adjudication
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: claims-adjudication
  template:
    metadata:
      labels:
        app: claims-adjudication
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "claims-adjudication"
        dapr.io/app-port: "8001"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: claims-adjudication
        image: registry.yourdomain.com/insurance/claims-adjudication:latest
        ports:
        - containerPort: 8001
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        - secretRef:
            name: jwt-secret
        env:
        - name: SERVICE_PORT
          value: "8001"
        - name: TEMPORAL_TASK_QUEUE
          value: "claims-adjudication"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: ml-models
          mountPath: /app/models
      volumes:
      - name: ml-models
        persistentVolumeClaim:
          claimName: claims-ml-models
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: claims-adjudication
  namespace: insurance-platform
spec:
  selector:
    app: claims-adjudication
  ports:
  - port: 8001
    targetPort: 8001
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claims-ml-models
  namespace: insurance-platform
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: cinder-ssd
  resources:
    requests:
      storage: 10Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: claims-adjudication-hpa
  namespace: insurance-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: claims-adjudication
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Pods
    pods:
      metric:
        name: claims_processing_queue_length
      target:
        type: AverageValue
        averageValue: "100"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: claims-adjudication-pdb
  namespace: insurance-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: claims-adjudication
