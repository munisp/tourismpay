        tier: backend
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: risk-scoring
        image: registry.yourdomain.com/insurance/risk-scoring:latest
        ports:
        - containerPort: 8006
          name: http
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
