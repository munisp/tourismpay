apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyc-orchestrator
  namespace: insurance-platform
  labels:
    app: kyc-orchestrator
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kyc-orchestrator
  template:
    metadata:
      labels:
        app: kyc-orchestrator
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "kyc-orchestrator"
        dapr.io/app-port: "8003"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: kyc-orchestrator
        image: registry.yourdomain.com/insurance/kyc-orchestrator:latest
        ports:
        - containerPort: 8003
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        - secretRef:
            name: verification-credentials
        env:
        - name: SERVICE_PORT
          value: "8003"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: kyc-orchestrator
  namespace: insurance-platform
spec:
  selector:
    app: kyc-orchestrator
  ports:
  - port: 8003
    targetPort: 8003
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liveness-detection
  namespace: insurance-platform
  labels:
    app: liveness-detection
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: liveness-detection
  template:
    metadata:
      labels:
        app: liveness-detection
        tier: backend
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: liveness-detection
        image: registry.yourdomain.com/insurance/liveness-detection:latest
        ports:
        - containerPort: 8004
          name: http
        envFrom:
        - configMapRef:
            name: platform-config
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: liveness-detection
  namespace: insurance-platform
spec:
  selector:
    app: liveness-detection
  ports:
  - port: 8004
    targetPort: 8004
    name: http
  type: ClusterIP
---
