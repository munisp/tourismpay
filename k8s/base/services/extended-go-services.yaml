# ============================================================================
# Extended Go Microservices — Kubernetes Deployments & Services
# Covers: actuarial, bancassurance, group-life, nmid, pfa, reinsurance
# ============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: actuarial-module
  namespace: insurance-platform
  labels:
    app: actuarial-module
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: actuarial-module
  template:
    metadata:
      labels:
        app: actuarial-module
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8091"
    spec:
      containers:
      - name: actuarial-module
        image: registry.insurance.example.com/actuarial-module:latest
        ports:
        - containerPort: 8091
          name: http
        env:
        - name: PORT
          value: "8091"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: url
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8091
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 8091
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: actuarial-module
  namespace: insurance-platform
spec:
  selector:
    app: actuarial-module
  ports:
  - name: http
    port: 8091
    targetPort: 8091
