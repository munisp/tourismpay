apiVersion: apps/v1
kind: Deployment
metadata:
  name: communication-service
  namespace: insurance-platform
  labels:
    app: communication-service
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: communication-service
  template:
    metadata:
      labels:
        app: communication-service
        tier: backend
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "communication-service"
        dapr.io/app-port: "8008"
    spec:
      serviceAccountName: insurance-platform
      containers:
      - name: communication-service
        image: registry.yourdomain.com/insurance/communication-service:latest
        ports:
        - containerPort: 8008
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: db-credentials
        - secretRef:
            name: communication-credentials
        env:
        - name: SERVICE_PORT
          value: "8008"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8008
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8008
          initialDelaySeconds: 5
          periodSeconds: 5
      imagePullSecrets:
      - name: registry-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: communication-service
  namespace: insurance-platform
spec:
  selector:
    app: communication-service
  ports:
  - port: 8008
    targetPort: 8008
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
