apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: insurance-platform-ingress
  namespace: insurance-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - insurance.yourdomain.com
    - api.insurance.yourdomain.com
    secretName: insurance-tls
  rules:
  - host: insurance.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: customer-portal
            port:
              number: 3000
  - host: api.insurance.yourdomain.com
    http:
      paths:
      - path: /api/claims
        pathType: Prefix
        backend:
          service:
            name: claims-adjudication
            port:
              number: 8001
      - path: /api/policies
        pathType: Prefix
        backend:
          service:
            name: policy-workflow
            port:
              number: 8002
      - path: /api/kyc
        pathType: Prefix
        backend:
          service:
            name: kyc-orchestrator
            port:
              number: 8003
      - path: /api/fraud
        pathType: Prefix
        backend:
          service:
            name: fraud-detection
            port:
              number: 8007
      - path: /api/payments
        pathType: Prefix
        backend:
          service:
            name: payment-service
            port:
              number: 8020
      - path: /api/communications
        pathType: Prefix
        backend:
          service:
            name: communication-service
            port:
              number: 8008
      - path: /api/geospatial
        pathType: Prefix
        backend:
          service:
            name: geospatial-service
            port:
              number: 8009
      - path: /api/telco
        pathType: Prefix
        backend:
          service:
            name: telco-integration
            port:
              number: 8010
      - path: /api/documents
        pathType: Prefix
        backend:
          service:
            name: document-service
            port:
              number: 8027
      - path: /api/microinsurance
        pathType: Prefix
        backend:
          service:
            name: microinsurance-service
            port:
              number: 8028
      - path: /api/analytics
        pathType: Prefix
        backend:
          service:
            name: analytics-service
            port:
              number: 8029
      - path: /api/underwriting
        pathType: Prefix
        backend:
          service:
            name: underwriting-service
            port:
              number: 8026
      - path: /api/brokers
        pathType: Prefix
        backend:
          service:
            name: broker-api
            port:
              number: 8025
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: monitoring-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
spec:
  tls:
  - hosts:
    - grafana.yourdomain.com
    - prometheus.yourdomain.com
    - jaeger.yourdomain.com
    secretName: monitoring-tls
  rules:
  - host: grafana.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
  - host: prometheus.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
  - host: jaeger.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jaeger-query
            port:
              number: 16686
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: middleware-ingress
  namespace: middleware
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: middleware-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
spec:
  tls:
  - hosts:
    - temporal.yourdomain.com
    secretName: middleware-tls
  rules:
  - host: temporal.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: temporal-ui
            port:
              number: 8080
---
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-basic-auth
  namespace: monitoring
type: Opaque
stringData:
  auth: "admin:$apr1$CHANGE_ME_HTPASSWD_HASH"
---
apiVersion: v1
kind: Secret
metadata:
  name: middleware-basic-auth
  namespace: middleware
type: Opaque
stringData:
  auth: "admin:$apr1$CHANGE_ME_HTPASSWD_HASH"
