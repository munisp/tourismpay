apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: insurance-platform-dev

resources:
  - ../../base

namePrefix: dev-

commonLabels:
  environment: development

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
    target:
      kind: HorizontalPodAutoscaler

configMapGenerator:
  - name: platform-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - GO_ENV=development
      - PYTHON_ENV=development
      - LOG_LEVEL=debug

secretGenerator:
  - name: db-credentials
    behavior: merge
    literals:
      - POSTGRES_USER=dev_user
      - POSTGRES_PASSWORD=dev_password
      - DATABASE_URL=postgresql://dev_user:dev_password@postgresql-dev:5432/insurance_dev

images:
  - name: registry.yourdomain.com/insurance/customer-portal
    newTag: dev
  - name: registry.yourdomain.com/insurance/claims-adjudication
    newTag: dev
