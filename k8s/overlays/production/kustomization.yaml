apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: insurance-platform

resources:
  - ../../base
  - ../../../k8s/middleware/kafka.yaml
  - ../../../k8s/middleware/redis.yaml
  - ../../../k8s/middleware/temporal.yaml
  - ../../../k8s/middleware/tigerbeetle.yaml
  - ../../../k8s/middleware/iceberg-lakehouse.yaml
  - ../../../k8s/middleware/dapr.yaml
  - ../../../k8s/middleware/fluvio.yaml
  - ../../../k8s/middleware/postgresql.yaml
  - ../../../k8s/monitoring/prometheus.yaml
  - ../../../k8s/monitoring/grafana.yaml
  - ../../../k8s/monitoring/jaeger.yaml
  - ../../../k8s/monitoring/loki.yaml
  - ../../../k8s/ingress/ingress.yaml

commonLabels:
  environment: production

configMapGenerator:
  - name: platform-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - GO_ENV=production
      - PYTHON_ENV=production
      - LOG_LEVEL=warn

replicas:
  - name: customer-portal
    count: 3
  - name: claims-adjudication
    count: 3
  - name: policy-workflow
    count: 3
  - name: kyc-orchestrator
    count: 3
  - name: fraud-detection
    count: 3
  - name: payment-service
    count: 3
  - name: communication-service
    count: 3

images:
  - name: registry.yourdomain.com/insurance/customer-portal
    newTag: v1.0.0
  - name: registry.yourdomain.com/insurance/claims-adjudication
    newTag: v1.0.0
  - name: registry.yourdomain.com/insurance/policy-workflow
    newTag: v1.0.0
  - name: registry.yourdomain.com/insurance/kyc-orchestrator
    newTag: v1.0.0
  - name: registry.yourdomain.com/insurance/fraud-detection
    newTag: v1.0.0
  - name: registry.yourdomain.com/insurance/payment-service
    newTag: v1.0.0
