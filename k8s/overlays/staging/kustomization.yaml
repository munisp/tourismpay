apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: insurance-platform-staging

resources:
  - ../../base

namePrefix: staging-

commonLabels:
  environment: staging

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5
    target:
      kind: HorizontalPodAutoscaler

configMapGenerator:
  - name: platform-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - GO_ENV=staging
      - PYTHON_ENV=staging
      - LOG_LEVEL=info

images:
  - name: registry.yourdomain.com/insurance/customer-portal
    newTag: staging
  - name: registry.yourdomain.com/insurance/claims-adjudication
    newTag: staging
