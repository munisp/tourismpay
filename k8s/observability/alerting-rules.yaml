---
# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Alerting Rules — TourismPay
#
# Categories:
#   1. Pod lifecycle (restarts, OOMKill, CrashLoopBackOff)
#   2. Service health (down, high error rate, high latency)
#   3. Panic/exception recovery (Go/Rust/Python crash events)
#   4. KEDA scaling (stuck at max, unable to scale)
#   5. Middleware health (Kafka, Redis, PostgreSQL, OpenSearch)
#   6. Business (settlement failures, fraud spikes)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: tourismpay
data:
  pod-lifecycle.yml: |
    groups:
      - name: pod-lifecycle
        interval: 30s
        rules:
          # Pod restarting frequently (CrashLoopBackOff or OOMKill)
          - alert: PodRestartingFrequently
            expr: increase(kube_pod_container_status_restarts_total{namespace="tourismpay"}[1h]) > 3
            for: 5m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "Pod {{ $labels.pod }} has restarted {{ $value }} times in 1h"
              runbook: "1. Check pod logs: kubectl logs {{ $labels.pod }} -n tourismpay --previous  2. Check OOM: kubectl describe pod {{ $labels.pod }} -n tourismpay | grep -A5 'Last State'  3. Check resource limits in deployment"

          # Pod killed by OOM
          - alert: PodOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{namespace="tourismpay", reason="OOMKilled"} == 1
            for: 0m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "Pod {{ $labels.pod }} was OOM killed"
              runbook: "1. Increase memory limits in k8s/base/deployments.yaml  2. Check for memory leaks: review recent code changes  3. Profile with pprof (Go) or py-spy (Python)"

          # Pod not ready for extended period
          - alert: PodNotReady
            expr: kube_pod_status_ready{namespace="tourismpay", condition="true"} == 0
            for: 10m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "Pod {{ $labels.pod }} not ready for 10m"
              runbook: "1. Check readiness probe: kubectl describe pod {{ $labels.pod }} -n tourismpay  2. Check dependencies (DB, Redis, Kafka)  3. Check application logs"

  service-health.yml: |
    groups:
      - name: service-health
        interval: 30s
        rules:
          # Service completely down
          - alert: ServiceDown
            expr: up{job=~"tourismpay-server|settlement-service|kyc-service|bis-ai-service|fraud-ml-service"} == 0
            for: 2m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "{{ $labels.job }} is DOWN"
              runbook: "1. kubectl get pods -n tourismpay -l app.kubernetes.io/name={{ $labels.job }}  2. Check deployment: kubectl rollout status deployment/{{ $labels.job }} -n tourismpay  3. Check events: kubectl get events -n tourismpay --sort-by=.lastTimestamp"

          # High error rate (>5% of requests are 5xx)
          - alert: HighErrorRate
            expr: |
              (
                sum(rate(tourismpay_http_requests_total{status=~"5.."}[5m])) by (service)
                / sum(rate(tourismpay_http_requests_total[5m])) by (service)
              ) > 0.05
            for: 5m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "{{ $labels.service }} error rate is {{ $value | humanizePercentage }}"
              runbook: "1. Check error logs in OpenSearch: service={{ $labels.service }} AND level=ERROR  2. Check recent deployments  3. Check downstream dependencies"

          # High latency (p95 > 2s)
          - alert: HighLatency
            expr: |
              histogram_quantile(0.95, sum(rate(tourismpay_http_request_duration_ms_bucket[5m])) by (le, service)) > 2000
            for: 10m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "{{ $labels.service }} p95 latency is {{ $value }}ms"
              runbook: "1. Check Jaeger for slow traces  2. Check DB query latency  3. Check Redis cache hit rate  4. Check for connection pool exhaustion"

  panic-recovery.yml: |
    groups:
      - name: panic-recovery
        interval: 15s
        rules:
          # Go service panic recovered
          - alert: GoPanicRecovered
            expr: increase(settlement_panics_recovered_total[5m]) > 0
            for: 0m
            labels:
              severity: critical
              team: backend
            annotations:
              summary: "Go settlement service recovered from {{ $value }} panic(s)"
              runbook: "1. Search OpenSearch: service=settlement-service AND event=panic_recovered  2. Review stack trace in logs  3. Check recent code changes to settlement service"

          # Rust service panic recovered
          - alert: RustPanicRecovered
            expr: increase(kyc_panics_recovered_total[5m]) > 0
            for: 0m
            labels:
              severity: critical
              team: backend
            annotations:
              summary: "Rust KYC service recovered from {{ $value }} panic(s)"
              runbook: "1. Search OpenSearch: service=kyc-service AND event=panic_recovered  2. Review backtrace in logs  3. Check for unwrap() on None/Err in recent changes"

          # Python unhandled exception
          - alert: PythonExceptionRecovered
            expr: increase(python_exceptions_recovered_total[5m]) > 0
            for: 0m
            labels:
              severity: warning
              team: ml
            annotations:
              summary: "Python ML service had {{ $value }} unhandled exception(s)"
              runbook: "1. Search OpenSearch: service=python-ml AND event=unhandled_exception  2. Review traceback in logs  3. Check ML model loading and data pipeline"

  keda-scaling.yml: |
    groups:
      - name: keda-scaling
        interval: 60s
        rules:
          # Service stuck at max replicas (potential capacity issue)
          - alert: KEDAMaxReplicasReached
            expr: |
              kube_deployment_status_replicas{namespace="tourismpay"}
              == on(deployment) group_left
              kube_deployment_spec_replicas{namespace="tourismpay"}
              and
              kube_deployment_spec_replicas{namespace="tourismpay"} >= 8
            for: 30m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "{{ $labels.deployment }} at max replicas for 30m — may need capacity increase"
              runbook: "1. Check KEDA ScaledObject limits  2. Review Kafka consumer lag  3. Check if workload is legitimate or attack"

          # Kafka consumer lag growing (KEDA trigger)
          - alert: KafkaConsumerLagHigh
            expr: kafka_consumergroup_lag{topic=~"tourismpay.*"} > 1000
            for: 10m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "Kafka lag for {{ $labels.consumergroup }}/{{ $labels.topic }} is {{ $value }}"
              runbook: "1. Check consumer pod health  2. Check KEDA ScaledObject status  3. Consider increasing partition count"

  middleware-health.yml: |
    groups:
      - name: middleware-health
        interval: 30s
        rules:
          - alert: RedisDown
            expr: up{job="redis"} == 0
            for: 2m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "Redis is DOWN — wallet rate limits, session cache, GDS cache affected"
              runbook: "1. kubectl get pods -n tourismpay -l app=redis  2. Check Redis Sentinel/Cluster status  3. Check disk space on Redis PVC"

          - alert: KafkaDown
            expr: up{job="kafka"} == 0
            for: 2m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "Kafka is DOWN — event streaming, settlement, fraud scoring affected"
              runbook: "1. Check Kafka broker status  2. Check KRaft controller quorum  3. Review Kafka disk usage"

          - alert: PostgreSQLDown
            expr: up{job="postgres"} == 0
            for: 1m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "PostgreSQL is DOWN — all services affected"
              runbook: "1. Check PG pod status  2. Check PVC disk space  3. Review connection pool (max_connections)"

          - alert: OpenSearchDown
            expr: up{job="opensearch"} == 0
            for: 5m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "OpenSearch is DOWN — search, logs, and GDS discovery affected"

          - alert: PostgreSQLConnectionPoolExhausted
            expr: pg_stat_activity_count{datname="tourismpay"} / pg_settings_max_connections > 0.85
            for: 5m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "PostgreSQL connection pool >85% utilized"

  business-alerts.yml: |
    groups:
      - name: business-alerts
        interval: 60s
        rules:
          - alert: SettlementFailureSpike
            expr: increase(tourismpay_payment_attempts_total{status="failed"}[15m]) > 10
            for: 5m
            labels:
              severity: critical
              team: finance
            annotations:
              summary: "{{ $value }} settlement failures in last 15m"
              runbook: "1. Check TigerBeetle ledger status  2. Check Mojaloop hub connectivity  3. Review failed corridor-specific transfers"

          - alert: FraudScoreSpike
            expr: |
              histogram_quantile(0.90, rate(tourismpay_fraud_score_distribution_bucket[30m])) > 75
            for: 15m
            labels:
              severity: warning
              team: security
            annotations:
              summary: "90th percentile fraud score spiked above 75 — potential attack"
              runbook: "1. Review fraud alerts in admin panel  2. Check geographic distribution  3. Consider enabling kill switch for affected corridor"

---
# ─── Alertmanager ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: tourismpay
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by: [alertname, severity, team]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: critical-slack
          continue: true
        - match:
            team: finance
          receiver: finance-slack
        - match:
            team: security
          receiver: security-slack

    receivers:
      - name: default
        webhook_configs:
          - url: http://tourismpay-server:3000/api/v1/webhooks/alerts
      - name: critical-slack
        slack_configs:
          - api_url_file: /etc/alertmanager/slack-critical-webhook
            channel: '#tourismpay-alerts-critical'
            title: '{{ .CommonAnnotations.summary }}'
            text: '{{ .CommonAnnotations.runbook }}'
      - name: finance-slack
        slack_configs:
          - api_url_file: /etc/alertmanager/slack-finance-webhook
            channel: '#tourismpay-finance'
      - name: security-slack
        slack_configs:
          - api_url_file: /etc/alertmanager/slack-security-webhook
            channel: '#tourismpay-security'

---
# ─── K8s Event Exporter — forwards pod lifecycle events to OpenSearch ─────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-event-exporter
  namespace: tourismpay
  labels:
    app.kubernetes.io/name: k8s-event-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-event-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-event-exporter
    spec:
      serviceAccountName: k8s-event-exporter
      containers:
        - name: exporter
          image: ghcr.io/resmoio/kubernetes-event-exporter:v1.7
          args: ["--conf=/etc/config/config.yaml"]
          volumeMounts:
            - name: config
              mountPath: /etc/config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: event-exporter-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: event-exporter-config
  namespace: tourismpay
data:
  config.yaml: |
    logLevel: info
    logFormat: json
    route:
      routes:
        # Forward pod lifecycle events (restarts, OOM, probe failures)
        - match:
            - receiver: opensearch
              namespace: tourismpay
              reason: "Killing|OOMKilled|BackOff|Unhealthy|FailedScheduling|FailedMount"
        # Forward KEDA scaling events
        - match:
            - receiver: opensearch
              namespace: tourismpay
              involvedObject.kind: ScaledObject
    receivers:
      - name: opensearch
        opensearch:
          hosts:
            - http://opensearch:9200
          index: tourismpay-k8s-events
          useEventID: true

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-event-exporter
  namespace: tourismpay

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-event-exporter
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get]

---
# ─── Stablecoin On-Ramp/Off-Ramp Alerting Rules ───────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: stablecoin-ramp-alerts
  namespace: tourismpay
  labels:
    app: tourismpay
    component: stablecoin
spec:
  groups:
    - name: stablecoin.onramp
      rules:
        - alert: OnrampFailureRateHigh
          expr: |
            rate(tourismpay_onramp_orders_total{status="failed"}[5m])
            / rate(tourismpay_onramp_orders_total[5m]) > 0.1
          for: 5m
          labels:
            severity: critical
            team: payments
          annotations:
            summary: "On-ramp failure rate > 10%"
            description: "{{ $labels.rail }} rail has {{ $value | humanizePercentage }} failure rate"
            runbook: "Check payment provider status; review failed order logs in OpenSearch"

        - alert: OnrampVolumeSpike
          expr: |
            rate(tourismpay_onramp_volume_usd_total[5m]) > 10000
          for: 10m
          labels:
            severity: warning
            team: payments
          annotations:
            summary: "On-ramp volume spike > $10K/5min"
            description: "Rail {{ $labels.rail }}: {{ $value | humanize }}/s USD volume"

    - name: stablecoin.offramp
      rules:
        - alert: OfframpFailureRateHigh
          expr: |
            rate(tourismpay_offramp_requests_total{status=~"failed|rejected_velocity"}[5m])
            / rate(tourismpay_offramp_requests_total[5m]) > 0.1
          for: 5m
          labels:
            severity: critical
            team: payments
          annotations:
            summary: "Off-ramp failure rate > 10%"
            description: "{{ $labels.rail }} rail has {{ $value | humanizePercentage }} failure rate"
            runbook: "Check payout provider status; verify velocity limits; review rejected requests"

        - alert: OfframpVelocityLimitBreach
          expr: rate(tourismpay_offramp_velocity_limit_hits_total[5m]) > 5
          for: 5m
          labels:
            severity: warning
            team: compliance
          annotations:
            summary: "Off-ramp velocity limit hits > 5/5min"
            description: "Users hitting daily $5K off-ramp cap frequently — possible abuse or limit too low"

    - name: stablecoin.fees
      rules:
        - alert: RampFeesAbnormal
          expr: |
            rate(tourismpay_ramp_fees_usd_total{direction="onramp"}[1h])
            / rate(tourismpay_onramp_volume_usd_total[1h]) > 0.05
          for: 15m
          labels:
            severity: warning
            team: payments
          annotations:
            summary: "Effective on-ramp fee ratio > 5%"
            description: "Rail {{ $labels.rail }}: effective fee {{ $value | humanizePercentage }}"

    - name: stablecoin.yield
      rules:
        - alert: YieldPositionsExcessive
          expr: tourismpay_yield_total_deposited_usd > 1000000
          for: 5m
          labels:
            severity: warning
            team: treasury
          annotations:
            summary: "Total yield deposits > $1M"
            description: "Current total: ${{ $value | humanize }}"

    - name: stablecoin.latency
      rules:
        - alert: RampProcessingLatencyHigh
          expr: |
            histogram_quantile(0.95, rate(tourismpay_ramp_duration_seconds_bucket[5m])) > 30
          for: 5m
          labels:
            severity: critical
            team: payments
          annotations:
            summary: "P95 ramp processing > 30s"
            description: "{{ $labels.direction }} via {{ $labels.rail }}: p95 = {{ $value | humanize }}s"
            runbook: "Check payment provider response times; scale pods if needed"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-event-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-event-exporter
subjects:
  - kind: ServiceAccount
    name: k8s-event-exporter
    namespace: tourismpay
