  replicas: 2
  selector:
    matchLabels:
      app: temporal
      component: worker
  template:
    metadata:
      labels:
        app: temporal
        component: worker
    spec:
      containers:
      - name: temporal-worker
        image: temporalio/server:1.22.4
        ports:
        - containerPort: 7239
