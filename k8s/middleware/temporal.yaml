apiVersion: v1
kind: Namespace
metadata:
  name: temporal
  labels:
    app.kubernetes.io/name: temporal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-frontend
  namespace: middleware
  labels:
    app: temporal
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: temporal
      component: frontend
  template:
    metadata:
      labels:
        app: temporal
        component: frontend
    spec:
      containers:
      - name: temporal-frontend
        image: temporalio/server:1.22.4
        ports:
        - containerPort: 7233
          name: grpc
        - containerPort: 6933
          name: membership
        env:
        - name: SERVICES
          value: frontend
        - name: DB
          value: postgresql
        - name: DB_PORT
          value: "5432"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: temporal-db-credentials
              key: username
        - name: POSTGRES_PWD
          valueFrom:
            secretKeyRef:
              name: temporal-db-credentials
              key: password
        - name: POSTGRES_SEEDS
          value: postgresql-ha-pgpool.insurance-platform.svc.cluster.local
        - name: DYNAMIC_CONFIG_FILE_PATH
          value: /etc/temporal/config/dynamicconfig/development-sql.yaml
        - name: ENABLE_ES
          value: "false"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: dynamic-config
          mountPath: /etc/temporal/config/dynamicconfig
        livenessProbe:
          tcpSocket:
            port: 7233
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 7233
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: dynamic-config
        configMap:
          name: temporal-dynamic-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-history
  namespace: middleware
  labels:
    app: temporal
    component: history
spec:
  replicas: 3
  selector:
    matchLabels:
      app: temporal
      component: history
  template:
    metadata:
      labels:
        app: temporal
        component: history
    spec:
      containers:
      - name: temporal-history
        image: temporalio/server:1.22.4
        ports:
        - containerPort: 7234
          name: grpc
        - containerPort: 6934
          name: membership
        env:
        - name: SERVICES
          value: history
        - name: DB
          value: postgresql
        - name: DB_PORT
          value: "5432"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: temporal-db-credentials
              key: username
        - name: POSTGRES_PWD
          valueFrom:
            secretKeyRef:
              name: temporal-db-credentials
              key: password
        - name: POSTGRES_SEEDS
          value: postgresql-ha-pgpool.insurance-platform.svc.cluster.local
        - name: DYNAMIC_CONFIG_FILE_PATH
          value: /etc/temporal/config/dynamicconfig/development-sql.yaml
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
        volumeMounts:
        - name: dynamic-config
          mountPath: /etc/temporal/config/dynamicconfig
      volumes:
      - name: dynamic-config
        configMap:
          name: temporal-dynamic-config
---
