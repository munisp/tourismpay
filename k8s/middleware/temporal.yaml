---
apiVersion: v1
kind: Service
metadata:
  name: temporal-frontend
  namespace: middleware
spec:
  type: ClusterIP
  ports:
  - port: 7233
    targetPort: 7233
    name: grpc
  selector:
    app: temporal
    component: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-frontend-headless
  namespace: middleware
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 7233
    targetPort: 7233
    name: grpc
  - port: 6933
    targetPort: 6933
    name: membership
  selector:
    app: temporal
    component: frontend
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-dynamic-config
  namespace: middleware
data:
  development-sql.yaml: |
    system.forceSearchAttributesCacheRefreshOnRead:
      - value: true
    limit.maxIDLength:
      - value: 255
    history.defaultActivityRetryPolicy:
      - value:
          InitialIntervalInSeconds: 1
          MaximumIntervalCoefficient: 100.0
          BackoffCoefficient: 2.0
          MaximumAttempts: 0
    history.defaultWorkflowRetryPolicy:
      - value:
          InitialIntervalInSeconds: 1
          MaximumIntervalCoefficient: 100.0
          BackoffCoefficient: 2.0
          MaximumAttempts: 0
---
apiVersion: v1
kind: Secret
metadata:
  name: temporal-db-credentials
  namespace: middleware
type: Opaque
stringData:
  username: "temporal"
  password: "CHANGE_ME_IN_PRODUCTION"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: middleware
  labels:
    app: temporal-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      containers:
      - name: temporal-ui
        image: temporalio/ui:2.21.3
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: TEMPORAL_ADDRESS
          value: temporal-frontend:7233
        - name: TEMPORAL_CORS_ORIGINS
          value: "*"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: middleware
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: temporal-ui
