        - name: DB_PORT
          value: "5432"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: temporal-db-credentials
              key: username
        - name: POSTGRES_PWD
          valueFrom:
            secretKeyRef:
              name: temporal-db-credentials
              key: password
        - name: POSTGRES_SEEDS
          value: postgresql-ha-pgpool.insurance-platform.svc.cluster.local
        - name: DYNAMIC_CONFIG_FILE_PATH
