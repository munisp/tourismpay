apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tigerbeetle
  namespace: middleware
  labels:
    app: tigerbeetle
spec:
  serviceName: tigerbeetle
  replicas: 3
  selector:
    matchLabels:
      app: tigerbeetle
  template:
    metadata:
      labels:
        app: tigerbeetle
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: tigerbeetle
        image: ghcr.io/tigerbeetle/tigerbeetle:latest
        ports:
        - containerPort: 3000
          name: client
        command:
        - /bin/sh
        - -c
        - |
          if [ ! -f /var/lib/tigerbeetle/0_0.tigerbeetle ]; then
            tigerbeetle format --cluster=0 --replica=$((${HOSTNAME##*-})) --replica-count=3 /var/lib/tigerbeetle/0_0.tigerbeetle
          fi
          tigerbeetle start --addresses=tigerbeetle-0.tigerbeetle-headless:3000,tigerbeetle-1.tigerbeetle-headless:3000,tigerbeetle-2.tigerbeetle-headless:3000 /var/lib/tigerbeetle/0_0.tigerbeetle
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"
        volumeMounts:
        - name: data
          mountPath: /var/lib/tigerbeetle
        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: cinder-high-iops
      resources:
        requests:
          storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: tigerbeetle
  namespace: middleware
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    name: client
  selector:
    app: tigerbeetle
---
apiVersion: v1
kind: Service
metadata:
  name: tigerbeetle-headless
  namespace: middleware
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 3000
    targetPort: 3000
    name: client
  selector:
    app: tigerbeetle
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tigerbeetle-pdb
  namespace: middleware
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: tigerbeetle
