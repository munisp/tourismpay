apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest
  namespace: middleware
  labels:
    app: iceberg-rest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iceberg-rest
  template:
    metadata:
      labels:
        app: iceberg-rest
    spec:
      containers:
      - name: iceberg-rest
        image: tabulario/iceberg-rest:latest
        ports:
        - containerPort: 8181
          name: http
        env:
        - name: CATALOG_WAREHOUSE
          value: "swift://insurance-lakehouse/warehouse"
        - name: CATALOG_IO__IMPL
          value: "org.apache.iceberg.hadoop.HadoopFileIO"
        - name: CATALOG_S3_ENDPOINT
          value: "http://swift-s3-proxy.middleware.svc.cluster.local:8080"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: swift-s3-credentials
              key: access-key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: swift-s3-credentials
              key: secret-key
        - name: AWS_REGION
          value: "us-east-1"
        - name: CATALOG_S3_PATH__STYLE__ACCESS
          value: "true"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
        livenessProbe:
          httpGet:
            path: /v1/config
            port: 8181
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/config
            port: 8181
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest
  namespace: middleware
spec:
  type: ClusterIP
  ports:
  - port: 8181
    targetPort: 8181
    name: http
  selector:
    app: iceberg-rest
---
apiVersion: v1
kind: Secret
metadata:
  name: swift-s3-credentials
  namespace: middleware
type: Opaque
stringData:
  access-key: "CHANGE_ME_IN_PRODUCTION"
  secret-key: "CHANGE_ME_IN_PRODUCTION"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino
  namespace: middleware
  labels:
    app: trino
    component: coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trino
      component: coordinator
  template:
    metadata:
      labels:
        app: trino
        component: coordinator
    spec:
      containers:
      - name: trino
        image: trinodb/trino:435
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: TRINO_ENVIRONMENT
          value: production
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        volumeMounts:
        - name: config
          mountPath: /etc/trino
        - name: catalog
          mountPath: /etc/trino/catalog
        livenessProbe:
          httpGet:
            path: /v1/info
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/info
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: trino-config
      - name: catalog
        configMap:
          name: trino-catalog
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino-worker
  namespace: middleware
  labels:
    app: trino
    component: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: trino
      component: worker
  template:
    metadata:
      labels:
        app: trino
        component: worker
    spec:
      containers:
      - name: trino
        image: trinodb/trino:435
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: TRINO_ENVIRONMENT
          value: production
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        volumeMounts:
        - name: config
          mountPath: /etc/trino
        - name: catalog
          mountPath: /etc/trino/catalog
      volumes:
      - name: config
        configMap:
          name: trino-worker-config
      - name: catalog
        configMap:
          name: trino-catalog
---
apiVersion: v1
kind: Service
metadata:
  name: trino
  namespace: middleware
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: trino
    component: coordinator
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-config
  namespace: middleware
data:
  config.properties: |
    coordinator=true
    node-scheduler.include-coordinator=false
    http-server.http.port=8080
    query.max-memory=5GB
    query.max-memory-per-node=1GB
    discovery.uri=http://trino:8080
  jvm.config: |
    -server
    -Xmx6G
    -XX:+UseG1GC
    -XX:G1HeapRegionSize=32M
    -XX:+UseGCOverheadLimit
    -XX:+ExplicitGCInvokesConcurrent
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:+ExitOnOutOfMemoryError
    -Djdk.attach.allowAttachSelf=true
  node.properties: |
    node.environment=production
    node.data-dir=/data/trino
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-worker-config
  namespace: middleware
data:
  config.properties: |
    coordinator=false
    http-server.http.port=8080
    query.max-memory=5GB
    query.max-memory-per-node=1GB
    discovery.uri=http://trino:8080
  jvm.config: |
    -server
    -Xmx6G
    -XX:+UseG1GC
    -XX:G1HeapRegionSize=32M
    -XX:+UseGCOverheadLimit
    -XX:+ExplicitGCInvokesConcurrent
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:+ExitOnOutOfMemoryError
    -Djdk.attach.allowAttachSelf=true
  node.properties: |
    node.environment=production
    node.data-dir=/data/trino
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trino-catalog
  namespace: middleware
data:
  iceberg.properties: |
    connector.name=iceberg
    iceberg.catalog.type=rest
    iceberg.rest-catalog.uri=http://iceberg-rest:8181
    iceberg.rest-catalog.warehouse=insurance-lakehouse
  postgresql.properties: |
    connector.name=postgresql
    connection-url=jdbc:postgresql://postgresql-ha-pgpool.insurance-platform.svc.cluster.local:5432/insurance
    connection-user=${ENV:POSTGRES_USER}
    connection-password=${ENV:POSTGRES_PASSWORD}
