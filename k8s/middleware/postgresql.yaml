apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-ha
  namespace: insurance-platform
  labels:
    app: postgresql-ha
spec:
  serviceName: postgresql-ha
  replicas: 3
  selector:
    matchLabels:
      app: postgresql-ha
  template:
    metadata:
      labels:
        app: postgresql-ha
    spec:
      containers:
      - name: postgresql
        image: bitnami/postgresql-repmgr:16
        ports:
        - containerPort: 5432
          name: postgresql
        env:
        - name: POSTGRESQL_POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: postgres-password
        - name: POSTGRESQL_USERNAME
          value: insurance_admin
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: password
        - name: POSTGRESQL_DATABASE
          value: insurance
        - name: REPMGR_USERNAME
          value: repmgr
        - name: REPMGR_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: repmgr-password
        - name: REPMGR_PRIMARY_HOST
          value: postgresql-ha-0.postgresql-ha
        - name: REPMGR_PARTNER_NODES
          value: postgresql-ha-0.postgresql-ha,postgresql-ha-1.postgresql-ha,postgresql-ha-2.postgresql-ha
        - name: REPMGR_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: REPMGR_NODE_NETWORK_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
        volumeMounts:
        - name: data
          mountPath: /bitnami/postgresql
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U insurance_admin -d insurance
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U insurance_admin -d insurance
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: cinder-ssd
      resources:
        requests:
          storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql-ha-pgpool
  namespace: insurance-platform
  labels:
    app: postgresql-ha-pgpool
spec:
  replicas: 2
  selector:
    matchLabels:
      app: postgresql-ha-pgpool
  template:
    metadata:
      labels:
        app: postgresql-ha-pgpool
    spec:
      containers:
      - name: pgpool
        image: bitnami/pgpool:4
        ports:
        - containerPort: 5432
          name: postgresql
        env:
        - name: PGPOOL_BACKEND_NODES
          value: "0:postgresql-ha-0.postgresql-ha:5432,1:postgresql-ha-1.postgresql-ha:5432,2:postgresql-ha-2.postgresql-ha:5432"
        - name: PGPOOL_SR_CHECK_USER
          value: repmgr
        - name: PGPOOL_SR_CHECK_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: repmgr-password
        - name: PGPOOL_ENABLE_LDAP
          value: "no"
        - name: PGPOOL_POSTGRES_USERNAME
          value: insurance_admin
        - name: PGPOOL_POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: password
        - name: PGPOOL_ADMIN_USERNAME
          value: admin
        - name: PGPOOL_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: admin-password
        - name: PGPOOL_ENABLE_LOAD_BALANCING
          value: "yes"
        - name: PGPOOL_NUM_INIT_CHILDREN
          value: "32"
        - name: PGPOOL_MAX_POOL
          value: "4"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - PGPASSWORD=$PGPOOL_POSTGRES_PASSWORD psql -U insurance_admin -d insurance -c "SELECT 1"
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - PGPASSWORD=$PGPOOL_POSTGRES_PASSWORD psql -U insurance_admin -d insurance -c "SELECT 1"
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-ha
  namespace: insurance-platform
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 5432
    targetPort: 5432
    name: postgresql
  selector:
    app: postgresql-ha
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-ha-pgpool
  namespace: insurance-platform
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    name: postgresql
  selector:
    app: postgresql-ha-pgpool
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: insurance-platform
type: Opaque
stringData:
  postgres-password: "CHANGE_ME_IN_PRODUCTION"
  password: "CHANGE_ME_IN_PRODUCTION"
  repmgr-password: "CHANGE_ME_IN_PRODUCTION"
  admin-password: "CHANGE_ME_IN_PRODUCTION"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgresql-ha-pdb
  namespace: insurance-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: postgresql-ha
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgresql-backup
  namespace: insurance-platform
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: bitnami/postgresql:16
            command:
            - /bin/sh
            - -c
            - |
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              pg_dump -h postgresql-ha-pgpool -U insurance_admin -d insurance | gzip > /backup/insurance_${TIMESTAMP}.sql.gz
              # Upload to Swift
              swift upload insurance-backups /backup/insurance_${TIMESTAMP}.sql.gz
              # Keep only last 7 days locally
              find /backup -name "*.sql.gz" -mtime +7 -delete
            env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
            - name: OS_AUTH_URL
              valueFrom:
                secretKeyRef:
                  name: swift-credentials
                  key: auth-url
            - name: OS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: swift-credentials
                  key: username
            - name: OS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: swift-credentials
                  key: password
            - name: OS_PROJECT_NAME
              value: insurance-platform
            volumeMounts:
            - name: backup
              mountPath: /backup
          volumes:
          - name: backup
            persistentVolumeClaim:
              claimName: postgresql-backup
          restartPolicy: OnFailure
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-backup
  namespace: insurance-platform
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: cinder-standard
  resources:
    requests:
      storage: 50Gi
