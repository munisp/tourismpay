apiVersion: v1
kind: Namespace
metadata:
  name: dapr-system
  labels:
    app.kubernetes.io/name: dapr
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dapr-config
  namespace: insurance-platform
data:
  config.yaml: |
    apiVersion: dapr.io/v1alpha1
    kind: Configuration
    metadata:
      name: insurance-config
    spec:
      tracing:
        samplingRate: "1"
        zipkin:
          endpointAddress: http://jaeger-collector.monitoring.svc.cluster.local:9411/api/v2/spans
      metric:
        enabled: true
      mtls:
        enabled: true
      accessControl:
        defaultAction: allow
        trustDomain: "insurance-platform"
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: insurance-platform
spec:
  type: state.redis
  version: v1
  metadata:
  - name: redisHost
    value: redis-cluster.middleware.svc.cluster.local:6379
  - name: redisPassword
    secretKeyRef:
      name: redis-credentials
      key: password
  - name: enableTLS
    value: "false"
  - name: actorStateStore
    value: "true"
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
  namespace: insurance-platform
spec:
  type: pubsub.kafka
  version: v1
  metadata:
  - name: brokers
    value: insurance-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
  - name: consumerGroup
    value: insurance-platform
  - name: authType
    value: none
  - name: maxMessageBytes
    value: "1048576"
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: secretstore
  namespace: insurance-platform
spec:
  type: secretstores.kubernetes
  version: v1
  metadata: []
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: binding-swift
  namespace: insurance-platform
spec:
  type: bindings.aws.s3
  version: v1
  metadata:
  - name: bucket
    value: insurance-documents
  - name: region
    value: us-east-1
  - name: endpoint
    value: http://swift-s3-proxy.middleware.svc.cluster.local:8080
  - name: accessKey
    secretKeyRef:
      name: swift-s3-credentials
      key: access-key
  - name: secretKey
    secretKeyRef:
      name: swift-s3-credentials
      key: secret-key
  - name: forcePathStyle
    value: "true"
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: cron
  namespace: insurance-platform
spec:
  type: bindings.cron
  version: v1
  metadata:
  - name: schedule
    value: "@every 1h"
---
apiVersion: dapr.io/v1alpha1
kind: Subscription
metadata:
  name: claims-subscription
  namespace: insurance-platform
spec:
  pubsubname: pubsub
  topic: claims-events
  route: /claims/events
  scopes:
  - claims-adjudication
  - fraud-detection
---
apiVersion: dapr.io/v1alpha1
kind: Subscription
metadata:
  name: policy-subscription
  namespace: insurance-platform
spec:
  pubsubname: pubsub
  topic: policy-events
  route: /policy/events
  scopes:
  - policy-workflow
  - underwriting-service
  - communication-service
---
apiVersion: dapr.io/v1alpha1
kind: Subscription
metadata:
  name: payment-subscription
  namespace: insurance-platform
spec:
  pubsubname: pubsub
  topic: payment-events
  route: /payment/events
  scopes:
  - payment-service
  - analytics-service
---
apiVersion: dapr.io/v1alpha1
kind: Subscription
metadata:
  name: kyc-subscription
  namespace: insurance-platform
spec:
  pubsubname: pubsub
  topic: kyc-events
  route: /kyc/events
  scopes:
  - kyc-orchestrator
  - fraud-detection
---
apiVersion: dapr.io/v1alpha1
kind: Subscription
metadata:
  name: fraud-subscription
  namespace: insurance-platform
spec:
  pubsubname: pubsub
  topic: fraud-alerts
  route: /fraud/alerts
  scopes:
  - fraud-detection
  - claims-adjudication
  - communication-service
---
apiVersion: dapr.io/v1alpha1
kind: Subscription
metadata:
  name: notification-subscription
  namespace: insurance-platform
spec:
  pubsubname: pubsub
  topic: notification-events
  route: /notification/events
  scopes:
  - communication-service
  - ussd-service
  - whatsapp-service
