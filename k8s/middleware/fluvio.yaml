apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fluvio-sc
  namespace: middleware
  labels:
    app: fluvio
    component: sc
spec:
  serviceName: fluvio-sc
  replicas: 1
  selector:
    matchLabels:
      app: fluvio
      component: sc
  template:
    metadata:
      labels:
        app: fluvio
        component: sc
    spec:
      containers:
      - name: fluvio-sc
        image: infinyon/fluvio:latest
        command: ["fluvio-sc"]
        args:
        - "--bind-public"
        - "0.0.0.0:9003"
        - "--bind-private"
        - "0.0.0.0:9004"
        ports:
        - containerPort: 9003
          name: public
        - containerPort: 9004
          name: private
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/fluvio
        livenessProbe:
          tcpSocket:
            port: 9003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 9003
          initialDelaySeconds: 10
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: cinder-ssd
      resources:
        requests:
          storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fluvio-spu
  namespace: middleware
  labels:
    app: fluvio
    component: spu
spec:
  serviceName: fluvio-spu
  replicas: 3
  selector:
    matchLabels:
      app: fluvio
      component: spu
  template:
    metadata:
      labels:
        app: fluvio
        component: spu
    spec:
      containers:
      - name: fluvio-spu
        image: infinyon/fluvio:latest
        command: ["fluvio-spu"]
        args:
        - "--sc-addr"
        - "fluvio-sc:9004"
        - "--bind-public"
        - "0.0.0.0:9005"
        - "--bind-private"
        - "0.0.0.0:9006"
        ports:
        - containerPort: 9005
          name: public
        - containerPort: 9006
          name: private
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
        volumeMounts:
        - name: data
          mountPath: /var/lib/fluvio
        livenessProbe:
          tcpSocket:
            port: 9005
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 9005
          initialDelaySeconds: 10
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: cinder-ssd
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: fluvio-sc
  namespace: middleware
spec:
  type: ClusterIP
  ports:
  - port: 9003
    targetPort: 9003
    name: public
  - port: 9004
    targetPort: 9004
    name: private
  selector:
    app: fluvio
    component: sc
---
apiVersion: v1
kind: Service
metadata:
  name: fluvio-spu
  namespace: middleware
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 9005
    targetPort: 9005
    name: public
  - port: 9006
    targetPort: 9006
    name: private
  selector:
    app: fluvio
    component: spu
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fluvio-spu-pdb
  namespace: middleware
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: fluvio
      component: spu
