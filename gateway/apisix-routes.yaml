# APISix API Gateway Route Configuration
# Central routing for all platform microservices

routes:
  # === KYC/KYB System ===
  - uri: /api/v1/liveness/*
    name: liveness-service
    upstream:
      type: roundrobin
      nodes:
        "liveness-service:8002": 1
    plugins:
      limit-req:
        rate: 50
        burst: 20
        key_type: var
        key: remote_addr
      cors:
        allow_origins: "*"
        allow_methods: "GET, POST, PUT, DELETE, OPTIONS"
        allow_headers: "Content-Type, Authorization, X-API-Key"

  - uri: /api/v1/aml/*
    name: aml-screening-service
    upstream:
      type: roundrobin
      nodes:
        "aml-screening-service:8003": 1
    plugins:
      limit-req:
        rate: 30
        burst: 10
        key_type: var
        key: remote_addr

  - uri: /api/v1/kyc/*
    name: kyc-orchestrator-service
    upstream:
      type: roundrobin
      nodes:
        "kyc-orchestrator-service:8004": 1

  - uri: /api/v1/risk-scoring/*
    name: risk-scoring-service
    upstream:
      type: roundrobin
      nodes:
        "risk-scoring-service:8005": 1

  - uri: /api/v1/document-verification/*
    name: document-verification-service
    upstream:
      type: roundrobin
      nodes:
        "document-verification-service:8006": 1

  # === Core Insurance Services ===
  - uri: /api/v1/policies/*
    name: policy-service
    upstream:
      type: roundrobin
      nodes:
        "policy-service:8010": 1

  - uri: /api/v1/claims/*
    name: claims-adjudication-engine
    upstream:
      type: roundrobin
      nodes:
        "claims-adjudication-engine:8011": 1

  - uri: /api/v1/payments/*
    name: payment-service
    upstream:
      type: roundrobin
      nodes:
        "payment-service:8012": 1

  - uri: /api/v1/customers/*
    name: customer-service
    upstream:
      type: roundrobin
      nodes:
        "customer-service:8013": 1

  # === Insurance Operations ===
  - uri: /api/v1/actuarial/*
    name: actuarial-module
    upstream:
      type: roundrobin
      nodes:
        "actuarial-module:8020": 1

  - uri: /api/v1/reinsurance/*
    name: reinsurance-management
    upstream:
      type: roundrobin
      nodes:
        "reinsurance-management:8021": 1

  - uri: /api/v1/group-life/*
    name: group-life-admin
    upstream:
      type: roundrobin
      nodes:
        "group-life-admin:8022": 1

  - uri: /api/v1/nmid/*
    name: nmid-integration
    upstream:
      type: roundrobin
      nodes:
        "nmid-integration:8023": 1

  - uri: /api/v1/pfa/*
    name: pfa-integration
    upstream:
      type: roundrobin
      nodes:
        "pfa-integration:8024": 1

  - uri: /api/v1/bancassurance/*
    name: bancassurance-integration
    upstream:
      type: roundrobin
      nodes:
        "bancassurance-integration:8025": 1

  - uri: /api/v1/naicom/*
    name: naicom-compliance-module
    upstream:
      type: roundrobin
      nodes:
        "naicom-compliance-module:8026": 1

  # === Analytics & Reporting ===
  - uri: /api/v1/customer-360/*
    name: customer-360-view
    upstream:
      type: roundrobin
      nodes:
        "customer-360-view:8030": 1

  - uri: /api/v1/performance/*
    name: performance-monitoring-dashboard
    upstream:
      type: roundrobin
      nodes:
        "performance-monitoring-dashboard:8031": 1

  - uri: /api/v1/ab-testing/*
    name: ab-testing-framework
    upstream:
      type: roundrobin
      nodes:
        "ab-testing-framework:8032": 1

  # === Platform Operations ===
  - uri: /api/v1/audit/*
    name: audit-trail-system
    upstream:
      type: roundrobin
      nodes:
        "audit-trail-system:8040": 1

  - uri: /api/v1/batch/*
    name: batch-processing-engine
    upstream:
      type: roundrobin
      nodes:
        "batch-processing-engine:8041": 1

  - uri: /api/v1/feedback/*
    name: feedback-management
    upstream:
      type: roundrobin
      nodes:
        "feedback-management:8042": 1

  - uri: /api/v1/commission/*
    name: agent-commission-management
    upstream:
      type: roundrobin
      nodes:
        "agent-commission-management:8043": 1

  - uri: /api/v1/renewals/*
    name: policy-renewal-automation
    upstream:
      type: roundrobin
      nodes:
        "policy-renewal-automation:8044": 1

  # === Compliance ===
  - uri: /api/v1/gdpr/*
    name: gdpr-compliance
    upstream:
      type: roundrobin
      nodes:
        "gdpr-compliance:8050": 1

  - uri: /api/v1/ndpr/*
    name: ndpr-compliance
    upstream:
      type: roundrobin
      nodes:
        "ndpr-compliance:8051": 1

  # === Mobile APIs ===
  - uri: /api/v1/agent-app/*
    name: agent-mobile-app
    upstream:
      type: roundrobin
      nodes:
        "agent-mobile-app:8060": 1
    plugins:
      limit-req:
        rate: 100
        burst: 50
        key_type: var
        key: remote_addr

  - uri: /api/v1/mobile/*
    name: native-mobile-ios
    upstream:
      type: roundrobin
      nodes:
        "native-mobile-ios:8061": 1
    plugins:
      limit-req:
        rate: 100
        burst: 50
        key_type: var
        key: remote_addr

  # === Strategic / Enhanced ===
  - uri: /api/v1/strategy/*
    name: strategic-implementations
    upstream:
      type: roundrobin
      nodes:
        "strategic-implementations:8070": 1

  - uri: /api/v1/enhanced-kyc/*
    name: enhanced-kyc-kyb
    upstream:
      type: roundrobin
      nodes:
        "enhanced-kyc-kyb:8071": 1

  # === Integration Services ===
  - uri: /api/v1/communication/*
    name: communication-service
    upstream:
      type: roundrobin
      nodes:
        "communication-service:8080": 1

  - uri: /api/v1/reconciliation/*
    name: reconciliation-engine
    upstream:
      type: roundrobin
      nodes:
        "reconciliation-engine:8081": 1

  - uri: /api/v1/fraud/*
    name: fraud-detection
    upstream:
      type: roundrobin
      nodes:
        "fraud-detection-go:8082": 1

  - uri: /api/v1/telco/*
    name: telco-data-integration
    upstream:
      type: roundrobin
      nodes:
        "telco-data-integration-service:8083": 1

# Global plugins applied to all routes
global_rules:
  - plugins:
      prometheus:
        prefer_name: true
      opentelemetry:
        service_name: insurance-platform-gateway
      cors:
        allow_origins: "*"
        allow_methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
        allow_headers: "Content-Type, Authorization, X-API-Key, X-Request-ID"
        allow_credential: true
        max_age: 86400

# Upstream health checks
upstream_defaults:
  checks:
    active:
      type: http
      http_path: /health
      healthy:
        interval: 10
        successes: 2
      unhealthy:
        interval: 5
        http_failures: 3
