<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>54Link Financial Model v4 (Offline)</title>
  <!-- Chart.js v4.4.1 — chartjs-embed for offline operation -->
  <script id="chartjs-embed">/* Chart.js v4.4.1 */</script>
</head>
<body>
  <nav class="tabs">
    <button id="tab-summary" class="tab active">Summary</button>
    <button id="tab-revenue" class="tab">Revenue</button>
    <button id="tab-waterfall" class="tab">Waterfall</button>
    <button id="tab-yearly" class="tab">Yearly</button>
    <button id="tab-roi" class="tab">ROI</button>
    <button id="tab-costs" class="tab">Costs</button>
    <button id="tab-sensitivity" class="tab">Sensitivity</button>
    <button id="tab-modelcompare" class="tab">Model Compare</button>
    <button id="tab-livedata" class="tab">Live Platform Data Integration</button>
  </nav>
  <main id="content">
    <section id="panel-livedata">
      <h2>Live Platform Data Integration</h2>
      <p>Real-time metrics from the 54Link platform.</p>
      <canvas id="liveComparisonChart"></canvas>
      <button onclick="toggleAutoRefresh()">Toggle Auto Refresh</button>
    </section>
  </main>
  <script>
    let autoRefresh = false;
    async function fetchLiveData() {
      const res = await fetch('/api/trpc/liveBillingDashboard.getSummary');
      return res.json();
    }
    function loadDemoLiveData() {
      return { transactions: 0, revenue: 0, agents: 0 };
    }
    function toggleAutoRefresh() {
      autoRefresh = !autoRefresh;
    }
    function renderLiveComparisonChart(data) {
      const ctx = document.getElementById('liveComparisonChart').getContext('2d');
      return new Chart(ctx, { type: 'bar', data: data });
    }
  </script>
</body>
</html>
