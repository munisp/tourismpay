# Default values for insurance-platform
# This is a YAML-formatted file.

global:
  imageRegistry: "registry.yourdomain.com"
  imagePullSecrets:
    - name: registry-credentials
  storageClass: "cinder-ssd"

# Environment configuration
environment: production

# Namespace configuration
namespace: insurance-platform

# Common labels
commonLabels:
  app.kubernetes.io/part-of: unified-insurance-platform

# Image configuration
image:
  pullPolicy: IfNotPresent
  tag: "latest"

# Service account
serviceAccount:
  create: true
  name: insurance-platform
  annotations: {}

# Pod security context
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# ===========================================
# Application Services
# ===========================================

customerPortal:
  enabled: true
  replicaCount: 3
  image:
    repository: insurance/customer-portal
    tag: ""
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

claimsAdjudication:
  enabled: true
  replicaCount: 3
  image:
    repository: insurance/claims-adjudication
    tag: ""
  service:
    type: ClusterIP
    port: 8001
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 70

policyWorkflow:
  enabled: true
  replicaCount: 3
  image:
    repository: insurance/policy-workflow
    tag: ""
  service:
    type: ClusterIP
    port: 8002
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 70

kycOrchestrator:
