# ===========================================
# Middleware Configuration
# ===========================================

postgresql:
  enabled: true
  architecture: replication
  auth:
    postgresPassword: ""
    username: insurance_admin
    password: ""
    database: insurance
  primary:
    persistence:
      storageClass: cinder-ssd
      size: 100Gi
  readReplicas:
    replicaCount: 2
    persistence:
      storageClass: cinder-ssd
      size: 100Gi

redis:
  enabled: true
  architecture: replication
  auth:
    password: ""
  master:
    persistence:
      storageClass: cinder-ssd
      size: 10Gi
  replica:
    replicaCount: 2
    persistence:
      storageClass: cinder-ssd
      size: 10Gi

kafka:
  enabled: true
  replicaCount: 3
  persistence:
    storageClass: cinder-ssd
    size: 100Gi
  zookeeper:
    replicaCount: 3
    persistence:
      storageClass: cinder-ssd
      size: 20Gi

temporal:
  enabled: true
  server:
    replicaCount: 3
  persistence:
    storageClass: cinder-ssd

tigerbeetle:
  enabled: true
  replicaCount: 3
  persistence:
    storageClass: cinder-high-iops
    size: 100Gi

iceberg:
  enabled: true
  replicaCount: 2
  swift:
    container: insurance-lakehouse

dapr:
  enabled: true

fluvio:
  enabled: true
  sc:
    replicaCount: 1
  spu:
    replicaCount: 3
  persistence:
    storageClass: cinder-ssd
    size: 50Gi

# ===========================================
# Monitoring Configuration
# ===========================================

monitoring:
  enabled: true
  prometheus:
    enabled: true
    retention: 30d
    persistence:
      storageClass: cinder-ssd
      size: 100Gi
  grafana:
    enabled: true
    adminPassword: ""
  jaeger:
    enabled: true
    persistence:
      storageClass: cinder-ssd
      size: 50Gi
  loki:
    enabled: true
    persistence:
      storageClass: cinder-ssd
      size: 100Gi

# ===========================================
# Ingress Configuration
# ===========================================

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: insurance.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
          service: customer-portal
          port: 3000
    - host: api.insurance.yourdomain.com
      paths:
        - path: /api/claims
          pathType: Prefix
          service: claims-adjudication
          port: 8001
        - path: /api/policies
          pathType: Prefix
          service: policy-workflow
          port: 8002
        - path: /api/kyc
          pathType: Prefix
          service: kyc-orchestrator
          port: 8003
  tls:
    - secretName: insurance-tls
      hosts:
        - insurance.yourdomain.com
        - api.insurance.yourdomain.com

# ===========================================
# OpenStack Configuration
# ===========================================

openstack:
  authUrl: "https://openstack.yourdomain.com:5000/v3"
  region: "RegionOne"
  projectName: "insurance-platform"
  swift:
    enabled: true
    containers:
      - insurance-documents
      - insurance-backups
      - insurance-lakehouse
  cinder:
    storageClasses:
      - name: cinder-standard
        type: standard
        default: true
      - name: cinder-ssd
        type: ssd
      - name: cinder-high-iops
        type: high-iops

# ===========================================
# Secrets Configuration
# ===========================================

secrets:
  database:
    existingSecret: ""
    postgresPassword: ""
    password: ""
  redis:
    existingSecret: ""
    password: ""
  jwt:
    existingSecret: ""
    secret: ""
    refreshSecret: ""
  payment:
    existingSecret: ""
    paystackSecretKey: ""
    flutterwaveSecretKey: ""
  swift:
    existingSecret: ""
    username: ""
    password: ""
