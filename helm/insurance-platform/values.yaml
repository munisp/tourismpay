      memory: "4Gi"
      cpu: "2000m"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

communicationService:
  enabled: true
  replicaCount: 3
  image:
    repository: insurance/communication-service
    tag: ""
  service:
    type: ClusterIP
    port: 8008
  resources:
