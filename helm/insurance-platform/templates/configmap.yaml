apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "insurance-platform.fullname" . }}-config
  labels:
    {{- include "insurance-platform.labels" . | nindent 4 }}
data:
  # Database Configuration
  POSTGRES_HOST: "{{ include "insurance-platform.fullname" . }}-postgresql"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "{{ .Values.postgresql.auth.database }}"
  
  # Redis Configuration
  REDIS_HOST: "{{ include "insurance-platform.fullname" . }}-redis-master"
  REDIS_PORT: "6379"
  
  # Kafka Configuration
  KAFKA_BROKERS: "{{ include "insurance-platform.fullname" . }}-kafka:9092"
  KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"
  
  # Temporal Configuration
  TEMPORAL_ADDRESS: "{{ include "insurance-platform.fullname" . }}-temporal-frontend:7233"
  TEMPORAL_NAMESPACE: "default"
  
  # TigerBeetle Configuration
  TIGERBEETLE_ADDRESS: "{{ include "insurance-platform.fullname" . }}-tigerbeetle:3000"
  
  # Lakehouse Configuration
  LAKEHOUSE_URL: "http://{{ include "insurance-platform.fullname" . }}-iceberg-rest:8181"
  
  # Dapr Configuration
  DAPR_HTTP_PORT: "3500"
  DAPR_GRPC_PORT: "50001"
  
  # Fluvio Configuration
  FLUVIO_ADDRESS: "{{ include "insurance-platform.fullname" . }}-fluvio-sc:9003"
  
  # OpenStack Swift Configuration
  SWIFT_AUTH_URL: "{{ .Values.openstack.authUrl }}"
  SWIFT_CONTAINER: "insurance-documents"
  SWIFT_REGION: "{{ .Values.openstack.region }}"
  
  # Application Configuration
  NODE_ENV: "{{ .Values.environment }}"
  GO_ENV: "{{ .Values.environment }}"
  PYTHON_ENV: "{{ .Values.environment }}"
  LOG_LEVEL: "{{ if eq .Values.environment "production" }}warn{{ else }}info{{ end }}"
