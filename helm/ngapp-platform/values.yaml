# NGApp Platform - Production Values
# Override per environment: values-staging.yaml, values-production.yaml

global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""
  environment: production
  domain: ngapp.example.com
  tls:
    enabled: true
    issuer: letsencrypt-prod

# Middleware dependencies
postgresql:
  enabled: true
  auth:
    database: ngapp
    username: ngapp
    existingSecret: ngapp-db-credentials
  primary:
    persistence:
      size: 50Gi
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 2Gi
        cpu: "2"

redis:
  enabled: true
  auth:
    existingSecret: ngapp-redis-credentials
  master:
    persistence:
      size: 10Gi
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

kafka:
  enabled: true
  kraft:
    enabled: true
  persistence:
    size: 20Gi
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 2Gi
      cpu: "1"

keycloak:
  enabled: true
  auth:
    adminUser: admin
    existingSecret: ngapp-keycloak-credentials
  postgresql:
    enabled: false
  externalDatabase:
    host: "{{ .Release.Name }}-postgresql"
    database: keycloak

opensearch:
  enabled: true
  replicas: 2
  persistence:
    size: 30Gi
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 4Gi
      cpu: "2"

# Temporal workflow engine
temporal:
  enabled: true
  image:
    repository: temporalio/auto-setup
    tag: "1.23"
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: "1"

# Frontend application
frontend:
  enabled: true
  replicaCount: 3
  image:
    repository: ngapp/customer-portal
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/rate-limit: "100"
      nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    hosts:
      - host: portal.ngapp.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: ngapp-portal-tls
        hosts:
          - portal.ngapp.example.com
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# API Gateway (APISIX)
apiGateway:
  enabled: true
  replicaCount: 2
  image:
    repository: apache/apisix
    tag: "3.8.0"
  service:
    type: LoadBalancer
    port: 9080
    adminPort: 9180
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: "1"

# ============================================================
# Microservices Configuration
# All services follow the same pattern with sensible defaults
# ============================================================

serviceDefaults:
  replicaCount: 2
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 75

