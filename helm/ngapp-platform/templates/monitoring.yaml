{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ngapp.fullname" . }}-grafana-dashboards
  labels:
    grafana_dashboard: "1"
data:
  ngapp-overview.json: |
    {
      "dashboard": {
        "title": "NGApp Platform Overview",
        "panels": [
          {"title": "Request Rate", "type": "graph", "targets": [{"expr": "sum(rate(http_requests_total{job=~\"ngapp-.*\"}[5m])) by (service)"}]},
          {"title": "Error Rate", "type": "graph", "targets": [{"expr": "sum(rate(http_requests_total{job=~\"ngapp-.*\",status=~\"5..\"}[5m])) by (service)"}]},
          {"title": "Latency P99", "type": "graph", "targets": [{"expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~\"ngapp-.*\"}[5m])) by (le, service))"}]},
          {"title": "Active Connections", "type": "stat", "targets": [{"expr": "sum(http_connections_active{job=~\"ngapp-.*\"})"}]}
        ]
      }
    }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ngapp.fullname" . }}-services
  labels:
    {{- include "ngapp.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: ngapp-platform
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "ngapp.fullname" . }}-alerts
  labels:
    {{- include "ngapp.labels" . | nindent 4 }}
spec:
  groups:
    - name: ngapp.rules
      rules:
        - alert: ServiceDown
          expr: up{job=~"ngapp-.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ "{{" }} $labels.service {{ "}}" }} is down"
            description: "{{ "{{" }} $labels.service {{ "}}" }} has been unreachable for 5 minutes."
        - alert: HighErrorRate
          expr: sum(rate(http_requests_total{job=~"ngapp-.*",status=~"5.."}[5m])) by (service) / sum(rate(http_requests_total{job=~"ngapp-.*"}[5m])) by (service) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High error rate on {{ "{{" }} $labels.service {{ "}}" }}"
            description: "Error rate is above 5% for 5 minutes."
        - alert: HighLatency
          expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~"ngapp-.*"}[5m])) by (le, service)) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High latency on {{ "{{" }} $labels.service {{ "}}" }}"
            description: "P99 latency is above 2s for 5 minutes."
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace=~"ngapp.*"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod crash looping in {{ "{{" }} $labels.namespace {{ "}}" }}"
        - alert: HighMemoryUsage
          expr: container_memory_working_set_bytes{namespace=~"ngapp.*"} / container_spec_memory_limit_bytes > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on {{ "{{" }} $labels.pod {{ "}}" }}"
        - alert: DatabaseConnectionPoolExhausted
          expr: ngapp_db_pool_available{job=~"ngapp-.*"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "DB connection pool exhausted on {{ "{{" }} $labels.service {{ "}}" }}"
{{- end }}
