{{- range $name, $config := .Values.services }}
{{- $defaults := $.Values.serviceDefaults }}
{{- $replicas := $config.replicaCount | default $defaults.replicaCount }}
{{- $port := $config.port | default 8080 }}
{{- $memReq := (($config.resources).requests).memory | default (($defaults.resources).requests).memory }}
{{- $cpuReq := (($config.resources).requests).cpu | default (($defaults.resources).requests).cpu }}
{{- $memLim := (($config.resources).limits).memory | default (($defaults.resources).limits).memory }}
{{- $cpuLim := (($config.resources).limits).cpu | default (($defaults.resources).limits).cpu }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "ngapp.serviceLabels" (dict "root" $ "serviceName" $name "component" "backend") | nindent 4 }}
spec:
  replicas: {{ $replicas }}
  selector:
    matchLabels:
      {{- include "ngapp.serviceSelectorLabels" (dict "root" $ "serviceName" $name) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "ngapp.serviceSelectorLabels" (dict "root" $ "serviceName" $name) | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $port }}"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ $name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ $name }}
          image: {{ include "ngapp.serviceImage" (dict "root" $ "serviceName" $name) }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ $port }}
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: {{ $name }}
            - name: SERVICE_PORT
              value: "{{ $port }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ngapp-db-credentials
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ngapp-redis-credentials
                  key: url
            - name: KAFKA_BROKERS
              value: "{{ $.Release.Name }}-kafka:9092"
            - name: KEYCLOAK_URL
              value: "http://{{ $.Release.Name }}-keycloak:8080"
            - name: OPENSEARCH_URL
              value: "http://{{ $.Release.Name }}-opensearch:9200"
            - name: TEMPORAL_HOST
              value: "{{ $.Release.Name }}-temporal:7233"
            - name: ENVIRONMENT
              value: {{ $.Values.global.environment | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: {{ $memReq }}
              cpu: {{ $cpuReq }}
            limits:
              memory: {{ $memLim }}
              cpu: {{ $cpuLim }}
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "ngapp.serviceSelectorLabels" (dict "root" $ "serviceName" $name) | nindent 14 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "ngapp.serviceLabels" (dict "root" $ "serviceName" $name "component" "backend") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ngapp.serviceSelectorLabels" (dict "root" $ "serviceName" $name) | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  labels:
    {{- include "ngapp.serviceLabels" (dict "root" $ "serviceName" $name "component" "backend") | nindent 4 }}
---
{{- if $.Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
spec:
  minAvailable: {{ $.Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "ngapp.serviceSelectorLabels" (dict "root" $ "serviceName" $name) | nindent 6 }}
---
{{- end }}
{{- if ($defaults.autoscaling).enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ ($config.autoscaling).minReplicas | default ($defaults.autoscaling).minReplicas }}
  maxReplicas: {{ ($config.autoscaling).maxReplicas | default ($defaults.autoscaling).maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ ($config.autoscaling).targetCPUUtilizationPercentage | default ($defaults.autoscaling).targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
{{- end }}
{{- end }}
