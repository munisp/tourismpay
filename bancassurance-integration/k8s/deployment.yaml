apiVersion: apps/v1
kind: Deployment
metadata:
  name: bancassurance-integration
  namespace: insurance-platform
  labels:
    app: bancassurance-integration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bancassurance-integration
  template:
    metadata:
      labels:
        app: bancassurance-integration
    spec:
      containers:
        - name: bancassurance-integration
          image: bancassurance-integration:latest
          ports:
            - containerPort: 8091
          env:
            - name: PORT
              value: "8091"
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: bancassurance-integration
  namespace: insurance-platform
spec:
  selector:
    app: bancassurance-integration
  ports:
    - port: 8091
      targetPort: 8091
  type: ClusterIP
