name: Security Scanning

on:
  push:
    branches: [main, "devin/**"]
  pull_request:
    branches: [main]
  schedule:
    # Run full security scan every Monday at 02:00 UTC
    - cron: "0 2 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─── CodeQL SAST ─────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, go]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ─── Semgrep SAST ─────────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          semgrep \
            --config=p/typescript \
            --config=p/nodejs \
            --config=p/jwt \
            --config=p/sql-injection \
            --config=p/xss \
            --config=p/secrets \
            --sarif \
            --output=semgrep.sarif \
            --error \
            --severity=ERROR \
            . || true
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  # ─── Secret Scanning (Gitleaks) ───────────────────────────────────────────────
  gitleaks:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─── npm Dependency Audit ─────────────────────────────────────────────────────
  npm-audit:
    name: npm Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Run npm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true
      - name: Run OSV Scanner
        uses: google/osv-scanner-action@v1
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml

  # ─── Container Image Scanning (Trivy) ────────────────────────────────────────
  trivy-server:
    name: Container Scan — tourismpay-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build -t tourismpay/server:ci .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: tourismpay/server:ci
          format: sarif
          output: trivy-server.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-server.sarif

  # ─── Go Security (govulncheck) ────────────────────────────────────────────────
  go-security:
    name: Go Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck — tigerbeetle-gateway
        run: cd services/tigerbeetle-gateway && govulncheck ./...
        continue-on-error: true
      - name: Run govulncheck — temporal-worker
        run: cd services/temporal-worker && govulncheck ./...
        continue-on-error: true

  # ─── Rust Security (cargo-audit) ─────────────────────────────────────────────
  rust-security:
    name: Rust Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo-audit — fluvio-consumer
        run: cd services/fluvio-consumer && cargo audit
        continue-on-error: true
      - name: Run cargo-audit — crypto-engine
        run: cd services/crypto-engine && cargo audit
        continue-on-error: true

  # ─── Python Security (pip-audit) ─────────────────────────────────────────────
  python-security:
    name: Python Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit — lakehouse-etl
        run: pip-audit -r services/lakehouse-etl/requirements.txt
        continue-on-error: true
      - name: Run pip-audit — fraud-scoring
        run: pip-audit -r services/fraud-scoring/requirements.txt
        continue-on-error: true

  # ─── Kubernetes Manifest Scanning (Checkov) ──────────────────────────────────
  checkov:
    name: Kubernetes Manifest Security (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true
      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
