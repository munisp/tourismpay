name: Build & Test Microservices

on:
  push:
    branches: [main, "devin/**"]
    paths:
      - "services/**"
      - ".github/workflows/build-services.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/**"

permissions:
  contents: read
  packages: write

jobs:
  # ─── Go Services ─────────────────────────────────────────────────────────────
  go-services:
    name: Go — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [tigerbeetle-gateway, temporal-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - name: Build
        run: |
          cd services/${{ matrix.service }}
          go build -v ./...
      - name: Test
        run: |
          cd services/${{ matrix.service }}
          go test -v -race -coverprofile=coverage.out ./...
      - name: Vet
        run: |
          cd services/${{ matrix.service }}
          go vet ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          cd services/${{ matrix.service }}
          staticcheck ./...
        continue-on-error: true

  # ─── Rust Services ───────────────────────────────────────────────────────────
  rust-services:
    name: Rust — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [fluvio-consumer, crypto-engine]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/${{ matrix.service }}
      - name: Build
        run: |
          cd services/${{ matrix.service }}
          cargo build --release
      - name: Test
        run: |
          cd services/${{ matrix.service }}
          cargo test
      - name: Clippy
        run: |
          cd services/${{ matrix.service }}
          cargo clippy -- -D warnings
      - name: Format check
        run: |
          cd services/${{ matrix.service }}
          cargo fmt --check

  # ─── Python Services ─────────────────────────────────────────────────────────
  python-services:
    name: Python — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [lakehouse-etl, fraud-scoring]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt
      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy
      - name: Lint (ruff)
        run: |
          cd services/${{ matrix.service }}
          ruff check .
        continue-on-error: true
      - name: Type check (mypy)
        run: |
          cd services/${{ matrix.service }}
          mypy main.py --ignore-missing-imports
        continue-on-error: true
      - name: Syntax check
        run: |
          cd services/${{ matrix.service }}
          python3 -m py_compile main.py && echo "Syntax OK"

  # ─── Docker Build (all services) ─────────────────────────────────────────────
  docker-build:
    name: Docker Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [go-services, rust-services, python-services]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: tigerbeetle-gateway
            context: services/tigerbeetle-gateway
          - service: temporal-worker
            context: services/temporal-worker
          - service: fluvio-consumer
            context: services/fluvio-consumer
          - service: crypto-engine
            context: services/crypto-engine
          - service: lakehouse-etl
            context: services/lakehouse-etl
          - service: fraud-scoring
            context: services/fraud-scoring
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tourismpay-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/tourismpay-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
