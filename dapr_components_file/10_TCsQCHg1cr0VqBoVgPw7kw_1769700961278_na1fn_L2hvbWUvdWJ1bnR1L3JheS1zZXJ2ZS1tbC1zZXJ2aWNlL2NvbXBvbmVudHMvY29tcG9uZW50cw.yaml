apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub-kafka
spec:
  type: pubsub.kafka
  version: v1
  metadata:
  - name: brokers
    value: "kafka.local:9092" # Placeholder for Kafka broker address
  - name: authRequired
    value: "false"
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore-redis
spec:
  type: state.redis
  version: v1
  metadata:
  - name: redisHost
    value: "redis.local:6379" # Placeholder for Redis host address
  - name: redisPassword
    value: "" # Empty password for local testing
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: secretstore-file
spec:
  type: secretstores.local.file
  version: v1
  metadata:
  - name: secretsFile
    value: "/tmp/secrets.json" # Path to a local secrets file
