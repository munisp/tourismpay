# dapr_components.yaml

# 1. State Store Component (Redis)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: redis-state-store
spec:
  type: state.redis
  version: v1
  metadata:
  - name: redisHost
    value: localhost:6379 # Replace with actual host in production
  - name: redisPassword
    value: "" # Replace with actual password/secret reference
  - name: actorStateStore
    value: "true"
---
# 2. Pub/Sub Component (Kafka)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kafka-pubsub
spec:
  type: pubsub.kafka
  version: v1
  metadata:
  - name: brokers
    value: localhost:9092 # Replace with actual Kafka broker list
  - name: consumerGroup
    value: lakehouse-query-service-group
  - name: authRequired
    value: "false" # Set to "true" and configure SASL/SSL for production
---
# 3. Secret Store Component (Local File for example)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: local-secret-store
spec:
  type: secretstores.local.file
  version: v1
  metadata:
  - name: secretsFile
    value: /tmp/dapr/secrets.json # Create this file for local testing
