apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub-kafka
spec:
  type: pubsub.kafka
  version: v1
  metadata:
  - name: brokers
    value: "kafka.default.svc.cluster.local:9092" # Placeholder for a typical Kubernetes setup
  - name: consumerGroup
    value: "communication-service-group"
  - name: authRequired
    value: "false" # For simplicity, assuming no auth in this example
