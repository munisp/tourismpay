# /home/ubuntu/dapr-components.yaml

# 1. Pub/Sub Component (Kafka)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kafka-pubsub
spec:
  type: pubsub.kafka
  version: v1
  metadata:
  - name: brokers
    value: "kafka.default.svc.cluster.local:9092" # Production-ready Kafka broker address
  - name: consumerGroup
    value: "fraud-detection-group"
  - name: authRequired
    value: "false"
  # For production, you would use SASL/SSL authentication, e.g.:
  # - name: saslUsername
  #   secretKeyRef:
  #     name: kafka-secrets
  #     key: username
  # - name: saslPassword
  #   secretKeyRef:
  #     name: kafka-secrets
  #     key: password
---
# 2. State Store Component (Redis)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  metadata:
  - name: redisHost
    value: redis-master.default.svc.cluster.local:6379 # Production-ready Redis host
  - name: redisPassword
    secretKeyRef:
      name: redis-secret
      key: redis-password
auth:
  secretStore: secretstore # Reference the Kubernetes secret store component
---
# 3. Secrets Store Component (Kubernetes)
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: secretstore
spec:
  type: secretstores.kubernetes
  version: v1
  metadata:
  - name: namespace
    value: default
---
# 4. Resiliency Component (for retries and error handling)
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: fraud-detection-resiliency
spec:
  resiliency:
    policies:
      timeouts:
        default: 5s
      retries:
        pubsubRetry:
          policy: constant
          duration: 50ms
          maxRetries: 10
        stateRetry:
          policy: constant
          duration: 100ms
          maxRetries: 5
      circuitBreakers:
        pubsubCircuitBreaker:
          maxRequests: 1
          interval: 30s
          timeout: 15s
          trip: consecutiveFailures > 5
    targets:
      components:
        kafka-pubsub:
          outbound:
            retry: pubsubRetry
            circuitBreaker: pubsubCircuitBreaker
        statestore:
          outbound:
            retry: stateRetry
      apps:
        # Service-to-service invocation target
        payment-service:
          timeout: default
          retry: stateRetry # Reusing stateRetry for simplicity
          circuitBreaker: pubsubCircuitBreaker # Reusing pubsubCircuitBreaker for simplicity
