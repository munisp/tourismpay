apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kafka-pubsub
spec:
  type: pubsub.kafka
  version: v1
  metadata:
  - name: brokers
    value: "kafka.broker.svc.cluster.local:9092" # Placeholder for Kafka broker address
  - name: consumerGroup
    value: "policy-service-group"
  - name: authRequired
    value: "false"
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: redis-state
spec:
  type: state.redis
  version: v1
  metadata:
  - name: redisHost
    value: "redis-master.svc.cluster.local:6379" # Placeholder for Redis host
  - name: redisPassword
    secretKeyRef:
      name: redis-password
      key: redis-password
  - name: actorStateStore
    value: "true"
auth:
  secretStore: local-secret-store
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: local-secret-store
spec:
  type: secretstores.local
  version: v1
  metadata:
  - name: secretsFile
    value: "/tmp/dapr-secrets.json" # File to store secrets for local testing
---
# Define a mock secrets file for the local-secret-store
# In a real environment, this would be managed by a dedicated secret store (e.g., Kubernetes, Vault, AWS Secrets Manager)
# This file is for demonstration purposes with the local-secret-store component.
# Content of /tmp/dapr-secrets.json:
# {
#   "redis-password": {
#     "redis-password": "a-very-secure-password"
#   }
# }
