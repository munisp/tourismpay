apiVersion: v1
kind: Namespace
metadata:
  name: geospatial
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: geospatial-config
  namespace: geospatial
data:
  DATABASE_URL: "postgresql://postgres:postgres@postgis-db:5432/geospatial?sslmode=disable"
  NOMINATIM_URL: "https://nominatim.openstreetmap.org"
  GO_SERVICE_PORT: "8090"
  PYTHON_SERVICE_PORT: "8091"
---
apiVersion: v1
kind: Secret
metadata:
  name: geospatial-secrets
  namespace: geospatial
type: Opaque
stringData:
  GOOGLE_MAPS_API_KEY: ""
  POSTGRES_PASSWORD: "postgres"
---
# PostGIS Database
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgis-db
  namespace: geospatial
spec:
  serviceName: postgis-db
  replicas: 1
  selector:
    matchLabels:
      app: postgis-db
  template:
    metadata:
      labels:
        app: postgis-db
    spec:
      containers:
        - name: postgis
          image: postgis/postgis:16-3.4
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: geospatial
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geospatial-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgis-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: postgis-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: postgis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgis-db
  namespace: geospatial
spec:
  selector:
    app: postgis-db
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
# Go Geospatial Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geospatial-go-service
  namespace: geospatial
spec:
  replicas: 3
  selector:
    matchLabels:
      app: geospatial-go-service
  template:
    metadata:
      labels:
        app: geospatial-go-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - geospatial-go-service
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: geospatial-go
          image: unified-insurance/geospatial-go-service:latest
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: geospatial-config
                  key: DATABASE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: geospatial-go-service
  namespace: geospatial
spec:
  selector:
    app: geospatial-go-service
  ports:
    - port: 8090
      targetPort: 8090
---
# Python Geospatial Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geospatial-python-service
  namespace: geospatial
spec:
  replicas: 3
  selector:
    matchLabels:
      app: geospatial-python-service
  template:
    metadata:
      labels:
        app: geospatial-python-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8091"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - geospatial-python-service
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: geospatial-python
          image: unified-insurance/geospatial-python-service:latest
          ports:
            - containerPort: 8091
          env:
            - name: PORT
              value: "8091"
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: geospatial-config
                  key: DATABASE_URL
            - name: NOMINATIM_URL
              valueFrom:
                configMapKeyRef:
                  name: geospatial-config
                  key: NOMINATIM_URL
            - name: GOOGLE_MAPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: geospatial-secrets
                  key: GOOGLE_MAPS_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: geospatial-python-service
  namespace: geospatial
spec:
  selector:
    app: geospatial-python-service
  ports:
    - port: 8091
      targetPort: 8091
---
# HPA for Go Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: geospatial-go-service-hpa
  namespace: geospatial
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: geospatial-go-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# HPA for Python Service
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: geospatial-python-service-hpa
  namespace: geospatial
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: geospatial-python-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# PodDisruptionBudget for Go Service
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: geospatial-go-service-pdb
  namespace: geospatial
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: geospatial-go-service
---
# PodDisruptionBudget for Python Service
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: geospatial-python-service-pdb
  namespace: geospatial
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: geospatial-python-service
