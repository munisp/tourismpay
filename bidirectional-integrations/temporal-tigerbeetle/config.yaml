apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-tigerbeetle-config
  namespace: insurance-platform
data:
  config.yaml: |
    temporal:
      host: temporal-frontend.temporal:7233
      namespace: insurance-platform
      taskQueue: financial-transactions
      maxConcurrentWorkflows: 100
      maxConcurrentActivities: 200
    
    tigerbeetle:
      clusterID: 0
      addresses:
        - tigerbeetle-0.tigerbeetle-headless:3000
        - tigerbeetle-1.tigerbeetle-headless:3000
        - tigerbeetle-2.tigerbeetle-headless:3000
      connectionTimeout: 30s
      requestTimeout: 10s
      maxRetries: 3
    
    ledgers:
      - id: 1
        name: insurance-operations
        description: Main insurance operations ledger
      - id: 2
        name: claims-reserve
        description: Claims reserve ledger
      - id: 3
        name: premium-collection
        description: Premium collection ledger
    
    accounts:
      systemAccounts:
        - id: "00000000-0000-0000-0000-000000000001"
          ledger: 1
          code: 1
          description: System liability account
        - id: "00000000-0000-0000-0000-000000000002"
          ledger: 1
          code: 2
          description: System asset account
        - id: "00000000-0000-0000-0000-000000000003"
          ledger: 2
          code: 1
          description: Claims reserve pool
        - id: "00000000-0000-0000-0000-000000000004"
          ledger: 3
          code: 1
          description: Premium collection account
    
    workflows:
      paymentWorkflow:
        name: PaymentWorkflow
        taskQueue: financial-transactions
        executionTimeout: 1h
        runTimeout: 30m
        taskTimeout: 30s
        retryPolicy:
          initialInterval: 1s
          backoffCoefficient: 2.0
          maximumInterval: 1m
          maximumAttempts: 3
      
      claimPaymentWorkflow:
        name: ClaimPaymentWorkflow
        taskQueue: financial-transactions
        executionTimeout: 2h
        runTimeout: 1h
        taskTimeout: 30s
        retryPolicy:
          initialInterval: 1s
          backoffCoefficient: 2.0
          maximumInterval: 1m
          maximumAttempts: 3
      
      refundWorkflow:
        name: RefundWorkflow
        taskQueue: financial-transactions
        executionTimeout: 1h
        runTimeout: 30m
        taskTimeout: 30s
        retryPolicy:
          initialInterval: 1s
          backoffCoefficient: 2.0
          maximumInterval: 1m
          maximumAttempts: 5
    
    activities:
      createAccountActivity:
        startToCloseTimeout: 30s
        scheduleToStartTimeout: 1m
        scheduleToCloseTimeout: 2m
        heartbeatTimeout: 10s
      
      createTransferActivity:
        startToCloseTimeout: 30s
        scheduleToStartTimeout: 1m
        scheduleToCloseTimeout: 2m
        heartbeatTimeout: 10s
      
      postPendingTransferActivity:
        startToCloseTimeout: 30s
        scheduleToStartTimeout: 1m
        scheduleToCloseTimeout: 2m
        heartbeatTimeout: 10s
      
      voidPendingTransferActivity:
        startToCloseTimeout: 30s
        scheduleToStartTimeout: 1m
        scheduleToCloseTimeout: 2m
        heartbeatTimeout: 10s
      
      getAccountBalanceActivity:
        startToCloseTimeout: 10s
        scheduleToStartTimeout: 30s
        scheduleToCloseTimeout: 1m
        heartbeatTimeout: 5s
    
    monitoring:
      prometheus:
        enabled: true
        port: 9090
        path: /metrics
      
      logging:
        level: info
        format: json
        output: stdout
      
      tracing:
        enabled: true
        jaegerEndpoint: jaeger-collector:14268
        samplingRate: 0.1
    
    resilience:
      circuitBreaker:
        enabled: true
        threshold: 5
        timeout: 30s
        halfOpenRequests: 3
      
      rateLimiting:
        enabled: true
        requestsPerSecond: 1000
        burst: 2000
      
      bulkhead:
        enabled: true
        maxConcurrentCalls: 100
        maxWaitDuration: 5s
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-tigerbeetle-worker
  namespace: insurance-platform
  labels:
    app: temporal-tigerbeetle-worker
    component: integration
spec:
  replicas: 3
  selector:
    matchLabels:
      app: temporal-tigerbeetle-worker
  template:
    metadata:
      labels:
        app: temporal-tigerbeetle-worker
        component: integration
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: temporal-tigerbeetle-worker
      containers:
      - name: worker
        image: insurance-platform/temporal-tigerbeetle-worker:latest
        imagePullPolicy: Always
        ports:
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: TEMPORAL_HOST
          value: "temporal-frontend.temporal:7233"
        - name: TEMPORAL_NAMESPACE
          value: "insurance-platform"
        - name: TEMPORAL_TASK_QUEUE
          value: "financial-transactions"
        - name: TIGERBEETLE_ADDRESSES
          value: "tigerbeetle-0.tigerbeetle-headless:3000,tigerbeetle-1.tigerbeetle-headless:3000,tigerbeetle-2.tigerbeetle-headless:3000"
        - name: TIGERBEETLE_CLUSTER_ID
          value: "0"
        - name: LOG_LEVEL
          value: "info"
        volumeMounts:
        - name: config
          mountPath: /etc/config
          readOnly: true
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: temporal-tigerbeetle-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - temporal-tigerbeetle-worker
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: temporal-tigerbeetle-worker
  namespace: insurance-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: temporal-tigerbeetle-worker
  namespace: insurance-platform
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: temporal-tigerbeetle-worker
  namespace: insurance-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: temporal-tigerbeetle-worker
subjects:
- kind: ServiceAccount
  name: temporal-tigerbeetle-worker
  namespace: insurance-platform
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: temporal-tigerbeetle-worker
  namespace: insurance-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: temporal-tigerbeetle-worker
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: temporal-tigerbeetle-worker
  namespace: insurance-platform
  labels:
    app: temporal-tigerbeetle-worker
spec:
  selector:
    matchLabels:
      app: temporal-tigerbeetle-worker
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
