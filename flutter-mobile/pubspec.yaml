name: tourismpay_mobile
description: TourismPay - Tourism Payment Platform for Africa
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^6.0.3
  json_annotation: ^4.8.1
  intl: ^0.19.0
  qr_code_scanner: ^1.0.1
  qr_flutter: ^4.1.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  local_auth: ^2.1.8
  geolocator: ^11.0.0
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
