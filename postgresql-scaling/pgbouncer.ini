;; PgBouncer Configuration for Insurance Platform
;; Inspired by OpenAI's PostgreSQL Scaling Architecture
;; Supports millions of QPS with connection pooling

[databases]
;; Primary database for writes
insurance_primary = host=primary.postgres.internal port=5432 dbname=insurance_platform auth_user=pgbouncer

;; Read replicas for read-heavy workloads
insurance_replica_1 = host=replica1.postgres.internal port=5432 dbname=insurance_platform auth_user=pgbouncer
insurance_replica_2 = host=replica2.postgres.internal port=5432 dbname=insurance_platform auth_user=pgbouncer
insurance_replica_3 = host=replica3.postgres.internal port=5432 dbname=insurance_platform auth_user=pgbouncer

;; Workload-isolated databases
;; High Priority: Customer-facing operations
insurance_high_priority = host=high-priority.postgres.internal port=5432 dbname=insurance_platform auth_user=pgbouncer

;; Medium Priority: Agent operations, underwriting
insurance_medium_priority = host=medium-priority.postgres.internal port=5432 dbname=insurance_platform auth_user=pgbouncer

;; Low Priority: Analytics, reporting, batch jobs
insurance_low_priority = host=low-priority.postgres.internal port=5432 dbname=insurance_platform auth_user=pgbouncer

;; Isolated: Fraud detection (Insurance Radar)
insurance_fraud_detection = host=fraud-detection.postgres.internal port=5432 dbname=insurance_platform auth_user=pgbouncer

[pgbouncer]
;; Connection settings
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir = /var/run/pgbouncer

;; Authentication
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

;; Pool Mode: transaction for most workloads
;; - statement: Best for simple queries, highest connection reuse
;; - transaction: Good balance, releases connection after transaction
;; - session: Traditional mode, connection held for entire session
pool_mode = transaction

;; Pool sizing (inspired by OpenAI's approach)
;; Azure PostgreSQL max connections: 5000
;; We reserve headroom for direct connections and maintenance
default_pool_size = 100
min_pool_size = 10
reserve_pool_size = 25
reserve_pool_timeout = 5

;; Maximum connections per database
max_db_connections = 500

;; Maximum connections per user
max_user_connections = 200

;; Total maximum client connections
max_client_conn = 10000

;; Connection timeouts
server_connect_timeout = 15
server_login_retry = 15
server_idle_timeout = 600
server_lifetime = 3600

;; Query timeout to prevent long-running queries
query_timeout = 30
query_wait_timeout = 120

;; Client timeouts
client_idle_timeout = 0
client_login_timeout = 60

;; Idle transaction timeout (critical for preventing autovacuum blocking)
;; OpenAI recommends: idle_in_transaction_session_timeout
idle_transaction_timeout = 60

;; DNS settings
dns_max_ttl = 15
dns_nxdomain_ttl = 15

;; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

;; Admin settings
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats

;; TLS settings for production
;server_tls_sslmode = require
;server_tls_ca_file = /etc/pgbouncer/ca.crt
;client_tls_sslmode = require
;client_tls_key_file = /etc/pgbouncer/server.key
;client_tls_cert_file = /etc/pgbouncer/server.crt

;; Application name prefix for tracking
application_name_add_host = 1

;; Disable prepared statements in transaction mode
;; (required for transaction pooling)
ignore_startup_parameters = extra_float_digits

[users]
;; Per-user pool settings
;; High-priority users get more connections
customer_portal = pool_mode=transaction max_user_connections=300
agent_portal = pool_mode=transaction max_user_connections=200
claims_service = pool_mode=transaction max_user_connections=200
fraud_detection = pool_mode=transaction max_user_connections=100
analytics_service = pool_mode=transaction max_user_connections=50
batch_processor = pool_mode=session max_user_connections=25
