version: "3.8"

services:
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: insureportal-opensearch
    environment:
      - cluster.name=insureportal-logs
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-InsureP0rtal!2026}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - logging

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.12.0
    container_name: insureportal-dashboards
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    networks:
      - logging

  fluentd:
    build:
      context: .
      dockerfile: Dockerfile.fluentd
    container_name: insureportal-fluentd
    volumes:
      - ./fluentd.conf:/fluentd/etc/fluent.conf:ro
      - /var/log/containers:/var/log/containers:ro
      - fluentd-buffer:/var/log/fluentd/buffer
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_SCHEME=https
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-InsureP0rtal!2026}
      - OPENSEARCH_SSL_VERIFY=false
    depends_on:
      - opensearch
    networks:
      - logging

volumes:
  opensearch-data:
  fluentd-buffer:

networks:
  logging:
    driver: bridge
