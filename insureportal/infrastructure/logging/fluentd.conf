# InsurePortal Log Aggregation — Fluentd Configuration
# Collects logs from all platform services and ships to OpenSearch

# ── Source: Application logs from Docker containers ──────────────────────────
<source>
  @type tail
  path /var/log/containers/insureportal-*.log
  pos_file /var/log/fluentd/containers.pos
  tag kubernetes.*
  read_from_head true
  <parse>
    @type json
    time_key time
    time_format %Y-%m-%dT%H:%M:%S.%NZ
  </parse>
</source>

# ── Source: Node.js application logs (structured JSON) ───────────────────────
<source>
  @type forward
  port 24224
  bind 0.0.0.0
  tag app.insureportal
</source>

# ── Filter: Add metadata ────────────────────────────────────────────────────
<filter kubernetes.**>
  @type kubernetes_metadata
  @id filter_kube_metadata
</filter>

# ── Filter: Parse structured logs ───────────────────────────────────────────
<filter app.insureportal.**>
  @type parser
  key_name log
  reserve_data true
  <parse>
    @type json
    time_key timestamp
    time_format %Y-%m-%dT%H:%M:%S.%LZ
  </parse>
</filter>

# ── Filter: Mask sensitive data ─────────────────────────────────────────────
<filter **>
  @type record_transformer
  enable_ruby true
  <record>
    log ${record["log"].to_s.gsub(/\b\d{11}\b/, '***BVN***').gsub(/\b\d{11}\b/, '***NIN***').gsub(/password["\s:=]+\S+/i, 'password=***')}
  </record>
</filter>

# ── Output: OpenSearch ──────────────────────────────────────────────────────
<match kubernetes.** app.insureportal.**>
  @type opensearch
  host "#{ENV['OPENSEARCH_HOST'] || 'opensearch'}"
  port "#{ENV['OPENSEARCH_PORT'] || '9200'}"
  scheme "#{ENV['OPENSEARCH_SCHEME'] || 'https'}"
  user "#{ENV['OPENSEARCH_USER'] || 'admin'}"
  password "#{ENV['OPENSEARCH_PASSWORD']}"
  ssl_verify "#{ENV['OPENSEARCH_SSL_VERIFY'] || 'true'}"
  index_name insureportal-logs
  type_name _doc

  logstash_format true
  logstash_prefix insureportal
  logstash_dateformat %Y.%m.%d

  include_tag_key true
  tag_key @log_name

  reconnect_on_error true
  reload_on_failure true
  reload_connections false

  <buffer>
    @type file
    path /var/log/fluentd/buffer/opensearch
    flush_interval 5s
    flush_thread_count 2
    retry_max_interval 30
    retry_forever true
    chunk_limit_size 8M
    queue_limit_length 32
    overflow_action block
  </buffer>
</match>

# ── Output: Stdout (for debugging) ─────────────────────────────────────────
<match fluent.**>
  @type null
</match>
