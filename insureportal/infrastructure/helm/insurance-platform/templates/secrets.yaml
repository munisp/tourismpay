apiVersion: v1
kind: Secret
metadata:
  name: {{ include "insurance-platform.fullname" . }}-secrets
  labels:
    {{- include "insurance-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.database.existingSecret }}
  {{- else }}
  POSTGRES_USER: "{{ .Values.postgresql.auth.username }}"
  POSTGRES_PASSWORD: "{{ .Values.secrets.database.password | default "CHANGE_ME_IN_PRODUCTION" }}"
  DATABASE_URL: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.secrets.database.password | default "CHANGE_ME_IN_PRODUCTION" }}@{{ include "insurance-platform.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  {{- end }}
  
  {{- if .Values.secrets.redis.existingSecret }}
  {{- else }}
  REDIS_PASSWORD: "{{ .Values.secrets.redis.password | default "CHANGE_ME_IN_PRODUCTION" }}"
  REDIS_URL: "redis://:{{ .Values.secrets.redis.password | default "CHANGE_ME_IN_PRODUCTION" }}@{{ include "insurance-platform.fullname" . }}-redis-master:6379"
  {{- end }}
  
  {{- if .Values.secrets.jwt.existingSecret }}
  {{- else }}
  JWT_SECRET: "{{ .Values.secrets.jwt.secret | default "CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET" }}"
  JWT_REFRESH_SECRET: "{{ .Values.secrets.jwt.refreshSecret | default "CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET" }}"
  {{- end }}
  
  {{- if .Values.secrets.payment.existingSecret }}
  {{- else }}
  PAYSTACK_SECRET_KEY: "{{ .Values.secrets.payment.paystackSecretKey | default "sk_live_CHANGE_ME" }}"
  FLUTTERWAVE_SECRET_KEY: "{{ .Values.secrets.payment.flutterwaveSecretKey | default "FLWSECK_CHANGE_ME" }}"
  {{- end }}
  
  {{- if .Values.secrets.swift.existingSecret }}
  {{- else }}
  OS_USERNAME: "{{ .Values.secrets.swift.username | default "CHANGE_ME" }}"
  OS_PASSWORD: "{{ .Values.secrets.swift.password | default "CHANGE_ME" }}"
  OS_PROJECT_NAME: "{{ .Values.openstack.projectName }}"
  OS_AUTH_URL: "{{ .Values.openstack.authUrl }}"
  {{- end }}
