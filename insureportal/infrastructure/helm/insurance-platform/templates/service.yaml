{{- $fullName := include "insurance-platform.fullname" . -}}

{{- range $serviceName, $service := .Values }}
{{- if and (kindIs "map" $service) (hasKey $service "enabled") $service.enabled (hasKey $service "service") }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-{{ $serviceName | kebabcase }}
  labels:
    {{- include "insurance-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $serviceName | kebabcase }}
spec:
  type: {{ $service.service.type }}
  ports:
    - port: {{ $service.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: {{ $serviceName | kebabcase }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
{{- end }}
{{- end }}
