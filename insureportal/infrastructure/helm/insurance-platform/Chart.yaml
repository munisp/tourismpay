apiVersion: v2
name: insurance-platform
description: Unified Insurance Platform Helm Chart for OpenStack/Kubernetes deployment
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - insurance
  - microservices
  - openstack
  - kubernetes
home: https://github.com/yourdomain/unified-insurance-platform
maintainers:
  - name: Insurance Platform Team
    email: platform@yourdomain.com
dependencies:
  - name: postgresql
    version: "13.2.24"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "18.6.1"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: kafka
    version: "26.6.2"
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
