# InsurePortal Production Values
# Override default values.yaml for production deployment

replicaCount: 3

image:
  repository: ghcr.io/munisp/insureportal
  pullPolicy: IfNotPresent
  tag: ""  # Set via CI/CD --set image.tag=$SHA

resources:
  limits:
    cpu: "2"
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: 1m
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
  hosts:
    - host: insureportal.ng
      paths:
        - path: /
          pathType: Prefix
    - host: api.insureportal.ng
      paths:
        - path: /api
          pathType: Prefix
  tls:
    - secretName: insureportal-tls
      hosts:
        - insureportal.ng
        - api.insureportal.ng

# Database
postgresql:
  enabled: false  # Use external managed DB in production
  external:
    host: ""      # Set via --set postgresql.external.host
    port: 5432
    database: insureportal_prod
    existingSecret: insureportal-db-credentials
    sslMode: require

# Redis
redis:
  enabled: false  # Use external managed Redis in production
  external:
    host: ""      # Set via --set redis.external.host
    port: 6379
    existingSecret: insureportal-redis-credentials
    tls: true

# Kafka
kafka:
  enabled: false  # Use external managed Kafka in production
  external:
    brokers: ""   # Set via --set kafka.external.brokers
    saslMechanism: SCRAM-SHA-256
    existingSecret: insureportal-kafka-credentials
    tls: true

# Keycloak
keycloak:
  enabled: false  # Use external managed Keycloak
  external:
    url: ""       # Set via --set keycloak.external.url
    realm: insureportal
    existingSecret: insureportal-keycloak-credentials

# Observability
monitoring:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
  grafana:
    enabled: true
    dashboards:
      enabled: true

# Security
networkPolicy:
  enabled: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Probes
livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

# Node affinity for production
nodeSelector:
  node-role: production

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - insureportal
          topologyKey: kubernetes.io/hostname

# Microservices
microservices:
  claims-adjudication-engine:
    replicas: 2
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi

  underwriting-engine:
    replicas: 2
    resources:
      limits:
        cpu: "1"
        memory: 1Gi

  fraud-detection-go:
    replicas: 2
    resources:
      limits:
        cpu: "1"
        memory: 1Gi

  policy-lifecycle-service:
    replicas: 2
    resources:
      limits:
        cpu: 500m
        memory: 512Mi

  premium-collection-service:
    replicas: 2
    resources:
      limits:
        cpu: 500m
        memory: 512Mi

  notification-service:
    replicas: 2
    resources:
      limits:
        cpu: 500m
        memory: 512Mi

  kyc-kyb-system:
    replicas: 2
    resources:
      limits:
        cpu: 500m
        memory: 512Mi

  naicom-compliance-module:
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
