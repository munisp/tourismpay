apiVersion: v2
name: ngapp-platform
description: NGApp Insurance Platform - Complete Helm chart for all microservices
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - insurance
  - microservices
  - nigerian-insurance
  - naicom
maintainers:
  - name: NGApp Team
dependencies:
  - name: postgresql
    version: "15.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "18.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: kafka
    version: "28.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: kafka.enabled
  - name: keycloak
    version: "21.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: keycloak.enabled
  - name: opensearch
    version: "2.x"
    repository: "https://opensearch-project.github.io/helm-charts/"
    condition: opensearch.enabled
