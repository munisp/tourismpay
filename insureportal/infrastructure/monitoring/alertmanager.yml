# ─────────────────────────────────────────────────────────────────────────────
# Alertmanager Configuration — InsurePortal
# ─────────────────────────────────────────────────────────────────────────────
# Incident escalation stack (all open-source):
#   critical  → Grafana OnCall webhook (on-call rotation + escalation chains)
#               + Slack #pos-alerts-critical
#   warning   → Slack #pos-alerts-warning
#   fraud     → Slack #pos-fraud-alerts (always, regardless of severity)
#   default   → Slack #pos-alerts-info
#
# Grafana OnCall is the open-source alternative to PagerDuty.
# Docs: https://grafana.com/docs/oncall/latest/
# Self-hosted: docker-compose.monitoring.yml includes the oncall service.
#
# Replace the webhook URLs and Slack tokens with real values before deploying.
# Inject secrets via environment variables or a secrets manager (Vault, etc.).
# ─────────────────────────────────────────────────────────────────────────────

global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.insureportal.ng:587"
  smtp_from: "alerts@insureportal.ng"
  smtp_auth_username: "alerts@insureportal.ng"
  smtp_auth_password: "smtp-password-change-in-production"
  smtp_require_tls: true

# ── Routing tree ──────────────────────────────────────────────────────────────
route:
  receiver: "slack-info"
  group_by: ["alertname", "service", "environment"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical → Grafana OnCall (on-call rotation) + Slack critical
    - matchers:
        - severity = "critical"
      receiver: "grafana-oncall-critical"
      continue: true

    - matchers:
        - severity = "critical"
      receiver: "slack-critical"

    # Warning → Slack warning channel
    - matchers:
        - severity = "warning"
      receiver: "slack-warning"

    # Fraud alerts always go to fraud channel (any severity)
    - matchers:
        - alertname =~ ".*Fraud.*"
      receiver: "slack-fraud"
      continue: true

# ── Inhibition rules ─────────────────────────────────────────────────────────
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname", "service"]

# ── Receivers ────────────────────────────────────────────────────────────────
receivers:

  # ── Grafana OnCall (open-source on-call rotation + escalation) ─────────────
  # Grafana OnCall exposes a Prometheus-compatible alertmanager webhook.
  # Obtain the webhook URL from:
  #   Grafana OnCall UI → Integrations → Alertmanager → Copy webhook URL
  # Self-hosted OnCall runs on port 8080 (see docker-compose.monitoring.yml).
  - name: "grafana-oncall-critical"
    webhook_configs:
      - url: "http://oncall:8080/integrations/v1/alertmanager/insureportal-integration-token-change-in-production/"
        send_resolved: true
        http_config:
          # Optional: add a Bearer token if OnCall is behind auth
          # authorization:
          #   credentials: "oncall-api-token-change-in-production"
        max_alerts: 50
        timeout: 10s

  # ── Slack: critical channel ─────────────────────────────────────────────────
  - name: "slack-critical"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/T00000000/B00000000/slack-webhook-url-change-in-production"
        channel: "#pos-alerts-critical"
        send_resolved: true
        icon_emoji: ":rotating_light:"
        username: "InsurePortal Alertmanager"
        title: '{{ template "slack.default.title" . }}'
        title_link: "https://grafana.insureportal.ng/d/insureportal-prod-v1"
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service }}
          *Environment:* {{ .Labels.environment }}
          {{ end }}
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        actions:
          - type: button
            text: "View Dashboard"
            url: "https://grafana.insureportal.ng/d/insureportal-prod-v1"
          - type: button
            text: "Grafana OnCall"
            url: "http://oncall:3000/a/grafana-oncall-app/incidents"
          - type: button
            text: "Runbook"
            url: "https://wiki.insureportal.ng/runbooks/insureportal"

  # ── Slack: warning channel ──────────────────────────────────────────────────
  - name: "slack-warning"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/T00000000/B00000000/slack-webhook-url-change-in-production"
        channel: "#pos-alerts-warning"
        send_resolved: true
        icon_emoji: ":warning:"
        username: "InsurePortal Alertmanager"
        title: '{{ template "slack.default.title" . }}'
        title_link: "https://grafana.insureportal.ng/d/insureportal-prod-v1"
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service }}
          {{ end }}
        color: "warning"

  # ── Slack: fraud-specific channel ──────────────────────────────────────────
  - name: "slack-fraud"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/T00000000/B00000000/slack-webhook-url-change-in-production"
        channel: "#pos-fraud-alerts"
        send_resolved: true
        icon_emoji: ":shield:"
        username: "InsurePortal Fraud Monitor"
        title: ":shield: Fraud Alert Spike — InsurePortal"
        title_link: "https://grafana.insureportal.ng/d/insureportal-prod-v1"
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}
        color: "danger"

  # ── Slack: info / default ───────────────────────────────────────────────────
  - name: "slack-info"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/T00000000/B00000000/slack-webhook-url-change-in-production"
        channel: "#pos-alerts-info"
        send_resolved: true
        icon_emoji: ":information_source:"
        username: "InsurePortal Alertmanager"
        title: '{{ template "slack.default.title" . }}'
        text: '{{ template "slack.default.text" . }}'

templates:
  - "/etc/alertmanager/templates/*.tmpl"
