global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'posinsureportal-production'
    region: 'ng-west'

# ── Alert manager ─────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Alert rule files ──────────────────────────────────────────────────────────
rule_files:
  - "alerts.yml"
  - "alerts/float.rules.yml"
  - "alerts/fraud.rules.yml"
  - "alerts/sim.rules.yml"
  - "alerts/latency.rules.yml"
  - "alerts/availability.rules.yml"
  - "alerts/mdm.rules.yml"
  - "alerts/cbn.rules.yml"

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:
  # InsurePortal application
  - job_name: 'insureportal-app'
    static_configs:
      - targets: ['insureportal-app:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 15s

  # Workflow orchestrator (Go)
  - job_name: 'workflow-orchestrator'
    static_configs:
      - targets: ['workflow-orchestrator:8090']
    metrics_path: '/metrics'

  # Fraud engine (Rust)
  - job_name: 'fraud-engine'
    static_configs:
      - targets: ['fraud-engine:8085']
    metrics_path: '/metrics'

  # TX validator (Rust)
  - job_name: 'tx-validator'
    static_configs:
      - targets: ['tx-validator:8086']
    metrics_path: '/metrics'

  # Ledger bridge (Rust)
  - job_name: 'ledger-bridge'
    static_configs:
      - targets: ['ledger-bridge:8087']
    metrics_path: '/metrics'

  # POS Printer service (Rust)
  - job_name: 'pos-printer'
    static_configs:
      - targets: ['pos-printer:8088']
    metrics_path: '/metrics'

  # i18n Currency service (Rust)
  - job_name: 'i18n-currency'
    static_configs:
      - targets: ['i18n-currency:8089']
    metrics_path: '/metrics'

  # PostgreSQL (via postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis (via redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Kafka (via kafka_exporter)
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # Keycloak
  - job_name: 'keycloak'
    static_configs:
      - targets: ['keycloak:8080']
    metrics_path: '/metrics'

  # Vault
  - job_name: 'vault'
    static_configs:
      - targets: ['vault:8200']
    metrics_path: '/v1/sys/metrics'
    params:
      format: ['prometheus']
    bearer_token_file: /etc/prometheus/vault-token

  # Permify
  - job_name: 'permify'
    static_configs:
      - targets: ['permify:3476']
    metrics_path: '/metrics'

  # Temporal
  - job_name: 'temporal'
    static_configs:
      - targets: ['temporal:7233']
    metrics_path: '/metrics'

  # nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']

  # Node exporter (host metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor (container metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: '/metrics'

  # OTA service
  - job_name: 'ota-service'
    static_configs:
      - targets: ['ota-service:8081']
    metrics_path: '/metrics'

  # MDM Compliance Engine
  - job_name: 'mdm-compliance-engine'
    static_configs:
      - targets: ['mdm-compliance-engine:8091']
    metrics_path: '/metrics'

  # MDM Geofence Service
  - job_name: 'mdm-geofence-service'
    static_configs:
      - targets: ['mdm-geofence-service:8092']
    metrics_path: '/metrics'

  # CBN Reporting Engine
  - job_name: 'cbn-reporting-engine'
    static_configs:
      - targets: ['cbn-reporting-engine:8095']
    metrics_path: '/metrics'

  # Settlement Service
  - job_name: 'settlement-service'
    static_configs:
      - targets: ['settlement-service:8073']
    metrics_path: '/metrics'

  # KYC Service
  - job_name: 'kyc-service'
    static_configs:
      - targets: ['kyc-service:8070']
    metrics_path: '/metrics'

  # Fluvio
  - job_name: 'fluvio'
    static_configs:
      - targets: ['fluvio:9003']
    metrics_path: '/metrics'
