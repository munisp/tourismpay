groups:
  # ── CBN Regulatory Compliance Alerts ─────────────────────────────────────────
  - name: cbn_compliance
    interval: 60s
    rules:
      - alert: CBNReportSubmissionOverdue
        expr: (time() - pos_cbn_last_report_submission_timestamp{report_type="monthly_activity"}) > 864000
        for: 0m
        labels:
          severity: critical
          team: compliance
          category: cbn
        annotations:
          summary: "CBN Monthly Activity Report submission overdue"
          description: "The CBN Monthly Activity Report has not been submitted for {{ $value | humanizeDuration }}. CBN deadline is 10 days after month-end."
          runbook: "https://docs.insureportal.ng/runbooks/cbn-report-overdue"

      - alert: CBNQuarterlyFraudReportOverdue
        expr: (time() - pos_cbn_last_report_submission_timestamp{report_type="quarterly_fraud"}) > 1296000
        for: 0m
        labels:
          severity: critical
          team: compliance
          category: cbn
        annotations:
          summary: "CBN Quarterly Fraud Report submission overdue"
          description: "The CBN Quarterly Fraud Report has not been submitted for {{ $value | humanizeDuration }}. CBN deadline is 15 days after quarter-end."
          runbook: "https://docs.insureportal.ng/runbooks/cbn-report-overdue"

      - alert: CBNSARNotSubmitted
        expr: pos_cbn_sar_pending_total > 0
        for: 72h
        labels:
          severity: critical
          team: compliance
          category: cbn
        annotations:
          summary: "Suspicious Activity Report (SAR) not submitted within 72 hours"
          description: "{{ $value }} SAR(s) are pending submission. CBN requires SAR submission within 3 business days of detection."
          runbook: "https://docs.insureportal.ng/runbooks/cbn-sar-overdue"

      - alert: SARThresholdBreached
        expr: pos_transaction_amount_ngn > 5000000
        for: 0m
        labels:
          severity: warning
          team: compliance
          category: cbn
        annotations:
          summary: "Transaction exceeds CBN SAR threshold (NGN 5M)"
          description: "Transaction {{ $labels.transaction_id }} amount {{ $value | humanize }} NGN exceeds the CBN SAR threshold of NGN 5,000,000. Review required."

      - alert: DailyAggregateThresholdBreached
        expr: sum by (customer_id) (increase(pos_transaction_amount_ngn[24h])) > 10000000
        for: 0m
        labels:
          severity: warning
          team: compliance
          category: cbn
        annotations:
          summary: "Customer daily transaction aggregate exceeds NGN 10M"
          description: "Customer {{ $labels.customer_id }} has transacted {{ $value | humanize }} NGN in the last 24 hours, exceeding the CBN CTR threshold."

      - alert: KYCExpiryApproaching
        expr: (pos_kyc_expiry_timestamp - time()) < 2592000
        for: 0m
        labels:
          severity: warning
          team: compliance
          category: cbn
        annotations:
          summary: "Agent KYC document expiring within 30 days"
          description: "Agent {{ $labels.agent_id }} KYC document {{ $labels.document_type }} expires in {{ $value | humanizeDuration }}."

      - alert: KYCExpired
        expr: (pos_kyc_expiry_timestamp - time()) < 0
        for: 0m
        labels:
          severity: critical
          team: compliance
          category: cbn
        annotations:
          summary: "Agent KYC document expired"
          description: "Agent {{ $labels.agent_id }} KYC document {{ $labels.document_type }} has expired. Agent must be suspended until KYC is renewed."
          runbook: "https://docs.insureportal.ng/runbooks/kyc-expired"

      - alert: CBNReportGenerationFailed
        expr: increase(pos_cbn_report_generation_failures_total[1h]) > 0
        for: 0m
        labels:
          severity: critical
          team: compliance
          category: cbn
        annotations:
          summary: "CBN report generation failed"
          description: "{{ $value }} CBN report generation failure(s) in the last hour. Report type: {{ $labels.report_type }}."
          runbook: "https://docs.insureportal.ng/runbooks/cbn-report-failure"

  # ── Settlement Alerts ─────────────────────────────────────────────────────────
  - name: settlement
    interval: 60s
    rules:
      - alert: SettlementBatchFailed
        expr: increase(pos_settlement_batch_failures_total[1h]) > 0
        for: 0m
        labels:
          severity: critical
          team: finance
          category: settlement
        annotations:
          summary: "Settlement batch processing failed"
          description: "{{ $value }} settlement batch failure(s) in the last hour. Batch ID: {{ $labels.batch_id }}."
          runbook: "https://docs.insureportal.ng/runbooks/settlement-failure"

      - alert: SettlementDelayed
        expr: (time() - pos_settlement_last_successful_timestamp) > 86400
        for: 0m
        labels:
          severity: critical
          team: finance
          category: settlement
        annotations:
          summary: "Settlement has not completed in over 24 hours"
          description: "Last successful settlement was {{ $value | humanizeDuration }} ago. Immediate investigation required."
          runbook: "https://docs.insureportal.ng/runbooks/settlement-delayed"

      - alert: SettlementReconciliationMismatch
        expr: abs(pos_settlement_expected_amount_ngn - pos_settlement_actual_amount_ngn) > 10000
        for: 0m
        labels:
          severity: critical
          team: finance
          category: settlement
        annotations:
          summary: "Settlement reconciliation mismatch detected"
          description: "Settlement {{ $labels.settlement_id }} has a discrepancy of {{ $value | humanize }} NGN between expected and actual amounts."
          runbook: "https://docs.insureportal.ng/runbooks/settlement-mismatch"

      - alert: NIPSettlementWindowMissed
        expr: pos_nip_settlement_window_missed_total > 0
        for: 0m
        labels:
          severity: critical
          team: finance
          category: settlement
        annotations:
          summary: "NIP settlement window missed"
          description: "{{ $value }} NIP settlement window(s) missed. This may result in penalties from NIBSS."
          runbook: "https://docs.insureportal.ng/runbooks/nip-window-missed"
