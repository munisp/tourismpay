groups:
  - name: latency_alerts
    interval: 15s
    rules:
      # ── Transaction API high latency ────────────────────────────────────────
      - alert: TransactionApiHighLatency
        expr: histogram_quantile(0.95, rate(posinsureportal_http_request_duration_seconds_bucket{route=~"/api/trpc/transactions.*"}[5m])) > 3
        for: 3m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Transaction API p95 latency > 3s"
          description: "95th percentile latency for transaction API is {{ $value | humanizeDuration }}. PAX A920 timeout is 30s but UX degrades above 3s."
          runbook: "https://wiki.insureportal.ng/runbooks/high-latency"

      # ── SIM mid-transaction latency ─────────────────────────────────────────
      - alert: SimMidTransactionLatencyHigh
        expr: posinsureportal_sim_latency_ms > 3000
        for: 1m
        labels:
          severity: critical
          team: network
        annotations:
          summary: "SIM latency > 3000ms on terminal {{ $labels.terminal_id }}"
          description: "Terminal {{ $labels.terminal_id }} SIM {{ $labels.sim_slot }} has latency of {{ $value }}ms. Watchdog will trigger failover at 3000ms."

      # ── Database query slow ─────────────────────────────────────────────────
      - alert: DatabaseQuerySlow
        expr: histogram_quantile(0.99, rate(posinsureportal_db_query_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Database p99 query latency > 1s"
          description: "99th percentile database query duration is {{ $value | humanizeDuration }}. Check for missing indexes or lock contention."

      # ── Kafka consumer lag ──────────────────────────────────────────────────
      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_group_lag{topic="transactions"} > 1000
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Kafka consumer lag > 1000 on transactions topic"
          description: "Consumer group {{ $labels.group }} is {{ $value }} messages behind on topic {{ $labels.topic }}."

      # ── Temporal workflow execution slow ────────────────────────────────────
      - alert: TemporalWorkflowSlow
        expr: histogram_quantile(0.95, rate(temporal_workflow_execution_duration_seconds_bucket[10m])) > 300
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Temporal settlement workflow p95 > 5 minutes"
          description: "Settlement workflow execution is taking {{ $value | humanizeDuration }} at p95. Expected < 5 minutes."
