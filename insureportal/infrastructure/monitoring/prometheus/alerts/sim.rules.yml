groups:
  - name: sim_alerts
    interval: 30s
    rules:
      # ── SIM failover triggered ──────────────────────────────────────────────
      - alert: SimFailoverTriggered
        expr: increase(posinsureportal_sim_failovers_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
          team: network
        annotations:
          summary: "SIM failover on terminal {{ $labels.terminal_id }}"
          description: "Terminal {{ $labels.terminal_id }} (agent {{ $labels.agent_code }}) switched from {{ $labels.from_slot }} to {{ $labels.to_slot }}. Reason: {{ $labels.reason }}."
          runbook: "https://wiki.insureportal.ng/runbooks/sim-failover"

      # ── Multiple failovers in short window ──────────────────────────────────
      - alert: FrequentSimFailovers
        expr: increase(posinsureportal_sim_failovers_total[30m]) > 3
        for: 5m
        labels:
          severity: critical
          team: network
        annotations:
          summary: "Terminal {{ $labels.terminal_id }} has {{ $value }} SIM failovers in 30 minutes"
          description: "Frequent SIM failovers suggest persistent network instability. Consider field investigation."

      # ── Poor signal quality ─────────────────────────────────────────────────
      - alert: PoorSimSignalQuality
        expr: posinsureportal_sim_rssi_dbm < -90
        for: 5m
        labels:
          severity: warning
          team: network
        annotations:
          summary: "Poor SIM signal on terminal {{ $labels.terminal_id }}"
          description: "Terminal {{ $labels.terminal_id }} has RSSI of {{ $value }} dBm (below -90 dBm threshold). Transactions may be unreliable."

      # ── High packet loss ────────────────────────────────────────────────────
      - alert: HighSimPacketLoss
        expr: posinsureportal_sim_packet_loss_percent > 15
        for: 3m
        labels:
          severity: warning
          team: network
        annotations:
          summary: "High packet loss on terminal {{ $labels.terminal_id }}"
          description: "Terminal {{ $labels.terminal_id }} has {{ $value }}% packet loss on SIM {{ $labels.sim_slot }}."

      # ── Terminal offline ────────────────────────────────────────────────────
      - alert: TerminalOffline
        expr: time() - posinsureportal_terminal_last_probe_timestamp > 300
        for: 5m
        labels:
          severity: warning
          team: network
        annotations:
          summary: "Terminal {{ $labels.terminal_id }} offline for > 5 minutes"
          description: "No probe received from terminal {{ $labels.terminal_id }} (agent {{ $labels.agent_code }}) for {{ $value | humanizeDuration }}."
