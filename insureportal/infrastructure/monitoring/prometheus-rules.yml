# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Alerting Rules — InsurePortal
# ─────────────────────────────────────────────────────────────────────────────
# Load this file in prometheus.yml under rule_files:
#   rule_files:
#     - /etc/prometheus/rules/insureportal-rules.yml
# ─────────────────────────────────────────────────────────────────────────────

groups:

  # ── Transaction SLA ─────────────────────────────────────────────────────────
  - name: pos_shell_transactions
    interval: 30s
    rules:

      # p95 latency > 500 ms (critical SLA breach)
      - alert: InsurePortalHighTransactionLatency
        expr: |
          histogram_quantile(0.95,
            rate(pos_transaction_duration_ms_bucket[5m])
          ) > 500
        for: 2m
        labels:
          severity: critical
          service: insureportal
          environment: production
        annotations:
          summary: "InsurePortal p95 transaction latency exceeds 500 ms"
          description: >
            The 95th percentile transaction latency is
            {{ printf "%.0f" $value }} ms (threshold: 500 ms).
            This breaches the agent SLA. Investigate DB query times,
            platform service timeouts, and float lock contention.
          runbook: "https://wiki.insureportal.ng/runbooks/insureportal#high-latency"

      # Transaction error rate > 5% over 5 min window
      - alert: InsurePortalHighTransactionErrorRate
        expr: |
          rate(pos_transaction_errors_total[5m])
          /
          (rate(pos_transactions_total[5m]) + 0.001)
          > 0.05
        for: 3m
        labels:
          severity: critical
          service: insureportal
          environment: production
        annotations:
          summary: "InsurePortal transaction error rate exceeds 5%"
          description: >
            Transaction error rate is {{ printf "%.1f" (mul $value 100) }}%
            over the last 5 minutes. Check platform service connectivity,
            float balance levels, and DB connection pool health.
          runbook: "https://wiki.insureportal.ng/runbooks/insureportal#transaction-errors"

      # Transaction volume drops to zero (possible outage)
      - alert: InsurePortalNoTransactions
        expr: rate(pos_transactions_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
          service: insureportal
          environment: production
        annotations:
          summary: "InsurePortal: no transactions processed in 10 minutes"
          description: >
            No transactions have been processed in the last 10 minutes.
            This may indicate a server outage, connectivity issue, or
            agent authentication failure.

  # ── Fraud Monitoring ─────────────────────────────────────────────────────────
  - name: pos_shell_fraud
    interval: 30s
    rules:

      # Fraud alert spike: > 10 alerts per minute
      - alert: InsurePortalFraudAlertSpike
        expr: rate(pos_fraud_alerts_total[5m]) * 60 > 10
        for: 1m
        labels:
          severity: critical
          service: insureportal
          environment: production
        annotations:
          summary: "InsurePortal: fraud alert spike detected"
          description: >
            Fraud alerts are firing at
            {{ printf "%.1f" (mul $value 60) }} per minute
            (threshold: 10/min). Possible coordinated attack or
            compromised agent terminals. Review the fraud dashboard
            immediately.
          runbook: "https://wiki.insureportal.ng/runbooks/insureportal#fraud-spike"

  # ── Float Management ─────────────────────────────────────────────────────────
  - name: pos_shell_float
    interval: 60s
    rules:

      # Float lock contention: > 5 locks per minute
      - alert: InsurePortalFloatLockContention
        expr: rate(pos_float_locks_total[5m]) * 60 > 5
        for: 2m
        labels:
          severity: warning
          service: insureportal
          environment: production
        annotations:
          summary: "InsurePortal: high float lock contention"
          description: >
            Float lock rate is {{ printf "%.1f" (mul $value 60) }} per minute.
            High contention may cause transaction delays. Consider
            increasing float allocation or reviewing concurrent transaction
            patterns.

  # ── Platform Service Health ──────────────────────────────────────────────────
  - name: pos_shell_platform
    interval: 30s
    rules:

      # Platform call error rate > 10% (platform degradation)
      - alert: InsurePortalPlatformDegradation
        expr: |
          rate(pos_platform_calls_total{status="error"}[5m])
          /
          (rate(pos_platform_calls_total[5m]) + 0.001)
          > 0.10
        for: 3m
        labels:
          severity: warning
          service: insureportal
          environment: production
        annotations:
          summary: "InsurePortal: platform service degradation (>10% errors)"
          description: >
            Platform service call error rate is
            {{ printf "%.1f" (mul $value 100) }}% for service
            {{ $labels.platform_service }}.
            InsurePortal is operating in fail-open fallback mode.
            Check platform service health dashboards.
          runbook: "https://wiki.insureportal.ng/runbooks/insureportal#platform-degradation"

  # ── Node.js Process Health ───────────────────────────────────────────────────
  - name: pos_shell_process
    interval: 60s
    rules:

      # High memory usage (> 512 MB heap)
      - alert: InsurePortalHighMemoryUsage
        expr: nodejs_heap_size_used_bytes > 536870912
        for: 5m
        labels:
          severity: warning
          service: insureportal
          environment: production
        annotations:
          summary: "InsurePortal Node.js heap usage exceeds 512 MB"
          description: >
            Node.js heap is at
            {{ printf "%.0f" (div $value 1048576) }} MB.
            Check for memory leaks in socket handlers, LLM response
            buffering, or Prometheus metric cardinality explosion.

      # Event loop lag > 100 ms (server under stress)
      - alert: InsurePortalEventLoopLag
        expr: nodejs_eventloop_lag_seconds > 0.1
        for: 2m
        labels:
          severity: warning
          service: insureportal
          environment: production
        annotations:
          summary: "InsurePortal Node.js event loop lag exceeds 100 ms"
          description: >
            Event loop lag is {{ printf "%.0f" (mul $value 1000) }} ms.
            Blocking I/O or CPU-intensive operations are stalling the
            event loop. Review recent code changes and DB query patterns.
