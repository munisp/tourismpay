# Prometheus stack values for NGApp Platform
# Install with: helm install monitoring prometheus-community/kube-prometheus-stack -f monitoring/prometheus-values.yaml

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    podMonitorSelector: {}
    ruleSelector: {}
    retention: 30d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 100Gi

grafana:
  enabled: true
  adminPassword: "" # Use existing secret
  adminExistingSecret: ngapp-grafana-credentials
  persistence:
    enabled: true
    size: 10Gi
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: ngapp
          orgId: 1
          folder: NGApp
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/ngapp
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
  config:
    route:
      receiver: slack-notifications
      group_by: [alertname, service]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: pagerduty
          continue: true
        - match:
            severity: warning
          receiver: slack-notifications
    receivers:
      - name: slack-notifications
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook-url
            channel: "#ngapp-alerts"
            title: "{{ "{{" }} .GroupLabels.alertname {{ "}}" }}"
            text: "{{ "{{" }} range .Alerts {{ "}}" }}{{ "{{" }} .Annotations.description {{ "}}" }}\n{{ "{{" }} end {{ "}}" }}"
      - name: pagerduty
        pagerduty_configs:
          - service_key_file: /etc/alertmanager/secrets/pagerduty-key
            severity: "{{ "{{" }} .GroupLabels.severity {{ "}}" }}"
