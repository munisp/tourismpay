version: "3.9"

# NGApp Staging Environment
# Usage: docker compose -f deploy/staging/docker-compose.staging.yml up -d

services:
  # ── Core Application ──
  portal:
    build:
      context: ../../customer-portal-full
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=staging
      - DATABASE_URL=postgres://ngapp:${DB_PASSWORD}@postgres:5432/ngapp_staging
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=ngapp
      - KEYCLOAK_CLIENT_ID=ngapp-portal
      - TEMPORAL_ADDRESS=temporal:7233
      - OPENSEARCH_URL=http://opensearch:9200
      - DEMO_MODE=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Database ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ngapp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-staging_password}
      POSTGRES_DB: ngapp_staging
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Message Broker ──
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: staging-cluster-001
    ports:
      - "9092:9092"
    volumes:
      - kafkadata:/var/lib/kafka/data

  # ── Authentication ──
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/ngapp_staging
      KC_DB_USERNAME: ngapp
      KC_DB_PASSWORD: ${DB_PASSWORD:-staging_password}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Workflow Engine ──
  temporal:
    image: temporalio/auto-setup:1.23
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ngapp
      POSTGRES_PWD: ${DB_PASSWORD:-staging_password}
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Search & Analytics ──
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearchdata:/usr/share/opensearch/data

  # ── Go Microservices ──
  ussd-gateway:
    build:
      context: ../../ussd-gateway
      dockerfile: Dockerfile
    environment:
      - PORT=8088
      - DATABASE_URL=postgres://ngapp:${DB_PASSWORD:-staging_password}@postgres:5432/ngapp_staging
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy

  api-marketplace:
    build:
      context: ../../api-marketplace
      dockerfile: Dockerfile
    environment:
      - PORT=8096
      - DATABASE_URL=postgres://ngapp:${DB_PASSWORD:-staging_password}@postgres:5432/ngapp_staging
      - REDIS_URL=redis://redis:6379
    ports:
      - "8096:8096"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  kafkadata:
  opensearchdata:
