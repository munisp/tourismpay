apiVersion: apps/v1
kind: Deployment
metadata:
  name: group-life-admin
  namespace: insurance-platform
  labels:
    app: group-life-admin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: group-life-admin
  template:
    metadata:
      labels:
        app: group-life-admin
    spec:
      containers:
        - name: group-life-admin
          image: group-life-admin:latest
          ports:
            - containerPort: 8095
          env:
            - name: PORT
              value: "8095"
          livenessProbe:
            httpGet:
              path: /health
              port: 8095
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8095
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: group-life-admin
  namespace: insurance-platform
spec:
  selector:
    app: group-life-admin
  ports:
    - port: 8095
      targetPort: 8095
  type: ClusterIP
