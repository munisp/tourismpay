apiVersion: apps/v1
kind: Deployment
metadata:
  name: gdpr-compliance
  namespace: insurance-platform
  labels:
    app: gdpr-compliance
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gdpr-compliance
  template:
    metadata:
      labels:
        app: gdpr-compliance
    spec:
      containers:
        - name: gdpr-compliance
          image: gdpr-compliance:latest
          ports:
            - containerPort: 8104
          env:
            - name: PORT
              value: "8104"
          livenessProbe:
            httpGet:
              path: /health
              port: 8104
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8104
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: gdpr-compliance
  namespace: insurance-platform
spec:
  selector:
    app: gdpr-compliance
  ports:
    - port: 8104
      targetPort: 8104
  type: ClusterIP
