apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: policy-workflow-events
spec:
  pubsubname: pubsub
  topic: policy-workflow-completed
  routes:
    default: /api/v1/webhooks/dapr/policy-workflow-completed
scopes:
- policy-webhook-service
---
apiVersion: dapr.io/v2alpha1
kind: Subscription
metadata:
  name: policy-workflow-failed-events
spec:
  pubsubname: pubsub
  topic: policy-workflow-failed
  routes:
    default: /api/v1/webhooks/dapr/policy-workflow-failed
scopes:
- policy-webhook-service
