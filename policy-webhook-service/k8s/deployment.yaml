apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-webhook-service
  labels:
    app: policy-webhook-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: policy-webhook-service
  template:
    metadata:
      labels:
        app: policy-webhook-service
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "policy-webhook-service"
        dapr.io/app-port: "8000"
        dapr.io/app-protocol: "http"
        dapr.io/log-level: "info"
        dapr.io/sidecar-cpu-limit: "1000m"
        dapr.io/sidecar-memory-limit: "512Mi"
        dapr.io/sidecar-cpu-request: "100m"
        dapr.io/sidecar-memory-request: "256Mi"
    spec:
      containers:
      - name: policy-webhook-service
        image: insurance-platform/policy-webhook-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: TEMPORAL_ADDRESS
          value: "temporal:7233"
        - name: TEMPORAL_NAMESPACE
          value: "insurance-platform"
        - name: DAPR_GRPC_PORT
          value: "50001"
        - name: DAPR_HTTP_PORT
          value: "3500"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: policy-webhook-service
  labels:
    app: policy-webhook-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: policy-webhook-service
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: policy-webhook-service
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - webhook.insurance-platform.example.com
    secretName: policy-webhook-tls
  rules:
  - host: webhook.insurance-platform.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: policy-webhook-service
            port:
              number: 80
