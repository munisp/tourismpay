version: "3.9"

# Consolidated Docker Compose — reduces 31 containers to 15 (52% reduction).
#
# Consolidations:
# - 8 Go middleware services → 1 unified Go binary (go-middleware)
# - 4 Rust services (pbac, rate-limiter, crypto, offline-sync) → 1 (rust-core)
# - 3 Rust middleware (redis-cache, tigerbeetle-ledger, fluvio-stream) → 1 (rust-streaming)
# - 3 Python services (python-ml, opensearch-analytics, lakehouse-analytics) → 1 (python-unified)
# - Removed zookeeper (Kafka KRaft mode)
# - ml-inference merged into python-unified

services:
  # ─── Core Infrastructure ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ndsep_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ndsep_secure_2026}
      POSTGRES_DB: ${POSTGRES_DB:-ndsep_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndsep_user -d ndsep_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Main Application ──────────────────────────────────────────────────────
  tourismpay-pwa:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-ndsep_user}:${POSTGRES_PASSWORD:-ndsep_secure_2026}@postgres:5432/${POSTGRES_DB:-ndsep_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-production-jwt-secret-min-32-characters-long}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-default-internal-key}
      GO_SETTLEMENT_URL: http://go-settlement:8081
      GO_MIDDLEWARE_URL: http://go-middleware:8100
      RUST_CORE_URL: http://rust-core:8090
      RUST_STREAMING_URL: http://rust-streaming:8110
      PYTHON_UNIFIED_URL: http://python-unified:8001
      KAFKA_BROKER_URL: kafka:9092
      KEYCLOAK_URL: http://keycloak:8080
      OPENSEARCH_URL: http://opensearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Go Settlement Service ──────────────────────────────────────────────────
  go-settlement:
    build:
      context: ./go-settlement-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: postgresql://${POSTGRES_USER:-ndsep_user}:${POSTGRES_PASSWORD:-ndsep_secure_2026}@postgres:5432/${POSTGRES_DB:-ndsep_db}
      TIGERBEETLE_ADDR: tigerbeetle:3000
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-default-internal-key}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Go Middleware (Unified: kafka, temporal, keycloak, permify, apisix, waf, dapr, mojaloop) ──
  go-middleware:
    build:
      context: ./go-middleware
      dockerfile: Dockerfile.unified
    ports:
      - "8100:8100"
    environment:
      PORT: "8100"
      KAFKA_BROKERS: kafka:9092
      TEMPORAL_HOST: temporal:7233
      KEYCLOAK_URL: http://keycloak:8080
      APISIX_ADMIN_URL: http://apisix:9180
      JWT_SECRET: ${JWT_SECRET:-production-jwt-secret-min-32-characters-long}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-default-internal-key}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Rust Core (Unified: pbac, rate-limiter, crypto, offline-sync) ──────────
  rust-core:
    build:
      context: ./rust-services
      dockerfile: Dockerfile.core
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      RUST_LOG: info
      REDIS_URL: redis://redis:6379
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-default-internal-key}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Rust Streaming (Unified: redis-cache, tigerbeetle-ledger, fluvio-stream) ──
  rust-streaming:
    build:
      context: ./rust-services
      dockerfile: Dockerfile.streaming
    ports:
      - "8110:8110"
    environment:
      PORT: "8110"
      RUST_LOG: info
      REDIS_URL: redis://redis:6379
      TIGERBEETLE_ADDR: tigerbeetle:3000
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-default-internal-key}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8110/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Python Unified (ML + OpenSearch Analytics + Lakehouse + Inference) ─────
  python-unified:
    build:
      context: .
      dockerfile: python-services/Dockerfile.unified
    ports:
      - "8001:8001"
      - "8120:8120"
      - "8121:8121"
      - "8200:8200"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ndsep_user}:${POSTGRES_PASSWORD:-ndsep_secure_2026}@postgres:5432/${POSTGRES_DB:-ndsep_db}
      REDIS_URL: redis://redis:6379
      OPENSEARCH_URL: http://opensearch:9200
      ML_MODEL_DIR: /app/ml/saved_models
      LAKEHOUSE_DATA_DIR: /data/lakehouse
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-default-internal-key}
    volumes:
      - lakehouse-data:/data/lakehouse
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Infrastructure (profile: middleware) ───────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    profiles: ["middleware"]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ndsep_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-ndsep_user}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-ndsep_secure_2026}
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["middleware"]

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    profiles: ["middleware"]

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.15.6
    ports:
      - "3001:3000"
    command: start --addresses=0.0.0.0:3000 /data/0_0.tigerbeetle
    volumes:
      - tigerbeetle_data:/data
    profiles: ["middleware"]

  apisix:
    image: apache/apisix:3.8.0-debian
    ports:
      - "9080:9080"
      - "9180:9180"
    volumes:
      - ./infra/ha/apisix:/usr/local/apisix/conf
    profiles: ["middleware"]

  temporal:
    image: temporalio/auto-setup:1.23
    ports:
      - "7233:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ndsep_user}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-ndsep_secure_2026}
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["middleware"]

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-tourismpay-neo4j-2026}
      NEO4J_PLUGINS: '["graph-data-science"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    profiles: ["ml"]

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  tigerbeetle_data:
  neo4j_data:
  lakehouse-data:
