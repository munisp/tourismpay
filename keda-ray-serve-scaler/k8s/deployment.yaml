apiVersion: apps/v1
kind: Deployment
metadata:
  name: keda-ray-serve-scaler
  namespace: ray-serve
  labels:
    app: keda-ray-serve-scaler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: keda-ray-serve-scaler
  template:
    metadata:
      labels:
        app: keda-ray-serve-scaler
    spec:
      serviceAccountName: keda-ray-serve-scaler
      containers:
      - name: scaler
        image: your-registry/keda-ray-serve-scaler:latest
        imagePullPolicy: Always
        ports:
        - name: grpc
          containerPort: 50051
          protocol: TCP
        env:
        - name: RAY_SERVE_URL
          value: "http://ray-serve-service:8000"
        - name: PROMETHEUS_URL
          value: "http://prometheus:9090"
        - name: GRPC_PORT
          value: "50051"
        - name: SCRAPE_INTERVAL
          value: "10"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "grpc_health_probe -addr=:50051 || exit 0"
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "grpc_health_probe -addr=:50051 || exit 0"
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: keda-ray-serve-scaler
  namespace: ray-serve
  labels:
    app: keda-ray-serve-scaler
spec:
  type: ClusterIP
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
    protocol: TCP
  selector:
    app: keda-ray-serve-scaler
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keda-ray-serve-scaler
  namespace: ray-serve
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keda-ray-serve-scaler
  namespace: ray-serve
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keda-ray-serve-scaler
  namespace: ray-serve
subjects:
- kind: ServiceAccount
  name: keda-ray-serve-scaler
  namespace: ray-serve
roleRef:
  kind: Role
  name: keda-ray-serve-scaler
  apiGroup: rbac.authorization.k8s.io
