apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ray-serve-queue-scaler
  namespace: ray-serve
spec:
  scaleTargetRef:
    name: ray-serve-deployment
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 3
  maxReplicaCount: 20
  fallback:
    failureThreshold: 3
    replicas: 5
  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
          - type: Percent
            value: 50
            periodSeconds: 60
          - type: Pods
            value: 2
            periodSeconds: 60
          selectPolicy: Min
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
          - type: Percent
            value: 100
            periodSeconds: 30
          - type: Pods
            value: 4
            periodSeconds: 30
          selectPolicy: Max
  triggers:
  # External scaler for queue length
  - type: external
    metadata:
      scalerAddress: keda-ray-serve-scaler.ray-serve.svc.cluster.local:50051
      modelNames: fraud-detection,risk-scoring,claims-prediction
      queueLengthThreshold: "20"
      metricType: queue
    metricType: Value
  # External scaler for latency
  - type: external
    metadata:
      scalerAddress: keda-ray-serve-scaler.ray-serve.svc.cluster.local:50051
      modelNames: fraud-detection,risk-scoring,claims-prediction
      latencyP95Threshold: "500"
      metricType: latency
    metricType: Value
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ray-serve-combined-scaler
  namespace: ray-serve
spec:
  scaleTargetRef:
    name: ray-serve-deployment
  pollingInterval: 5
  cooldownPeriod: 120
  minReplicaCount: 5
  maxReplicaCount: 50
  fallback:
    failureThreshold: 3
    replicas: 10
  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 600
          policies:
          - type: Percent
            value: 25
            periodSeconds: 120
          - type: Pods
            value: 3
            periodSeconds: 120
          selectPolicy: Min
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
          - type: Percent
            value: 200
            periodSeconds: 15
          - type: Pods
            value: 10
            periodSeconds: 15
          selectPolicy: Max
  triggers:
  # Combined external scaler (queue + latency)
  - type: external
    metadata:
      scalerAddress: keda-ray-serve-scaler.ray-serve.svc.cluster.local:50051
      modelNames: fraud-detection,risk-scoring,claims-prediction
      queueLengthThreshold: "50"
      latencyP95Threshold: "1000"
      metricType: combined
    metricType: AverageValue
---
